oasis. They are the earliest realistic portraits to survive in any number from antiquity, and they look astonishingly modern.", "longForm": "After Rome annexed Egypt in 30 BCE, the local elite kept practicing mummification but combined it with Roman portrait conventions. The result was these Fayum mummy portraits \u2014 encaustic paintings on thin wood panels, made during the sitter's lifetime, then attached over the face when they died. The technique was lost for over a thousand years until rediscovered in the 19th century. The eyes in particular have a directness that anticipates Byzantine icons and, much later, modern portrait painting.", "tags": ["roman-egypt", "encaustic", "portrait", "funerary"], "comprehensionQuestion": {"question": "What makes Fayum mummy portraits unusual in the history of ancient art?", "options": ["They are the only ancient paintings made on canvas", "They are the largest surviving body of realistic individual portraiture from the ancient world", "They were made by Greek artists working in Rome", "They depict only Egyptian gods, not humans"], "correctIndex": 1, "explanation": "The Fayum portraits are the earliest large body of realistic individual portraiture to survive from antiquity \u2014 hundreds of faces painted with specific features, jewelry, and hairstyles. Most ancient portraiture was idealized; these were meant to look like specific people."}, "lat": 29.31, "lng": 30.84}, "met-gothic-stained-glass": {"id": "met-gothic-stained-glass", "title": "Stained Glass Panel: The Visitation", "artistId": null, "year": 1280, "decade": 1280, "eraId": "sacred-medieval", "regionId": "europe", "subRegionId": "french", "museumId": "met", "medium": "Pot-metal glass and vitreous paint", "dimensions": "approx. 60 x 40 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Chartres%20Cathedral%2008%20-%20Stained%20glass.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 3, "wallLabel": "A stained glass panel showing the Visitation \u2014 the moment Mary visits her cousin Elizabeth \u2014 made in northern France around 1280. The colors are produced by metal oxides fused into the glass during manufacture (pot-metal glass), not by surface paint, which is why Gothic stained glass retains its saturation after seven centuries.", "longForm": "Gothic cathedrals were designed around their stained glass. The architectural breakthroughs of the 12th century \u2014 the pointed arch, the flying buttress, the rib vault \u2014 were not aesthetic inventions but engineering solutions that let walls become so thin they could be replaced by glass. The light coming through colored glass was understood theologically as the light of God filtered into the human world. Chartres, Sainte-Chapelle, and Bourges retain the most extensive original Gothic glass programs; smaller panels like this one come from churches that did not survive intact.", "tags": ["stained-glass", "gothic", "pot-metal", "religious"], "comprehensionQuestion": {"question": "Why did Gothic architects develop pointed arches, flying buttresses, and rib vaults?", "options": ["Purely for aesthetic reasons \u2014 they preferred the pointed arch's visual appearance", "As structural solutions that transferred weight away from walls, allowing them to be replaced with glass", "To make churches taller than Romanesque ones as a statement of civic pride", "Because pointed arches were stronger than round arches in earthquakes"], "correctIndex": 1, "explanation": "The pointed arch, flying buttress, and rib vault are engineering solutions to a single problem: how do you get light into a massive stone building? By directing structural loads to external buttresses, Gothic architects could reduce walls to thin membranes of glass. The aesthetic was a consequence of the engineering, not the goal."}, "lat": 48.45, "lng": 1.49}, "met-greek-grave-stele": {"id": "met-greek-grave-stele", "title": "Marble Grave Stele of a Young Woman and Servant", "artistId": null, "year": -395, "decade": -390, "eraId": "ancient-worlds", "regionId": "europe", "subRegionId": "greek-byzantine", "museumId": "met", "medium": "Marble", "dimensions": "178 x 73 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Marble%20grave%20stele%20of%20a%20young%20woman%20and%20servant%20MET%20DT11989.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "metObjectId": 253505, "famousLevel": 5, "wallLabel": "A young Athenian woman leans against the frame of her grave marker, exhausted and wistful, a jewel box in her hand. Beside her stands a little girl \u2014 her sister, perhaps, or a household slave \u2014 with hair cut short in mourning. Made in Athens around 395 BCE, at the height of the Classical period. The restrained naturalism of the pose was revolutionary; nothing before it in sculpture had shown grief as quietly as this.", "longForm": "Classical Athenian grave stelae (ca. 430\u2013317 BCE) represent one of the great flowerings of naturalistic sculpture in the ancient world. The Athenians who commissioned them were, by our standards, an elite minority \u2014 only citizens and metics wealthy enough to afford carved marble. The stelae show families in moments of farewell: handshakes, lingering gazes, hands reaching toward hands. What's remarkable is their emotional restraint. Greek culture had a word for this restraint \u2014 sophrosyne \u2014 that meant something between moderation and knowing your place in the cosmos. These grave reliefs embody it: grief made visible without becoming melodrama. When the Macedonian king Demetrios Phalereus banned elaborate grave monuments in 317 BCE as an austerity measure, the tradition stopped almost overnight.", "tags": ["classical-greek", "marble", "grave-stele", "funerary"], "comprehensionQuestion": {"question": "What word describes the emotional quality of Classical Athenian grave stelae \u2014 their restrained, dignified treatment of grief?", "options": ["Hubris \u2014 an excessive pride expressing grief loudly and publicly", "Sophrosyne \u2014 a quality of measured restraint that shows grief without melodrama", "Kleos \u2014 the desire for glory expressed even in death", "Pathos \u2014 an overwhelming emotional display meant to invoke pity"], "correctIndex": 1, "explanation": "Sophrosyne \u2014 roughly translatable as temperance, moderation, or restraint \u2014 was a central Greek virtue. The Classical grave stelae embody it: the young woman leans, tired and sad; she does not wail or tear her hair. The emotional depth is present but controlled, making the grief feel more real, not less."}, "lat": 37.97, "lng": 23.72}, "met-gudea-statue": {"id": "met-gudea-statue", "title": "Statue of Gudea", "artistId": null, "year": -2090, "decade": -2090, "eraId": "ancient-worlds", "regionId": "middle-east-north-africa", "subRegionId": "mesopotamian", "museumId": "met", "medium": "Diorite", "dimensions": "44 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Statue%20of%20Gudea%2C%20Metropolitan%20Museum%20of%20Art.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "metObjectId": 329072, "famousLevel": 4, "wallLabel": "Gudea, ruler of the Sumerian city-state of Lagash around 2100 BCE, depicted as a pious worshipper rather than a warrior \u2014 hands clasped, eyes wide, head shaved. Carved in diorite, an extremely hard stone imported from Magan (modern Oman) at great expense. About two dozen Gudea statues survive across museums.", "longForm": "Gudea ruled Lagash during a brief renaissance of Sumerian culture between the Akkadian and Ur III empires. He commissioned dozens of statues of himself, mostly in standing or seated poses with hands devoutly clasped, and inscribed each with long cuneiform texts describing the temples he had built for the gods. The diorite was sourced from Magan \u2014 modern Oman \u2014 and brought up the Persian Gulf by ship. Working diorite was technically extraordinary: it is harder than steel and could only be shaped by abrasion with even harder stones.", "tags": ["sumerian", "ruler-portrait", "diorite", "ur-iii"], "comprehensionQuestion": {"question": "Why did Gudea commission so many statues of himself in a posture of prayer rather than conquest?", "options": ["He was not a warrior and had no military victories to celebrate", "Gudea ruled during a religious renaissance that emphasized piety over military power as the source of royal legitimacy", "The statues were made after his death by priests", "Diorite was too hard to carve dynamic poses"], "correctIndex": 1, "explanation": "Gudea ruled Lagash during the Third Dynasty of Ur period, a time of deliberate cultural revival after Akkadian conquest. His statues emphasize piety and temple-building \u2014 the long inscriptions describe temples he built, not battles he won. Legitimacy came through devotion to the gods."}, "lat": 31.32, "lng": 45.85}, "met-han-tomb-figures": {"id": "met-han-tomb-figures", "title": "Tomb Figures of a Standing Woman", "artistId": null, "year": -100, "decade": -100, "eraId": "ancient-worlds", "regionId": "east-asia", "subRegionId": "chinese", "museumId": "met", "medium": "Earthenware with pigment", "dimensions": "approx. 60 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Female%20attendant%2C%20Han%20dynasty%2C%20earthenware%20with%20traces%20of%20polychrome%2C%20Honolulu%20Museum%20of%20Art.JPG?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 3, "wallLabel": "A pottery attendant from a Western Han tomb, made to accompany an aristocrat into the afterlife. Where earlier Chinese rulers were buried with live retainers, by the Han dynasty (206 BCE-220 CE) terracotta figures had become the convention \u2014 the same shift in attitudes that Egyptian shabti figures represent two millennia earlier.", "longForm": "The Han dynasty produced enormous quantities of these tomb figures, called mingqi, meaning 'spirit objects.' Made cheaply in molds and painted with mineral pigments that have mostly faded, they reproduced the world of the living for the dead: musicians, dancers, animals, soldiers, granaries, even toilets. The painting was applied after firing in cool earth tones \u2014 white, vermillion, indigo \u2014 much of which has flaked away over two thousand years. The most famous mingqi army is the Terracotta Warriors of the First Emperor; these later Han examples are scaled-down and far more common.", "tags": ["tomb", "mingqi", "han-dynasty", "earthenware"], "comprehensionQuestion": {"question": "Why did Han dynasty elites replace live sacrifice with pottery tomb figures?", "options": ["Pottery was more expensive and therefore more prestigious", "A shift in values \u2014 pottery substitutes fulfilled the same ritual function without requiring human death", "The Han government banned live sacrifice for economic reasons", "Pottery figures were believed to be more effective in the afterlife"], "correctIndex": 1, "explanation": "Earlier Chinese rulers \u2014 including the First Emperor with his terracotta army \u2014 were buried with live retainers and animals. The Han dynasty transition to pottery substitutes reflects both a humanitarian shift and an unbroken belief that the dead needed servants: the figures fulfill the ritual obligation at lower human cost."}, "lat": 34.27, "lng": 108.95}, "met-hatshepsut-kneeling": {"id": "met-hatshepsut-kneeling", "title": "Large Kneeling Statue of Hatshepsut", "artistId": null, "year": -1470, "decade": -1470, "movementId": "egyptian-ancient", "museumId": "met", "medium": "Granite, paint", "dimensions": "295.9 x 82.6 x 149.9 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Large%20Kneeling%20Statue%20of%20Hatshepsut%20MET%20DP116045.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art, Rogers Fund, 1929", "metObjectId": 544449, "famousLevel": 5, "wallLabel": "Hatshepsut, one of the few women to rule as pharaoh, kneels to make an offering to the god Amun. She wears the false beard and head-cloth of an Egyptian king. The statue is one of several that lined the processional way to her mortuary temple at Deir el-Bahri, smashed after her death and reassembled by Met excavators in the 1920s.", "longForm": "Hatshepsut ruled Egypt for about twenty years in the early 15th century BCE, first as regent for her young stepson Thutmose III, then as pharaoh in her own right. Female rulers were not unheard of in Egypt, but assuming the formal regalia of kingship \u2014 the false beard, the nemes head-cloth, the kilt \u2014 was a striking choice. After her death, Thutmose III ordered her image systematically erased from her monuments. The shattered fragments of this statue and several like it were discovered in pits near her temple at Deir el-Bahri during a Met excavation in 1927-28 and reassembled in New York. The pink granite came from Aswan, six hundred miles up the Nile.", "tags": ["sculpture", "pharaoh", "female-ruler", "new-kingdom"], "details": [], "eraId": "ancient-worlds", "regionId": "middle-east-north-africa", "subRegionId": "egyptian", "comprehensionQuestion": {"question": "Why does Hatshepsut wear a false beard and king's regalia in this statue?", "options": ["To disguise her gender from enemies", "To fulfill the ritual requirements of pharaonic kingship, regardless of her sex", "Because Egyptian sculptors only knew how to carve male figures", "To honor her deceased husband"], "correctIndex": 1, "explanation": "In Egyptian religious convention, the pharaoh's role demanded specific regalia \u2014 false beard, nemes headcloth, kilt \u2014 as costume of the office, not the person. Hatshepsut adopted full male regalia to fulfill the ritual identity of kingship."}, "lat": 25.74, "lng": 32.6}, "met-heian-buddha": {"id": "met-heian-buddha", "title": "Standing Buddha (Yakushi Nyorai)", "artistId": null, "year": 900, "decade": 900, "eraId": "sacred-medieval", "regionId": "east-asia", "subRegionId": "japanese", "museumId": "met", "medium": "Wood with traces of pigment", "dimensions": "approx. 142 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Amida%20Buddha%2C%20Heian%20period.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 3, "wallLabel": "A Heian-period Japanese wooden Buddha statue, made around 900 CE in the 'Ichiboku' technique \u2014 carved from a single block of wood. This is Yakushi Nyorai, the Buddha of healing, who in Japanese Buddhism holds a small medicine jar in his left hand.", "longForm": "Buddhism entered Japan from Korea in the 6th century and within two centuries had become the dominant religion of the imperial court. Heian-period sculpture (794-1185) developed distinctly Japanese sculptural forms \u2014 gentler than the Tang Chinese models that had inspired them, with softer drapery and more meditative expressions. The Ichiboku-zukuri technique of carving from a single block of wood emphasized the natural grain. Yakushi Nyorai was particularly popular among Heian aristocrats because of his role as healer; many temples were built specifically to ask his blessing for sick emperors and family members.", "tags": ["heian", "buddha", "wood-sculpture", "yakushi"], "comprehensionQuestion": {"question": "What was Yakushi Nyorai's specific role in Japanese Buddhist practice, and why was he popular among the Heian aristocracy?", "options": ["Yakushi was the Buddha of enlightenment, worshipped by monks seeking liberation", "Yakushi was the Medicine Buddha, who promised to cure illness and extend life \u2014 particularly valuable to an aristocracy obsessed with bodily wellbeing", "Yakushi presided over the afterlife and was worshipped in funeral rites", "Yakushi was specifically a protector of warriors and was popular at the imperial court for military reasons"], "correctIndex": 1, "explanation": "Yakushi Nyorai made twelve vows before attaining Buddhahood, including promises to cure all diseases and extend life. The Heian aristocracy \u2014 politically powerful, obsessed with purity and bodily health, vulnerable to the epidemics and political crises of the period \u2014 built numerous temples to Yakushi on behalf of sick emperors and family members. The medicine jar he holds in his left hand identifies him instantly."}, "lat": 34.98, "lng": 135.75}, "met-hellenistic-head": {"id": "met-hellenistic-head", "title": "Marble Head of a Youth", "artistId": null, "year": -200, "decade": -200, "eraId": "ancient-worlds", "regionId": "europe", "subRegionId": "greek-byzantine", "museumId": "met", "medium": "Marble", "dimensions": "approx. 28 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Marble%20head%20of%20a%20youth%20MET%20DP147854.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 3, "wallLabel": "A marble portrait head from the Hellenistic period \u2014 the era after Alexander the Great's conquests opened the Greek world into a vast, cosmopolitan civilization stretching from Egypt to Afghanistan. The slight turn of the head, the parted lips, the shadowed eyes under a furrowed brow: all are departures from Classical composure. Hellenistic sculpture discovered psychology.", "longForm": "The death of Alexander the Great in 323 BCE is the conventional start of the Hellenistic period (Greek: Hellenistikos, 'following Greek customs'). The Hellenistic world was enormous \u2014 Greek language and culture spread across the eastern Mediterranean and into Asia \u2014 and its art reflected this new scale. Sculptors moved away from the serene idealism of the Classical period toward emotional intensity, psychological complexity, and dramatic poses. Where Classical sculpture shows its subjects composed, Hellenistic sculpture shows them straining, suffering, or caught at a peak moment of action. The Hellenistic period ends with the Roman conquest of Egypt in 30 BCE, but Roman sculpture absorbed and continued its traditions for centuries.", "tags": ["hellenistic", "marble", "portrait", "post-alexander"], "comprehensionQuestion": {"question": "How does Hellenistic sculpture differ from Classical Greek sculpture in its treatment of the human figure?", "options": ["Hellenistic sculpture is technically inferior, using simplified forms because the craft declined after Alexander", "Hellenistic sculpture moved toward emotional intensity and psychological complexity, while Classical sculpture favored serene idealism and composure", "Hellenistic sculpture shows only gods and heroes, while Classical sculpture depicts ordinary people", "The difference is only one of scale \u2014 Hellenistic sculptures are larger but otherwise identical in style"], "correctIndex": 1, "explanation": "Classical sculpture (roughly 480\u2013323 BCE) idealized its subjects \u2014 calm, composed, at their most rational. Hellenistic sculpture (323\u201331 BCE) discovered drama: figures strain, suffer, twist mid-action. The Laoco\u00f6n, the Dying Gaul, the Winged Victory \u2014 all Hellenistic \u2014 reach for emotional states that Classical sculpture deliberately avoided."}, "lat": 37.97, "lng": 23.72}, "met-hokusai-great-wave": {"id": "met-hokusai-great-wave", "title": "Under the Wave off Kanagawa (The Great Wave)", "artistId": "hokusai", "year": 1831, "decade": 1830, "eraId": "revolution-industry", "regionId": "east-asia", "subRegionId": "japanese", "museumId": "met", "medium": "Polychrome woodblock print (nishiki-e)", "dimensions": "25.7 x 37.9 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Tsunami%20by%20hokusai%2019th%20century.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art, H. O. Havemeyer Collection, 1929", "metObjectId": 45434, "famousLevel": 5, "wallLabel": "Three fishing boats race a wave the size of a hill. Mount Fuji sits small in the distance, framed by the wave's claw of spray. The first print in Hokusai's Thirty-six Views of Mount Fuji series, published around 1831 when he was seventy. The blue is Prussian blue, a synthetic pigment imported from Europe \u2014 a small detail of trade that lets us date Japanese prints precisely.", "longForm": "The Great Wave is possibly the most reproduced image in art history. It was made for ordinary buyers in Edo (now Tokyo) and originally sold for the price of a bowl of noodles. Hokusai was in his seventies, working on his series of Mount Fuji views \u2014 Fuji is visible in every one of the thirty-six prints, often hidden cleverly in the composition. When Japan opened to trade in the 1850s and prints flooded into Europe, the Great Wave directly inspired Monet, Van Gogh, Debussy, and an entire wave of European modernism. The wave itself contains echoes of European linear perspective that Hokusai had encountered in Dutch prints \u2014 a quiet two-way exchange of influence between East and West.", "tags": ["woodblock-print", "ukiyo-e", "edo-period", "hokusai-fuji"], "comprehensionQuestion": {"question": "What small detail of the Great Wave reveals the trade connections between Japan and Europe in the early 19th century?", "options": ["The fishing boats use European-style rigging not native to Japan", "The blue pigment is Prussian blue \u2014 a synthetic color invented in Berlin around 1704 and imported to Japan through Dutch traders, making it possible to date Japanese prints that use it", "The wave's shape was copied from a European engraving of the Atlantic Ocean", "Mount Fuji is shown in a style borrowed from Dutch landscape painting"], "correctIndex": 1, "explanation": "Prussian blue \u2014 a vivid, stable synthetic pigment invented in Berlin around 1704 \u2014 reached Japan through the Dutch East India Company's trading post at Nagasaki. Hokusai adopted it enthusiastically in the 1820s-30s. This means we can date Japanese prints that use it to after its arrival in Japan, and it's a quiet reminder that the 'purely Japanese' Great Wave contains a trace of European chemistry."}, "lat": 35.69, "lng": 139.69}, "met-hopper-tables": {"id": "met-hopper-tables", "title": "Tables for Ladies", "artistId": "hopper", "year": 1930, "decade": 1930, "movementId": "american-modernism", "museumId": "met", "medium": "Oil on canvas", "dimensions": "122.6 x 153 cm", "image": "https://upload.wikimedia.org/wikipedia/en/d/da/Tables_for_Ladies%2C_Edward_Hopper%2C_1930.jpg", "imageCredit": "Public domain via fair use, The Metropolitan Museum of Art, George A. Hearn Fund, 1931", "famousLevel": 4, "wallLabel": "A waitress arranges fruit at the front of a New York restaurant whose name, painted on the window, was a Depression-era convention signaling that unaccompanied women were welcome. A cashier counts at the register; a couple dines in the background. The acid yellow electric light is the painting's most modern element.", "longForm": "Hopper painted this in 1930, the first full year of the Great Depression, when 'Tables for Ladies' signs were proliferating as restaurants tried to attract a respectable middle-class clientele who would have previously eaten only at home or in private clubs. The Met acquired it the following year, an unusually quick recognition. Note the construction of the space: the diagonal of the counter pulls the eye in from the lower right, the vertical of the windows holds the composition together, and the small black cat on the chair in the background is the only animate creature not actively at work.", "tags": ["urban-scene", "depression-era", "electric-light", "waitress"], "details": [{"crop": "waitress", "x": 0.3, "y": 0.5, "label": "Waitress arranging fruit"}, {"crop": "couple", "x": 0.75, "y": 0.55, "label": "The dining couple"}], "metObjectId": 488978, "imageSource": "wikipedia-fair-use", "eraId": "modernism", "regionId": "americas", "subRegionId": "us-american", "comprehensionQuestion": {"question": "What social change does the title 'Tables for Ladies' reference, and why did Hopper choose this moment to paint it?", "options": ["The title refers to a new custom of women hosting dinner parties in their own homes", "It references restaurant signs advertising that single women would be treated respectfully \u2014 not assumed to be prostitutes \u2014 a social shift of the early 20th century that Hopper captured at the height of the Depression", "The title ironically refers to the lack of tables available to women in the painting", "Tables for Ladies was a phrase meaning outdoor caf\u00e9 seating, newly fashionable in 1930s New York"], "correctIndex": 1, "explanation": "Restaurants began posting 'Tables for Ladies' signs in the early 20th century to signal that women dining alone or together would not be harassed or assumed to be soliciting. Hopper painted this in 1930, during the Depression, when the women at work in the painting hold newly-available public roles as cashier and waitress. The painting documents a social transition in the way women occupied public space."}, "lat": 40.71, "lng": -74.01}, "met-ife-head": {"id": "met-ife-head", "title": "Crowned Head of an Ooni (King)", "artistId": null, "year": 1300, "decade": 1300, "eraId": "sacred-medieval", "regionId": "sub-saharan-africa", "subRegionId": "ife", "museumId": "met", "medium": "Copper alloy with traces of red and black pigment", "dimensions": "approx. 31 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Arte%20yoruba%2C%20nigeria%2C%20testa%20da%20ife%2C%2012-15mo%20secolo.JPG?width=1200", "imageSource": "wikimedia", "imageCredit": "Photo public domain via Wikimedia Commons", "famousLevel": 5, "wallLabel": "A life-size head cast in copper alloy in the Yoruba city of Ife, present-day Nigeria, around 1300 CE. Probably an idealized portrait of an Ooni \u2014 a king-priest of Ife \u2014 used in second burial ceremonies where the deceased's body had decomposed. The naturalism stunned European researchers in 1910; the German anthropologist Leo Frobenius initially claimed they must be evidence of a lost Greek colony in Africa. They were not.", "longForm": "Ife was the spiritual capital of Yoruba civilization and a major political power from roughly the 11th to 15th centuries. Its sculptors produced bronze and terracotta heads of a refined naturalism that has no clear parallel in West African art before or since. The faces have parallel scarification lines, plump cheeks, almond eyes, full lips. They were used in second burials \u2014 re-creations of the deceased ruler's body as part of the ritual transfer of power. Most known Ife heads are now in Nigeria; a small number are at the British Museum and other Western collections. The Ooni of Ife today is still a major Yoruba religious authority.", "tags": ["copper-alloy", "naturalism", "royal-portrait", "yoruba"], "comprehensionQuestion": {"question": "Why did European scholars initially refuse to believe that the Ife heads were made by African artists?", "options": ["The Ife heads were found alongside European trade goods, suggesting a workshop collaboration", "The heads' naturalism was so sophisticated it contradicted colonial-era assumptions that sub-Saharan Africans were incapable of high artistic achievement \u2014 some scholars invented impossible alternative origins including ancient Greece", "The technique of bronze casting was not known in West Africa until European contact", "The Ife heads were made in a style identical to Greek sculpture, suggesting a shared teacher"], "correctIndex": 1, "explanation": "When Leo Frobenius encountered Ife heads in 1910, he attributed them to a lost Greek or Atlantean colony in Africa. This was not ignorance but ideology: the colonial project depended on the idea that African civilizations were primitive. Naturalistic portrait sculpture of this quality \u2014 equal or superior to contemporaneous European work \u2014 was evidence that the ideology was false, so the ideology rejected the evidence. We now know Ife heads date to the 11th-15th centuries CE and represent an indigenous Yoruba tradition of royal portraiture."}, "lat": 7.47, "lng": 4.56}, "met-illuminated-manuscript": {"id": "met-illuminated-manuscript", "title": "Initial Page from the Belles Heures of Jean de France", "artistId": null, "year": 1410, "decade": 1410, "eraId": "sacred-medieval", "regionId": "europe", "subRegionId": "french", "museumId": "met", "medium": "Tempera, gold, ink on vellum", "dimensions": "approx. 24 x 17 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Tr%C3%A8s%20Riches%20Heures%20du%20Duc%20de%20Berry%20Janvier.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art (Cloisters Collection)", "famousLevel": 4, "wallLabel": "A page from the Belles Heures of Jean de France, Duc de Berry \u2014 a richly illustrated book of hours made between 1405 and 1409 by the Limbourg brothers, three Flemish brothers working at the French court. Books of hours were private prayer books for the wealthy, with prayers for each canonical hour of the day.", "longForm": "The Limbourg brothers \u2014 Paul, Jean, and Herman \u2014 were arguably the most skilled illuminators of the late medieval period. They worked exclusively for the Duc de Berry, a fabulously wealthy collector who also commissioned the famous Tr\u00e8s Riches Heures (now at the Mus\u00e9e Cond\u00e9). Both manuscripts demonstrate the technical and observational sophistication that Flemish painters were developing in the decades just before oil paint would revolutionize panel painting. The Belles Heures is one of the only Limbourg manuscripts to survive nearly complete; it is the centerpiece of the Met Cloisters' medieval collection.", "tags": ["illuminated-manuscript", "book-of-hours", "limbourg-brothers", "international-gothic"], "comprehensionQuestion": {"question": "What was a Book of Hours, and who were they made for?", "options": ["A liturgical book used by priests during Mass, made for cathedral libraries", "A private prayer book organized around the canonical hours of the day, made for wealthy laypeople", "A scientific text measuring celestial hours, made for court astronomers", "A book recording the hours of a monastery's daily schedule, made for abbots"], "correctIndex": 1, "explanation": "Books of Hours were the medieval equivalent of a personal spiritual practice guide \u2014 prayers for each of the eight canonical hours (Matins, Lauds, Prime, Terce, Sext, None, Vespers, Compline), richly illustrated for wealthy patrons who could afford them. The Limbourg brothers' Belles Heures was made for one of the wealthiest men in France."}, "lat": 48.86, "lng": 2.35}, "met-indus-seal": {"id": "met-indus-seal", "title": "Indus Valley Steatite Seal", "artistId": null, "year": -2300, "decade": -2300, "eraId": "ancient-worlds", "regionId": "south-asia", "subRegionId": "indian", "museumId": null, "medium": "Steatite (soapstone)", "dimensions": "approx. 3 cm square", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Pashupati%20Seal%20from%20the%20Harappan%20Civilization.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain photo via Wikimedia Commons", "famousLevel": 4, "wallLabel": "A small carved steatite seal from the Indus Valley Civilization (modern Pakistan and northwest India), bearing a humped bull and a line of script that has never been deciphered. Made around 2300 BCE, these seals were used to stamp clay tablets \u2014 probably for trade \u2014 and traveled as far as Mesopotamia.", "longForm": "The Indus Valley Civilization, contemporary with Old Kingdom Egypt and the Sumerian city-states, may have been the largest urban civilization of its time. Its cities \u2014 Mohenjo-daro, Harappa, Dholavira \u2014 were laid out on grids with standardized brick sizes, sophisticated drainage, and what appear to be public granaries. Then, around 1900 BCE, it collapsed. The script on these seals remains undeciphered, possibly because no bilingual key has ever been found. We cannot read their literature, their laws, or even their names.", "tags": ["indus-valley", "seal", "undeciphered-script", "bronze-age"], "comprehensionQuestion": {"question": "What is the most significant unsolved mystery of the Indus Valley Civilization?", "options": ["Where its cities were located", "Its writing system, found on thousands of seals like this one, has never been deciphered", "Whether it had any art at all", "How its people transported the large stone seals"], "correctIndex": 1, "explanation": "The Indus script appears on hundreds of seals and has defied all attempts at decipherment. Without a bilingual text, we cannot read their language. We know more about ancient Sumerian merchants from 4,000 years ago than we know about the Indus people who may have been their trading partners."}, "lat": 27.33, "lng": 68.14, "originLabel": "National Museum, Delhi"}, "met-islamic-ceramic": {"id": "met-islamic-ceramic", "title": "Bowl with Arabic Inscription", "artistId": null, "year": 950, "decade": 950, "eraId": "sacred-medieval", "regionId": "middle-east-north-africa", "subRegionId": "islamic", "museumId": "met", "medium": "Earthenware with slip and underglaze", "dimensions": "approx. 28 cm diameter", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Nishapur%20Samanid%20ware%20inscription.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "A 10th-century earthenware bowl from the Samanid dynasty of present-day Iran and Central Asia, inscribed in elegant Kufic with an Arabic proverb: 'Knowledge: its beginning is bitter to taste, but its end is sweeter than honey.' The text is the entire ornament.", "longForm": "Samanid epigraphic pottery is one of the great expressions of Islamic ceramic art. Made in Nishapur (in present-day Iran) and Samarkand (in present-day Uzbekistan), these bowls used the elegant attenuated Kufic of the period as their sole decoration, often inscribing aphorisms about hospitality, knowledge, or proper conduct around the rim. They were luxury objects, but the messages were everyday wisdom \u2014 meant to be encountered repeatedly by guests at a meal. The technical innovation was applying the script in dark slip directly to the white slip ground, then sealing it under a clear lead glaze.", "tags": ["samanid", "ceramic", "kufic", "central-asia"], "comprehensionQuestion": {"question": "What does the Samanid bowl's inscribed proverb reveal about how Islamic decorative art was experienced?", "options": ["Islamic ceramics were purely decorative with no textual function", "Text on objects was meant to be read during use \u2014 at a meal, a proverb about knowledge would reach the diner as they ate", "The inscriptions were purely ornamental and most viewers couldn't read them", "The proverb identifies the workshop that made the bowl"], "correctIndex": 1, "explanation": "Samanid epigraphic ware placed aphorisms about hospitality, knowledge, and conduct on the interior of bowls \u2014 visible only when in use, during a meal. The text was meant to be encountered repeatedly by diners. The art was designed for active experience, not passive display. This integration of text and object is a defining feature of Islamic visual culture."}, "lat": 36.21, "lng": 59.62}, "met-iznik-tile": {"id": "met-iznik-tile", "title": "Tile Panel with Floral Scrolls", "artistId": null, "year": 1570, "decade": 1570, "eraId": "sacred-medieval", "regionId": "middle-east-north-africa", "subRegionId": "islamic", "museumId": "met", "medium": "Fritware with underglaze painting", "dimensions": "approx. 28 x 28 cm (each tile)", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Rustem%20Pasha%20Mosque%20tile%20detail.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "Ottoman Iznik tiles from the second half of the 16th century, when the workshops of Iznik in western Turkey were producing the finest ceramics in the Islamic world. The brilliant red ('tomato red' or 'sealing-wax red') that appears from around 1555 was a technical breakthrough not achieved by any other ceramic tradition \u2014 a raised slip of Armenian bole that fires to a dense, vivid red under the colorless glaze.", "longForm": "Iznik ceramics are named for the Turkish city of Iznik (ancient Nicaea, where the famous Christian council was held in 325 CE). The Iznik workshops produced tiles, vessels, and architectural revetments for the Ottoman court from the late 15th century until around 1700, when demand and quality declined together. The finest Iznik pieces \u2014 from roughly 1530-1600 \u2014 are distinguished by the so-called 'tomato red,' a thick raised slip of Armenian bole that fires separately from the other pigments, creating a slightly three-dimensional surface. The S\u00fcleymaniye Mosque and the R\u00fcstem Pasha Mosque in Istanbul contain the most extensive Iznik tilework programs.", "tags": ["ottoman", "iznik", "tiles", "underglaze"], "comprehensionQuestion": {"question": "What is the 'tomato red' of Iznik ceramics, and why did it disappear after about 1700?", "options": ["Tomato red was achieved using a Spanish cochineal dye imported after 1492", "Armenian bole \u2014 a thick slip of iron-rich clay \u2014 was applied in raised relief and fired to produce a vivid, slightly three-dimensional red impossible to achieve as a flat underglaze; the technique died when the specialist workshops declined after 1700", "Tomato red was a trade secret discovered by a single Iznik master and lost with his death", "The red pigment was imported from Persia and trade routes were disrupted, ending its supply"], "correctIndex": 1, "explanation": "The vivid 'sealing-wax red' of finest Iznik ware is produced by Armenian bole \u2014 a slip rich in iron oxide \u2014 applied thickly enough to stand slightly above the surface in low relief, then fired under the transparent glaze. The result has a slight three-dimensionality and a density of color that no other ceramic tradition achieved. As the Ottoman empire's imperial patronage declined after 1700, the workshops that maintained this demanding technique contracted and the knowledge was lost."}, "lat": 40.43, "lng": 29.72}, "met-jade-burial-suit": {"id": "met-jade-burial-suit", "title": "Jade Burial Suit", "artistId": null, "year": -120, "decade": -120, "eraId": "ancient-worlds", "regionId": "east-asia", "subRegionId": "chinese", "museumId": null, "medium": "Jade plaques sewn with gold wire", "dimensions": "approx. 175 cm long", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Xihan%20Tomb%201%20Jade%20Burial%20Suit.JPG?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain photo via Wikimedia Commons", "famousLevel": 4, "wallLabel": "A Han dynasty jade burial suit, made of over 2,000 small jade plaques sewn together with gold wire to encase the body of an aristocrat. Jade was believed to prevent decomposition. The most famous example, found in the tomb of Prince Liu Sheng at Mancheng in 1968, contained over 4 kilograms of gold thread.", "longForm": "Han dynasty (206 BCE-220 CE) elite tombs were vast underground palaces stocked with everything the deceased might need in the afterlife \u2014 food, servants, attendants, animals, currency. The jade burial suits represented the most extreme expression of this practice. Jade had been considered a substance with magical preservative properties in China since the Neolithic; encasing the body in jade was meant to preserve it intact for the soul to return to. They didn't work \u2014 the bodies inside have invariably decomposed \u2014 but the suits survive in stunning condition, monuments to the labor and wealth of the Han aristocracy.", "tags": ["han-dynasty", "jade", "burial", "elite-tomb"], "comprehensionQuestion": {"question": "Did jade burial suits actually preserve the bodies inside them?", "options": ["Yes \u2014 all known suits contain perfectly preserved remains", "No \u2014 every known suit contains fully decomposed remains; the belief that jade prevented decay was simply wrong", "Partially \u2014 jade preserved the skeleton but not soft tissue", "Unknown \u2014 no suits have ever been opened"], "correctIndex": 1, "explanation": "The jade burial suits failed at their stated purpose. Every suit opened by archaeologists has contained fully decomposed remains. The belief that jade \u2014 connected to heaven, eternal, imperishable \u2014 could prevent bodily decay was a religious conviction, not an empirical one. The suits survive; the bodies do not."}, "lat": 38.87, "lng": 115.47, "originLabel": "Hebei Museum, Baoding"}, "met-korean-celadon": {"id": "met-korean-celadon", "title": "Maebyeong (Plum) Bottle with Inlaid Cranes and Clouds", "artistId": null, "year": 1250, "decade": 1250, "eraId": "sacred-medieval", "regionId": "east-asia", "subRegionId": "korean", "museumId": "met", "medium": "Stoneware with inlaid decoration under celadon glaze", "dimensions": "approx. 34 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Korean%20-%20Maebyong%20-%20Walters%20491326.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "A Goryeo dynasty Korean celadon bottle inlaid with white and black slip in patterns of cranes and clouds, made around 1250. The technique \u2014 sanggam, where designs are carved into the leather-hard clay body, filled with contrasting slips, then covered with the characteristic blue-green celadon glaze \u2014 was a Korean innovation that produced some of the most prized ceramics in East Asia.", "longForm": "Goryeo celadon (918-1392) was so prized that it was exported to Song dynasty China, which itself produced extraordinary celadon \u2014 a rare case of Chinese collectors importing Korean ceramics rather than the other way around. The sanggam inlay technique was perfected in Korea in the 12th century and produced these characteristic decorative designs of cranes, lotus, clouds, and willows, all rendered in delicate white and black slip beneath the soft blue-green glaze. After the Mongol invasions of the 13th century and the subsequent fall of the Goryeo, the technique declined; later Joseon dynasty Korean ceramics took a different aesthetic direction entirely.", "tags": ["goryeo", "celadon", "sanggam", "korean"], "comprehensionQuestion": {"question": "What made Goryeo celadon remarkable enough to be exported back to Song dynasty China?", "options": ["Korean celadon was cheaper than Chinese ceramics", "The Korean sanggam inlay technique \u2014 filling carved designs with contrasting slips \u2014 was a uniquely Korean innovation that Chinese potters admired and could not replicate", "Chinese demand for celadon had declined, making Korean exports fill a gap", "Korean celadon was heavier and more durable than Chinese equivalents"], "correctIndex": 1, "explanation": "China produced extraordinary celadon in the Song period, yet Chinese collectors imported Korean Goryeo celadon. The sanggam technique \u2014 carving the leather-hard clay body, filling the incisions with white and black slips, then applying celadon glaze \u2014 produced patterns of cranes, lotus, and clouds that were uniquely Korean. This represents a rare case of cultural flow from Korea to China rather than the reverse."}, "lat": 35.16, "lng": 128.6}, "met-kouros": {"id": "met-kouros", "title": "Marble Statue of a Kouros (Youth)", "artistId": null, "year": -590, "decade": -590, "eraId": "ancient-worlds", "regionId": "europe", "subRegionId": "greek-byzantine", "museumId": "met", "medium": "Marble", "dimensions": "194.6 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Marble%20statue%20of%20a%20kouros%20%28youth%29%20MET%20DT247656.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "metObjectId": 253370, "famousLevel": 5, "wallLabel": "An early Greek statue of a nude young man, made in Attica around 590 BCE. The pose \u2014 left foot forward, arms at sides, fists clenched \u2014 was borrowed directly from Egyptian sculpture, but the Greeks would, within two centuries, evolve it into the contrapposto realism of the Classical period.", "longForm": "Kouros statues were freestanding marble figures of young men, made in Greece between roughly 600 and 480 BCE. They were used as grave markers and as votive offerings at sanctuaries. The earliest examples like this one are recognizably indebted to Egyptian sculpture: the strict frontal pose, the symmetrical stance, the stylized hair. But the Greeks made one critical change \u2014 their kouroi are nude, while Egyptian figures wore the shendyt-kilt. Over the next century, Greek sculptors would gradually loosen the rigid pose, ultimately producing the radical naturalism of Classical sculpture.", "tags": ["archaic-greek", "marble", "grave-marker", "kouros"], "comprehensionQuestion": {"question": "What does the kouros's pose reveal about the relationship between early Greek and Egyptian art?", "options": ["Greek sculptors invented the pose independently", "The kouros directly borrowed its stride, arm position, and proportional system from Egyptian sculpture", "The pose was borrowed from Mesopotamian guardian figures", "Egyptian artists traveled to Greece to teach their methods"], "correctIndex": 1, "explanation": "The kouros pose \u2014 left foot forward, arms at sides, rigid frontal stance \u2014 is directly derived from Egyptian sculpture. Greek artists encountered monumental Egyptian statues and deliberately adopted the convention, then gradually evolved away from it over the following century."}, "lat": 37.97, "lng": 23.72}, "met-lapita-pottery": {"id": "met-lapita-pottery", "title": "Cast of a Lapita Pottery Fragment with Dentate-Stamped Decoration", "artistId": null, "year": -2500, "decade": -2500, "eraId": "ancient-worlds", "regionId": "oceania", "subRegionId": "lapita", "museumId": "met", "originLabel": "The Met \u00b7 New York", "lat": -4.0, "lng": 152.0, "medium": "Plaster cast of earthenware original", "dimensions": "Cast: approx. 30 cm diameter", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Lapita%20pottery%20cast%2C%20c.%201200-1000%20BC%2C%20earthenware%2C%20Mussau%20Islands%2C%20Papua%20New%20Guinea%20-%20Metropolitan%20Museum%20of%20Art%20-%20DSC06355.JPG?width=1200", "imageSource": "wikimedia", "imageCredit": "Daderot, CC0 via Wikimedia Commons", "metObjectId": 317373, "famousLevel": 4, "wallLabel": "A plaster cast of a fragment of Lapita pottery from the Mussau Islands, Papua New Guinea, dated around 1200\u20131000 BCE. The original earthenware was decorated with dentate-stamped patterns \u2014 geometric designs pressed into the wet clay surface using a comb-like tool \u2014 before firing. Lapita pottery has been found in an arc spanning 4,500 kilometers from the Bismarck Archipelago to Samoa, each potsherd a marker on the migration route of the greatest maritime expansion in human prehistory. The people who made it were the ancestors of today's Polynesian, Micronesian, and many Melanesian peoples. They crossed open ocean in outrigger canoes, navigating by stars, waves, and birds, settling island after island that no human had ever reached.", "longForm": "Archaeologists describe finding Lapita pottery the way detectives describe finding fingerprints: the distinctive dentate-stamped geometric patterns are unmistakable, and their sequential appearance in archaeological layers across the Pacific traces the route of a migration with a precision that linguistic and genetic evidence can only approximate. The Lapita cultural complex (~3500\u20131000 BCE) is named for a beach on New Caledonia where a large concentration of potsherds was found in the 1950s. Since then, over 200 Lapita sites have been identified across a 4,500-kilometer arc from the Bismarck Archipelago to Fiji, Tonga, and Samoa. The pottery was not used for cooking \u2014 carbon residues are absent \u2014 but for serving and storing food. The clay and sand used in its manufacture came from specific sources, and chemical analysis of sherds from distant islands reveals that pots were imported along with the raw materials, suggesting an active maritime trade network rather than simply a migration of people carrying pots. The Lapita people were not the first humans in Near Oceania (parts of New Guinea and Australia have been inhabited for 50,000 years), but they were the first to reach Remote Oceania \u2014 the vast expanse of the Pacific east of the Solomon Islands. When they arrived in Tonga and Samoa around 3,000 years ago, they were the first humans those islands had ever seen. From their descendants \u2014 after a pause of perhaps 1,000 years \u2014 came the final great maritime expansion that settled Polynesia: Hawaii (~800 CE), New Zealand (~1300 CE), and Easter Island (~900 CE).", "comprehensionQuestion": {"question": "Why do archaeologists get excited when they find Lapita pottery at a new Pacific island site?", "options": ["Because Lapita pottery is made from rare clay only found near Papua New Guinea, and finding it elsewhere proves ancient trade routes", "Because the sequential appearance of Lapita pottery across the Pacific \u2014 each potsherd identifiable by its distinctive dentate-stamped patterns \u2014 traces the migration route of the ancestors of all Polynesian and many Melanesian peoples with archaeological precision", "Because Lapita pottery fragments are used to carbon-date the geological layers around them, giving archaeologists precise dates for volcanic events and sea level changes", "Because Lapita pottery is the only durable material that survives in the Pacific's humid environment, making it the only evidence of early human presence on most islands"], "correctIndex": 1, "explanation": "The Lapita pottery distribution is the primary archaeological evidence for the peopling of the Pacific. The distinctive geometric dentate-stamped patterns are consistent enough across time and space to be identified with confidence, and their sequential appearance \u2014 moving eastward through Melanesia and into Polynesia over roughly 2,500 years \u2014 maps the migration with a precision that oral traditions, linguistics, and genetics can corroborate but not match. Each new Lapita site fills in a gap in the migration map."}}, "met-mamluk-mosque-lamp": {"id": "met-mamluk-mosque-lamp", "title": "Mosque Lamp", "artistId": null, "year": 1340, "decade": 1340, "eraId": "sacred-medieval", "regionId": "middle-east-north-africa", "subRegionId": "islamic", "museumId": "met", "medium": "Glass, enamel, and gold", "dimensions": "approx. 36 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Mosque%20lamp%20%28mamluk%29%2C%20Louvre%2C%2014th%20century.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 3, "wallLabel": "A Mamluk enameled glass mosque lamp from Egypt or Syria, made around 1340. These lamps were suspended from the ceilings of mosques by chains, casting tinted light during prayer. The Arabic inscription quotes the famous 'Light Verse' from the Qur'an (24:35), which compares God to a lamp in a niche.", "longForm": "The Mamluk Sultanate (1250-1517) ruled Egypt and Syria for two and a half centuries and produced some of the most technically sophisticated metalwork, glass, and architecture of the late medieval Islamic world. The enameled glass mosque lamps are among the most prized; they were commissioned in large numbers by sultans and emirs to be donated to specific mosques, often inscribed with the donor's name and titles. After the Mamluks fell to the Ottomans in 1517, the technique of enameling glass at this level was lost and not recovered for several centuries.", "tags": ["mamluk", "glass", "enamel", "mosque"], "comprehensionQuestion": {"question": "What Quranic verse appears on Mamluk mosque lamps, and why was it particularly appropriate?", "options": ["The opening verse of the Quran (Al-Fatiha), used in all Islamic ritual contexts", "The 'Light Verse' (24:35), which compares God to a lamp in a niche \u2014 the lamp's function and its inscription became inseparable", "A verse about paradise and its gardens, connecting the lamp's light to heavenly beauty", "The verse commanding Muslims to pray five times daily"], "correctIndex": 1, "explanation": "The Light Verse \u2014 'God is the light of the heavens and the earth; His light is like a niche in which is a lamp' \u2014 appears on virtually all Mamluk mosque lamps. The verse describes God through the metaphor of a lamp; inscribing it on an actual lamp creates a perfect fusion of object and meaning. The lamp holding the light verse becomes a theological statement."}, "lat": 30.06, "lng": 31.25}, "met-maya-stela": {"id": "met-maya-stela", "title": "Stela Showing a Ruler", "artistId": null, "year": 750, "decade": 750, "eraId": "sacred-medieval", "regionId": "americas", "subRegionId": "maya", "museumId": "met", "medium": "Limestone", "dimensions": "approx. 220 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Copan%20stela%20A.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "A Late Classic Maya limestone stela depicting a ruler in ceremonial regalia, accompanied by hieroglyphic inscriptions that name him, give the date of his accession, and record his ritual deeds. Most Maya city-states erected stelae like this at twenty-year intervals (k'atun-endings) to commemorate the ruling dynasty's relationship to the gods of time.", "longForm": "Maya stelae are the densest surviving record of any Mesoamerican civilization. Each carries dates calculated according to the Maya Long Count calendar (which begins, by convention, on a day equivalent to August 11, 3114 BCE), the names of specific rulers, references to wars, alliances, marriages, and rituals. Because the Maya script has been substantially deciphered since the 1970s, we can read these inscriptions today \u2014 making the Maya the only Mesoamerican civilization for which we have anything approaching a written historical record. Around 800 CE the southern Maya cities entered a still-unexplained collapse; by 950 most had been abandoned, the dynasties forgotten, the script forgotten until the 19th century.", "tags": ["maya", "stela", "limestone", "classic-period"], "comprehensionQuestion": {"question": "Why do Maya stelae matter so much to historians that they call the Maya 'the only Mesoamerican civilization with a written historical record'?", "options": ["Maya stelae are the only pre-Columbian objects to survive in significant numbers", "Because Maya hieroglyphic script has been substantially deciphered, stelae can be read \u2014 they name specific rulers, record dates, battles, and alliances \u2014 giving us the only readable political history from pre-contact Mesoamerica", "Maya stelae contain maps of their cities that allow archaeologists to reconstruct urban plans", "The Maya were the only Mesoamerican people who carved stone monuments"], "correctIndex": 1, "explanation": "The Maya script has been largely deciphered since the 1970s-80s \u2014 a feat of linguistic detective work without a Rosetta Stone. This means we can now read the stelae: we know specific rulers' names and titles, the dates of their births, accessions, wars, and deaths, and the genealogical claims they made. No other Mesoamerican civilization has left us a comparable readable record."}, "lat": 14.85, "lng": -89.14}, "met-maya-vessel": {"id": "met-maya-vessel", "title": "Cylinder Vessel with Lord and Attendants", "artistId": null, "year": 750, "decade": 750, "eraId": "sacred-medieval", "regionId": "americas", "subRegionId": "maya", "museumId": "met", "medium": "Ceramic with polychrome slip", "dimensions": "approx. 18 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Maya%20vase%20of%20the%20seven%20gods.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 3, "wallLabel": "A Late Classic Maya drinking vessel painted with a court scene: a seated lord receives tribute or counsel from attendants, with glyphs naming each figure and the painter himself. Made around 750 CE in the Pet\u00e9n lowlands. The Maya were the only Mesoamerican civilization with a fully developed writing system; we can read these inscriptions today.", "longForm": "Maya 'codex-style' painted vessels are some of the most informationally rich art objects in the world. Each scene typically depicts a moment from court life or mythology, and many are signed by the painters. The pigments \u2014 particularly the brilliant Maya blue \u2014 used a chemical bond between indigo dye and palygorskite clay that European chemists couldn't replicate until the late 20th century. These vessels held kakaw, a frothy unsweetened chocolate drink consumed by elites in formal contexts. The civilization that produced them entered a still-unexplained collapse beginning around 800 CE; by 950, the southern Maya cities were abandoned to the jungle.", "tags": ["ceramic", "classic-maya", "polychrome", "courtly"], "comprehensionQuestion": {"question": "What does the fact that many Maya vessels are signed by their painters tell us about Maya artistic culture?", "options": ["Only royal family members were allowed to paint vessels, and signing identified their lineage", "The Maya had a concept of the named individual artist \u2014 an artist identity \u2014 that is unusual in pre-modern non-Western art", "Signatures were ownership marks indicating which noble household commissioned the vessel", "Vessel signatures were part of the hieroglyphic text identifying the contents"], "correctIndex": 1, "explanation": "Signed Maya vessels reveal a concept of artistic identity that's rare in the pre-modern world outside Renaissance Europe. Painters identified themselves by name \u2014 sometimes as 'he of the holy writing' \u2014 and certain individual hands can be tracked across multiple vessels. The Maya valued the artist's individual contribution, not just the object's ritual function."}, "lat": 15.5, "lng": -89.5}, "met-monet-bridge": {"id": "met-monet-bridge", "title": "Bridge over a Pond of Water Lilies", "artistId": "monet", "year": 1899, "decade": 1890, "movementId": "impressionism", "museumId": "met", "medium": "Oil on canvas", "dimensions": "92.7 x 73.7 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Bridge%20over%20a%20Pond%20of%20Water%20Lilies.JPG?width=1200", "imageCredit": "Public domain, The Metropolitan Museum of Art, H. O. Havemeyer Collection, 1929", "famousLevel": 5, "wallLabel": "Monet painted the Japanese footbridge in his Giverny garden a dozen times in 1899, in different lights and seasons. Here the foliage is at full summer green, the lilies open on the water below, and the bridge sits high in the composition like a Japanese print. The painting is built almost entirely from layered green and lavender, with the bridge as the only horizontal anchor.", "longForm": "Monet had bought his property in Giverny in 1890 and immediately began transforming the marsh below the house into a water garden, importing exotic plants and building the footbridge himself, modeled on prints he had collected by Hokusai and Hiroshige. The 1899 bridge series was his first sustained attempt at painting the water garden, a subject that would absorb him for the rest of his life and culminate in the monumental late Water Lilies panels at the Musee de l'Orangerie in Paris. The Met holds two paintings from this 1899 series; the other shows the bridge in a cooler, more silver light.", "tags": ["water-garden", "giverny", "series-painting", "japanese-influence"], "details": [{"crop": "bridge", "x": 0.5, "y": 0.3, "label": "The Japanese footbridge"}, {"crop": "lilies", "x": 0.4, "y": 0.75, "label": "Water lilies on the surface"}], "metObjectId": 437127, "imageSource": "wikimedia", "eraId": "revolution-industry", "regionId": "europe", "subRegionId": "french", "comprehensionQuestion": {"question": "Why did Monet paint the same subject \u2014 haystacks, Rouen Cathedral, water lilies \u2014 dozens of times?", "options": ["Monet suffered from memory loss and forgot he had already painted each subject", "Monet was investigating how light transforms the same subject at different times of day and season \u2014 the series format made the theme of perception and transience explicit", "Each painting in a series was commissioned by a different collector", "Monet repeated subjects because he could not afford to travel to new locations"], "correctIndex": 1, "explanation": "The series paintings were Monet's most radical statement. By showing the same object \u2014 a haystack, a cathedral, a bridge \u2014 in thirty different light conditions, he made the argument that there is no fixed appearance, only perception under specific conditions of light, atmosphere, and time. The subject was almost irrelevant; light was the actual subject."}, "lat": 49.08, "lng": 1.53}, "met-mughal-emperor": {"id": "met-mughal-emperor", "title": "Portrait of the Emperor Shah Jahan", "artistId": null, "year": 1630, "decade": 1630, "eraId": "renaissances-empires", "regionId": "south-asia", "subRegionId": "indian", "museumId": "met", "medium": "Opaque watercolor, ink, and gold on paper", "dimensions": "approx. 39 x 27 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Shah%20Jahan%20on%20a%20Terrace%2C%20Holding%20a%20Pendant%20Set%20with%20His%20Portrait%20MET%20DP240791.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "The Mughal emperor Shah Jahan, who built the Taj Mahal, in a court portrait by one of his miniaturists. Mughal painting fused Persian technique with Indian observation: the gold-leaf halo and the precise rendering of textile, jewel, and horse furniture are characteristic. Painted around 1630, contemporary with the Dutch Golden Age in Europe.", "longForm": "Mughal court painting is one of the great cross-cultural art forms in human history. The first Mughal emperors brought painters from Safavid Persia to India in the 16th century; their workshops trained Indian artists in Persian conventions but also absorbed Indian color, attention to plant and animal life, and a different sense of what a portrait should do. By Shah Jahan's reign in the 1630s, Mughal miniature was at its zenith \u2014 astonishingly refined, often political, always made for the emperor's private viewing in albums. The Taj Mahal was begun in 1632, the year this kind of portrait was at its peak.", "tags": ["miniature", "mughal", "portrait", "court-painting"], "comprehensionQuestion": {"question": "How did Mughal miniature painting achieve its characteristic style, and where did it come from?", "options": ["Mughal miniature was a pure Indian invention with no foreign influence", "Mughal emperors brought Persian court painters to India; their workshops trained Indian artists, fusing Persian technique with Indian subjects, observation, and color sensibility", "Mughal painting derived from Chinese scroll painting brought by Silk Road merchants", "Mughal painting was invented by a single genius artist at Akbar's court whose name is unknown"], "correctIndex": 1, "explanation": "The first Mughal emperor Babur and his son Humayun brought Persian painters from the Safavid court; Humayun himself spent years in Persian exile and returned with master painters who became the foundation of the imperial workshops. Under Akbar, these Persian foundations were transformed: Indian painters brought observation of local plants and animals, warmer color, and a different sense of portraiture. The result was a hybrid unique in art history."}, "lat": 28.64, "lng": 77.22}, "met-nok-head": {"id": "met-nok-head", "title": "Nok Terracotta Head", "artistId": null, "year": -300, "decade": -300, "eraId": "ancient-worlds", "regionId": "sub-saharan-africa", "subRegionId": "nok", "museumId": null, "medium": "Terracotta", "dimensions": "approx. 36 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Nok%20head%20Louvre%2070.1998.11.1.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain photo via Wikimedia Commons", "famousLevel": 4, "wallLabel": "A terracotta head from the Nok culture of present-day central Nigeria, made between 500 BCE and 200 CE. The Nok are the earliest known sub-Saharan African civilization to produce large-scale figurative sculpture. Most surviving heads are fragments of full standing figures, broken in antiquity.", "longForm": "The Nok culture was discovered accidentally in 1928 when tin miners in central Nigeria began turning up terracotta heads from the alluvial gravels they were dredging. The figures share a striking set of features: triangular eyes with the pupils pierced through, elaborate hairstyles, naturalistic proportions. They predate by over a thousand years the better-known Ife heads that emerged from the same broad region around 1100 CE \u2014 meaning sub-Saharan African figurative sculpture had a much deeper history than colonial-era scholars assumed.", "tags": ["nok", "terracotta", "iron-age", "west-african"], "comprehensionQuestion": {"question": "Why is the Nok culture's existence significant for the history of African art?", "options": ["The Nok invented bronze casting in Africa", "Nok terracottas push the date of large-scale sub-Saharan African figurative sculpture back to 500 BCE, far earlier than European scholars once assumed", "The Nok were the ancestors of the ancient Egyptians", "Nok art directly influenced Greek sculpture"], "correctIndex": 1, "explanation": "When European scholars first encountered West African sculpture, they assumed it was a recent tradition. The Nok discovery revealed sustained, sophisticated figurative sculpture in sub-Saharan Africa from at least 500 BCE \u2014 contemporaneous with ancient Greece. The colonial assumption that African art had no deep history was false."}, "lat": 10.0, "lng": 8.0, "originLabel": "National Museum, Lagos"}, "met-okeeffe-cow-skull": {"id": "met-okeeffe-cow-skull", "title": "Cow's Skull: Red, White, and Blue", "artistId": "okeeffe", "year": 1931, "decade": 1930, "movementId": "american-modernism", "museumId": "met", "medium": "Oil on canvas", "dimensions": "101.3 x 91.1 cm", "image": "https://upload.wikimedia.org/wikipedia/en/9/9b/Cow%27s_Skull-_Red%2C_White%2C_and_Blue.jpg", "imageCredit": "Public domain via fair use, The Metropolitan Museum of Art, Alfred Stieglitz Collection, 1952", "famousLevel": 5, "wallLabel": "A bleached cow skull hangs against a black vertical band flanked by red borders, suggesting the American flag. O'Keeffe painted it in 1931, the year of her first long summer in New Mexico, in deliberate response to critics who insisted that the truly American subject matter was urban and industrial. She offered desert bones instead.", "longForm": "O'Keeffe wrote later that she had been listening to male artists in New York talk about painting the Great American Novel, and decided to make the Great American Painting herself, with the most quintessentially American subject she could think of: the bleached skull of a Western range cow against red, white, and blue. The painting is partly serious and partly a joke at the expense of her colleagues. It was acquired by the Met as part of the Stieglitz collection after his death, when his executors distributed his enormous holdings of modern American art to several major museums.", "tags": ["southwest", "skull", "abstraction", "american-symbol"], "details": [], "metObjectId": 488694, "imageSource": "wikipedia-fair-use", "eraId": "modernism", "regionId": "americas", "subRegionId": "us-american", "comprehensionQuestion": {"question": "What was O'Keeffe's stated intention in painting a cow skull against the American flag's colors?", "options": ["She was making an anti-war statement about American imperialism", "She wanted to capture the spirit of the American West \u2014 its harshness and vitality \u2014 against the colors that East Coast intellectuals associated only with colonial history and political power", "The skull represented death of the American dream during the Depression", "O'Keeffe painted several works with skulls purely for formal reasons, with no symbolic intent"], "correctIndex": 1, "explanation": "O'Keeffe described this as her 'American' painting \u2014 a response to what she saw as Eastern establishment culture's inability to see the American West clearly. She placed the skull \u2014 something the East would see as morbid, something she found beautiful and alive with the desert \u2014 against the red, white, and blue, insisting that this bone-bleached landscape was as American as anything in New York."}, "lat": 36.17, "lng": -105.72}, "met-olmec-head": {"id": "met-olmec-head", "title": "Olmec Colossal Head (replica context)", "artistId": null, "year": -900, "decade": -900, "eraId": "ancient-worlds", "regionId": "americas", "subRegionId": "olmec", "museumId": null, "medium": "Basalt", "dimensions": "Up to 3.4 m tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Olmec%20Head%20No.%201.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Photo public domain via Wikimedia Commons", "famousLevel": 5, "wallLabel": "Seventeen colossal heads carved from basalt have been found in the Olmec heartland of present-day Veracruz and Tabasco, Mexico. Each is a portrait of a specific ruler. The basalt was quarried in the Tuxtla mountains and dragged dozens of miles to the political centers of San Lorenzo and La Venta \u2014 without metal tools, without the wheel, without draft animals. They date to roughly 1200-400 BCE.", "longForm": "The Olmec are sometimes called the 'mother culture' of Mesoamerica \u2014 their visual vocabulary, religious iconography, and architectural conventions appear in modified form in every later Mesoamerican civilization, from the Maya to the Aztec. The colossal heads each wear a distinctive helmet, possibly representing the protective headgear of the rulers' role as ballgame players. They were carved using stone hammers and abrasives, then deliberately defaced and buried \u2014 likely as part of a ritual transition between rulers. Most are now displayed near where they were excavated; one (Head N\u00ba 8) is at the Anthropology Museum in Veracruz.", "tags": ["sculpture", "ruler-portrait", "basalt", "preclassic"], "comprehensionQuestion": {"question": "What does the deliberate defacement of Olmec colossal heads reveal about Mesoamerican political culture?", "options": ["The heads were damaged by natural disaster, not intentionally", "Defacement and burial were ritual acts when a ruler died \u2014 monuments were killed alongside their subjects", "Later civilizations like the Maya destroyed Olmec monuments out of cultural rivalry", "The defacement was done by Spanish conquistadors in the 16th century"], "correctIndex": 1, "explanation": "The colossal heads were systematically defaced and buried, apparently as part of a ritual transition between rulers. The monument died with its subject. This practice of deliberately ending the monumental life of objects appears across Mesoamerican cultures \u2014 the Maya sometimes buried their own stelae in a similar way."}, "lat": 18.46, "lng": -95.08, "originLabel": "Jalapa Museum, Veracruz"}, "met-olmec-mask": {"id": "met-olmec-mask", "title": "Olmec-Style Mask", "artistId": null, "year": -900, "decade": -900, "eraId": "ancient-worlds", "regionId": "americas", "subRegionId": "olmec", "museumId": "met", "lat": 18.45, "lng": -95.1, "medium": "Serpentine", "dimensions": "H. 4 7/16 in. (11.3 cm)", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Olmec%20mask%20-%20Metropolitan%20Museum%20of%20Art%20-%201979.206.134.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "metObjectId": 308996, "famousLevel": 4, "wallLabel": "Olmec masks in serpentine or jade \u2014 green stones prized above all others in ancient Mesoamerica \u2014 were among the most powerful ritual objects in the ancient Americas. The Olmec culture (~1500\u2013400 BCE) along the Gulf Coast of Mexico is the earliest major civilization in Mesoamerica, and their aesthetic conventions shaped every civilization that followed: the jaguar-human hybrid (were-jaguar), the cleft forehead, the downturned mouth. These features recur in Maya, Zapotec, Aztec, and Teotihuacan art for two thousand years. The Olmec didn't just influence their neighbors \u2014 they established the visual vocabulary of an entire hemisphere.", "longForm": "The Olmec present archaeologists with a fundamental puzzle: they were clearly the most powerful civilization in their time and region, with an artistic style so distinctive and influential that scholar Michael Coe called them the 'mother culture' of Mesoamerica. Yet almost nothing is known about their political structure, their religious beliefs, their rulers' names, or why their civilization collapsed. What survives are objects: the colossal basalt heads, the jade and serpentine figurines and masks, the hollow ceramic babies with their strange were-jaguar features. The were-jaguar motif \u2014 a being that combines human and jaguar characteristics, usually shown as an infant with a snarling mouth and cleft forehead \u2014 appears on objects across thousands of square miles and hundreds of years. Whatever it meant, it was important enough to be reproduced obsessively. The green color of jade and serpentine was itself sacred: it represented maize, water, and the life-giving earth. Rulers were buried with jade in their mouths and hands. The Aztecs, two thousand years later, collected Olmec objects as antiques \u2014 recognizing them as relics of an older, more powerful world.", "comprehensionQuestion": {"question": "Why are Olmec objects found in sites hundreds of miles from the Olmec heartland on the Gulf Coast?", "options": ["Olmec armies conquered these distant regions and installed garrisons who maintained Olmec artistic traditions", "Jade and serpentine objects were so highly valued that they functioned as luxury trade goods and symbols of prestige, spreading Olmec visual conventions across a vast exchange network", "Olmec migrants fled their homeland due to volcanic activity and resettled across Mesoamerica", "Ancient Aliens distributed them"], "correctIndex": 1, "explanation": "Olmec-style objects appear across Mesoamerica because they were prestige goods \u2014 items so valued that elites across the region acquired them through trade, tribute, or gift exchange. Owning an Olmec jade object signaled connection to the most powerful civilization of the era. The spread of Olmec objects is the spread of a prestige system, not a military empire."}}, "met-parvati": {"id": "met-parvati", "title": "Standing Parvati", "artistId": null, "year": 1000, "decade": 1000, "eraId": "sacred-medieval", "regionId": "south-asia", "subRegionId": "indian", "museumId": "met", "medium": "Copper alloy", "dimensions": "approx. 70 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Parvati%2C%20Chola%20bronze%2C%20c.%2010th%20century.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "The Hindu goddess Parvati stands in the elegant tribhanga pose \u2014 three bends, hip and shoulder and head, that became the iconic stance of Indian sculpture for over a thousand years. Cast in copper alloy by the lost-wax process in the Chola dynasty of South India, when Tamil bronze casting reached a technical peak that has never been surpassed.", "longForm": "The Chola dynasty ruled South India from the 9th through 13th centuries and produced bronze sculpture so technically refined that contemporary Chola masters in Tamil Nadu still work from the same iconographic books, called shilpa shastras, that the originals followed. These bronzes were never made as static museum objects: they were dressed in textiles, garlanded, carried in procession through temple complexes, and bathed in milk and honey. The empty rings on her belt held actual cloth and jewelry. To see a Chola bronze in a Western museum is to see it stripped of about ninety percent of its intended visual life.", "tags": ["bronze", "chola", "hindu", "tribhanga"], "comprehensionQuestion": {"question": "Why do Chola bronze sculptures of deities like Parvati include empty rings and attachment points?", "options": ["The rings were functional handles for moving the heavy sculptures", "The bronzes were dressed in actual textiles and jewels for ceremonies \u2014 the rings held fabric and real ornaments; a 'bare' Chola bronze in a museum is missing roughly 90% of its intended visual life", "The rings were added by later restorers who misunderstood the originals", "Empty attachment points indicate unfinished sculptures that were never completed"], "correctIndex": 1, "explanation": "Chola bronzes were not made as static art objects but as living ritual presences. They were dressed in silk garments, garlanded with flowers, adorned with actual gold jewelry, and carried through temple streets in procession. The empty rings you see in museums held fabric and jewels. Seeing a Chola bronze unclothed is like seeing a king stripped of all regalia \u2014 technically accurate to the bronze, but not to the intended experience."}, "lat": 11.06, "lng": 77.37}, "met-persian-battle-folio": {"id": "met-persian-battle-folio", "title": "Battle Scene from the Shahnameh of Firdawsi", "artistId": null, "year": 1525, "decade": 1520, "eraId": "sacred-medieval", "regionId": "middle-east-north-africa", "subRegionId": "persian", "museumId": "met", "medium": "Opaque watercolor, ink, and gold on paper", "dimensions": "approx. 47 x 32 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Shahnameh%20folio%20-%20battle%20scene.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "A battle scene from a Safavid manuscript of the Shahnameh, the 'Book of Kings' \u2014 the Persian national epic written by Firdawsi around 1000 CE. Two armies clash on a gold-streaked sky. The Tabriz school of the early 16th century brought Persian manuscript painting to its technical peak: mineral pigments ground to a powder, brushwork at the scale of hairs, faces expressive within a 3cm circle.", "longForm": "The Shahnameh is Firdawsi's 60,000-verse retelling of the pre-Islamic history of Persia, from the mythological kings of the primordial world through the Arab conquest in 651 CE. It is the longest epic written by a single author in world literature. Persian manuscripts of the Shahnameh were the most prestigious luxury objects of the Safavid court and among the most valued things money could buy across the Islamic world. The Houghton Shahnameh, commissioned by Shah Tahmasp around 1520-40, is the finest \u2014 742 pages with 258 full-page paintings, scattered across institutions worldwide after its disassembly in the 1970s.", "tags": ["safavid", "manuscript", "shahnameh", "miniature-painting"], "comprehensionQuestion": {"question": "What
