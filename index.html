<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#F5EFE4" />
<title>Accession — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   ACCESSION - DESIGN TOKENS
   The foundational design variables for the entire app.
   Change values here to affect the whole interface.
   ============================================================ */

:root {
  /* ---------- COLORS ----------
     Inspired by warm museum interiors:
     - Paper: aged cream, the dominant background
     - Ink: warm near-black for text
     - Sepia: secondary text and borders
     - Burgundy: active states and important moments
     - Gold: rewards, streak, mastery
     - Sage: success, "you've seen this"
  */
  --color-paper: #F5EFE4;
  --color-paper-deep: #ECE3D2;
  --color-paper-light: #FBF7EE;
  --color-ink: #1F1B16;
  --color-ink-soft: #3A332B;
  --color-sepia: #7A6A55;
  --color-sepia-light: #B8A88E;
  --color-burgundy: #6B2E2E;
  --color-burgundy-soft: #8B4848;
  --color-gold: #B8945A;
  --color-gold-soft: #D4B57E;
  --color-sage: #7A8471;
  --color-sage-soft: #A4AE9B;
  --color-line: rgba(31, 27, 22, 0.12);
  --color-line-strong: rgba(31, 27, 22, 0.22);

  /* ---------- TYPOGRAPHY ----------
     Three families:
     - Display (DM Serif Display): headlines, titles
     - Body serif (Lora): long-form reading
     - UI sans (Inter): nav, buttons, stats
  */
  --font-display: 'DM Serif Display', 'Playfair Display', Georgia, serif;
  --font-serif: 'Lora', 'Georgia', serif;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;

  --type-display-xl: 2.5rem;
  --type-display-l: 1.875rem;
  --type-display-m: 1.5rem;
  --type-body-l: 1.0625rem;
  --type-body-m: 0.9375rem;
  --type-body-s: 0.8125rem;
  --type-caption: 0.6875rem;

  --leading-tight: 1.2;
  --leading-normal: 1.5;
  --leading-relaxed: 1.7;

  /* ---------- SPACING ----------
     Based on 4px grid for tight UI control.
  */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;

  /* ---------- RADII ---------- */
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-pill: 999px;

  /* ---------- SHADOWS ----------
     Subtle, warm shadows. Never harsh.
  */
  --shadow-sm: 0 1px 2px rgba(31, 27, 22, 0.06), 0 1px 1px rgba(31, 27, 22, 0.04);
  --shadow-md: 0 4px 12px rgba(31, 27, 22, 0.08), 0 2px 4px rgba(31, 27, 22, 0.04);
  --shadow-lg: 0 12px 32px rgba(31, 27, 22, 0.12), 0 4px 8px rgba(31, 27, 22, 0.06);
  --shadow-inset: inset 0 1px 0 rgba(255, 255, 255, 0.4);

  /* ---------- MOTION ----------
     Everything fades and settles. No bounces.
  */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.45, 0, 0.55, 1);
  --duration-fast: 150ms;
  --duration-base: 250ms;
  --duration-slow: 400ms;
  --duration-pageturn: 600ms;

  /* ---------- LAYOUT ---------- */
  --max-width-mobile: 480px;
  --tab-bar-height: 72px;
  --header-height: 56px;
}

/* ============================================================
   ACCESSION - BASE STYLES
   Reset, body, typography defaults.
   ============================================================ */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-sans);
  font-size: var(--type-body-m);
  line-height: var(--leading-normal);
  color: var(--color-ink);
  background: var(--color-paper);
  /* Subtle paper grain texture via CSS, no image needed */
  background-image:
    radial-gradient(circle at 25% 35%, rgba(122, 106, 85, 0.04) 0%, transparent 50%),
    radial-gradient(circle at 75% 65%, rgba(184, 148, 90, 0.03) 0%, transparent 50%);
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overscroll-behavior: none;
}

/* Lock the app to mobile-friendly width but allow desktop centering */
#app {
  max-width: var(--max-width-mobile);
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  position: relative;
  background: var(--color-paper);
  /* Subtle vertical edges on desktop only */
  box-shadow: 0 0 0 1px var(--color-line) inset;
}

@media (min-width: 481px) {
  body {
    background: linear-gradient(180deg, #ECE3D2 0%, #DCD0BC 100%);
  }
  #app {
    box-shadow: 0 0 60px rgba(31, 27, 22, 0.08);
  }
}

/* Typography defaults */
h1, h2, h3, h4 {
  font-family: var(--font-display);
  font-weight: 400;
  line-height: var(--leading-tight);
  color: var(--color-ink);
}

h1 { font-size: var(--type-display-xl); letter-spacing: -0.02em; }
h2 { font-size: var(--type-display-l); letter-spacing: -0.01em; }
h3 { font-size: var(--type-display-m); }

p {
  font-family: var(--font-serif);
  font-size: var(--type-body-l);
  line-height: var(--leading-relaxed);
  color: var(--color-ink-soft);
}

button {
  font-family: var(--font-sans);
  font-size: var(--type-body-m);
  border: none;
  background: none;
  cursor: pointer;
  color: inherit;
}

a {
  color: var(--color-burgundy);
  text-decoration: none;
}

img {
  max-width: 100%;
  height: auto;
  display: block;
}

/* Utility classes */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
}

.serif { font-family: var(--font-serif); }
.display { font-family: var(--font-display); }
.eyebrow {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-sepia);
  font-weight: 500;
}

/* ============================================================
   ACCESSION - COMPONENT STYLES
   Reusable UI components.
   ============================================================ */

/* ---------- TAB BAR (bottom navigation) ---------- */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: var(--max-width-mobile);
  height: var(--tab-bar-height);
  background: var(--color-paper-light);
  border-top: 1px solid var(--color-line);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 100;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: rgba(251, 247, 238, 0.88);
}

.tab-bar__item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--color-sepia);
  transition: color var(--duration-fast) var(--ease-out);
  padding: var(--space-2);
}

.tab-bar__item.is-active {
  color: var(--color-burgundy);
}

.tab-bar__icon {
  width: 22px;
  height: 22px;
  stroke: currentColor;
  stroke-width: 1.5;
  fill: none;
}

/* ---------- HEADER ---------- */
.header {
  height: var(--header-height);
  padding: 0 var(--space-5);
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--color-line);
  background: var(--color-paper);
  position: sticky;
  top: 0;
  z-index: 50;
}

.header__title {
  font-family: var(--font-display);
  font-size: var(--type-display-m);
  color: var(--color-ink);
}

/* ---------- VIEW CONTAINER ---------- */
.view {
  padding: var(--space-5);
  padding-bottom: calc(var(--tab-bar-height) + var(--space-8));
  min-height: 100vh;
  min-height: 100dvh;
  animation: fadeIn var(--duration-base) var(--ease-out);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ---------- CARDS ---------- */
.card {
  background: var(--color-paper-light);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  box-shadow: var(--shadow-sm);
  position: relative;
}

.card--accent {
  border-left: 3px solid var(--color-burgundy);
}

.artwork-card {
  background: var(--color-paper-light);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--color-line);
}

.artwork-card__image {
  width: 100%;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  background: var(--color-paper-deep);
  display: block;
}

.artwork-card__body {
  padding: var(--space-5);
}

.artwork-card__title {
  font-family: var(--font-display);
  font-size: var(--type-display-m);
  line-height: var(--leading-tight);
  color: var(--color-ink);
  margin-bottom: var(--space-2);
}

.artwork-card__artist {
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  letter-spacing: 0.04em;
  color: var(--color-sepia);
  text-transform: uppercase;
  margin-bottom: var(--space-4);
}

.artwork-card__artist .year {
  font-style: normal;
  color: var(--color-sepia-light);
  margin-left: var(--space-2);
}

.artwork-card__label {
  font-family: var(--font-serif);
  font-size: var(--type-body-m);
  line-height: var(--leading-relaxed);
  color: var(--color-ink-soft);
}

/* ---------- BUTTONS ---------- */
.btn {
  font-family: var(--font-sans);
  font-size: var(--type-body-m);
  font-weight: 500;
  padding: var(--space-3) var(--space-6);
  border-radius: var(--radius-pill);
  border: 1px solid transparent;
  transition: all var(--duration-fast) var(--ease-out);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  letter-spacing: 0.02em;
  min-height: 44px;
  user-select: none;
}

.btn--primary {
  background: var(--color-ink);
  color: var(--color-paper);
}

.btn--primary:active {
  transform: scale(0.98);
  background: var(--color-burgundy);
}

.btn--secondary {
  background: transparent;
  color: var(--color-ink);
  border-color: var(--color-line-strong);
}

.btn--secondary:active {
  background: var(--color-paper-deep);
}

.btn--full {
  width: 100%;
}

.btn--lg {
  padding: var(--space-4) var(--space-8);
  font-size: var(--type-body-l);
}

/* ---------- WAX SEAL ---------- */
.wax-seal {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, var(--color-burgundy-soft) 0%, var(--color-burgundy) 60%, #4A1F1F 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow:
    inset -2px -3px 4px rgba(0,0,0,0.3),
    inset 2px 2px 4px rgba(255,255,255,0.15),
    0 2px 8px rgba(74, 31, 31, 0.4);
}

.wax-seal::before {
  content: '';
  position: absolute;
  inset: 6px;
  border-radius: 50%;
  border: 1px dashed rgba(255, 235, 200, 0.3);
}

.wax-seal__number {
  font-family: var(--font-display);
  font-size: 1.75rem;
  color: var(--color-paper);
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  line-height: 1;
}

.wax-seal--with-ring {
  box-shadow:
    0 0 0 3px var(--color-gold),
    0 0 0 5px var(--color-paper),
    inset -2px -3px 4px rgba(0,0,0,0.3),
    inset 2px 2px 4px rgba(255,255,255,0.15),
    0 2px 8px rgba(74, 31, 31, 0.4);
}

/* ---------- PROGRESS LINE ---------- */
.progress-line {
  height: 2px;
  background: var(--color-line);
  border-radius: 1px;
  overflow: hidden;
  position: relative;
}

.progress-line__fill {
  height: 100%;
  background: var(--color-burgundy);
  border-radius: 1px;
  transition: width var(--duration-slow) var(--ease-out);
}

/* ---------- ACCESSION PLAQUE (badges) ---------- */
.plaque {
  background: var(--color-paper-deep);
  border: 1px solid var(--color-line-strong);
  border-radius: var(--radius-sm);
  padding: var(--space-3) var(--space-4);
  font-family: var(--font-sans);
  display: flex;
  flex-direction: column;
  gap: 2px;
  position: relative;
}

.plaque__label {
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-sepia);
}

.plaque__value {
  font-family: var(--font-display);
  font-size: var(--type-body-l);
  color: var(--color-ink);
}

/* ---------- MOVEMENT TILE ---------- */
.movement-tile {
  display: block;
  padding: var(--space-5);
  background: var(--color-paper-light);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-lg);
  margin-bottom: var(--space-4);
  position: relative;
  transition: transform var(--duration-fast) var(--ease-out);
}

.movement-tile:active {
  transform: scale(0.99);
}

.movement-tile.is-locked {
  opacity: 0.5;
  pointer-events: none;
}

.movement-tile__years {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  color: var(--color-sepia);
  margin-bottom: var(--space-1);
}

.movement-tile__name {
  font-family: var(--font-display);
  font-size: var(--type-display-m);
  margin-bottom: var(--space-2);
  color: var(--color-ink);
}

.movement-tile__blurb {
  font-family: var(--font-serif);
  font-size: var(--type-body-m);
  color: var(--color-ink-soft);
  line-height: var(--leading-normal);
  margin-bottom: var(--space-4);
}

.movement-tile__footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
}

.movement-tile__progress {
  flex: 1;
  height: 2px;
  background: var(--color-line);
  border-radius: 1px;
  overflow: hidden;
}

.movement-tile__progress-fill {
  height: 100%;
  background: var(--color-burgundy);
}

.movement-tile__seal {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--color-burgundy);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.movement-tile__seal svg {
  width: 12px;
  height: 12px;
  stroke: var(--color-paper);
  fill: none;
  stroke-width: 2.5;
}

/* ---------- QUIZ OPTION ---------- */
.quiz-option {
  width: 100%;
  background: var(--color-paper-light);
  border: 1.5px solid var(--color-line-strong);
  border-radius: var(--radius-md);
  padding: var(--space-4) var(--space-5);
  text-align: left;
  font-family: var(--font-serif);
  font-size: var(--type-body-l);
  color: var(--color-ink);
  margin-bottom: var(--space-3);
  transition: all var(--duration-fast) var(--ease-out);
  min-height: 56px;
}

.quiz-option:active {
  transform: scale(0.99);
  background: var(--color-paper-deep);
}

.quiz-option.is-correct {
  background: rgba(122, 132, 113, 0.18);
  border-color: var(--color-sage);
  color: var(--color-sage);
}

.quiz-option.is-incorrect {
  background: rgba(107, 46, 46, 0.1);
  border-color: var(--color-burgundy);
  color: var(--color-burgundy);
}

.quiz-option.is-disabled {
  opacity: 0.4;
  pointer-events: none;
}

/* ---------- HERO PANEL (today view) ---------- */
.hero-panel {
  background: linear-gradient(180deg, var(--color-paper-light) 0%, var(--color-paper) 100%);
  border-radius: var(--radius-xl);
  overflow: hidden;
  margin-bottom: var(--space-5);
  border: 1px solid var(--color-line);
  box-shadow: var(--shadow-md);
}

.hero-panel__image {
  width: 100%;
  aspect-ratio: 16 / 11;
  object-fit: cover;
  background: var(--color-paper-deep);
}

.hero-panel__body {
  padding: var(--space-5);
}

/* ---------- LEADERBOARD ROW ---------- */
.leaderboard-row {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) 0;
  border-bottom: 1px solid var(--color-line);
}

.leaderboard-row:last-child {
  border-bottom: none;
}

.leaderboard-row__avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--color-paper-deep);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: var(--type-body-l);
  color: var(--color-ink);
  flex-shrink: 0;
}

.leaderboard-row__name {
  flex: 1;
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: var(--type-body-m);
}

.leaderboard-row__stat {
  font-family: var(--font-display);
  font-size: var(--type-body-l);
  color: var(--color-burgundy);
}

.leaderboard-row__substat {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.06em;
  color: var(--color-sepia);
  text-transform: uppercase;
}

/* ---------- DIVIDER WITH ORNAMENT ---------- */
.divider-ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: var(--space-6) 0;
  gap: var(--space-3);
}

.divider-ornament::before,
.divider-ornament::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--color-line);
}

.divider-ornament__symbol {
  font-family: var(--font-display);
  color: var(--color-sepia);
  font-size: var(--type-body-l);
}

/* ---------- CONSTELLATION NODE ---------- */
.constellation-svg {
  width: 100%;
  height: auto;
  display: block;
}

.constellation-node {
  transition: all var(--duration-base) var(--ease-out);
}

.constellation-node[data-state="faint"] {
  opacity: 0.25;
}

.constellation-node[data-state="lit"] {
  opacity: 1;
}

.constellation-node[data-state="gold"] {
  opacity: 1;
}

/* ============================================================
   ACCESSION - VIEW STYLES & ANIMATIONS
   Per-view layouts and motion.
   ============================================================ */

/* ---------- ONBOARDING / WALKTHROUGH ---------- */
.onboarding {
  padding: var(--space-6) var(--space-5) calc(var(--tab-bar-height) + var(--space-5));
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

.onboarding__intro {
  text-align: center;
  padding-top: var(--space-10);
}

.onboarding__title {
  font-family: var(--font-display);
  font-size: 3rem;
  letter-spacing: -0.02em;
  line-height: 0.95;
  margin-bottom: var(--space-3);
  color: var(--color-ink);
}

.onboarding__subtitle {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: var(--type-body-l);
  color: var(--color-sepia);
  margin-bottom: var(--space-10);
}

.onboarding__body {
  flex: 1;
}

.onboarding__footer {
  padding-top: var(--space-6);
}

.museum-checklist {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.museum-checkbox {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-4);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-md);
  background: var(--color-paper-light);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
}

.museum-checkbox.is-checked {
  background: rgba(107, 46, 46, 0.06);
  border-color: var(--color-burgundy);
}

.museum-checkbox__box {
  width: 20px;
  height: 20px;
  border: 1.5px solid var(--color-line-strong);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.museum-checkbox.is-checked .museum-checkbox__box {
  background: var(--color-burgundy);
  border-color: var(--color-burgundy);
}

.museum-checkbox.is-checked .museum-checkbox__box::after {
  content: '✓';
  color: var(--color-paper);
  font-size: 13px;
  font-weight: bold;
}

.museum-checkbox__name {
  font-family: var(--font-sans);
  font-size: var(--type-body-m);
  color: var(--color-ink);
}

/* Walkthrough card swiping */
.walkthrough-card {
  background: var(--color-paper-light);
  border-radius: var(--radius-xl);
  overflow: hidden;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--color-line);
  margin-bottom: var(--space-5);
}

.walkthrough-card__image {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  background: var(--color-paper-deep);
}

.walkthrough-card__body {
  padding: var(--space-5);
}

.walkthrough-question {
  font-family: var(--font-display);
  font-size: var(--type-display-l);
  text-align: center;
  margin-bottom: var(--space-2);
}

.walkthrough-meta {
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  text-align: center;
  color: var(--color-sepia);

  text-transform: uppercase;

}

.walkthrough-choices {

  gap: var(--space-3);

.walkthrough-choice {

  border-radius: var(--radius-md);
  border: 1.5px solid var(--color-line-strong);

  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--color-ink);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  min-height: 64px;
  justify-content: center;
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
}

.walkthrough-choice:active {
  transform: scale(0.98);
}

.walkthrough-choice__icon {
  font-size: 1.25rem;
  line-height: 1;
}

/* ---------- TODAY VIEW ---------- */
.today-greeting {
  font-family: var(--font-display);
  font-size: var(--type-display-l);
  margin-bottom: var(--space-2);
}

.today-date {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-sepia);
  margin-bottom: var(--space-5);
}

.today-section {
  margin-bottom: var(--space-6);
}

.today-section__title {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-sepia);
  font-weight: 500;
  margin-bottom: var(--space-3);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.streak-row {
  display: flex;
  align-items: center;
  gap: var(--space-5);
}

.streak-row__copy {
  flex: 1;
}

.streak-row__count {
  font-family: var(--font-display);
  font-size: var(--type-display-l);
  line-height: 1;
  margin-bottom: var(--space-1);
}

.streak-row__caption {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: var(--type-body-m);
  color: var(--color-sepia);
}

/* ---------- LESSON PLAYER ---------- */
.lesson-shell {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--color-paper);
}

.lesson-progress-bar {
  height: 4px;
  background: var(--color-line);
  position: sticky;
  top: 0;
  z-index: 60;
}

.lesson-progress-bar__fill {
  height: 100%;
  background: var(--color-burgundy);
  transition: width var(--duration-base) var(--ease-out);
}

.lesson-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-5);
  position: sticky;
  top: 4px;
  z-index: 50;
  background: var(--color-paper);
}

.lesson-close {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  color: var(--color-sepia);
}

.lesson-step {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-sepia);
}

.lesson-body {
  flex: 1;
  padding: var(--space-3) var(--space-5);
  display: flex;
  flex-direction: column;
}

.lesson-footer {
  padding: var(--space-5);
  padding-bottom: calc(var(--space-5) + env(safe-area-inset-bottom));
  border-top: 1px solid var(--color-line);
  background: var(--color-paper-light);
}

.lesson-card-image {
  width: 100%;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  border-radius: var(--radius-lg);
  background: var(--color-paper-deep);
  margin-bottom: var(--space-5);
}

.lesson-card-image--quiz {
  aspect-ratio: 1;
}

.lesson-card-title {
  font-family: var(--font-display);
  font-size: var(--type-display-m);
  margin-bottom: var(--space-1);
}

.lesson-card-meta {
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--color-sepia);
  margin-bottom: var(--space-4);
}

.lesson-card-body {
  font-family: var(--font-serif);
  font-size: var(--type-body-l);
  line-height: var(--leading-relaxed);
  color: var(--color-ink-soft);
  margin-bottom: var(--space-5);
}

.lesson-question {
  font-family: var(--font-display);
  font-size: var(--type-display-m);
  margin-bottom: var(--space-5);
  line-height: var(--leading-tight);
}

.lesson-feedback {
  font-family: var(--font-serif);
  font-size: var(--type-body-m);
  color: var(--color-ink-soft);
  padding: var(--space-4);
  background: var(--color-paper-deep);
  border-radius: var(--radius-md);
  margin-top: var(--space-3);
  border-left: 3px solid var(--color-sage);
  animation: slideUp var(--duration-base) var(--ease-out);
}

.lesson-feedback.is-incorrect {
  border-left-color: var(--color-burgundy);
}

.lesson-feedback__label {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-sage);
  margin-bottom: var(--space-1);
  display: block;
}

.lesson-feedback.is-incorrect .lesson-feedback__label {
  color: var(--color-burgundy);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ---------- DATE SLIDER ---------- */
.date-slider {
  margin: var(--space-5) 0;
}

.date-slider__value {
  font-family: var(--font-display);
  font-size: 3rem;
  text-align: center;
  margin-bottom: var(--space-3);
  letter-spacing: -0.01em;
}

.date-slider__bce {
  font-size: var(--type-body-m);
  color: var(--color-sepia);
  margin-left: var(--space-1);
}

.date-slider input[type="range"] {
  width: 100%;
  appearance: none;
  -webkit-appearance: none;
  height: 2px;
  background: var(--color-line-strong);
  border-radius: 1px;
  outline: none;
}

.date-slider input[type="range"]::-webkit-slider-thumb {
  appearance: none;
  -webkit-appearance: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--color-burgundy);
  border: 3px solid var(--color-paper);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
}

.date-slider input[type="range"]::-moz-range-thumb {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--color-burgundy);
  border: 3px solid var(--color-paper);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
}

.date-slider__range {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  color: var(--color-sepia);
  margin-top: var(--space-2);
  letter-spacing: 0.04em;
}

/* ---------- BEFORE/AFTER QUIZ ---------- */
.before-after-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-3);
  margin-bottom: var(--space-5);
}

.before-after-option {
  display: flex;
  flex-direction: column;
  background: var(--color-paper-light);
  border: 2px solid var(--color-line);
  border-radius: var(--radius-md);
  overflow: hidden;
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
}

.before-after-option:active {
  transform: scale(0.98);
}

.before-after-option.is-correct {
  border-color: var(--color-sage);
}

.before-after-option.is-incorrect {
  border-color: var(--color-burgundy);
  opacity: 0.6;
}

.before-after-option img {
  aspect-ratio: 1;
  object-fit: cover;
  width: 100%;
}

.before-after-option__caption {
  padding: var(--space-3);
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  text-align: center;
  background: var(--color-paper-light);
}

/* ---------- REWARD CARD ---------- */
.reward-screen {
  text-align: center;
  padding: var(--space-10) var(--space-5);
  animation: fadeIn var(--duration-slow) var(--ease-out);
}

.reward-seal-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: var(--space-6);
}

.reward-seal-wrap .wax-seal {
  animation: sealStamp 500ms var(--ease-out);
}

@keyframes sealStamp {
  0% { transform: scale(0.6) rotate(-15deg); opacity: 0; }
  60% { transform: scale(1.15) rotate(2deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

.reward-title {
  font-family: var(--font-display);
  font-size: var(--type-display-l);
  margin-bottom: var(--space-3);
}

.reward-eyebrow {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--color-burgundy);
  margin-bottom: var(--space-2);
}

.reward-subtitle {
  font-family: var(--font-serif);
  font-style: italic;
  color: var(--color-sepia);
  margin-bottom: var(--space-8);
}

.reward-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-3);
  margin-bottom: var(--space-8);
}

/* ---------- COMPARISON CARD ---------- */
.comparison-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
  gap: var(--space-3);
  margin: var(--space-5) 0;
}

.comparison-item {
  background: var(--color-paper-light);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-md);
  overflow: hidden;
}

.comparison-item__image {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  background: var(--color-paper-deep);
  display: block;
}

.comparison-item__title {
  font-family: var(--font-display);
  font-size: var(--type-body-m);
  line-height: var(--leading-tight);
  padding: var(--space-2) var(--space-3) 0;
  color: var(--color-ink);
}

.comparison-item__meta {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.04em;
  color: var(--color-sepia);
  padding: 2px var(--space-3) var(--space-2);
}

/* ---------- TIMELINE GRID (Collection view, new) ---------- */
.timeline-grid {
  display: grid;
  grid-template-columns: 100px repeat(6, minmax(80px, 1fr));
  gap: 2px;
  background: var(--color-line);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-md);
  overflow: hidden;
  margin-bottom: var(--space-5);
  /* Allow horizontal scroll on tighter phones */
  min-width: 100%;
}

.timeline-grid__wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: var(--space-2);
}

.timeline-grid__cell {
  background: var(--color-paper);
  padding: var(--space-2) var(--space-1);
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  text-align: center;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.timeline-grid__header {
  background: var(--color-paper-deep);
  font-weight: 500;
  color: var(--color-sepia);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  line-height: 1.2;
  font-size: 9px;
}

.timeline-grid__row-label {
  background: var(--color-paper-deep);
  font-weight: 500;
  color: var(--color-ink);
  text-transform: none;
  letter-spacing: 0;
  font-size: var(--type-caption);
  justify-content: flex-start;
  padding-left: var(--space-3);
  text-align: left;
}

.timeline-grid__cell-content {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  align-items: center;
  justify-content: center;
  width: 100%;
}

.timeline-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--color-sepia-light);
  display: inline-block;
  cursor: pointer;
}

.timeline-dot[data-state="lit"]  { background: var(--color-burgundy); }
.timeline-dot[data-state="gold"] { background: var(--color-gold); box-shadow: 0 0 0 1px var(--color-paper), 0 0 0 2px var(--color-gold); }
.timeline-dot[data-state="faint"] { background: var(--color-sepia-light); opacity: 0.6; }
.timeline-dot[data-state="unencountered"] { background: transparent; border: 1px dashed var(--color-sepia-light); opacity: 0.4; }
.collection-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--space-3);
}

.collection-tile {
  aspect-ratio: 1;
  border-radius: var(--radius-md);
  overflow: hidden;
  position: relative;
  background: var(--color-paper-deep);
  border: 1px solid var(--color-line);
}

.collection-tile img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.collection-tile.is-faint img {
  filter: grayscale(1) opacity(0.3);
}

.collection-tile__caption {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: var(--space-2) var(--space-3);
  background: linear-gradient(transparent, rgba(31, 27, 22, 0.8));
  color: var(--color-paper);
  font-family: var(--font-display);
  font-size: var(--type-body-s);
}

.collection-tile.is-faint .collection-tile__caption {
  color: var(--color-sepia-light);
}

/* ---------- PROFILE / RANKS ---------- */
.rank-row {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  padding: var(--space-4) 0;
  border-bottom: 1px solid var(--color-line);
}

.rank-row:last-child {
  border-bottom: none;
}

.rank-row__name {
  flex: 1;
}

.rank-row__movement {
  font-family: var(--font-display);
  font-size: var(--type-body-l);
  color: var(--color-ink);
  margin-bottom: 2px;
}

.rank-row__rank {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-sepia);
}

.rank-row__progress {
  width: 80px;
  height: 2px;
  background: var(--color-line);
}

.rank-row__progress-fill {
  height: 100%;
  background: var(--color-burgundy);
}

window.__BUNDLED_DATA = {"paths": {"met-chronological": {"id": "met-chronological", "title": "The Met, Chronologically", "subtitle": "A journey through art history, anchored in the Metropolitan Museum of Art", "museumId": "met", "movements": ["egyptian-ancient", "italian-renaissance", "northern-renaissance", "dutch-golden-age", "impressionism", "american-modernism"]}}, "eras": {"ancient-worlds": {"id": "ancient-worlds", "name": "Ancient Worlds", "order": 1, "yearStart": -3500, "yearEnd": 500, "color": "#C9A961", "blurb": "The first cities, the first gods, the first art made to outlast its makers.", "longForm": "Across four millennia, the earliest sustained art traditions appeared independently and almost simultaneously in different river valleys: the Nile, the Tigris and Euphrates, the Indus, the Yellow River. Cities formed. Writing was invented. Hierarchies hardened. Art in this era is almost universally tied to power, ritual, and the dead \u2014 pyramids, tombs, oracle bones, temple sculpture, jade burial suits. Stylistic conservatism is the norm: a 2000 BCE Egyptian sculpture and a 1000 BCE Egyptian sculpture look strikingly similar by design. Art was a stabilizing force, not an expressive one.", "themes": ["the first cities", "art for the dead", "power and ritual", "writing emerges"]}, "contemporary-global": {"id": "contemporary-global", "name": "Contemporary Global Art", "order": 6, "yearStart": 1970, "yearEnd": 2030, "color": "#4A6741", "blurb": "Biennials, the internet, repatriation, and a global conversation with no single center.", "longForm": "From roughly 1970 onward, contemporary art becomes genuinely global in a way it had never been before. The biennial circuit spreads from Venice to S\u00e3o Paulo to Dakar to Sharjah to Yokohama. Repatriation debates intensify around objects looted during the colonial period. Digital work, performance, social practice, installation, and traditional media coexist. Indigenous and diasporic artists shape the discourse rather than being shaped by it. The Western canon doesn't disappear, but it becomes one of many.", "themes": ["biennials", "the internet", "repatriation", "Indigenous contemporary", "global south", "digital art"]}, "modernism": {"id": "modernism", "name": "Modernism", "order": 5, "yearStart": 1900, "yearEnd": 1970, "color": "#A0392B", "blurb": "Cubism, abstraction, two world wars, and the slow shattering of Western art's centrality.", "longForm": "The 20th century opens with European artists looking outward \u2014 Picasso to West African masks, Matisse to North African pattern, the German Expressionists to Polynesian carving \u2014 and using what they see (often without credit) to break the inherited rules of representation. Cubism, abstraction, and the various -isms accelerate one another. Mexican muralism gives painting public scale in the Americas. Japanese Nihonga reinvents traditional brushwork for a modern audience. African and Asian artists trained in European academies turn that training back on colonial conditions. After WWII, New York briefly replaces Paris as the world's art center, but the deeper story is the slow loss of any single center at all.", "themes": ["Cubism", "abstraction", "Mexican muralism", "global modernisms", "Abstract Expressionism", "decolonization begins"]}, "renaissances-empires": {"id": "renaissances-empires", "name": "Renaissances & Empires", "order": 3, "yearStart": 1400, "yearEnd": 1800, "color": "#8B5A3C", "blurb": "Florence rediscovers antiquity, Mughals build, Ming porcelain crosses oceans, and the global art market is born.", "longForm": "The four centuries between 1400 and 1800 see something close to simultaneous flowering across multiple civilizations. The Italian Renaissance reinvents perspective and the cult of the individual artist. The Ottomans, Safavids, and Mughals build vast, sophisticated visual cultures fusing Persian, Turkic, and Indian traditions. Ming and Qing China produce porcelain that becomes the first truly global luxury good. Benin bronzes reach their technical peak in West Africa. Mesoamerican empires are conquered, and a new hybrid Hispano-Indigenous art emerges. Trade routes \u2014 overland, maritime, transatlantic \u2014 carry pigments, techniques, motifs, and entire painters across continents.", "themes": ["European Renaissance", "Mughal & Safavid empires", "Ming/Qing porcelain", "global trade", "Benin bronzes", "colonial encounter"]}, "revolution-industry": {"id": "revolution-industry", "name": "Revolution & Industry", "order": 4, "yearStart": 1800, "yearEnd": 1900, "color": "#5C7A8E", "blurb": "Steam, photography, colonial extraction, and a hundred years of overthrowing how to look.", "longForm": "Industrial production, the camera, mass-circulation prints, and a steady erosion of patronage by church and aristocracy all destabilize what painting is for. In Europe, Romanticism gives way to Realism gives way to Impressionism in three generations. In Japan, the Meiji Restoration ends the shogunate and Japanese prints flood into Europe, reshaping European modernism. In India, colonial schools introduce British academic painting just as Indian artists invent the Bengal School in counter-reaction. Photography by 1890 is everywhere. The 19th century is when global art history becomes genuinely entangled \u2014 and when colonial museums begin pulling objects out of their cultures of origin.", "themes": ["photography", "Romanticism to Impressionism", "Japonisme", "colonial extraction", "Bengal School"]}, "sacred-medieval": {"id": "sacred-medieval", "name": "Sacred & Medieval Worlds", "order": 2, "yearStart": 500, "yearEnd": 1400, "color": "#7B5A2E", "blurb": "Empires collapse, religions rise, and art becomes a vessel for the divine.", "longForm": "The collapse of the Roman Empire in the West, the rise of Christianity and Islam, the great Tang and Song dynasties in China, the apex of Khmer Angkor, the height of classical Maya \u2014 all happen in roughly the same nine centuries. Across Eurasia, art turns away from naturalism toward symbolic, hieratic forms suited to expressing the sacred. Byzantine icons, Islamic calligraphy and tile, illuminated manuscripts, Chinese landscape painting as philosophical practice, Hindu temple sculpture, Mesoamerican stelae \u2014 the visual languages are radically different but the underlying impulse is similar: making the invisible visible, and giving the religious or cosmic order a permanent form.", "themes": ["world religions", "post-Roman fragmentation", "manuscript and icon", "Tang and Song China", "classical Maya"]}}, "regions": {"east-asia": {"id": "east-asia", "name": "East Asia", "order": 4, "color": "#9C3F3F", "blurb": "Three thousand unbroken years of brush, ink, lacquer, and porcelain.", "longForm": "China, Japan, Korea, and Vietnam share writing systems, religions, and aesthetic vocabulary in degrees that make 'East Asia' a meaningful category \u2014 but each developed a distinct artistic identity. China set the terms for most of the era; Japan absorbed and transformed; Korea innovated within the tradition; Vietnam pulled toward Southeast Asia. Tibet sits adjacent, with deep ties to South Asian Buddhist art.", "subRegions": ["chinese", "japanese", "korean", "vietnamese", "tibetan"]}, "europe": {"id": "europe", "name": "Europe", "order": 1, "color": "#8B5A3C", "blurb": "The Mediterranean and its long northward reach. Half a dozen distinct traditions wearing the label.", "longForm": "The Latin West, the Greek East, and a dozen national traditions inside them \u2014 Italian, Flemish, Dutch, Spanish, French, German, English, Northern, Russian, Greek/Byzantine, Eastern. European art is so often presented as a single story that its internal divergences get flattened. A Flemish 1500s panel and an Italian 1500s panel were made in cultures with different religious settlements, different patron classes, different paint chemistry. The deeper you go, the less Europe is one place.", "subRegions": ["italian", "flemish", "dutch", "spanish", "french", "german", "austrian", "english", "northern-european", "russian", "greek-byzantine", "eastern-european"]}, "indigenous-americas": {"id": "indigenous-americas", "name": "Indigenous Americas", "order": 7, "color": "#9C5840", "blurb": "The artistic traditions of North America, the Andes, and the Amazon \u2014 most of them still living traditions.", "longForm": "The Indigenous arts of the Americas span hundreds of distinct cultures and traditions, from Pueblo pottery and Pacific Northwest carving to Inca textiles and Amazonian feather work. Many traditions were nearly extinguished during the colonial period and have been carefully revived; many never stopped. They are not 'ancient' \u2014 they are contemporary practices with deep pasts.", "subRegions": ["north-american-indigenous", "andean", "amazonian"]}, "mesoamerica": {"id": "mesoamerica", "name": "Mesoamerica", "order": 8, "color": "#C46B3D", "blurb": "Olmec, Maya, Aztec, and a dozen city-states in between, building stone civilizations across what is now Mexico and Central America.", "longForm": "Three thousand years of unbroken artistic tradition across the cultures of present-day Mexico, Guatemala, Belize, and Honduras. The Olmec, the Maya, the Zapotec, the Mixtec, the Toltec, the Aztec \u2014 all distinct, all interconnected through trade and conquest. Stone sculpture, codices, mural painting, jade and obsidian carving. Largely erased by Spanish conquest but visible in fragments throughout the world's major museums.", "subRegions": ["olmec", "maya", "aztec", "mixtec", "zapotec"]}, "middle-east-north-africa": {"id": "middle-east-north-africa", "name": "Middle East & North Africa", "order": 2, "color": "#C9A961", "blurb": "Where writing was invented, and where most of the world's empires worth the name have started.", "longForm": "From the Sumerians to the Ottomans, the lands between the Nile and the Tigris have produced more imperial visual languages than any equivalent region. Egyptian conservatism, Mesopotamian innovation, Persian luxury, Byzantine icon, Islamic calligraphic and geometric abstraction, Ottoman tile \u2014 vastly different but mutually entangled traditions.", "subRegions": ["egyptian", "mesopotamian", "persian", "islamic", "maghreb"]}, "modern-americas": {"id": "modern-americas", "name": "Modern Americas", "order": 10, "color": "#A0392B", "blurb": "Post-1500 art across the Americas \u2014 Hispano-Indigenous, US, Mexican, Brazilian, and beyond.", "longForm": "After 1500, the Americas became a site of forced encounter between Indigenous traditions, European colonial cultures, and African diasporic ones. Hispano-Indigenous painting in Cuzco and Mexico City, US landscape painting, Mexican muralism, Brazilian modernism, Argentinian conceptualism \u2014 distinct traditions with shared colonial inheritance.", "subRegions": ["us-american", "mexican", "brazilian", "argentinian", "canadian", "caribbean", "hispano-indigenous"]}, "oceania": {"id": "oceania", "name": "Oceania", "order": 9, "color": "#5E7A8C", "blurb": "Australia, Polynesia, Melanesia, and the world's longest continuous artistic tradition \u2014 Aboriginal Australian art.", "longForm": "Aboriginal Australian art has been continuously practiced for at least 60,000 years, making it the longest unbroken artistic tradition on Earth. Polynesian tatau, Maori whakairo carving, Melanesian masks and bilum bags \u2014 sophisticated visual cultures often grouped together as 'Pacific art' that have very little in common with each other beyond geography.", "subRegions": ["aboriginal-australian", "polynesian", "maori", "melanesian"]}, "south-asia": {"id": "south-asia", "name": "South Asia", "order": 5, "color": "#B8862A", "blurb": "The continent that produced Hindu temple sculpture, Buddhist cave painting, Mughal miniature, and a dozen things in between.", "longForm": "South Asia's artistic history is layered like nowhere else: pre-Vedic, Vedic, Buddhist, Jain, Hindu, Indo-Islamic, Sikh, colonial, modern. Hindu temple architecture and sculpture is among the most sophisticated visual traditions humans have produced. The Mughal miniature, which fused Persian technique with Indian subject matter, is one of the great cross-cultural art forms.", "subRegions": ["indian", "sri-lankan", "nepalese"]}, "southeast-asia": {"id": "southeast-asia", "name": "Southeast Asia", "order": 6, "color": "#7E6B3F", "blurb": "The pivot between India and China, and the home of Angkor \u2014 the largest religious complex ever built.", "longForm": "Indianized and Sinicized cultural spheres met across mainland and maritime Southeast Asia, producing wildly distinctive traditions: Khmer temple-mountain architecture, Javanese gamelan-and-batik aesthetic, Thai golden Buddhas, Burmese lacquer. Often underrepresented in Western museums and survey courses.", "subRegions": ["khmer", "thai", "javanese", "burmese", "vietnamese-southeast"]}, "sub-saharan-africa": {"id": "sub-saharan-africa", "name": "Sub-Saharan Africa", "order": 3, "color": "#7A4D2E", "blurb": "Sophisticated artistic civilizations whose existence was systematically denied during the colonial period.", "longForm": "When Benin bronzes reached London in 1897, they so contradicted European assumptions about African art that some scholars insisted they must have been made by visiting Europeans. They were not. Nok terracottas, Ife heads, Benin bronzes, Kongo nkisi, Ethiopian Christian art, Yoruba ibeji \u2014 sustained traditions stretching back two and a half thousand years, with court workshops, master-apprentice lineages, and technical innovations that anticipated European discoveries by centuries.", "subRegions": ["nok", "ife", "benin", "kongo", "ethiopian", "yoruba", "contemporary-african"]}}, "subregions": {"aboriginal-australian": {"id": "aboriginal-australian", "name": "Aboriginal Australian", "parentRegionId": "oceania", "blurb": "The oldest continuous artistic tradition on Earth. Rock art at least 40,000 years old, and a still-active contemporary tradition."}, "amazonian": {"id": "amazonian", "name": "Amazonian", "parentRegionId": "indigenous-americas", "blurb": "Marajoara pottery, Shipibo geometric body painting and textile, feather work \u2014 sophisticated lowland traditions often invisible in museums."}, "andean": {"id": "andean", "name": "Andean", "parentRegionId": "indigenous-americas", "blurb": "Chav\u00edn, Moche, Nazca, Wari, Inca, and contemporary Quechua and Aymara traditions. Textiles, ceramics, and goldwork at the highest technical level."}, "argentinian": {"id": "argentinian", "name": "Argentinian", "parentRegionId": "modern-americas", "blurb": "A strong tradition of conceptual and geometric abstraction \u2014 Xul Solar, Berni, Le Parc."}, "austrian": {"id": "austrian", "name": "Austrian", "parentRegionId": "europe", "blurb": "The Habsburg court at Vienna, Klimt and the Secession, Egon Schiele. A small region with outsized artistic gravity."}, "aztec": {"id": "aztec", "name": "Aztec (Mexica)", "parentRegionId": "mesoamerica", "blurb": "The Triple Alliance of Tenochtitlan, Texcoco, and Tlacopan, 1428-1521. Stone sculpture, featherwork, codices."}, "benin": {"id": "benin", "name": "Benin", "parentRegionId": "sub-saharan-africa", "blurb": "The Kingdom of Benin produced cast-bronze plaques and heads from the 13th century onward. Most are now in European museums."}, "brazilian": {"id": "brazilian", "name": "Brazilian", "parentRegionId": "modern-americas", "blurb": "Tarsila do Amaral's anthropophagic modernism, Concrete and Neo-Concrete art, Lygia Clark, H\u00e9lio Oiticica, contemporary."}, "burmese": {"id": "burmese", "name": "Burmese", "parentRegionId": "southeast-asia", "blurb": "Pagan-era stupas, gilded Buddha sculpture, and one of the great lacquerware traditions."}, "canadian": {"id": "canadian", "name": "Canadian", "parentRegionId": "modern-americas", "blurb": "Group of Seven landscape painting, Inuit printmaking, contemporary First Nations and M\u00e9tis art."}, "caribbean": {"id": "caribbean", "name": "Caribbean", "parentRegionId": "modern-americas", "blurb": "Cuban, Haitian, Jamaican, Trinidadian, Puerto Rican traditions \u2014 often overlooked, deeply important to global modernism."}, "chinese": {"id": "chinese", "name": "Chinese", "parentRegionId": "east-asia", "blurb": "Three thousand years of brush, ink, and porcelain. The original East Asian tradition that the others responded to."}, "contemporary-african": {"id": "contemporary-african", "name": "Contemporary African", "parentRegionId": "sub-saharan-africa", "blurb": "Since 1960s independence, a generation of artists \u2014 El Anatsui, Yinka Shonibare, Wangechi Mutu \u2014 has taken the global stage."}, "dutch": {"id": "dutch", "name": "Dutch", "parentRegionId": "europe", "blurb": "After Dutch independence in 1648, a small Protestant republic invents the modern art market and produces Rembrandt and Vermeer."}, "eastern-european": {"id": "eastern-european", "name": "Eastern European", "parentRegionId": "europe", "blurb": "Polish, Czech, Hungarian \u2014 distinct national schools often eclipsed by Western European fame."}, "egyptian": {"id": "egyptian", "name": "Egyptian", "parentRegionId": "middle-east-north-africa", "blurb": "Three millennia of remarkably stable artistic conventions, made for the gods and the dead."}, "english": {"id": "english", "name": "English", "parentRegionId": "europe", "blurb": "Late to develop an independent tradition, but produces Gainsborough, Turner, the Pre-Raphaelites, and a strong watercolor school."}, "ethiopian": {"id": "ethiopian", "name": "Ethiopian", "parentRegionId": "sub-saharan-africa", "blurb": "A continuous Christian art tradition stretching from the 4th century to today \u2014 icons, illuminated manuscripts, rock-hewn churches."}, "flemish": {"id": "flemish", "name": "Flemish", "parentRegionId": "europe", "blurb": "Bruges, Ghent, Antwerp. Inventors of oil painting and the dense, jewel-like Northern Renaissance interior."}, "french": {"id": "french", "name": "French", "parentRegionId": "europe", "blurb": "After 1648, the Royal Academy in Paris becomes the most influential art institution in Europe. After 1850, Paris becomes the world's modern art capital."}, "german": {"id": "german", "name": "German", "parentRegionId": "europe", "blurb": "D\u00fcrer, Holbein, Friedrich, Kirchner. Often Protestant, often austere, often technically virtuosic."}, "greek-byzantine": {"id": "greek-byzantine", "name": "Greek/Byzantine", "parentRegionId": "europe", "blurb": "The Eastern Roman Empire and its inheritors. Icons, mosaics, and an artistic tradition that stretched from Ravenna to Moscow."}, "hispano-indigenous": {"id": "hispano-indigenous", "name": "Hispano-Indigenous", "parentRegionId": "modern-americas", "blurb": "The hybrid painting traditions of colonial Mexico and Peru \u2014 Cuzco School, casta paintings, religious art that fused Spanish and Indigenous visual languages."}, "ife": {"id": "ife", "name": "Ife", "parentRegionId": "sub-saharan-africa", "blurb": "The Yoruba city of Ife produced staggeringly naturalistic bronze and terracotta heads in the 12th-15th centuries."}, "indian": {"id": "indian", "name": "Indian", "parentRegionId": "south-asia", "blurb": "Pre-Vedic seal carving, Buddhist cave painting, Hindu temple sculpture, Mughal miniature, Bengal School, contemporary. The most layered tradition in the world."}, "islamic": {"id": "islamic", "name": "Islamic", "parentRegionId": "middle-east-north-africa", "blurb": "Across Umayyad, Abbasid, Fatimid, Mamluk, Ottoman, Safavid, and Mughal dynasties. Calligraphy, geometric tile, architectural splendor."}, "italian": {"id": "italian", "name": "Italian", "parentRegionId": "europe", "blurb": "Florence, Venice, Rome, Siena, Naples. The Italian peninsula has produced more named artists than any other equivalent geography in world history."}, "japanese": {"id": "japanese", "name": "Japanese", "parentRegionId": "east-asia", "blurb": "From Heian courtly painting through woodblock printing to the modern era. Distinguished by a strong tradition of empty space and asymmetric design."}, "javanese": {"id": "javanese", "name": "Javanese", "parentRegionId": "southeast-asia", "blurb": "Borobudur is the largest Buddhist temple in the world. After Islamization, Java becomes a center of batik and shadow puppet (wayang) traditions."}, "khmer": {"id": "khmer", "name": "Khmer", "parentRegionId": "southeast-asia", "blurb": "The Angkor empire of present-day Cambodia produced the largest religious complex ever built and a sculptural tradition equal to anything in Asia."}, "kongo": {"id": "kongo", "name": "Kongo", "parentRegionId": "sub-saharan-africa", "blurb": "The Kingdom of Kongo and its neighbors \u2014 nkisi power figures, raphia textile, and one of the earliest African Christian art traditions."}, "korean": {"id": "korean", "name": "Korean", "parentRegionId": "east-asia", "blurb": "Goryeo celadon, Joseon ink painting, contemporary art. A tradition often overshadowed by China and Japan but technically among the finest in East Asia."}, "maghreb": {"id": "maghreb", "name": "Maghreb", "parentRegionId": "middle-east-north-africa", "blurb": "North Africa west of Egypt \u2014 Morocco, Algeria, Tunisia, Libya. Berber, Arab, and Andalusi traditions."}, "maori": {"id": "maori", "name": "M\u0101ori", "parentRegionId": "oceania", "blurb": "Aotearoa New Zealand. Whakairo (carving), t\u0101 moko (tattoo), tukutuku (panel weaving) \u2014 a distinctive Polynesian-derived tradition."}, "maya": {"id": "maya", "name": "Maya", "parentRegionId": "mesoamerica", "blurb": "The Maya cities of present-day Guatemala, southern Mexico, Belize, and Honduras. Stelae, codices, polychrome ceramics, monumental architecture, hieroglyphic writing."}, "melanesian": {"id": "melanesian", "name": "Melanesian", "parentRegionId": "oceania", "blurb": "Papua New Guinea, Vanuatu, Solomon Islands, Fiji. Sepik River carving, malagan funerary objects, bilum textile."}, "mesopotamian": {"id": "mesopotamian", "name": "Mesopotamian", "parentRegionId": "middle-east-north-africa", "blurb": "Sumerians, Akkadians, Babylonians, Assyrians \u2014 the first urban art traditions in human history."}, "mexican": {"id": "mexican", "name": "Mexican", "parentRegionId": "modern-americas", "blurb": "After independence, a distinct Mexican school: muralism (Rivera, Orozco, Siqueiros), Frida Kahlo, the Ruptura generation, contemporary art."}, "mixtec": {"id": "mixtec", "name": "Mixtec", "parentRegionId": "mesoamerica", "blurb": "The Mixtec of Oaxaca produced exquisite codices and metalwork."}, "nepalese": {"id": "nepalese", "name": "Nepalese", "parentRegionId": "south-asia", "blurb": "Newar Buddhist and Hindu art \u2014 paubha paintings, gilt bronze, woodcarving. Tibetan art has its roots here."}, "nok": {"id": "nok", "name": "Nok", "parentRegionId": "sub-saharan-africa", "blurb": "The Nok culture of present-day Nigeria, 1500 BCE - 500 CE. The oldest large-scale sculpture tradition in sub-Saharan Africa."}, "north-american-indigenous": {"id": "north-american-indigenous", "name": "North American Indigenous", "parentRegionId": "indigenous-americas", "blurb": "Pueblo, Pacific Northwest, Plains, Eastern Woodlands \u2014 many distinct traditions across the continent, most still actively practiced."}, "northern-european": {"id": "northern-european", "name": "Northern European", "parentRegionId": "europe", "blurb": "Scandinavian art \u2014 Munch, Hammersh\u00f8i, Vilhelm Lundstr\u00f8m. Often associated with cold light and psychological interiority."}, "olmec": {"id": "olmec", "name": "Olmec", "parentRegionId": "mesoamerica", "blurb": "The mother culture of Mesoamerica, ca. 1500-400 BCE. Colossal heads of basalt, jade carving, and the earliest Mesoamerican writing."}, "persian": {"id": "persian", "name": "Persian", "parentRegionId": "middle-east-north-africa", "blurb": "Achaemenid, Sasanian, Safavid. A continuous tradition of refined court arts \u2014 manuscript painting, carpet, tile, calligraphy."}, "polynesian": {"id": "polynesian", "name": "Polynesian", "parentRegionId": "oceania", "blurb": "Hawaiian, Samoan, Tongan, Tahitian. Tatau (tattoo), wood carving, kapa bark cloth, featherwork."}, "russian": {"id": "russian", "name": "Russian", "parentRegionId": "europe", "blurb": "From icon painting through the Wanderers, then the explosive avant-garde of Malevich, Kandinsky, and the Russian Constructivists."}, "spanish": {"id": "spanish", "name": "Spanish", "parentRegionId": "europe", "blurb": "Catholic, courtly, and dark. El Greco, Vel\u00e1zquez, Murillo, Goya."}, "sri-lankan": {"id": "sri-lankan", "name": "Sri Lankan", "parentRegionId": "south-asia", "blurb": "Theravada Buddhist art, Sigiriya frescoes, an island tradition with deep Indian roots and its own voice."}, "thai": {"id": "thai", "name": "Thai", "parentRegionId": "southeast-asia", "blurb": "Sukhothai, Ayutthaya, Bangkok \u2014 a sustained Theravada Buddhist tradition with extraordinary metalwork and painting."}, "tibetan": {"id": "tibetan", "name": "Tibetan", "parentRegionId": "east-asia", "blurb": "Vajrayana Buddhist art \u2014 thangka paintings, sand mandalas, gilt-bronze sculpture. Closer to South Asian traditions than East Asian in deep history."}, "us-american": {"id": "us-american", "name": "US American", "parentRegionId": "modern-americas", "blurb": "From colonial portraiture through the Hudson River School, the Ashcan School, Abstract Expressionism, Pop, and beyond."}, "vietnamese-southeast": {"id": "vietnamese-southeast", "name": "Vietnamese (SE Asian)", "parentRegionId": "southeast-asia", "blurb": "Cham culture in central Vietnam left Hindu temples; northern Vietnam belongs more to the East Asian tradition."}, "vietnamese": {"id": "vietnamese", "name": "Vietnamese", "parentRegionId": "east-asia", "blurb": "A thousand years of Chinese-influenced art followed by a distinct Vietnamese tradition \u2014 Dong Ho prints, lacquer painting, modern Hanoi."}, "yoruba": {"id": "yoruba", "name": "Yoruba", "parentRegionId": "sub-saharan-africa", "blurb": "The Yoruba of Nigeria and Benin \u2014 ibeji twin figures, beaded crowns, gelede masks, ancestor sculpture."}, "zapotec": {"id": "zapotec", "name": "Zapotec", "parentRegionId": "mesoamerica", "blurb": "The Zapotec of Monte Alb\u00e1n, contemporaneous with the early Maya. Stelae and urn figures."}}, "movements": {"american-modernism": {"id": "american-modernism", "name": "American Modernism", "shortName": "American Modernism", "yearStart": 1900, "yearEnd": 1960, "color": "#A0392B", "blurb": "America builds its own modernism out of skyscrapers, jazz, and lonely diners.", "longForm": "Early 20th-century American painters absorbed European modernism but produced something distinctly their own. The Ashcan School painted gritty New York street life. Stieglitz's circle, including Georgia O'Keeffe and Marsden Hartley, found abstraction in the American landscape. Edward Hopper made loneliness into a national subject. After World War II, New York replaced Paris as the world's art capital, and Abstract Expressionism \u2014 Pollock, Rothko, de Kooning \u2014 turned painting itself into a kind of action. The Met's American Wing tells this story chronologically across two floors.", "keyArtworks": ["met-hopper-tables", "met-okeeffe-cow-skull"], "lessons": ["american-modernism-01"]}, "dutch-golden-age": {"id": "dutch-golden-age", "name": "Dutch Golden Age", "shortName": "Dutch Golden Age", "yearStart": 1600, "yearEnd": 1700, "color": "#3D4F5C", "blurb": "A small Protestant republic gets rich and invents the modern art market.", "longForm": "In the 17th century, the newly independent Dutch Republic was the richest place in Europe per capita. With no Catholic church commissioning altarpieces and no royal court demanding portraits, Dutch painters turned to a new clientele: the middle class. They painted what their customers wanted on their walls \u2014 portraits, landscapes, still lifes of half-peeled lemons, quiet interiors of women reading letters. Rembrandt was the towering figure, but Vermeer's thirty-four surviving paintings, including five at the Met, are perhaps the most carefully studied images in Western art.", "keyArtworks": ["met-vermeer-water-pitcher", "met-rembrandt-self-portrait"], "lessons": ["dutch-golden-age-01"]}, "egyptian-ancient": {"id": "egyptian-ancient", "name": "Egyptian & Ancient Mediterranean", "shortName": "Ancient", "yearStart": -3000, "yearEnd": 400, "color": "#C9A961", "blurb": "Three millennia of art made for the gods and the dead. Stone, gold, and an obsession with eternity.", "longForm": "The art of ancient Egypt was not made to be looked at by us. It was made to function: to house the soul of a king, to ensure safe passage to the afterlife, to honor a god whose name has not been spoken in millennia. Stylistically rigid for thousands of years on purpose, Egyptian art valued permanence over expression. The Met's Temple of Dendur, given to the United States by Egypt in 1965, is one of only four Egyptian temples outside Egypt. Around it sit objects that were sealed in tombs for three thousand years before being opened in the last two centuries.", "keyArtworks": ["met-temple-dendur", "met-hatshepsut-kneeling"], "lessons": ["egyptian-ancient-01"]}, "impressionism": {"id": "impressionism", "name": "Impressionism", "shortName": "Impressionism", "yearStart": 1860, "yearEnd": 1900, "color": "#8FA8B5", "blurb": "A handful of Parisians decide painting should look like the eye actually sees.", "longForm": "Rejected by the official Paris Salon, a group of painters including Monet, Renoir, Degas, and Pissarro began exhibiting together in 1874. Critics mocked one of Monet's loose harbor scenes as a mere 'impression' \u2014 the name stuck. Their innovation was both technical and philosophical: they painted outdoors, in front of their subjects, trying to capture the specific light of a specific moment before it changed. The Met has one of the great Impressionist collections in the world, including Monet's Water Lilies, Degas' dancers, and a wall of Cezanne that bridges to what came next.", "keyArtworks": ["met-monet-bridge", "met-degas-rehearsal"], "lessons": ["impressionism-01"]}, "italian-renaissance": {"id": "italian-renaissance", "name": "Italian Renaissance", "shortName": "Italian Renaissance", "yearStart": 1400, "yearEnd": 1600, "color": "#8B5A3C", "blurb": "Florence and Venice rediscover antiquity and invent the modern artist.", "longForm": "Beginning in early 15th-century Florence, painters and sculptors began to study the ancient Greeks and Romans not as relics but as rivals. They reinvented perspective, anatomy, and the very idea of the artist as an individual genius rather than an anonymous craftsman. The movement crested with Leonardo, Michelangelo, and Raphael, then radiated outward to Venice, where Titian and Tintoretto traded Florentine line for sumptuous color. The Met's holdings are deep here, from Botticelli's late religious panels to a small but ravishing collection of Italian drawings.", "keyArtworks": ["met-botticelli-jerome", "met-bellini-madonna"], "lessons": ["italian-renaissance-01"]}, "northern-renaissance": {"id": "northern-renaissance", "name": "Northern Renaissance", "shortName": "Northern Renaissance", "yearStart": 1400, "yearEnd": 1600, "color": "#4A6741", "blurb": "Oil paint, miraculous detail, and a colder, more intricate world than Italy.", "longForm": "While Italy looked to ancient marble for inspiration, painters in Flanders and the Low Countries looked instead through windows, into mirrors, at the precise grain of a velvet sleeve. The breakthrough was oil paint, which let Jan van Eyck and his successors build up layers of nearly invisible glaze and render the visible world with hallucinatory clarity. Northern Renaissance art is generally smaller, denser, and stranger than its Italian counterpart, packed with symbolism that contemporary viewers could read like text. The Met's collection includes Bruegel, Memling, and a stunning Petrus Christus portrait.", "keyArtworks": ["met-bruegel-harvesters", "met-christus-carthusian"], "lessons": ["northern-renaissance-01"]}}, "museums": {"met": {"id": "met", "name": "The Metropolitan Museum of Art", "shortName": "The Met", "city": "New York", "country": "USA", "founded": 1870, "blurb": "One of the largest and most encyclopedic museums in the world. Two million works spanning 5,000 years across the entire history of art."}}, "artists": {"bellini": {"id": "bellini", "name": "Giovanni Bellini", "shortName": "Bellini", "yearBorn": 1430, "yearDied": 1516, "nationality": "Italian", "movementId": "italian-renaissance", "blurb": "The Venetian master who taught his city to paint, founder of a school that would produce Titian, Giorgione, and Tintoretto.", "longForm": "Bellini lived a long life and worked at the geographic edge of the Italian Renaissance, in Venice, where he absorbed both the Florentine love of line and the Northern Renaissance discovery of oil paint. He brought oil glazing to Venetian painting and in doing so changed what color could do in Western art. His pupils and assistants included most of the next generation of Venetian masters. The Met owns several Bellinis, including a quiet, intimate Madonna and Child from around 1485.", "influencedBy": ["jacopo-bellini"], "influenced": ["titian", "giorgione"]}, "botticelli": {"id": "botticelli", "name": "Sandro Botticelli", "shortName": "Botticelli", "yearBorn": 1445, "yearDied": 1510, "nationality": "Italian", "movementId": "italian-renaissance", "blurb": "Florentine painter of impossibly graceful Madonnas, Venuses, and mythological dreams.", "longForm": "Botticelli worked in Florence under the patronage of the Medici family, producing some of the most recognizable images in Western art, including The Birth of Venus and Primavera. His mature style favored linear elegance over the volumetric realism his contemporaries were developing, which fell out of fashion almost immediately after his death. He was forgotten for nearly four centuries until the Pre-Raphaelites and Walter Pater rediscovered him in the 19th century. The Met owns several late religious works, including a striking small Annunciation.", "influencedBy": ["lippi"], "influenced": ["pre-raphaelites"]}, "bruegel-elder": {"id": "bruegel-elder", "name": "Pieter Bruegel the Elder", "shortName": "Bruegel", "yearBorn": 1525, "yearDied": 1569, "nationality": "Flemish", "movementId": "northern-renaissance", "blurb": "The greatest painter of peasants, weather, and the strangeness of being alive in 16th-century Flanders.", "longForm": "Bruegel was a learned man who painted as if he wasn't. His scenes of villagers harvesting, dancing, and freezing in winter are so vivid that we sometimes forget they are also moral allegories, drawn from a humanist's library of proverbs and biblical parables. He founded a painter dynasty: his sons Pieter the Younger and Jan continued the workshop, but the original Bruegel remains unmatched. Of his fewer than fifty surviving works, the Met owns one masterpiece, The Harvesters, painted in 1565 as part of a series depicting the months of the year.", "influencedBy": ["bosch"], "influenced": ["rubens"]}, "clifford-possum-tjapaltjarri": {"id": "clifford-possum-tjapaltjarri", "name": "Clifford Possum Tjapaltjarri", "shortName": "Clifford Possum", "yearBorn": 1932, "yearDied": 2002, "nationality": "Anmatyerre (Australia)", "subRegionId": "aboriginal-australian", "regionId": "oceania", "blurb": "One of the founding generation of the Papunya Tula movement and a senior Anmatyerre custodian of ancestral knowledge.", "longForm": "Clifford Possum was born in central Australia and became one of the most significant artists of the late 20th century. He was deeply embedded in Anmatyerre ceremonial life and made deliberate choices about which Tjukurpa (ancestral stories) could be rendered in painting for non-Anmatyerre audiences. His large-scale works \u2014 sometimes incorporating maps of his country across canvases two or three meters across \u2014 are masterpieces of both visual design and political assertion.", "influencedBy": [], "influenced": []}, "degas": {"id": "degas", "name": "Edgar Degas", "shortName": "Degas", "yearBorn": 1834, "yearDied": 1917, "nationality": "French", "movementId": "impressionism", "blurb": "The Impressionist who hated being called one. Obsessed with the human figure, especially dancers caught off-guard.", "longForm": "Degas exhibited with the Impressionists but resented the label. Unlike Monet, he had little interest in landscape or outdoor light. He was a draftsman first, trained in the academic tradition, and his subject was the human figure in unguarded moments: laundresses ironing, jockeys before the race, and above all, ballet dancers stretching, yawning, adjusting their slippers backstage. He took up sculpture in his later years as his eyesight failed, producing wax figures that were cast in bronze after his death.", "influencedBy": ["ingres"], "influenced": ["toulouse-lautrec"]}, "hokusai": {"id": "hokusai", "name": "Katsushika Hokusai", "shortName": "Hokusai", "yearBorn": 1760, "yearDied": 1849, "nationality": "Japanese", "subRegionId": "japanese", "regionId": "east-asia", "blurb": "Edo-period painter and printmaker whose Thirty-six Views of Mount Fuji defined Japanese landscape art and reshaped European modernism.", "longForm": "Hokusai was already in his seventies when he produced the Thirty-six Views of Mount Fuji, his most famous series. He changed his artistic name dozens of times across his career \u2014 a Japanese convention for marking creative stages \u2014 and worked obsessively until his death at 89, reportedly complaining that if he could have only five more years he would finally learn to draw. His prints reached Europe after Japan's opening to trade in the 1850s and arguably had as much influence on European modernism as any single Western artist of the 19th century.", "influencedBy": ["kano-school"], "influenced": ["monet", "van-gogh", "degas"]}, "hopper": {"id": "hopper", "name": "Edward Hopper", "shortName": "Hopper", "yearBorn": 1882, "yearDied": 1967, "nationality": "American", "movementId": "american-modernism", "blurb": "The great painter of American loneliness. Diners, hotel rooms, gas stations, all empty of small talk.", "longForm": "Hopper trained as an illustrator and worked commercially for years before his paintings began to sell. He married another painter, Josephine Nivison, who modeled for nearly every female figure in his mature work. He painted slowly, sometimes finishing only two or three canvases a year. His subjects are American spaces drained of their usual activity: a diner at 3 a.m., a hotel lobby with one figure reading, a Sunday morning street with the shops closed. The Whitney holds the largest Hopper collection in the world, but the Met owns his luminous Tables for Ladies.", "influencedBy": ["henri"], "influenced": ["wyeth", "rothko"]}, "monet": {"id": "monet", "name": "Claude Monet", "shortName": "Monet", "yearBorn": 1840, "yearDied": 1926, "nationality": "French", "movementId": "impressionism", "blurb": "The longest-lived Impressionist, who painted the same haystacks, cathedrals, and water lilies hundreds of times to chase the changing light.", "longForm": "Monet gave Impressionism its name, with his 1872 painting Impression, Sunrise. He spent the second half of his life at his house in Giverny, where he designed an elaborate water garden specifically so he could paint it. As his eyesight failed in old age, his late Water Lilies became increasingly abstract, anticipating Abstract Expressionism by half a century. The Met has thirty-two Monets, including key examples from his series paintings of haystacks and Rouen Cathedral, where the subject barely matters and the light is everything.", "influencedBy": ["boudin", "turner"], "influenced": ["pollock"]}, "okeeffe": {"id": "okeeffe", "name": "Georgia O'Keeffe", "shortName": "O'Keeffe", "yearBorn": 1887, "yearDied": 1986, "nationality": "American", "movementId": "american-modernism", "blurb": "Made American modernism out of magnified flowers, bleached desert bones, and New Mexico skies.", "longForm": "O'Keeffe came of age in the orbit of the photographer Alfred Stieglitz, whom she married. Her early work was abstract, but she became famous for her enormous close-ups of flowers, painted so large that they nearly tip into pure form. From 1929 she spent summers in New Mexico, and after Stieglitz's death she moved there permanently. The bleached cattle skulls, adobe churches, and red hills of her late work are inseparable from American modernism's frontier mythology. She lived to ninety-eight and was nearly blind at the end.", "influencedBy": ["dow"], "influenced": ["mitchell"]}, "petrus-christus": {"id": "petrus-christus", "name": "Petrus Christus", "shortName": "Petrus Christus", "yearBorn": 1410, "yearDied": 1475, "nationality": "Flemish", "movementId": "northern-renaissance", "blurb": "Bruges painter who took over Jan van Eyck's workshop and his role as the leading painter of the Low Countries.", "longForm": "Petrus Christus became the most important painter in Bruges after Jan van Eyck's death in 1441, almost certainly inheriting his workshop and many of his patrons. He was one of the first Northern painters to use single-point linear perspective, an Italian innovation, and one of the first to set portrait subjects in real interior spaces rather than against flat backgrounds. The Met's Portrait of a Carthusian, dated 1446, is among the earliest dated Netherlandish portraits and one of his most famous works.", "influencedBy": ["van-eyck"], "influenced": ["memling"]}, "rembrandt": {"id": "rembrandt", "name": "Rembrandt van Rijn", "shortName": "Rembrandt", "yearBorn": 1606, "yearDied": 1669, "nationality": "Dutch", "movementId": "dutch-golden-age", "blurb": "The towering genius of 17th-century painting. Painted his own face from youth to ruin.", "longForm": "Rembrandt was the most successful painter in Amsterdam for the first half of his career and bankrupt for the second. He left nearly a hundred self-portraits, an unprecedented act of self-examination that lets us watch him age in close to real time. His handling of paint became increasingly thick and free as he aged, and his late works, including several Met masterpieces, anticipate the broken brushwork of two centuries later. He outlived his wife, his mistress, and his only surviving son.", "influencedBy": ["lastman", "caravaggio"], "influenced": ["vermeer", "kokoschka"]}, "vermeer": {"id": "vermeer", "name": "Johannes Vermeer", "shortName": "Vermeer", "yearBorn": 1632, "yearDied": 1675, "nationality": "Dutch", "movementId": "dutch-golden-age", "blurb": "A Delft painter of quiet interiors who left only about 34 paintings, each one a small miracle of light.", "longForm": "Almost nothing is known about Vermeer's life. He lived in Delft, painted slowly, died in debt at 43, and was largely forgotten for two centuries before being rediscovered in the 1860s. His paintings are nearly all the same: a woman in a corner of a room, light entering from a window on the left, the world reduced to a moment so quiet it seems to hold its breath. He may have used a camera obscura, an optical device, to achieve his particular soft focus and pearl-like highlights. The Met owns five Vermeers, the largest concentration outside the Mauritshuis in The Hague.", "influencedBy": ["fabritius"], "influenced": ["hammershoi"]}}, "artworks": {"met-aboriginal-dot-painting": {"id": "met-aboriginal-dot-painting", "title": "Possum Dreaming", "artistId": "clifford-possum-tjapaltjarri", "year": 1976, "decade": 1970, "eraId": "contemporary-global", "regionId": "oceania", "subRegionId": "aboriginal-australian", "museumId": null, "medium": "Synthetic polymer paint on canvas", "dimensions": "Variable", "image": null, "imageSource": "placard", "imageCredit": "Image under copyright; placard shown", "famousLevel": 4, "wallLabel": "A 'dot painting' by a senior artist of the Papunya Tula art movement, which began in 1971 when Aboriginal elders at Papunya in central Australia adapted traditional ceremonial sand and body designs into acrylic paint on canvas. The resulting works look modernist to Western eyes but encode the same Tjukurpa (ancestral law) that the artists' ancestors had taught for forty thousand years.", "longForm": "Papunya Tula was one of the most consequential art movements of the late 20th century \u2014 both as a development in painting itself and as an assertion of Aboriginal sovereignty over land and tradition. The senior artists who founded it deliberately chose which ancestral knowledge could be made visible to outsiders (and at what level of abstraction) and which could not. Clifford Possum Tjapaltjarri was one of the founding generation and one of the great Australian artists of the century, full stop. His major works hang in the National Gallery of Australia. The Aboriginal artistic tradition he works in is at least 40,000 years old, by far the longest unbroken artistic lineage on Earth.", "tags": ["dot-painting", "papunya-tula", "tjukurpa", "acrylic"]}, "met-bellini-madonna": {"id": "met-bellini-madonna", "title": "Madonna and Child", "artistId": "bellini", "year": 1485, "decade": 1480, "movementId": "italian-renaissance", "museumId": "met", "medium": "Oil on wood", "dimensions": "88.9 x 71.1 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Madonna%20and%20Child%20MET%20DT375.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art, Rogers Fund, 1908", "metObjectId": 435641, "famousLevel": 4, "wallLabel": "Mary holds the Christ Child against a parapet, with a Venetian landscape behind her. The composition is one Bellini painted dozens of times across his long career, each version a small varia
