  app.innerHTML = `
    <div class="view">
      <div style="display:flex; align-items:center; gap:var(--space-3); margin-bottom:var(--space-5);">
        <button class="lesson-close" id="back-btn" aria-label="Back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="eyebrow">Region</div>
      </div>
      <h1 style="margin-bottom:var(--space-3);color:${region.color||'var(--color-ink)'};">${region.name}</h1>
      <p style="margin-bottom:var(--space-6);">${region.longForm||region.blurb}</p>
      <h3 class="today-section__title"><span>Through the eras</span></h3>
      ${rows}
    </div>
  `;

  document.getElementById('back-btn').addEventListener('click', renderLearn);
  app.querySelectorAll('[data-lesson-id]').forEach(el => {
    el.addEventListener('click', () => window.__accessionNavigate && window.__accessionNavigate(el.dataset.lessonId));
  });
}

/* =========================================================
   BY ERA: eras in order → tap to see region breakdown
   ========================================================= */

function renderByEra(container) {
  const eras = getEras();

  container.innerHTML = eras.map(era => {
    const mastery = getEraMastery(era.id);
    const pct = Math.round(mastery * 100);
    const lessonList = getAllLessonsForEra(era.id);
    const completedCount = lessonList.filter(l => isLessonCompleted(l.id)).length;
    return `
      <div class="movement-tile" data-era-id="${era.id}" style="cursor:pointer;">
        <div class="movement-tile__years">${era.yearStart < 0 ? Math.abs(era.yearStart) + ' BCE' : era.yearStart} – ${era.yearEnd < 0 ? Math.abs(era.yearEnd) + ' BCE' : era.yearEnd}</div>
        <h2 class="movement-tile__name" style="color:${era.color||'var(--color-ink)'};">${era.name}</h2>
        <p class="movement-tile__blurb">${era.blurb}</p>
        <div class="movement-tile__footer">
          <div class="movement-tile__progress">
            <div class="movement-tile__progress-fill" style="width:${pct}%; background:${era.color||'var(--color-burgundy)'};"></div>
          </div>
          <div style="font-family:var(--font-sans);font-size:var(--type-caption);letter-spacing:0.06em;color:var(--color-sepia);">
            ${completedCount}/${lessonList.length} lessons · ${pct}% mastered
          </div>
        </div>
      </div>
    `;
  }).join('');

  container.querySelectorAll('[data-era-id]').forEach(el => {
    el.addEventListener('click', () => openEraDetail(el.dataset.eraId));
  });
}

function openEraDetail(eraId) {
  const app = document.getElementById('app');
  const era = getEra(eraId);
  if (!era) return;
  const regions = getRegions();

  const rows = regions.map(region => {
    const cm = getCellMastery(eraId, region.id);
    if (cm === null) return '';
    const pct = Math.round(cm * 100);
    const lessons = findLessonsForCell(eraId, region.id);
    return `
      <div style="padding: var(--space-4) 0; border-bottom: 1px solid var(--color-line);">
        <div style="display:flex; align-items:center; gap:var(--space-3); margin-bottom:var(--space-2);">
          <div style="flex:1;">
            <div class="eyebrow" style="margin-bottom:2px;">${region.name}</div>
            <div style="font-family:var(--font-sans);font-size:var(--type-body-s);color:var(--color-sepia);">${pct}% mastered</div>
          </div>
          <div style="width:80px;height:2px;background:var(--color-line);">
            <div style="height:100%;background:${region.color||'var(--color-burgundy)'};width:${pct}%;"></div>
          </div>
        </div>
        ${lessons.map(l => lessonCard(l)).join('')}
      </div>
    `;
  }).filter(Boolean).join('');

  // Also show sampler-style lessons tagged only to this era
  const samplerLessons = getAllLessonsForEra(eraId).filter(l => l.isSampler || !l.regionId);

  const fe = getFeStatus(eraId);
  const feCard = fe ? (() => {
    if (fe.unlocked && !fe.passed) return `
      <div class="fe-learn-card fe-learn-card--unlocked" id="fe-era-card" data-era-id="${eraId}">
        <div class="fe-learn-card__label">Final Exhibition — Unlocked</div>
        <div class="fe-learn-card__title">Era Examination</div>
        <div class="fe-learn-card__body">All ${fe.totalLessons} lessons complete. Take the final examination to earn your certificate for this era.</div>
        <div class="fe-learn-card__action">Begin Final Exhibition</div>
      </div>
    `;
    if (fe.passed) return `
      <div class="fe-learn-card fe-learn-card--passed" id="fe-era-card" data-era-id="${eraId}">
        <div class="fe-learn-card__label">Final Exhibition — Passed ${fe.previousScore}/${fe.previousTotal}</div>
        <div class="fe-learn-card__title">Era Examination</div>
        <div class="fe-learn-card__body">${fe.needsRefresher ? 'New content has been added. Complete new lessons to retake.' : 'Retake any time to improve your score.'}</div>
        <div class="fe-learn-card__action">${fe.needsRefresher ? 'Complete new lessons first' : 'Retake Examination'}</div>
      </div>
    `;
    if (fe.totalLessons > 0) return `
      <div class="fe-learn-card fe-learn-card--locked">
        <div class="fe-learn-card__label">Final Exhibition — Locked</div>
        <div class="fe-learn-card__title">Era Examination</div>
        <div class="fe-learn-card__body">${fe.completedLessons}/${fe.totalLessons} lessons complete. Finish all lessons to unlock.</div>
        <div class="fe-learn-card__progress">
          <div class="fe-learn-card__progress-fill" style="width:${Math.round(fe.completedLessons/fe.totalLessons*100)}%"></div>
        </div>
      </div>
    `;
    return '';
  })() : '';

  app.innerHTML = `
    <div class="view">
      <div style="display:flex; align-items:center; gap:var(--space-3); margin-bottom:var(--space-5);">
        <button class="lesson-close" id="back-btn" aria-label="Back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="eyebrow">Era</div>
      </div>
      <h1 style="margin-bottom:var(--space-2);color:${era.color||'var(--color-ink)'};">${era.name}</h1>
      <p style="font-family:var(--font-serif);font-style:italic;color:var(--color-sepia);margin-bottom:var(--space-3);">${era.yearStart < 0 ? Math.abs(era.yearStart) + ' BCE' : era.yearStart} – ${era.yearEnd < 0 ? Math.abs(era.yearEnd) + ' BCE' : era.yearEnd}</p>
      <p style="margin-bottom:var(--space-6);">${era.longForm||era.blurb}</p>

      ${feCard}

      ${samplerLessons.length ? `
        <h3 class="today-section__title" style="margin-bottom:var(--space-3);"><span>Era lessons</span></h3>
        ${samplerLessons.map(l => lessonCard(l)).join('')}
        <div style="margin-bottom:var(--space-6);"></div>
      ` : ''}

      ${rows ? `<h3 class="today-section__title" style="margin-bottom:0;"><span>By region</span></h3>${rows}` : ''}
    </div>
  `;

  document.getElementById('back-btn').addEventListener('click', renderLearn);
  app.querySelectorAll('[data-lesson-id]').forEach(el => {
    el.addEventListener('click', () => window.__accessionNavigate && window.__accessionNavigate(el.dataset.lessonId));
  });
  const feCardEl = document.getElementById('fe-era-card');
  if (feCardEl) {
    const feStatus = getFeStatus(feCardEl.dataset.eraId);
    if (feStatus && (feStatus.unlocked || feStatus.passed) && !feStatus.needsRefresher) {
      feCardEl.style.cursor = 'pointer';
      feCardEl.addEventListener('click', () => window.__accessionNav && window.__accessionNav('final-exhibitions'));
    }
  }
}

/* =========================================================
   HELPERS
   ========================================================= */

function lessonCard(lesson) {
  const done = isLessonCompleted(lesson.id);
  return `
    <div class="card" data-lesson-id="${lesson.id}" style="margin-top:var(--space-2);cursor:pointer;padding:var(--space-3);">
      <div style="display:flex;align-items:center;gap:var(--space-2);">
        <div style="flex:1;">
          <div class="eyebrow" style="margin-bottom:2px;">
            ${lesson.isSampler ? 'Sampler' : 'Lesson'} · ${lesson.estimatedMinutes||5} min
            ${done ? ' · <span style="color:var(--color-gold);">✓ Complete</span>' : ''}
          </div>
          <strong style="font-family:var(--font-display);font-size:var(--type-body-l);">${lesson.title}</strong>
          ${lesson.subtitle ? `<p style="margin:0;font-size:var(--type-body-s);color:var(--color-sepia);">${lesson.subtitle}</p>` : ''}
        </div>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--color-sepia)" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
      </div>
    </div>
  `;
}

/**
 * Map era/region cells to their lesson IDs.
 * This is the canonical lesson-to-cell mapping.
 */
/**
 * Find all lessons for a specific era+region cell.
 * Driven entirely from lesson JSON data — no hardcoded map.
 */
function findLessonsForCell(eraId, regionId) {
  return getAllLessons()
    .filter(l => l.eraId === eraId && l.regionId === regionId);
}

/**
 * Get all lessons tagged to an era (for the era detail view).
 * Includes both region-specific lessons and era-wide lessons (no regionId).
 */
function getAllLessonsForEra(eraId) {
  return getAllLessons()
    .filter(l => l.eraId === eraId);
}

function isLessonCompleted(lessonId) {
  const state = getState();
  for (const scopeKey in state.movementProgress) {
    if ((state.movementProgress[scopeKey].lessonsCompleted || []).includes(lessonId)) {
      return true;
    }
  }
  return false;
}


/* ===== js/views/collection.js ===== */

/* ============================================================
   ACCESSION - COLLECTION VIEW (global thesis)
   The primary mode is a 6-era × N-region grid showing the user's
   progress across the global timeline. Tapping a dot shows the
   artwork in that cell.
   ============================================================ */






let viewMode = 'timeline';

function renderCollection() {
  const app = document.getElementById('app');
  const stats = getCollectionStats();
  const total = getAllArtworks().length;
  // "Complete" means you've either answered a quiz correctly (mastered ≥ 1)
  // OR marked the work as seen in person. Seeing a wall label alone doesn't count.
  const completeCount = total > 0
    ? getAllArtworks().filter(a => {
        const s = getState().artworkState[a.id];
        if (!s) return false;
        return (s.masteredCount >= 1) || (s.seenInPerson === 'yes');
      }).length
    : 0;
  const globalPct = total > 0 ? Math.round((completeCount / total) * 100) : 0;

  app.innerHTML = `
    <div class="view">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-2)">
        <div class="eyebrow">Your accession</div>
        <button id="settings-btn" style="background:none;border:none;cursor:pointer;padding:var(--space-2);color:var(--color-sepia)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px">
            <circle cx="12" cy="8" r="3.5"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </button>
      </div>
      <h1 style="margin-bottom: var(--space-4);">Collection</h1>

      <div class="reward-stats" style="margin-bottom: var(--space-6);">
        <div class="plaque">
          <span class="plaque__label">Encountered</span>
          <span class="plaque__value">${stats.encountered} <span style="color: var(--color-sepia-light); font-size: var(--type-body-s);">/ ${total}</span></span>
        </div>
        <div class="plaque">
          <span class="plaque__label">Mastered</span>
          <span class="plaque__value">${stats.mastered}</span>
        </div>
        <div class="plaque">
          <span class="plaque__label">In person</span>
          <span class="plaque__value">${stats.seenInPerson}</span>
        </div>
        <div class="plaque">
          <span class="plaque__label">Complete</span>
          <span class="plaque__value">${globalPct}% <span style="color: var(--color-sepia-light); font-size: var(--type-body-s);">(${completeCount}/${total})</span></span>
        </div>
      </div>

      <div style="display: flex; gap: var(--space-2); margin-bottom: var(--space-5);">
        <button class="btn ${viewMode === 'timeline' ? 'btn--primary' : 'btn--secondary'}" id="view-timeline" style="flex: 1;">Timeline</button>
        <button class="btn ${viewMode === 'grid' ? 'btn--primary' : 'btn--secondary'}" id="view-grid" style="flex: 1;">Grid</button>
      </div>

      <div id="collection-canvas"></div>
    </div>
  `;

  document.getElementById('settings-btn')?.addEventListener('click', () => {
    window.__accessionNav && window.__accessionNav('profile');
  });
  document.getElementById('view-timeline').addEventListener('click', () => {
    viewMode = 'timeline'; renderCollection();
  });
  document.getElementById('view-grid').addEventListener('click', () => {
    viewMode = 'grid'; renderCollection();
  });

  const canvas = document.getElementById('collection-canvas');
  if (viewMode === 'timeline') renderTimelineGrid(canvas);
  else renderTileGrid(canvas);
}

function renderTimelineGrid(container) {
  const eras = getEras();
  const regions = getRegions();
  const populatedRegions = regions.filter(r =>
    getAllArtworks().some(a => a.regionId === r.id)
  );

  const headerCells = [`<div class="timeline-grid__cell timeline-grid__header"></div>`];
  for (const era of eras) {
    headerCells.push(`
      <div class="timeline-grid__cell timeline-grid__header" title="${era.name}">${era.name}</div>
    `);
  }

  const rows = populatedRegions.map(region => {
    const cells = [`<div class="timeline-grid__cell timeline-grid__row-label">${region.name}</div>`];
    for (const era of eras) {
      const arts = getArtworksForCell(era.id, region.id);
      if (arts.length === 0) {
        cells.push(`<div class="timeline-grid__cell"></div>`);
      } else {
        const dots = arts.map(a => {
          const state = getNodeState(a.id);
          return `<span class="timeline-dot" data-state="${state}" data-artwork-id="${a.id}" title="${a.title}"></span>`;
        }).join('');
        cells.push(`
          <div class="timeline-grid__cell" data-era-id="${era.id}" data-region-id="${region.id}">
            <div class="timeline-grid__cell-content">${dots}</div>
          </div>
        `);
      }
    }
    return cells.join('');
  }).join('');

  container.innerHTML = `
    <div class="timeline-grid__wrap">
      <div class="timeline-grid" style="grid-template-columns: 100px repeat(${eras.length}, 120px);">
        ${headerCells.join('')}
        ${rows}
      </div>
    </div>
    <div style="padding: var(--space-3) 0; text-align: center; font-family: var(--font-serif); font-style: italic; color: var(--color-sepia); font-size: var(--type-body-s);">
      Swipe to scroll · Tap a dot to see the work · Gold rings mean seen in person
    </div>
    <div id="cell-detail"></div>
  `;

  container.querySelectorAll('.timeline-dot').forEach(dot => {
    dot.addEventListener('click', () => showArtworkPreview(dot.dataset.artworkId));
  });
}

function showArtworkPreview(artworkId) {
  const art = getArtwork(artworkId);
  if (!art) return;

  const region = getRegion(art.regionId);
  const era = getEra(art.eraId);
  const artist = art.artistId ? getArtist(art.artistId) : null;
  const state = getState();
  const artState = state.artworkState[art.id] || {};
  const seenValue = artState.seenInPerson;

  const mapHtml = buildArtworkMap(art.lat, art.lng, '');

  // Build or reuse the overlay
  let overlay = document.getElementById('artwork-sheet-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'artwork-sheet-overlay';
    overlay.className = 'artwork-sheet-overlay';
    document.body.appendChild(overlay);
  }

  overlay.innerHTML = `
    <div class="artwork-sheet" id="artwork-sheet">
      <div class="artwork-sheet__handle"></div>

      <img
        class="artwork-sheet__image"
        src="${art.image || buildPlacard(art)}"
        data-placard="${buildPlacard(art)}"
        onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}"
        alt="${art.title}"
      />

      ${mapHtml}

      <div class="artwork-sheet__body">
        <div class="eyebrow" style="margin-bottom: var(--space-1);">
          ${era?.name || ''} · ${region?.name || ''}
        </div>
        <h2 class="artwork-sheet__title">${art.title}</h2>
        <div class="artwork-sheet__meta">
          ${artist ? `${artist.name} · ` : ''}${formatYear(art.year)}
          ${art.medium ? ` · ${art.medium}` : ''}
        </div>

        <p class="artwork-sheet__wall-label">${art.wallLabel || ''}</p>

        ${art.longForm ? `<p class="artwork-sheet__long-form">${art.longForm}</p>` : ''}

        <div class="artwork-sheet__seen-row">
          <span class="artwork-sheet__seen-label">Seen in person?</span>
          <div class="artwork-sheet__seen-btns">
            <button class="artwork-sheet__seen-btn ${seenValue === 'yes' ? 'is-active' : ''}" data-val="yes">Yes</button>
            <button class="artwork-sheet__seen-btn ${seenValue === 'maybe' ? 'is-active' : ''}" data-val="maybe">Maybe</button>
            <button class="artwork-sheet__seen-btn ${seenValue === 'no' ? 'is-active' : ''}" data-val="no">No</button>
          </div>
        </div>
      </div>
    </div>
  `;

  // Show with animation
  requestAnimationFrame(() => {
    overlay.classList.add('is-visible');
    document.getElementById('artwork-sheet').classList.add('is-open');
  });

  // Dismiss on backdrop tap
  overlay.addEventListener('click', e => {
    if (e.target === overlay) dismissSheet(overlay);
  }, { once: true });

  // Dismiss on drag down (simple velocity check)
  const sheet = document.getElementById('artwork-sheet');
  let startY = 0;
  sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
  sheet.addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - startY > 60) dismissSheet(overlay);
  }, { passive: true });

  // Seen-in-person buttons
  overlay.querySelectorAll('.artwork-sheet__seen-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.val;
      setSeenInPerson(art.id, val);
      overlay.querySelectorAll('.artwork-sheet__seen-btn').forEach(b => b.classList.remove('is-active'));
      btn.classList.add('is-active');
    });
  });
}

function dismissSheet(overlay) {
  const sheet = document.getElementById('artwork-sheet');
  if (sheet) sheet.classList.remove('is-open');
  overlay.classList.remove('is-visible');
  setTimeout(() => { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 350);
}

function renderTileGrid(container) {
  const artworks = getAllArtworks();
  const state = getState();
  container.innerHTML = `
    <div class="collection-grid">
      ${artworks.map(art => {
        const s = state.artworkState[art.id];
        const encountered = s && s.encountered;
        return `
          <div class="collection-tile ${encountered ? '' : 'is-faint'}" data-artwork-id="${art.id}" style="cursor:pointer;">
            <img src="${art.image || buildPlacard(art)}" data-placard="${buildPlacard(art)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" alt="${art.title}" />
            <div class="collection-tile__caption">${art.title}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;

  container.querySelectorAll('[data-artwork-id]').forEach(tile => {
    tile.addEventListener('click', () => showArtworkPreview(tile.dataset.artworkId));
  });
}

function formatYear(year) {
  if (!year && year !== 0) return '';
  if (year < 0) return `${Math.abs(year)} BCE`;
  return String(year);
}

  });

    }
  });

  // Restore — trigger the hidden file input
  const restoreBtn = document.getElementById('restore-btn');
  const fileInput = document.getElementById('restore-file-input');
  restoreBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (!confirm('Restoring will replace all current progress with the contents of this backup. Continue?')) {
      fileInput.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const payload = JSON.parse(reader.result);
        const result = importState(payload);
        if (result.ok) {
          alert('Backup restored.');
          window.location.reload();
        } else {
          alert('Could not restore: ' + result.error);
        }
      } catch (err) {
        alert('That file isn\'t a valid JSON backup.');
      }
      fileInput.value = '';
    };
    reader.onerror = () => {
      alert('Could not read the file.');
      fileInput.value = '';
    };
    reader.readAsText(file);
  });
}

let step = 'intro';
let walkthroughIndex = 0;
let walkthroughQueue = [];

function renderOnboarding() {

  else if (!state.hasCompletedIntro) step = 'museums';

}

function renderIntroStep() {

  app.innerHTML = `

          ${MUSEUMS_TO_ASK.map(m => `
            <div class="museum-checkbox ${state.visitedMuseums.includes(m.id) ? 'is-checked' : ''}" data-museum-id="${m.id}">

  app.querySelectorAll('.museum-checkbox').forEach(box => {

      const isChecked = visited.includes(id);
      updateState(s => {
        s.visitedMuseums = isChecked
          ? s.visitedMuseums.filter(x => x !== id)
          : [...s.visitedMuseums, id];
      });
      box.classList.toggle('is-checked');
    });

  document.getElementById('continue-btn').addEventListener('click', () => {
    step = 'walkthrough';

  });
}

function renderWalkthroughStep() {
  const app = document.getElementById('app');
  const state = getState();
  // Build the queue once: artworks from museums the user has visited,
  // randomly shuffled and capped at 10.
  if (walkthroughQueue.length === 0) {
    const visited = new Set(getState().visitedMuseums);
    const all = getAllArtworks();

    // Prefer artworks whose museumId matches a visited museum
    const fromVisited = all.filter(a => a.museumId && visited.has(a.museumId));

    // Fall back to any artwork if nothing matches (e.g. user skipped selection)
    const pool = fromVisited.length > 0 ? fromVisited : all;

    // Shuffle using Fisher-Yates
    const shuffled = pool.slice();
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }

    walkthroughQueue = shuffled.slice(0, 10);
    walkthroughIndex = 0;
  }
  const art = walkthroughQueue[walkthroughIndex];
  if (!art) {
    finishWalkthrough();
    return;
  }
  const artist = art.artistId ? getArtist(art.artistId) : null;
  const movement = getMovement(art.movementId);
  markEncountered(art.id);

  const progressPct = ((walkthroughIndex + 1) / walkthroughQueue.length) * 100;

  app.innerHTML = `
    <div class="onboarding">
      <div style="margin-bottom: var(--space-4); padding-top: var(--space-2);">

          <div class="lesson-progress-bar__fill" style="width: ${progressPct}%"></div>
        </div>
        <div class="eyebrow" style="margin-bottom: var(--space-2);">Step 2 of 2 · ${walkthroughIndex + 1} of ${walkthroughQueue.length}</div>
        <h1 style="font-size: var(--type-display-m); margin-bottom: 0;">Seen this one?</h1>
        <p style="font-size: var(--type-body-s); margin: var(--space-1) 0 0;">Tap once for each work. Quick and approximate is fine.</p>
      </div>
      <div class="onboarding__body">
        <div class="walkthrough-card">
          <img class="walkthrough-card__image" src="${art.image || buildPlacard(art)}" data-placard="${buildPlacard(art)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" data-met-id="${art.metObjectId || ''}" alt="${art.title}" />
          <div class="walkthrough-card__body">
            <h2 class="walkthrough-question" style="font-size: var(--type-display-m);">${art.title}</h2>
            <div class="walkthrough-meta">${artist ? artist.shortName + ' · ' : ''}${formatYear(art.year)} · ${movement?.shortName || ''}</div>
            <div class="walkthrough-choices">
              <button class="walkthrough-choice" data-value="yes">
                <span class="walkthrough-choice__icon">✓</span>
                Yes
              </button>
              <button class="walkthrough-choice" data-value="maybe">
                <span class="walkthrough-choice__icon">?</span>
                Maybe
              </button>
              <button class="walkthrough-choice" data-value="no">
                <span class="walkthrough-choice__icon">·</span>
                No
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="onboarding__footer">
        <button class="btn btn--secondary btn--full" id="skip-btn">Skip rest</button>
      </div>
    </div>
  `;

  app.querySelectorAll('.walkthrough-choice').forEach(btn => {
    btn.addEventListener('click', () => {
      setSeenInPerson(art.id, btn.dataset.value);
      walkthroughIndex += 1;
      renderWalkthroughStep();
    });
  });
  document.getElementById('skip-btn').addEventListener('click', () => {
    if (confirm('Skip the rest of the walkthrough? You can redo it from your profile any time.')) {
      finishWalkthrough();
    }
  });
}

function finishWalkthrough() {
  updateState({ hasCompletedWalkthrough: true });
  walkthroughQueue = [];
  walkthroughIndex = 0;
  navigate('today');
}

function formatYear(year) {
  if (!year && year !== 0) return '';
  if (year < 0) return `${Math.abs(year)} BCE`;
  return year;
}


/* ===== js/views/exhibitions.js ===== */

/* ============================================================
   ACCESSION - EXHIBITIONS VIEW
   Curated browsing mode: themed exhibitions drawn dynamically
   from the full lesson + artwork catalogue. Works with any
   content that exists now or is added later.
   ============================================================ */




// ── Exhibition definitions ──────────────────────────────────────────────────
// Each exhibition is a filter function over lessons + artworks.
// New sessions populate them automatically.

function buildExhibitions() {
  const lessons = getAllLessons();
  const artworks = getAllArtworks();

  const completed = new Set();
  // Pull completion from movementProgress in state
  try {
    const raw = localStorage.getItem('accession:state');
    if (raw) {
      const s = JSON.parse(raw);
      for (const movId in s.movementProgress || {}) {
        for (const lid of s.movementProgress[movId].lessonsCompleted || []) {
          completed.add(lid);
        }
      }
    }
  } catch (e) { /* ignore */ }

  function exhibition(id, title, subtitle, era, filter) {
    const matching = lessons.filter(filter);
    const done = matching.filter(l => completed.has(l.id)).length;
    return { id, title, subtitle, era, lessons: matching, done, total: matching.length };
  }

  return [
    exhibition(
      'origins',
      'Origins of Art',
      'The first images made by human hands — caves, ochre, portable objects',
      'prehistoric',
      l => l.eraId === 'prehistoric'
    ),
    exhibition(
      'ancient-europe',
      'Ancient Europe',
      'Minoan, Bronze Age, Greek, Etruscan, and Roman art from 1600 BCE to 150 CE',
      'ancient-worlds',
      l => l.eraId === 'ancient-worlds' && l.regionId === 'europe'
    ),
    exhibition(
      'ancient-world',
      'The Ancient World',
      'Egypt, Mesopotamia, India, China, and the Americas in the first millennium BCE',
      'ancient-worlds',
      l => l.eraId === 'ancient-worlds' && l.regionId !== 'europe'
    ),
    exhibition(
      'sacred-medieval',
      'Sacred Worlds',
      'Buddhist, Hindu, Islamic, Byzantine, and Maya sacred art 500–1400 CE',
      'sacred-medieval',
      l => l.eraId === 'sacred-medieval'
    ),
    exhibition(
      'renaissance',
      'Renaissances & Empires',
      'Florence, Flanders, Mughal courts, Benin, and the Netherlands 1400–1800',
      'renaissances-empires',
      l => l.eraId === 'renaissances-empires'
    ),
    exhibition(
      'modern-world',
      'The Modern World',
      'Impressionism, photography, Ukiyo-e, and the art of industrial change',
      'revolution-industry',
      l => l.eraId === 'revolution-industry'
    ),
    exhibition(
      'modernism',
      'Modernism',
      'Picasso, Hopper, Matisse, Rivera, O\'Keeffe — art after the old rules broke',
      'modernism',
      l => l.eraId === 'modernism'
    ),
    exhibition(
      'materials',
      'Reading Materials',
      'Marble, bronze, fresco, mosaic, faience — how ancient media shape meaning',
      'ancient-worlds',
      l => ['ancient-materials-01', 'ancient-europe-materials-comparison',
            'roman-painting-mosaic-01', 'greek-symposium-01', 'etruscan-ancient-01'].includes(l.id)
    ),
    exhibition(
      'global-migration',
      'People in Motion',
      'Lapita, Jōmon, Sulawesi, Blombos — art as evidence of human migration',
      'prehistoric',
      l => ['oceania-ancient-01', 'prehistoric-sulawesi-01', 'prehistoric-africa-01',
            'prehistoric-global-art', 'jomon-ancient-01', 'jomon-to-yayoi-comparison',
            'prehistoric-east-asia-01'].includes(l.id)
    ),
    exhibition(
      'power',
      'The Art of Power',
      'How rulers across every culture used art to claim divine authority',
      'ancient-worlds',
      l => ['mesopotamian-ancient-01', 'mesopotamian-ancient-02', 'mesopotamian-royal-power-comparison',
            'greek-body-politics-01', 'roman-copies-01', 'egyptian-ancient-01',
            'african-sacred-medieval-01', 'africa-across-eras-comparison',
            'benin-bronzes-renaissances-01', 'americas-ancient-01'].includes(l.id)
    ),
    exhibition(
      'body',
      'The Human Body',
      'How artists across 40,000 years have represented the body — and why it matters',
      'prehistoric',
      l => ['prehistoric-global-venus', 'prehistoric-portable-art', 'greek-ancient-01',
            'greek-arc-ancient-01', 'greek-body-politics-01', 'roman-copies-01',
            'jomon-ancient-01', 'african-ancient-01', 'african-sacred-medieval-01'].includes(l.id)
    ),
    exhibition(
      'death',
      'Art and Death',
      'Tombs, mummies, jade suits, sarcophagi — how art handles mortality',
      'ancient-worlds',
      l => ['ancient-worlds-death-afterlife', 'maya-sacred-medieval-01',
            'americas-across-eras-comparison', 'egyptian-ancient-01',
            'prehistoric-portable-art'].includes(l.id)
    ),
  ].filter(e => e.total > 0);
}

// ── Render ──────────────────────────────────────────────────────────────────

let currentExhibition = null;

function renderExhibitions() {
  const app = document.getElementById('app');
  if (!app) return;

  let exhibitions = [];
  try {
    exhibitions = buildExhibitions();
  } catch(err) {
    console.error('Exhibitions build error:', err);
    app.innerHTML = `<div class="view" style="padding:var(--space-8) var(--space-6)"><p style="color:var(--color-sepia)">Could not load exhibitions. Try again.</p></div>`;
    return;
  }

  const totalLessons = getAllLessons().length;

  if (currentExhibition) {
    renderExhibitionDetail(currentExhibition, exhibitions);
    return;
  }

  app.innerHTML = `
    <div class="view-exhibitions">
      <div class="view-header">
        <div class="view-header__title" style="font-family:var(--font-display);font-size:var(--type-display-l)">Exhibitions</div>
        <div class="view-header__sub" style="color:var(--color-sepia);font-family:var(--font-serif);font-style:italic;font-size:var(--type-body-m);margin-top:4px">${totalLessons} lessons across ${exhibitions.length} exhibitions</div>
      </div>
      <div class="exhibitions-grid">
        ${exhibitions.map(e => renderExhibitionCard(e)).join('')}
      </div>
    </div>
  `;

  app.querySelectorAll('.exhibition-card').forEach(card => {
    card.addEventListener('click', () => {
      currentExhibition = card.dataset.id;
      renderExhibitions();
    });
  });
}

function renderExhibitionCard(e) {
  const pct = e.total > 0 ? Math.round((e.done / e.total) * 100) : 0;
  const complete = e.done === e.total && e.total > 0;
  return `

/* ============================================================
   ACCESSION - VERSUS VIEW
   Head-to-head challenge mode vs Brandon.
   Draws questions dynamically from all available artworks.
   Syncs scores to Firebase in real time.
   ============================================================ */







// ── State ────────────────────────────────────────────────────────────────────
let vsMode = 'lobby';          // 'lobby' | 'challenge' | 'results'
let currentChallenge = null;   // { questions, answers, score, partnerScore }
let partnerData = null;        // live partner stats from Firebase

// ── Helpers ──────────────────────────────────────────────────────────────────

function getCompletedLessons() {
  const s = getState();
  const set = new Set();
  for (const movId in s.movementProgress || {}) {
    for (const lid of s.movementProgress[movId].lessonsCompleted || []) set.add(lid);
  }
  return set;
}

function myStats() {
  const s = getState();
  const arts = getAllArtworks();
  const encountered = arts.filter(a => s.artworkState?.[a.id]?.encountered).length;
  const mastered = arts.filter(a => (s.artworkState?.[a.id]?.masteredCount || 0) >= 2).length;
  const lessons = getCompletedLessons().size;
  return { encountered, mastered, lessons, streak: s.streakDays || 0 };
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Challenge generation ─────────────────────────────────────────────────────

function generateChallenge(count = 5) {
  const s = getState();
  const arts = getAllArtworks();
  const regions = getRegions();
  const eras = getEras();

  // Only use artworks the user has encountered
  const pool = arts.filter(a => s.artworkState?.[a.id]?.encountered);
  if (pool.length < 4) return null;

  const questions = [];
  const used = new Set();

  const types = ['region', 'date', 'before-after'];

  while (questions.length < count && pool.length - used.size >= 4) {
    const remaining = pool.filter(a => !used.has(a.id));
    const art = remaining[Math.floor(Math.random() * remaining.length)];
    if (!art) break;
    used.add(art.id);

    const type = types[Math.floor(Math.random() * types.length)];

    if (type === 'region' && art.regionId) {
      const allRegions = regions.map(r => r.id);
      const distractors = shuffle(allRegions.filter(r => r !== art.regionId)).slice(0, 3);
      if (distractors.length < 3) continue;
      const opts = shuffle([art.regionId, ...distractors]);
      questions.push({
        type: 'region',
        artworkId: art.id,
        question: 'Where in the world was this made?',
        options: opts.map(id => ({ id, label: regions.find(r => r.id === id)?.name || id })),
        correctId: art.regionId,
      });
    } else if (type === 'date' && art.year != null) {
      // Multiple-choice date: 4 options with the correct year and 3 plausible wrong ones
      const y = art.year;
      const deltas = shuffle([150, 400, 800, 1500, 2000].filter(d => {
        const wrong = y + (Math.random() > 0.5 ? d : -d);
        return wrong !== y;
      })).slice(0, 3);
      const wrongs = deltas.map(d => y + (Math.random() > 0.5 ? d : -d));
      const opts = shuffle([y, ...wrongs]);
      questions.push({
        type: 'date',
        artworkId: art.id,
        question: 'Approximately when was this made?',
        options: opts.map(y2 => ({ id: String(y2), label: y2 < 0 ? `${Math.abs(y2)} BCE` : `${y2} CE` })),
        correctId: String(y),
      });
    } else if (type === 'before-after') {
      // Pick a second artwork to compare
      const others = remaining.filter(a => a.id !== art.id && a.year != null && art.year != null);
      if (others.length === 0) continue;
      const other = others[Math.floor(Math.random() * others.length)];
      used.add(other.id);
      const earlier = art.year <= other.year ? art : other;
      const later = art.year <= other.year ? other : art;
      questions.push({
        type: 'before-after',
        artworkId: earlier.id,
        artworkId2: later.id,
        question: 'Which came first?',
        options: [
          { id: earlier.id, label: earlier.title },
          { id: later.id, label: later.title },
        ],
        correctId: earlier.id,
      });
    }
  }

  return questions.length > 0 ? questions : null;
}

function handleAnswer(chosen, q) {

/* ===== js/views/final-exhibition.js ===== */

/* ============================================================
   ACCESSION - FINAL EXHIBITIONS
   Boss-match quizzes unlocked when a user completes all lessons
   in an era. Draws on every artwork in the era for a
   comprehensive cumulative test.

   Rules:
   - Unlocked only when all sequenced lessons in the era are done
   - If new lessons are added after completion, a refresher gate
     appears: user must complete the new lessons before re-taking
   - Quiz: 10 questions drawn from ALL artworks in the era
   - Question types: region, date, before-after, medium
   - Passing score: 7/10
   - State persisted in localStorage under accession:finalExhibitions
   ============================================================ */




// ── Helpers ──────────────────────────────────────────────────────────────────

function getSequencedLessons() {
  // Read the ordered sequence from progression.js via a global set during boot
  // We detect it from the lesson sequence order in state
  return window.__lessonSequence || [];
}

function getCompletedLessons() {
  const s = getState();
  const set = new Set();
  for (const movId in s.movementProgress || {}) {
    for (const lid of s.movementProgress[movId].lessonsCompleted || []) set.add(lid);
  }
  return set;
}

function getFinalExhibitionState() {
  try {
    return JSON.parse(localStorage.getItem('accession:finalExhibitions') || '{}');
  } catch(e) { return {}; }
}

function saveFinalExhibitionState(state) {
  localStorage.setItem('accession:finalExhibitions', JSON.stringify(state));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Era completion logic ──────────────────────────────────────────────────────

function getEraExhibitionStatus(eraId) {
  const allLessons = getAllLessons();
  const sequenced = allLessons.filter(l => l.eraId === eraId);
  const completed = getCompletedLessons();
  const feState = getFinalExhibitionState();

  const allDone = sequenced.length > 0 && sequenced.every(l => completed.has(l.id));
  const prevRecord = feState[eraId] || null;

  // Check if new lessons were added since last exhibition completion
  let needsRefresher = false;
  if (prevRecord?.completedAt) {
    const lessonsAtCompletion = new Set(prevRecord.lessonsAtCompletion || []);
    const currentLessons = new Set(sequenced.map(l => l.id));
    needsRefresher = [...currentLessons].some(id => !lessonsAtCompletion.has(id)) &&
                     ![...currentLessons].every(id => completed.has(id));
  }

  return {
    eraId,
    totalLessons: sequenced.length,
    completedLessons: sequenced.filter(l => completed.has(l.id)).length,
    unlocked: allDone && !needsRefresher,
    needsRefresher,
    previousScore: prevRecord?.score || null,
    previousTotal: prevRecord?.total || null,
    passed: prevRecord?.passed || false,
    completedAt: prevRecord?.completedAt || null,
  };
}

// ── Question generation ───────────────────────────────────────────────────────

function generateExhibitionQuiz(eraId, count = 10) {
  const arts = getAllArtworks().filter(a => a.eraId === eraId);
  const regions = getRegions();
  if (arts.length < 4) return [];

  // Difficulty ramp: questions 1-4 are factual (region/date/medium/before-after),
  // questions 5-7 are mixed, questions 8-10 are comprehension (synthesis/context).
  // Shuffle artworks and assign question types by position.
  const shuffledArts = shuffle([...arts]);
  const questions = [];
  const used = new Set();

  const factualTypes = ['region', 'date', 'medium', 'before-after'];

  // Helper: build a factual question for one artwork
  function makeFactual(art, preferType) {
    const types = preferType ? [preferType, ...factualTypes.filter(t => t !== preferType)] : factualTypes;
    for (const type of shuffle(types)) {
      if (type === 'region' && art.regionId) {
        const allRegions = regions.map(r => r.id);
        const distractors = shuffle(allRegions.filter(r => r !== art.regionId)).slice(0, 3);
        if (distractors.length < 3) continue;
        return {
          type: 'region',
          artworkId: art.id,
          question: 'Where in the world was this made?',
          options: shuffle([art.regionId, ...distractors]).map(id => ({
            id, label: regions.find(r => r.id === id)?.name || id
          })),
          correctId: art.regionId,
        };
      }
      if (type === 'date' && art.year != null) {
        const y = art.year;
        const deltas = [150, 400, 900, 2000];
        const wrongs = shuffle(deltas).slice(0, 3).map(d =>
          y + (Math.random() > 0.5 ? d : -d)
        );
        return {
          type: 'date',
          artworkId: art.id,
          question: 'Approximately when was this made?',
          options: shuffle([y, ...wrongs]).map(y2 => ({
            id: String(y2),
            label: y2 < 0 ? `${Math.abs(Math.round(y2))} BCE` : `${Math.round(y2)} CE`
          })),
          correctId: String(y),
        };
      }
      if (type === 'medium' && art.medium) {
        const others = shuffle(
          arts.filter(a => a.id !== art.id && a.medium)
            .map(a => a.medium.split('(')[0].split(',')[0].trim())
            .filter((m, i, arr) => arr.indexOf(m) === i)
        ).slice(0, 3);
        if (others.length < 2) continue;
        const correct = art.medium.split('(')[0].split(',')[0].trim();
        return {
          type: 'medium',
          artworkId: art.id,
          question: 'What material or technique was used to make this?',
          options: shuffle([correct, ...others]).map(m => ({ id: m, label: m })),
          correctId: correct,
        };
      }
      if (type === 'before-after') {
        const candidates = shuffledArts.filter(a => a.id !== art.id && a.year != null && art.year != null && a.year !== art.year && !used.has(a.id));
        if (candidates.length === 0) continue;
        const other = candidates[0];
        const earlier = art.year < other.year ? art : other;
        const later = art.year < other.year ? other : art;
        // Mark both used
        used.add(other.id);
        return {
          type: 'before-after',
          artworkId: earlier.id,
          artworkId2: later.id,
          question: 'Which was made first?',
          options: shuffle([
            { id: earlier.id, label: earlier.title },
            { id: later.id, label: later.title },
          ]),
          correctId: earlier.id,
        };
      }
    }
    return null;
  }

  // Helper: build a comprehension question for one artwork
  function makeComprehension(art) {
    const cq = art.comprehensionQuestion;
    if (!cq || !cq.question || !cq.options || cq.options.length < 4) return null;
    // Shuffle options but track the correct answer by content, not index
    const correct = cq.options[cq.correctIndex];
    const shuffledOpts = shuffle(cq.options.map((text, i) => ({ id: String(i), text })));
    const newCorrectId = shuffledOpts.find(o => o.text === correct)?.id || '0';
    return {
      type: 'comprehension',
      artworkId: art.id,
      question: cq.question,
      options: shuffledOpts.map(o => ({ id: o.id, label: o.text })),
      correctId: newCorrectId,
      explanation: cq.explanation || '',
    };
  }

  // Build 10 questions with a difficulty ramp:
  // Q1–4: factual (region/date/medium/before-after)
  // Q5–7: mixed factual + some comprehension
  // Q8–10: comprehension (synthesis/analysis questions from artwork data)

  const artPool = shuffle([...arts]);
  const artIterator = artPool[Symbol.iterator]();

  function nextArt() {
    for (const a of artIterator) {
      if (!used.has(a.id)) { used.add(a.id); return a; }
    }
    // Exhaust — allow reuse for comprehension (different question type)
    return artPool[Math.floor(Math.random() * artPool.length)];
  }

  // Q1-4: pure factual
  for (let i = 0; i < 4 && questions.length < count; i++) {
    const art = nextArt();
    if (!art) break;
    const q = makeFactual(art);
    if (q) questions.push(q);
  }

  // Q5-7: mixed (alternate factual and comprehension)
  for (let i = 0; i < 3 && questions.length < count; i++) {
    const art = nextArt();
    if (!art) break;
    const q = i % 2 === 0 ? makeComprehension(art) || makeFactual(art) : makeFactual(art) || makeComprehension(art);
    if (q) questions.push(q);
  }

  // Q8-10: comprehension only
  for (let i = 0; i < 3 && questions.length < count; i++) {
    const art = nextArt();
    if (!art) break;
    // For comprehension, allow reuse with different question type
    const q = makeComprehension(art) || makeFactual(art);
    if (q) questions.push(q);
  }

  return questions.slice(0, count);
}

// ── View state ────────────────────────────────────────────────────────────────

let feView = 'list';       // 'list' | 'intro' | 'quiz' | 'results'
let feEraId = null;
let feQuiz = null;         // { questions, answers, score }

// ── Entry point ───────────────────────────────────────────────────────────────

function renderFinalExhibitions() {
  if (feView === 'intro' && feEraId) {
    renderExhibitionIntro(feEraId);
  } else if (feView === 'quiz' && feQuiz) {
    renderExhibitionQuestion();
  } else if (feView === 'results' && feQuiz) {
    renderExhibitionResults();
  } else {
    renderExhibitionList();
  }
}

function renderExhibitionList() {
  const app = document.getElementById('app');
  const eras = getEras();

  const rows = eras.map(era => {
    const s = getEraExhibitionStatus(era.id);
    const pct = s.totalLessons > 0 ? Math.round((s.completedLessons / s.totalLessons) * 100) : 0;
    const artCount = getAllArtworks().filter(a => a.eraId === era.id).length;

    let badge = '', badgeClass = '', actionLabel = '', actionEnabled = false;
    if (s.passed) {
      badge = 'Passed';
      badgeClass = 'fe-badge--passed';
      actionLabel = `Retake · ${s.previousScore}/${s.previousTotal}`;
      actionEnabled = s.unlocked;
    } else if (s.unlocked) {
      badge = 'Unlocked';
      badgeClass = 'fe-badge--unlocked';
      actionLabel = 'Begin Exhibition';
      actionEnabled = true;
    } else if (s.needsRefresher) {
      badge = 'New content';
      badgeClass = 'fe-badge--refresher';
      actionLabel = 'Complete new lessons first';
      actionEnabled = false;
    } else {
      badge = `${s.completedLessons}/${s.totalLessons} lessons`;
      badgeClass = 'fe-badge--locked';
      actionLabel = pct === 100 ? 'Ready' : `${pct}% complete`;
      actionEnabled = false;
    }

    return `
      <div class="fe-era-row ${s.unlocked ? 'is-unlocked' : ''} ${s.passed ? 'is-passed' : ''}"
           data-era-id="${era.id}" data-action="${actionEnabled ? 'start' : ''}">
        <div class="fe-era-row__body">
          <div class="fe-era-row__name">${era.name}</div>
          <div class="fe-era-row__meta">${artCount} artworks · ${s.totalLessons} lessons</div>
          <div class="fe-era-progress">
            <div class="fe-era-progress__bar">
              <div class="fe-era-progress__fill" style="width:${pct}%"></div>
            </div>
          </div>
        </div>
        <div class="fe-era-row__right">
          <span class="fe-badge ${badgeClass}">${badge}</span>
          ${actionEnabled ? `<div class="fe-era-action">${actionLabel}</div>` : `<div class="fe-era-action fe-era-action--disabled">${actionLabel}</div>`}
        </div>
      </div>
    `;
  }).join('');

  app.innerHTML = `
    <div class="view-fe">
      <div class="view-header">
        <div class="view-header__title" style="font-family:var(--font-display);font-size:var(--type-display-l)">Final Exhibitions</div>
        <div class="view-header__sub" style="color:var(--color-sepia);font-family:var(--font-serif);font-style:italic;font-size:var(--type-body-m);margin-top:4px">
          Complete all lessons in an era to unlock its final examination
        </div>
      </div>
      <div class="fe-era-list">${rows}</div>
    </div>
  `;

  app.querySelectorAll('.fe-era-row[data-action="start"]').forEach(row => {
    row.addEventListener('click', () => {
      feEraId = row.dataset.eraId;
      feView = 'intro';
      renderFinalExhibitions();
    });
  });
}

// ── Intro screen ──────────────────────────────────────────────────────────────

function renderExhibitionIntro(eraId) {
  const app = document.getElementById('app');
  const era = getEra(eraId);
  const artCount = getAllArtworks().filter(a => a.eraId === eraId).length;
  const s = getEraExhibitionStatus(eraId);

  app.innerHTML = `
    <div class="view-fe view-fe--intro">
      <button class="btn-back" id="fe-back">All Exhibitions</button>
      <div class="fe-intro-era">${era?.name || eraId}</div>
      <div class="fe-intro-title">Final Exhibition</div>
      <div class="fe-intro-body">
        <p>You have completed all ${s.totalLessons} lessons in the ${era?.name} era.</p>
        <p>This examination draws on all <strong>${artCount} artworks</strong> from this era — including works you've seen in lessons and others you may not have encountered directly.</p>
        <p>10 questions. You need <strong>7 correct</strong> to pass.</p>
        ${s.passed ? `<p class="fe-intro-previous">Your best: <strong>${s.previousScore}/${s.previousTotal}</strong></p>` : ''}
      </div>
      <div class="fe-intro-actions">
        <button class="btn btn--primary btn--full btn--lg" id="fe-start-btn">Begin Examination</button>
        <button class="btn btn--secondary btn--full" id="fe-back2">Back</button>
      </div>
    </div>
  `;

  document.getElementById('fe-back')?.addEventListener('click', () => { feView = 'list'; feEraId = null; renderFinalExhibitions(); });
  document.getElementById('fe-back2')?.addEventListener('click', () => { feView = 'list'; feEraId = null; renderFinalExhibitions(); });
  document.getElementById('fe-start-btn')?.addEventListener('click', () => {
    const questions = generateExhibitionQuiz(eraId, 10);
    if (!questions.length) return;
    feQuiz = { eraId, questions, answers: [], score: 0 };
    feView = 'quiz';
    renderFinalExhibitions();
  });
}

// ── Quiz question ─────────────────────────────────────────────────────────────

function renderExhibitionQuestion() {
  const app = document.getElementById('app');
  const { questions, answers, score } = feQuiz;
  const qIdx = answers.length;

  if (qIdx >= questions.length) {
    feView = 'results';
    // Save result
    const feState = getFinalExhibitionState();
    const allLessons = getAllLessons().filter(l => l.eraId === feQuiz.eraId);
    feState[feQuiz.eraId] = {
      score,
      total: questions.length,
      passed: score >= 7,
      completedAt: new Date().toISOString(),
      lessonsAtCompletion: allLessons.map(l => l.id),
    };
    saveFinalExhibitionState(feState);
    renderFinalExhibitions();
    return;
  }

  const q = questions[qIdx];
  const art = getArtwork(q.artworkId);
  const art2 = q.artworkId2 ? getArtwork(q.artworkId2) : null;

  const isComprehension = q.type === 'comprehension';

  app.innerHTML = `
    <div class="view-fe view-fe--quiz">
      <div class="fe-quiz-header">
        <div class="fe-quiz-progress">Question ${qIdx + 1} of ${questions.length}${qIdx >= 7 ? ' · Synthesis' : ''}</div>
        <div class="fe-quiz-score">${score} correct</div>
      </div>
      <div class="fe-quiz-progress-bar">
        <div class="fe-quiz-progress-fill" style="width:${(qIdx / questions.length) * 100}%"></div>
      </div>

      ${isComprehension ? `<div class="fe-quiz-type-label">Analysis question</div>` : ''}

      <div class="fe-quiz-question">${q.question}</div>

      ${q.type === 'before-after' ? `
        <div class="fe-quiz-two-images">
          <div class="fe-quiz-two-item">
            <img class="fe-quiz-img" src="${art?.image || buildPlacard(art)}"
                 data-placard="${buildPlacard(art)}"
                 onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" alt="" />
            <div class="fe-quiz-two-label">${art?.title || ''}</div>
          </div>
          <div class="fe-quiz-two-item">
            <img class="fe-quiz-img" src="${art2?.image || buildPlacard(art2)}"
                 data-placard="${buildPlacard(art2)}"
                 onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" alt="" />
            <div class="fe-quiz-two-label">${art2?.title || ''}</div>
          </div>
        </div>
      ` : `
        <img class="fe-quiz-img fe-quiz-img--full" src="${art?.image || buildPlacard(art)}"
             data-placard="${buildPlacard(art)}"
             onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}"
             data-met-id="${art?.metObjectId || ''}" alt="" />
        <div class="fe-quiz-artwork-label">${art?.title || ''}${art?.year != null ? ` · ${art.year < 0 ? Math.abs(art.year) + ' BCE' : art.year + ' CE'}` : ''}</div>
      `}

      <div class="fe-quiz-options" id="fe-options">
        ${q.options.map(opt => `
          <button class="fe-quiz-option ${isComprehension ? 'fe-quiz-option--comprehension' : ''}" data-id="${opt.id}">${opt.label}</button>
        `).join('')}
      </div>
      <div id="fe-feedback" class="fe-quiz-feedback"></div>
      ${isComprehension ? `<div id="fe-explanation" class="fe-quiz-explanation"></div>` : ''}
    </div>
  `;

  document.querySelectorAll('.fe-quiz-option').forEach(btn => {
    btn.addEventListener('click', () => handleExhibitionAnswer(btn.dataset.id, q));
  });
}

function handleExhibitionAnswer(chosen, q) {
  const correct = chosen === q.correctId;
  if (correct) feQuiz.score++;
  feQuiz.answers.push({ chosen, correct, questionType: q.type });

  document.querySelectorAll('.fe-quiz-option').forEach(btn => {
    btn.disabled = true;
    if (btn.dataset.id === q.correctId) btn.classList.add('is-correct');
    else if (btn.dataset.id === chosen && !correct) btn.classList.add('is-incorrect');
  });

  const fb = document.getElementById('fe-feedback');
  if (fb) {
    if (q.type === 'comprehension') {
      fb.textContent = correct ? 'Correct' : `Not quite — the answer was: ${q.options.find(o => o.id === q.correctId)?.label?.slice(0, 60)}…`;
    } else {
      fb.textContent = correct ? 'Correct' : `Not quite — ${q.options.find(o => o.id === q.correctId)?.label}`;
    }
    fb.className = 'fe-quiz-feedback ' + (correct ? 'is-correct' : 'is-incorrect');
  }

  // Show explanation for comprehension questions
  const expEl = document.getElementById('fe-explanation');
  if (expEl && q.explanation) {
    expEl.textContent = q.explanation;
    expEl.classList.add('is-visible');
  }

  // Comprehension questions show longer before advancing
  const delay = q.type === 'comprehension' ? (correct ? 2200 : 3500) : (correct ? 1000 : 1800);
  setTimeout(() => renderExhibitionQuestion(), delay);
}

// ── Results ───────────────────────────────────────────────────────────────────

function renderExhibitionResults() {
  const app = document.getElementById('app');
  const { score, questions, eraId } = feQuiz;
  const era = getEra(eraId);
  const passed = score >= 7;
  const pct = Math.round((score / questions.length) * 100);

  const breakdown = questions.map((q, i) => {
    const art = getArtwork(q.artworkId);
    const ans = feQuiz.answers[i];
    return `
      <div class="fe-result-item ${ans?.correct ? 'is-correct' : 'is-incorrect'}">
        <img class="fe-result-thumb" src="${art?.image || buildPlacard(art)}"
             data-placard="${buildPlacard(art)}"
             onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" alt="" />
        <div class="fe-result-body">
          <div class="fe-result-title">${art?.title || q.artworkId}</div>
          <div class="fe-result-type">${q.type}</div>
          <div class="fe-result-verdict">${ans?.correct ? 'Correct' : 'Incorrect'}</div>
        </div>
      </div>
    `;
  }).join('');

  app.innerHTML = `
    <div class="view-fe view-fe--results">
      <div class="fe-results-header">
        <div class="fe-results-era">${era?.name} — Final Exhibition</div>
        <div class="fe-results-score">${score} / ${questions.length}</div>
        <div class="fe-results-verdict ${passed ? 'is-passed' : 'is-failed'}">
          ${passed ? 'Exhibition passed' : 'Not yet — try again'}
        </div>
        <div class="fe-results-pct">${pct}% correct · ${passed ? 'Pass (7+ required)' : 'Pass requires 7/10'}</div>
      </div>

      <div class="fe-results-breakdown">${breakdown}</div>

      <div class="fe-results-actions">
        ${passed
          ? `<button class="btn btn--primary btn--full btn--lg" id="fe-done-btn">Done</button>`
          : `<button class="btn btn--primary btn--full btn--lg" id="fe-retry-btn">Try Again</button>`
        }
        <button class="btn btn--secondary btn--full" id="fe-list-btn">All Exhibitions</button>
      </div>
    </div>
  `;

  document.getElementById('fe-done-btn')?.addEventListener('click', () => {
    feView = 'list'; feEraId = null; feQuiz = null; renderFinalExhibitions();
  });
  document.getElementById('fe-retry-btn')?.addEventListener('click', () => {
    const questions = generateExhibitionQuiz(feQuiz.eraId, 10);
    feQuiz = { eraId: feQuiz.eraId, questions, answers: [], score: 0 };
    feView = 'quiz';
    renderFinalExhibitions();
  });
  document.getElementById('fe-list-btn')?.addEventListener('click', () => {
    feView = 'list'; feEraId = null; feQuiz = null; renderFinalExhibitions();
  });
}

/**
 * Find all <img data-met-id="..."> elements on the page and resolve their
 * canonical Met image URLs. Called automatically after every render.
 */
function hydrateAllMetImages() {
  document.querySelectorAll('img[data-met-id]').forEach(img => {
    const metId = img.getAttribute('data-met-id');
    if (metId && metId !== 'null') hydrateMetImage(img, metId);
  });
}

// Currently rendered view ID, used to highlight the tab.
let currentView = null;

/**
 * Navigate to a named view. Renders the view and updates the tab bar.
 */
function navigate(view) {
  currentView = view;

  switch (view) {
    case 'today':            renderToday(); break;
    case 'learn':            renderLearn(); break;
    case 'collection':       renderCollection(); break;
    case 'profile':          renderProfile(); break;
    case 'exhibitions':      renderExhibitions(); break;
    case 'final-exhibitions':renderFinalExhibitions(); break;
    case 'versus':           renderVersus(); break;
    case 'onboarding':       renderOnboarding(); break;
    default:                 renderToday();
  }

  // The tab bar lives outside the #app, so we render it once and update its active state.
  renderTabBar();
  // Hydrate any Met images on the page
  hydrateAllMetImages();
  // Scroll to top on navigation
  window.scrollTo(0, 0);
}

/**
 * Start a lesson by ID. Exposed from app.js so views can call it without
 * importing the engine directly (cleaner dependency graph).
 */
function startLesson(lessonId) {
  currentView = 'lesson';
  startLessonImpl(lessonId);
  renderTabBar();
}

function startReview() {
  currentView = 'lesson';
  startReviewImpl();
  renderTabBar();
}

/**
 * Render the bottom tab bar. Hidden during lessons and onboarding.
 */
function renderTabBar() {
  let bar = document.getElementById('tab-bar');
  const showBar = ['today', 'learn', 'collection', 'exhibitions', 'final-exhibitions', 'versus', 'profile'].includes(currentView);

  if (!showBar) {
    if (bar) bar.remove();
    return;
  }

  const html = `
    <nav class="tab-bar" id="tab-bar" role="tablist">
      ${tabItem('today',      'Today',      tabIcon('today'))}
      ${tabItem('learn',      'Learn',      tabIcon('learn'))}
      ${tabItem('collection', 'Collection', tabIcon('collection'))}
      ${tabItem('profile',    'Profile',    tabIcon('profile'))}
    </nav>
  `;

  if (!bar) {
    document.body.insertAdjacentHTML('beforeend', html);
    bar = document.getElementById('tab-bar');
    // Wire up clicks once
    bar.querySelectorAll('.tab-bar__item').forEach(btn => {
      btn.addEventListener('click', () => navigate(btn.dataset.view));
    });
  } else {
    // Just update active state
    bar.querySelectorAll('.tab-bar__item').forEach(btn => {
      btn.classList.toggle('is-active', btn.dataset.view === currentView);
    });
  }
}

function tabItem(id, label, iconSvg) {
  return `
    <button class="tab-bar__item ${currentView === id ? 'is-active' : ''}" data-view="${id}" role="tab" aria-label="${label}">
      ${iconSvg}
      <span>${label}</span>
    </button>
  `;
}

/**
 * Inline SVG icons for the tab bar.
 * Drawn fresh rather than imported to keep the bundle tiny.
 */
function tabIcon(name) {
  const stroke = `class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"`;
  switch (name) {
    case 'today':
      return `<svg ${stroke}><path d="M3 18h18M5 14l7-7 7 7M9 18v-3M15 18v-3"/></svg>`;
    case 'learn':
      return `<svg ${stroke}><path d="M4 5v14a2 2 0 002 2h5V7a2 2 0 00-2-2H4zM20 5v14a2 2 0 01-2 2h-5V7a2 2 0 012-2h5z"/></svg>`;
    case 'exhibitions':
      // Archway / museum columns
      return `<svg ${stroke}><path d="M3 21h18M5 21V10M19 21V10M12 3L3 10h18L12 3zM9 21v-5a3 3 0 016 0v5"/></svg>`;
    case 'finals':
      // Medallion / award ribbon
      return `<svg ${stroke}><circle cx="12" cy="9" r="5"/><path d="M8.5 14.5L7 21l5-2 5 2-1.5-6.5"/></svg>`;
    case 'versus':
      // Crossed swords / VS lightning
      return `<svg ${stroke}><path d="M13 3l4 4-9 9-4-4 9-9zM3 21l4-4M15 9l3 3"/><path d="M19 3l-4 4M5 19l4-4"/></svg>`;
    case 'collection':
      return `<svg ${stroke}><circle cx="6" cy="7" r="1.5"/><circle cx="18" cy="9" r="1.5"/><circle cx="12" cy="17" r="1.5"/><path d="M7 8l10 1M17 10l-5 6M7 8l5 9"/></svg>`;
    case 'profile':
      return `<svg ${stroke}><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>`;
    default:
      return '';
  }
}

/**
 * Decide what to show on first load.
 * - Brand-new user: onboarding.
 * - Returning user: today.
 */
function decideStartView() {
  const state = getState();
  if (!state.hasCompletedIntro || !state.hasCompletedWalkthrough) {
    return 'onboarding';
  }
  return 'today';
}

/* ===== BOOT SEQUENCE ===== */
async function boot() {
  // 1. Load persisted state from localStorage
  loadState();
  // 2. Tick the session counter (once per app open, drives SRS)
  tickSession();
  // 3. Load all bundled content (small JSON files)
  await loadContent();
  // 4. Initialize sync (fires & forgets — works without it)
  initSync().catch(err => console.warn('Sync init error:', err));
  // 5. Route to first view
  navigate(decideStartView());
}

// Kick off when the DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
