<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no"/>
<meta name="theme-color" content="#F5EFE4"/>
<title>Accession</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>/* ============================================================
   ACCESSION - DESIGN TOKENS
   The foundational design variables for the entire app.
   Change values here to affect the whole interface.
   ============================================================ */

:root {
  /* ---------- COLORS ----------
     Inspired by warm museum interiors:
     - Paper: aged cream, the dominant background
     - Ink: warm near-black for text
     - Sepia: secondary text and borders
     - Burgundy: active states and important moments
     - Gold: rewards, streak, mastery
     - Sage: success, "you've seen this"
  */
  --color-paper: #F5EFE4;
  --color-paper-deep: #ECE3D2;
  --color-paper-light: #FBF7EE;
  --color-ink: #1F1B16;
  --color-ink-soft: #3A332B;
  --color-sepia: #7A6A55;
  --color-sepia-light: #B8A88E;
  --color-burgundy: #6B2E2E;
  --color-burgundy-soft: #8B4848;
  --color-gold: #B8945A;
  --color-gold-soft: #D4B57E;
  --color-sage: #7A8471;
  --color-sage-soft: #A4AE9B;
  --color-line: rgba(31, 27, 22, 0.12);
  --color-line-strong: rgba(31, 27, 22, 0.22);

  /* ---------- TYPOGRAPHY ----------
     Three families:
     - Display (DM Serif Display): headlines, titles
     - Body serif (Lora): long-form reading
     - UI sans (Inter): nav, buttons, stats
  */
  --font-display: 'DM Serif Display', 'Playfair Display', Georgia, serif;
  --font-serif: 'Lora', 'Georgia', serif;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;

  --type-display-xl: 2.5rem;
  --type-display-l: 1.875rem;
  --type-display-m: 1.5rem;
  --type-body-l: 1.0625rem;
  --type-body-m: 0.9375rem;
  --type-body-s: 0.8125rem;
  --type-caption: 0.6875rem;

  --leading-tight: 1.2;
  --leading-normal: 1.5;
  --leading-relaxed: 1.7;

  /* ---------- SPACING ----------
     Based on 4px grid for tight UI control.
  */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;

  /* ---------- RADII ---------- */
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-pill: 999px;

  /* ---------- SHADOWS ----------
     Subtle, warm shadows. Never harsh.
  */
  --shadow-sm: 0 1px 2px rgba(31, 27, 22, 0.06), 0 1px 1px rgba(31, 27, 22, 0.04);
  --shadow-md: 0 4px 12px rgba(31, 27, 22, 0.08), 0 2px 4px rgba(31, 27, 22, 0.04);
  --shadow-lg: 0 12px 32px rgba(31, 27, 22, 0.12), 0 4px 8px rgba(31, 27, 22, 0.06);
  --shadow-inset: inset 0 1px 0 rgba(255, 255, 255, 0.4);

  /* ---------- MOTION ----------
     Everything fades and settles. No bounces.
  */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.45, 0, 0.55, 1);
  --duration-fast: 150ms;
  --duration-base: 250ms;
  --duration-slow: 400ms;
  --duration-pageturn: 600ms;

  /* ---------- LAYOUT ---------- */
  --max-width-mobile: 480px;
  --tab-bar-height: 72px;
  --header-height: 56px;
}

/* ============================================================
   ACCESSION - BASE STYLES
   Reset, body, typography defaults.
   ============================================================ */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-sans);
  font-size: var(--type-body-m);
  line-height: var(--leading-normal);
  color: var(--color-ink);
  background: var(--color-paper);
  /* Subtle paper grain texture via CSS, no image needed */
  background-image:
    radial-gradient(circle at 25% 35%, rgba(122, 106, 85, 0.04) 0%, transparent 50%),
    radial-gradient(circle at 75% 65%, rgba(184, 148, 90, 0.03) 0%, transparent 50%);
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overscroll-behavior: none;
}

/* Lock the app to mobile-friendly width but allow desktop centering */
#app {
  max-width: var(--max-width-mobile);
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  position: relative;
  background: var(--color-paper);
  /* Subtle vertical edges on desktop only */
  box-shadow: 0 0 0 1px var(--color-line) inset;
}

@media (min-width: 481px) {
  body {
    background: linear-gradient(180deg, #ECE3D2 0%, #DCD0BC 100%);
  }
  #app {
    box-shadow: 0 0 60px rgba(31, 27, 22, 0.08);
  }
}

/* Typography defaults */
h1, h2, h3, h4 {
  font-family: var(--font-display);
  font-weight: 400;
  line-height: var(--leading-tight);
  color: var(--color-ink);
}

h1 { font-size: var(--type-display-xl); letter-spacing: -0.02em; }
h2 { font-size: var(--type-display-l); letter-spacing: -0.01em; }
h3 { font-size: var(--type-display-m); }

p {
  font-family: var(--font-serif);
  font-size: var(--type-body-l);
  line-height: var(--leading-relaxed);
  color: var(--color-ink-soft);
}

button {
  font-family: var(--font-sans);
  font-size: var(--type-body-m);
  border: none;
  background: none;
  cursor: pointer;
  color: inherit;
}

a {
  color: var(--color-burgundy);
  text-decoration: none;
}

img {
  max-width: 100%;
  height: auto;
  display: block;
}

/* Utility classes */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
}

.serif { font-family: var(--font-serif); }
.display { font-family: var(--font-display); }
.eyebrow {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-sepia);
  font-weight: 500;
}

/* ============================================================
   ACCESSION - COMPONENT STYLES
   Reusable UI components.
   ============================================================ */

/* ---------- TAB BAR (bottom navigation) ---------- */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: var(--max-width-mobile);
  height: var(--tab-bar-height);
  background: var(--color-paper-light);
  border-top: 1px solid var(--color-line);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 100;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: rgba(251, 247, 238, 0.88);
}

.tab-bar__item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--color-sepia);
  transition: color var(--duration-fast) var(--ease-out);
  padding: var(--space-2);
}

.tab-bar__item.is-active {
  color: var(--color-burgundy);
}

.tab-bar__icon {
  width: 22px;
  height: 22px;
  stroke: currentColor;
  stroke-width: 1.5;
  fill: none;
}

/* ---------- HEADER ---------- */
.header {
  height: var(--header-height);
  padding: 0 var(--space-5);
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--color-line);
  background: var(--color-paper);
  position: sticky;
  top: 0;
  z-index: 50;
}

.header__title {
  font-family: var(--font-display);
  font-size: var(--type-display-m);
  color: var(--color-ink);
}

/* ---------- VIEW CONTAINER ---------- */
.view {
  padding: var(--space-5);
  padding-bottom: calc(var(--tab-bar-height) + var(--space-8));
  min-height: 100vh;
  min-height: 100dvh;
  animation: fadeIn var(--duration-base) var(--ease-out);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ---------- CARDS ---------- */
.card {
  background: var(--color-paper-light);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  box-shadow: var(--shadow-sm);
  position: relative;
}

.card--accent {
  border-left: 3px solid var(--color-burgundy);
}

.artwork-card {
  background: var(--color-paper-light);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--color-line);
}

.artwork-card__image {
  width: 100%;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  background: var(--color-paper-deep);
  display: block;
}

.artwork-card__body {
  padding: var(--space-5);
}

.artwork-card__title {
  font-family: var(--font-display);
  font-size: var(--type-display-m);
  line-height: var(--leading-tight);
  color: var(--color-ink);
  margin-bottom: var(--space-2);
}

.artwork-card__artist {
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  letter-spacing: 0.04em;
  color: var(--color-sepia);
  text-transform: uppercase;
  margin-bottom: var(--space-4);
}

.artwork-card__artist .year {
  font-style: normal;
  color: var(--color-sepia-light);
  margin-left: var(--space-2);
}

.artwork-card__label {
  font-family: var(--font-serif);
  font-size: var(--type-body-m);
  line-height: var(--leading-relaxed);
  color: var(--color-ink-soft);
}

/* ---------- BUTTONS ---------- */
.btn {
  font-family: var(--font-sans);
  font-size: var(--type-body-m);
  font-weight: 500;
  padding: var(--space-3) var(--space-6);
  border-radius: var(--radius-pill);
  border: 1px solid transparent;
  transition: all var(--duration-fast) var(--ease-out);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  letter-spacing: 0.02em;
  min-height: 44px;
  user-select: none;
}

.btn--primary {
  background: var(--color-ink);
  color: var(--color-paper);
}

.btn--primary:active {
  transform: scale(0.98);
  background: var(--color-burgundy);
}

.btn--secondary {
  background: transparent;
  color: var(--color-ink);
  border-color: var(--color-line-strong);
}

.btn--secondary:active {
  background: var(--color-paper-deep);
}

.btn--full {
  width: 100%;
}

.btn--lg {
  padding: var(--space-4) var(--space-8);
  font-size: var(--type-body-l);
}

/* ---------- WAX SEAL ---------- */
.wax-seal {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, var(--color-burgundy-soft) 0%, var(--color-burgundy) 60%, #4A1F1F 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow:
    inset -2px -3px 4px rgba(0,0,0,0.3),
    inset 2px 2px 4px rgba(255,255,255,0.15),
    0 2px 8px rgba(74, 31, 31, 0.4);
}

.wax-seal::before {
  content: '';
  position: absolute;
  inset: 6px;
  border-radius: 50%;
  border: 1px dashed rgba(255, 235, 200, 0.3);
}

.wax-seal__number {
  font-family: var(--font-display);
  font-size: 1.75rem;
  color: var(--color-paper);
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  line-height: 1;
}

.wax-seal--with-ring {
  box-shadow:
    0 0 0 3px var(--color-gold),
    0 0 0 5px var(--color-paper),
    inset -2px -3px 4px rgba(0,0,0,0.3),
    inset 2px 2px 4px rgba(255,255,255,0.15),
    0 2px 8px rgba(74, 31, 31, 0.4);
}

/* ---------- PROGRESS LINE ---------- */
.progress-line {
  height: 2px;
  background: var(--color-line);
  border-radius: 1px;
  overflow: hidden;
  position: relative;
}

.progress-line__fill {
  height: 100%;
  background: var(--color-burgundy);
  border-radius: 1px;
  transition: width var(--duration-slow) var(--ease-out);
}

/* ---------- ACCESSION PLAQUE (badges) ---------- */
.plaque {
  background: var(--color-paper-deep);
  border: 1px solid var(--color-line-strong);
  border-radius: var(--radius-sm);
  padding: var(--space-3) var(--space-4);
  font-family: var(--font-sans);
  display: flex;
  flex-direction: column;
  gap: 2px;
  position: relative;
}

.plaque__label {
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-sepia);
}

.plaque__value {
  font-family: var(--font-display);
  font-size: var(--type-body-l);
  color: var(--color-ink);
}

/* ---------- MOVEMENT TILE ---------- */
.movement-tile {
  display: block;
  padding: var(--space-5);
  background: var(--color-paper-light);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-lg);
  margin-bottom: var(--space-4);
  position: relative;
  transition: transform var(--duration-fast) var(--ease-out);
}

.movement-tile:active {
  transform: scale(0.99);
}

.movement-tile.is-locked {
  opacity: 0.5;
  pointer-events: none;
}

.movement-tile__years {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  color: var(--color-sepia);
  margin-bottom: var(--space-1);
}

.movement-tile__name {
  font-family: var(--font-display);
  font-size: var(--type-display-m);
  margin-bottom: var(--space-2);
  color: var(--color-ink);
}

.movement-tile__blurb {
  font-family: var(--font-serif);
  font-size: var(--type-body-m);
  color: var(--color-ink-soft);
  line-height: var(--leading-normal);
  margin-bottom: var(--space-4);
}

.movement-tile__footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
}

.movement-tile__progress {
  flex: 1;
  height: 2px;
  background: var(--color-line);
  border-radius: 1px;
  overflow: hidden;
}

.movement-tile__progress-fill {
  height: 100%;
  background: var(--color-burgundy);
}

.movement-tile__seal {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--color-burgundy);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.movement-tile__seal svg {
  width: 12px;
  height: 12px;
  stroke: var(--color-paper);
  fill: none;
  stroke-width: 2.5;
}

/* ---------- QUIZ OPTION ---------- */
.quiz-option {
  width: 100%;
  background: var(--color-paper-light);
  border: 1.5px solid var(--color-line-strong);
  border-radius: var(--radius-md);
  padding: var(--space-4) var(--space-5);
  text-align: left;
  font-family: var(--font-serif);
  font-size: var(--type-body-l);
  color: var(--color-ink);
  margin-bottom: var(--space-3);
  transition: all var(--duration-fast) var(--ease-out);
  min-height: 56px;
}

.quiz-option:active {
  transform: scale(0.99);
  background: var(--color-paper-deep);
}

.quiz-option.is-correct {
  background: rgba(122, 132, 113, 0.18);
  border-color: var(--color-sage);
  color: var(--color-sage);
}

.quiz-option.is-incorrect {
  background: rgba(107, 46, 46, 0.1);
  border-color: var(--color-burgundy);
  color: var(--color-burgundy);
}

.quiz-option.is-disabled {
  opacity: 0.4;
  pointer-events: none;
}

/* ---------- HERO PANEL (today view) ---------- */
.hero-panel {
  background: linear-gradient(180deg, var(--color-paper-light) 0%, var(--color-paper) 100%);
  border-radius: var(--radius-xl);
  overflow: hidden;
  margin-bottom: var(--space-5);
  border: 1px solid var(--color-line);
  box-shadow: var(--shadow-md);
}

.hero-panel__image {
  width: 100%;
  aspect-ratio: 16 / 11;
  object-fit: cover;
  background: var(--color-paper-deep);
}

.hero-panel__body {
  padding: var(--space-5);
}

/* ---------- LEADERBOARD ROW ---------- */
.leaderboard-row {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) 0;
  border-bottom: 1px solid var(--color-line);
}

.leaderboard-row:last-child {
  border-bottom: none;
}

.leaderboard-row__avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--color-paper-deep);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: var(--type-body-l);
  color: var(--color-ink);
  flex-shrink: 0;
}

.leaderboard-row__name {
  flex: 1;
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: var(--type-body-m);
}

.leaderboard-row__stat {
  font-family: var(--font-display);
  font-size: var(--type-body-l);
  color: var(--color-burgundy);
}

.leaderboard-row__substat {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.06em;
  color: var(--color-sepia);
  text-transform: uppercase;
}

/* ---------- DIVIDER WITH ORNAMENT ---------- */
.divider-ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: var(--space-6) 0;
  gap: var(--space-3);
}

.divider-ornament::before,
.divider-ornament::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--color-line);
}

.divider-ornament__symbol {
  font-family: var(--font-display);
  color: var(--color-sepia);
  font-size: var(--type-body-l);
}

/* ---------- CONSTELLATION NODE ---------- */
.constellation-svg {
  width: 100%;
  height: auto;
  display: block;
}

.constellation-node {
  transition: all var(--duration-base) var(--ease-out);
}

.constellation-node[data-state="faint"] {
  opacity: 0.25;
}

.constellation-node[data-state="lit"] {
  opacity: 1;
}

.constellation-node[data-state="gold"] {
  opacity: 1;
}

/* ============================================================
   ACCESSION - VIEW STYLES & ANIMATIONS
   Per-view layouts and motion.
   ============================================================ */

/* ---------- ONBOARDING / WALKTHROUGH ---------- */
.onboarding {
  padding: var(--space-6) var(--space-5) calc(var(--tab-bar-height) + var(--space-5));
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

.onboarding__intro {
  text-align: center;
  padding-top: var(--space-10);
}

.onboarding__title {
  font-family: var(--font-display);
  font-size: 3rem;
  letter-spacing: -0.02em;
  line-height: 0.95;
  margin-bottom: var(--space-3);
  color: var(--color-ink);
}

.onboarding__subtitle {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: var(--type-body-l);
  color: var(--color-sepia);
  margin-bottom: var(--space-10);
}

.onboarding__body {
  flex: 1;
}

.onboarding__footer {
  padding-top: var(--space-6);
}

.museum-checklist {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.museum-checkbox {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-4);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-md);
  background: var(--color-paper-light);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
}

.museum-checkbox.is-checked {
  background: rgba(107, 46, 46, 0.06);
  border-color: var(--color-burgundy);
}

.museum-checkbox__box {
  width: 20px;
  height: 20px;
  border: 1.5px solid var(--color-line-strong);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.museum-checkbox.is-checked .museum-checkbox__box {
  background: var(--color-burgundy);
  border-color: var(--color-burgundy);
}

.museum-checkbox.is-checked .museum-checkbox__box::after {
  content: '✓';
  color: var(--color-paper);
  font-size: 13px;
  font-weight: bold;
}

.museum-checkbox__name {
  font-family: var(--font-sans);
  font-size: var(--type-body-m);
  color: var(--color-ink);
}

/* Walkthrough card swiping */
.walkthrough-card {
  background: var(--color-paper-light);
  border-radius: var(--radius-xl);
  overflow: hidden;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--color-line);
  margin-bottom: var(--space-5);
}

.walkthrough-card__image {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  background: var(--color-paper-deep);
}

.walkthrough-card__body {
  padding: var(--space-5);
}

.walkthrough-question {
  font-family: var(--font-display);
  font-size: var(--type-display-l);
  text-align: center;
  margin-bottom: var(--space-2);
}

.walkthrough-meta {
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  text-align: center;
  color: var(--color-sepia);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: var(--space-5);
}

.walkthrough-choices {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: var(--space-3);
  padding: 0 var(--space-2);
}

.walkthrough-choice {
  padding: var(--space-4) var(--space-2);
  border-radius: var(--radius-md);
  border: 1.5px solid var(--color-line-strong);
  background: var(--color-paper-light);
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--color-ink);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  min-height: 64px;
  justify-content: center;
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
}

.walkthrough-choice:active {
  transform: scale(0.98);
}

.walkthrough-choice__icon {
  font-size: 1.25rem;
  line-height: 1;
}

/* ---------- TODAY VIEW ---------- */
.today-greeting {
  font-family: var(--font-display);
  font-size: var(--type-display-l);
  margin-bottom: var(--space-2);
}

.today-date {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-sepia);
  margin-bottom: var(--space-5);
}

.today-section {
  margin-bottom: var(--space-6);
}

.today-section__title {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-sepia);
  font-weight: 500;
  margin-bottom: var(--space-3);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.streak-row {
  display: flex;
  align-items: center;
  gap: var(--space-5);
}

.streak-row__copy {
  flex: 1;
}

.streak-row__count {
  font-family: var(--font-display);
  font-size: var(--type-display-l);
  line-height: 1;
  margin-bottom: var(--space-1);
}

.streak-row__caption {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: var(--type-body-m);
  color: var(--color-sepia);
}

/* ---------- LESSON PLAYER ---------- */
.lesson-shell {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--color-paper);
}

.lesson-progress-bar {
  height: 4px;
  background: var(--color-line);
  position: sticky;
  top: 0;
  z-index: 60;
}

.lesson-progress-bar__fill {
  height: 100%;
  background: var(--color-burgundy);
  transition: width var(--duration-base) var(--ease-out);
}

.lesson-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-5);
  position: sticky;
  top: 4px;
  z-index: 50;
  background: var(--color-paper);
}

.lesson-close {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  color: var(--color-sepia);
}

.lesson-step {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-sepia);
}

.lesson-body {
  flex: 1;
  padding: var(--space-3) var(--space-5);
  display: flex;
  flex-direction: column;
}

.lesson-footer {
  padding: var(--space-5);
  padding-bottom: calc(var(--space-5) + env(safe-area-inset-bottom));
  border-top: 1px solid var(--color-line);
  background: var(--color-paper-light);
}

.lesson-card-image {
  width: 100%;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  border-radius: var(--radius-lg);
  background: var(--color-paper-deep);
  margin-bottom: var(--space-5);
}

.lesson-card-image--quiz {
  aspect-ratio: 1;
}

.lesson-card-title {
  font-family: var(--font-display);
  font-size: var(--type-display-m);
  margin-bottom: var(--space-1);
}

.lesson-card-meta {
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--color-sepia);
  margin-bottom: var(--space-4);
}

.lesson-card-body {
  font-family: var(--font-serif);
  font-size: var(--type-body-l);
  line-height: var(--leading-relaxed);
  color: var(--color-ink-soft);
  margin-bottom: var(--space-5);
}

.lesson-question {
  font-family: var(--font-display);
  font-size: var(--type-display-m);
  margin-bottom: var(--space-5);
  line-height: var(--leading-tight);
}

.lesson-feedback {
  font-family: var(--font-serif);
  font-size: var(--type-body-m);
  color: var(--color-ink-soft);
  padding: var(--space-4);
  background: var(--color-paper-deep);
  border-radius: var(--radius-md);
  margin-top: var(--space-3);
  border-left: 3px solid var(--color-sage);
  animation: slideUp var(--duration-base) var(--ease-out);
}

.lesson-feedback.is-incorrect {
  border-left-color: var(--color-burgundy);
}

.lesson-feedback__label {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-sage);
  margin-bottom: var(--space-1);
  display: block;
}

.lesson-feedback.is-incorrect .lesson-feedback__label {
  color: var(--color-burgundy);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ---------- DATE SLIDER ---------- */
.date-slider {
  margin: var(--space-5) 0;
}

.date-slider__value {
  font-family: var(--font-display);
  font-size: 3rem;
  text-align: center;
  margin-bottom: var(--space-3);
  letter-spacing: -0.01em;
}

.date-slider__bce {
  font-size: var(--type-body-m);
  color: var(--color-sepia);
  margin-left: var(--space-1);
}

.date-slider input[type="range"] {
  width: 100%;
  appearance: none;
  -webkit-appearance: none;
  height: 2px;
  background: var(--color-line-strong);
  border-radius: 1px;
  outline: none;
}

.date-slider input[type="range"]::-webkit-slider-thumb {
  appearance: none;
  -webkit-appearance: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--color-burgundy);
  border: 3px solid var(--color-paper);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
}

.date-slider input[type="range"]::-moz-range-thumb {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--color-burgundy);
  border: 3px solid var(--color-paper);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
}

.date-slider__range {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  color: var(--color-sepia);
  margin-top: var(--space-2);
  letter-spacing: 0.04em;
}

/* ---------- BEFORE/AFTER QUIZ ---------- */
.before-after-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-3);
  margin-bottom: var(--space-5);
}

.before-after-option {
  display: flex;
  flex-direction: column;
  background: var(--color-paper-light);
  border: 2px solid var(--color-line);
  border-radius: var(--radius-md);
  overflow: hidden;
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
}

.before-after-option:active {
  transform: scale(0.98);
}

.before-after-option.is-correct {
  border-color: var(--color-sage);
}

.before-after-option.is-incorrect {
  border-color: var(--color-burgundy);
  opacity: 0.6;
}

.before-after-option img {
  aspect-ratio: 1;
  object-fit: cover;
  width: 100%;
}

.before-after-option__caption {
  padding: var(--space-3);
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  text-align: center;
  background: var(--color-paper-light);
}

/* ---------- REWARD CARD ---------- */
.reward-screen {
  text-align: center;
  padding: var(--space-10) var(--space-5);
  animation: fadeIn var(--duration-slow) var(--ease-out);
}

.reward-seal-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: var(--space-6);
}

.reward-seal-wrap .wax-seal {
  animation: sealStamp 500ms var(--ease-out);
}

@keyframes sealStamp {
  0% { transform: scale(0.6) rotate(-15deg); opacity: 0; }
  60% { transform: scale(1.15) rotate(2deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

.reward-title {
  font-family: var(--font-display);
  font-size: var(--type-display-l);
  margin-bottom: var(--space-3);
}

.reward-eyebrow {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--color-burgundy);
  margin-bottom: var(--space-2);
}

.reward-subtitle {
  font-family: var(--font-serif);
  font-style: italic;
  color: var(--color-sepia);
  margin-bottom: var(--space-8);
}

.reward-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-3);
  margin-bottom: var(--space-8);
}

/* ---------- COMPARISON CARD ---------- */
.comparison-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
  gap: var(--space-3);
  margin: var(--space-5) 0;
}

.comparison-item {
  background: var(--color-paper-light);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-md);
  overflow: hidden;
}

.comparison-item__image {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  background: var(--color-paper-deep);
  display: block;
}

.comparison-item__title {
  font-family: var(--font-display);
  font-size: var(--type-body-m);
  line-height: var(--leading-tight);
  padding: var(--space-2) var(--space-3) 0;
  color: var(--color-ink);
}

.comparison-item__meta {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.04em;
  color: var(--color-sepia);
  padding: 2px var(--space-3) var(--space-2);
}

/* ---------- TIMELINE GRID (Collection view, new) ---------- */
.timeline-grid {
  display: grid;
  grid-template-columns: 100px repeat(6, 120px);
  gap: 2px;
  background: var(--color-line);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-md);
  overflow: hidden;
  margin-bottom: var(--space-5);
  /* Force the grid wider than the viewport so the wrap div scrolls it */
  min-width: max-content;
  width: max-content;
}

.timeline-grid__wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: var(--space-2);
  /* Stretch to full width of the view so the scroll container fills the screen */
  width: 100%;
  /* Subtle scroll indicator */
  scrollbar-width: thin;
  scrollbar-color: var(--color-sepia-light) transparent;
}

.timeline-grid__wrap::-webkit-scrollbar {
  height: 4px;
}

.timeline-grid__wrap::-webkit-scrollbar-thumb {
  background: var(--color-sepia-light);
  border-radius: 2px;
}

/* Sticky row label column so region names stay visible while scrolling */
.timeline-grid__row-label {
  position: sticky;
  left: 0;
  z-index: 2;
  background: var(--color-paper-deep);
  /* Re-declare border so it renders over the scrolled cells */
  border-right: 1px solid var(--color-line);
}

.timeline-grid__cell {
  background: var(--color-paper);
  padding: var(--space-2) var(--space-1);
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  text-align: center;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.timeline-grid__header {
  background: var(--color-paper-deep);
  font-weight: 500;
  color: var(--color-sepia);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  line-height: 1.2;
  font-size: 9px;
}

.timeline-grid__row-label {
  background: var(--color-paper-deep);
  font-weight: 500;
  color: var(--color-ink);
  text-transform: none;
  letter-spacing: 0;
  font-size: var(--type-caption);
  justify-content: flex-start;
  padding-left: var(--space-3);
  text-align: left;
}

.timeline-grid__cell-content {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  align-items: center;
  justify-content: center;
  width: 100%;
}

.timeline-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--color-sepia-light);
  display: inline-block;
  cursor: pointer;
}

.timeline-dot[data-state="lit"]  { background: var(--color-burgundy); }
.timeline-dot[data-state="gold"] { background: var(--color-gold); box-shadow: 0 0 0 1px var(--color-paper), 0 0 0 2px var(--color-gold); }
.timeline-dot[data-state="faint"] { background: var(--color-sepia-light); opacity: 0.6; }
.timeline-dot[data-state="unencountered"] { background: transparent; border: 1px dashed var(--color-sepia-light); opacity: 0.4; }
.collection-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--space-3);
}

.collection-tile {
  aspect-ratio: 1;
  border-radius: var(--radius-md);
  overflow: hidden;
  position: relative;
  background: var(--color-paper-deep);
  border: 1px solid var(--color-line);
}

.collection-tile img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.collection-tile.is-faint img {
  filter: grayscale(1) opacity(0.3);
}

.collection-tile__caption {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: var(--space-2) var(--space-3);
  background: linear-gradient(transparent, rgba(31, 27, 22, 0.8));
  color: var(--color-paper);
  font-family: var(--font-display);
  font-size: var(--type-body-s);
}

.collection-tile.is-faint .collection-tile__caption {
  color: var(--color-sepia-light);
}

/* ---------- PROFILE / RANKS ---------- */
.rank-row {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  padding: var(--space-4) 0;
  border-bottom: 1px solid var(--color-line);
}

.rank-row:last-child {
  border-bottom: none;
}

.rank-row__name {
  flex: 1;
}

.rank-row__movement {
  font-family: var(--font-display);
  font-size: var(--type-body-l);
  color: var(--color-ink);
  margin-bottom: 2px;
}

.rank-row__rank {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-sepia);
}

.rank-row__progress {
  width: 80px;
  height: 2px;
  background: var(--color-line);
}

.rank-row__progress-fill {
  height: 100%;
  background: var(--color-burgundy);
}

/* ── ARTWORK MAP ─────────────────────────────────────────── */

.artwork-map {
  position: relative;
  width: 100%;
  height: 160px;
  border-radius: var(--radius-md);
  overflow: hidden;
  margin-bottom: var(--space-4);
  background: #EDE4D3;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--color-line);
}

.artwork-map--comparison {
  height: 140px;
  margin-bottom: var(--space-3);
}

.artwork-map__label {
  position: absolute;
  bottom: var(--space-2);
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--color-sepia);
  white-space: nowrap;
  pointer-events: none;
}

/* ── ARTWORK DETAIL BOTTOM SHEET ─────────────────────────── */

.artwork-sheet-overlay {
  position: fixed;
  inset: 0;
  background: rgba(31, 27, 22, 0);
  z-index: 200;
  transition: background var(--duration-base) var(--ease-out);
  pointer-events: none;
}

.artwork-sheet-overlay.is-visible {
  background: rgba(31, 27, 22, 0.5);
  pointer-events: auto;
}

.artwork-sheet {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  max-height: 90vh;
  background: var(--color-paper);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transform: translateY(100%);
  transition: transform var(--duration-slow) var(--ease-out);
  padding-bottom: calc(env(safe-area-inset-bottom) + var(--space-8));
}

.artwork-sheet.is-open {
  transform: translateY(0);
}

.artwork-sheet__handle {
  width: 36px;
  height: 4px;
  background: var(--color-sepia-light);
  border-radius: var(--radius-pill);
  margin: var(--space-3) auto var(--space-4);
  opacity: 0.5;
}

.artwork-sheet__image {
  width: 100%;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  display: block;
  background: var(--color-paper-deep);
}

/* map inside sheet — no margin-bottom gap between image and map */
.artwork-sheet__image + .artwork-map {
  border-radius: 0;
  border-left: none;
  border-right: none;
  border-top: none;
  margin-bottom: 0;
}

.artwork-sheet__body {
  padding: var(--space-5) var(--space-6) var(--space-4);
}

.artwork-sheet__title {
  font-family: var(--font-display);
  font-size: var(--type-display-m);
  line-height: var(--leading-tight);
  margin-bottom: var(--space-1);
}

.artwork-sheet__meta {
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  letter-spacing: 0.04em;
  color: var(--color-sepia);
  text-transform: uppercase;
  margin-bottom: var(--space-5);
}

.artwork-sheet__wall-label {
  font-family: var(--font-serif);
  font-size: var(--type-body-m);
  line-height: var(--leading-relaxed);
  color: var(--color-ink-soft);
  margin-bottom: var(--space-5);
}

.artwork-sheet__long-form {
  font-family: var(--font-serif);
  font-size: var(--type-body-s);
  line-height: var(--leading-relaxed);
  color: var(--color-sepia);
  border-top: 1px solid var(--color-line);
  padding-top: var(--space-4);
  margin-bottom: var(--space-5);
}

.artwork-sheet__seen-row {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding-top: var(--space-4);
  border-top: 1px solid var(--color-line);
}

.artwork-sheet__seen-label {
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  color: var(--color-sepia);
  white-space: nowrap;
}

.artwork-sheet__seen-btns {
  display: flex;
  gap: var(--space-2);
}

.artwork-sheet__seen-btn {
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-pill);
  border: 1px solid var(--color-line-strong);
  background: transparent;
  color: var(--color-sepia);
  cursor: pointer;
  transition: all var(--duration-fast);
}

.artwork-sheet__seen-btn.is-active {
  background: var(--color-burgundy);
  border-color: var(--color-burgundy);
  color: #fff;
}

/* ── Seen In Person selector (wall-label cards) ─────────────── */
.seen-in-person-row {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-top: var(--space-4);
  padding-top: var(--space-4);
  border-top: 1px solid var(--color-border);
}

.seen-in-person-label {
  font-family: var(--font-ui);
  font-size: 0.8125rem;
  color: var(--color-ink-muted);
  white-space: nowrap;
  flex-shrink: 0;
}

.seen-in-person-btns {
  display: flex;
  gap: var(--space-2);
}

.seen-in-person-btn {
  font-family: var(--font-ui);
  font-size: 0.8125rem;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 999px;
  border: 1.5px solid var(--color-border);
  background: transparent;
  color: var(--color-ink-muted);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.seen-in-person-btn.is-active {
  background: var(--color-accent);
  border-color: var(--color-accent);
  color: #fff;
}

/* ============================================================
   EXHIBITIONS VIEW
   ============================================================ */

.view-exhibitions {
  padding: var(--space-4) var(--space-6) calc(var(--tab-bar-height) + var(--space-8));
}

.view-header {
  padding: var(--space-6) 0 var(--space-5);
}

.exhibitions-grid {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}

.exhibition-card {
  display: flex;
  align-items: flex-start;
  gap: var(--space-4);
  background: var(--color-paper-light);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-lg);
  padding: var(--space-4) var(--space-5);
  cursor: pointer;
  transition: background var(--duration-fast) var(--ease-out),
              box-shadow var(--duration-fast) var(--ease-out);
}
.exhibition-card:active { background: var(--color-paper-deep); }
.exhibition-card.is-complete { border-color: var(--color-sage-soft); }

.exhibition-card__era {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1.5px solid var(--color-sepia-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 0.75rem;
  color: var(--color-sepia);
  flex-shrink: 0;
  margin-top: 2px;
}
.exhibition-card__body { flex: 1; min-width: 0; }
.exhibition-card__title {
  font-family: var(--font-display);
  font-size: var(--type-body-l);
  color: var(--color-ink);
  margin-bottom: 3px;
}
.exhibition-card__sub {
  font-family: var(--font-serif);
  font-size: var(--type-body-s);
  color: var(--color-sepia);
  line-height: var(--leading-normal);
  margin-bottom: var(--space-3);
}
.exhibition-card__meta {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}
.exhibition-card__progress-bar {
  flex: 1;
  height: 4px;
  background: var(--color-line-strong);
  border-radius: var(--radius-pill);
  overflow: hidden;
}
.exhibition-card__progress-fill {
  height: 100%;
  background: var(--color-burgundy);
  border-radius: var(--radius-pill);
  transition: width var(--duration-slow) var(--ease-out);
}
.exhibition-card.is-complete .exhibition-card__progress-fill {
  background: var(--color-sage);
}
.exhibition-card__count {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  color: var(--color-sepia);
  flex-shrink: 0;
}
.exhibition-badge {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  color: var(--color-sage);
  font-weight: 600;
  flex-shrink: 0;
}

/* Exhibition detail */
.exhibition-detail-header {
  padding: var(--space-5) 0 var(--space-6);
  text-align: center;
}
.btn-back {
  display: block;
  background: none;
  border: none;
  color: var(--color-sepia);
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  cursor: pointer;
  padding: var(--space-2) 0 var(--space-4);
  text-align: left;
}
.exhibition-detail-era {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1.5px solid var(--color-sepia-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 1rem;
  color: var(--color-sepia);
  margin: 0 auto var(--space-4);
}
.exhibition-detail-title {
  font-family: var(--font-display);
  font-size: var(--type-display-m);
  color: var(--color-ink);
  margin-bottom: var(--space-2);
}
.exhibition-detail-sub {
  font-family: var(--font-serif);
  font-style: italic;
  color: var(--color-sepia);
  font-size: var(--type-body-m);
  margin-bottom: var(--space-3);
}
.exhibition-detail-progress {
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  color: var(--color-sepia-light);
}

.lesson-list { display: flex; flex-direction: column; gap: var(--space-2); }
.lesson-list-item {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  background: var(--color-paper-light);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-md);
  padding: var(--space-4);
  cursor: pointer;
  transition: background var(--duration-fast);
}
.lesson-list-item:active { background: var(--color-paper-deep); }
.lesson-list-item.is-done { opacity: 0.6; }
.lesson-list-item.is-done .lesson-list-item__title { text-decoration: line-through; }

.lesson-list-item__check {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 1.5px solid var(--color-line-strong);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  color: var(--color-sage);
  flex-shrink: 0;
}
.lesson-list-item.is-done .lesson-list-item__check {
  background: var(--color-sage-soft);
  border-color: var(--color-sage-soft);
  font-size: 0;
}
.lesson-list-item.is-done .lesson-list-item__check::after {
  content: '';
  display: block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--color-paper-light);
}
.lesson-list-item__body { flex: 1; min-width: 0; }
.lesson-list-item__title {
  font-family: var(--font-serif);
  font-size: var(--type-body-m);
  color: var(--color-ink);
  font-weight: 500;
}
.lesson-list-item__sub {
  font-family: var(--font-serif);
  font-size: var(--type-body-s);
  color: var(--color-sepia);
  font-style: italic;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.lesson-list-item__meta {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  color: var(--color-sepia-light);
  margin-top: 4px;
}
.lesson-list-item__arrow {
  color: var(--color-sepia-light);
  font-size: var(--type-body-m);
  flex-shrink: 0;
}

/* ============================================================
   VERSUS VIEW
   ============================================================ */

.view-versus {
  padding: var(--space-4) var(--space-6) calc(var(--tab-bar-height) + var(--space-8));
}
.view-versus--challenge,
.view-versus--results {
  padding: var(--space-4) var(--space-6) var(--space-8);
}

/* Scoreboard */
.vs-scoreboard {
  display: flex;
  align-items: stretch;
  gap: var(--space-3);
  background: var(--color-paper-light);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-xl);
  padding: var(--space-5);
  margin: var(--space-4) 0;
}
.vs-player {
  flex: 1;
  text-align: center;
}
.vs-player--me .vs-player__stat--big { color: var(--color-burgundy); }
.vs-player--partner .vs-player__stat--big { color: var(--color-gold); }
.vs-player__name {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  font-weight: 600;
  color: var(--color-sepia);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: var(--space-2);
}
.vs-player__stat--big {
  font-family: var(--font-display);
  font-size: var(--type-display-l);
  line-height: 1;
  margin-bottom: var(--space-1);
}
.vs-player__label {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  color: var(--color-sepia-light);
  margin-bottom: var(--space-2);
}
.vs-player__row {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  color: var(--color-sepia);
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.vs-streak {
  font-size: var(--type-caption);
  color: var(--color-sepia);
  margin-top: var(--space-2);
}
.vs-divider {
  font-family: var(--font-display);
  font-size: var(--type-body-l);
  color: var(--color-sepia-light);
  display: flex;
  align-items: center;
  padding: 0 var(--space-2);
}

/* Lead indicator */
.vs-lead {
  text-align: center;
  font-family: var(--font-serif);
  font-style: italic;
  font-size: var(--type-body-m);
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-md);
  margin-bottom: var(--space-4);
}
.vs-lead--winning { background: rgba(122, 132, 113, 0.12); color: var(--color-sage); }
.vs-lead--losing  { background: rgba(107, 46, 46, 0.08); color: var(--color-burgundy-soft); }
.vs-lead--tied    { background: var(--color-paper-deep); color: var(--color-sepia); }

/* Actions */
.vs-actions { margin: var(--space-5) 0 var(--space-4); }
.vs-hint {
  text-align: center;
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  color: var(--color-sepia-light);
  margin-top: var(--space-3);
}
.vs-empty {
  text-align: center;
  font-family: var(--font-serif);
  font-style: italic;
  color: var(--color-sepia);
  font-size: var(--type-body-m);
  line-height: var(--leading-relaxed);
  margin-bottom: var(--space-4);
}

/* History */
.vs-history {
  border-top: 1px solid var(--color-line);
  padding-top: var(--space-5);
  margin-top: var(--space-2);
}
.vs-history__title {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  font-weight: 600;
  color: var(--color-sepia);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: var(--space-3);
}
.vs-history__item {
  display: flex;
  justify-content: space-between;
  padding: var(--space-2) 0;
  border-bottom: 1px solid var(--color-line);
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  color: var(--color-ink-soft);
}

/* Sync status */
.vs-sync-status {
  text-align: center;
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  color: var(--color-sepia-light);
  margin-top: var(--space-6);
  padding-top: var(--space-4);
  border-top: 1px solid var(--color-line);
}

/* Challenge active */
.challenge-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--space-4) 0 var(--space-2);
}
.challenge-progress {
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  color: var(--color-sepia);
  font-weight: 600;
}
.challenge-score {
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  color: var(--color-burgundy);
  font-weight: 600;
}
.challenge-progress-bar {
  height: 4px;
  background: var(--color-line-strong);
  border-radius: var(--radius-pill);
  overflow: hidden;
  margin-bottom: var(--space-5);
}
.challenge-progress-fill {
  height: 100%;
  background: var(--color-burgundy);
  border-radius: var(--radius-pill);
  transition: width var(--duration-base) var(--ease-out);
}
.challenge-question {
  font-family: var(--font-serif);
  font-size: var(--type-body-l);
  color: var(--color-ink);
  font-weight: 500;
  text-align: center;
  margin-bottom: var(--space-5);
}
.challenge-img {
  width: 100%;
  max-height: 260px;
  object-fit: cover;
  border-radius: var(--radius-lg);
  display: block;
  margin-bottom: var(--space-5);
  background: var(--color-paper-deep);
}
.challenge-two-images {
  display: flex;
  gap: var(--space-3);
  margin-bottom: var(--space-5);
}
.challenge-img--half {
  width: calc(50% - var(--space-2));
  max-height: 180px;
  object-fit: cover;
  border-radius: var(--radius-md);
  background: var(--color-paper-deep);
}
.challenge-options {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}
.challenge-option {
  width: 100%;
  padding: var(--space-4) var(--space-5);
  background: var(--color-paper-light);
  border: 1.5px solid var(--color-line-strong);
  border-radius: var(--radius-md);
  font-family: var(--font-serif);
  font-size: var(--type-body-m);
  color: var(--color-ink);
  text-align: left;
  cursor: pointer;
  transition: all var(--duration-fast);
}
.challenge-option:active:not(:disabled) { background: var(--color-paper-deep); }
.challenge-option.is-correct {
  background: rgba(122, 132, 113, 0.15);
  border-color: var(--color-sage);
  color: var(--color-sage);
}
.challenge-option.is-incorrect {
  background: rgba(107, 46, 46, 0.08);
  border-color: var(--color-burgundy-soft);
  color: var(--color-burgundy-soft);
}
.challenge-option:disabled { cursor: default; }
.challenge-feedback {
  margin-top: var(--space-4);
  text-align: center;
  font-family: var(--font-sans);
  font-size: var(--type-body-m);
  font-weight: 600;
  padding: var(--space-3);
  border-radius: var(--radius-md);
  min-height: 44px;
}
.challenge-feedback.is-correct { color: var(--color-sage); background: rgba(122,132,113,0.1); }
.challenge-feedback.is-incorrect { color: var(--color-burgundy-soft); background: rgba(107,46,46,0.08); }

/* Results */
.results-header {
  text-align: center;
  padding: var(--space-8) 0 var(--space-6);
}
.results-medal {
  font-family: var(--font-display);
  font-size: var(--type-display-m);
  color: var(--color-ink);
  margin-bottom: var(--space-3);
  letter-spacing: -0.01em;
}
.results-score {
  font-family: var(--font-display);
  font-size: var(--type-display-l);
  color: var(--color-ink);
}
.results-pct {
  font-family: var(--font-serif);
  font-style: italic;
  color: var(--color-sepia);
  font-size: var(--type-body-m);
  margin-top: var(--space-2);
}
.results-breakdown {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  margin: var(--space-5) 0;
}
.results-item {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  padding: var(--space-3);
  border-radius: var(--radius-md);
  background: var(--color-paper-light);
  border: 1px solid var(--color-line);
}
.results-item.is-correct { border-color: rgba(122,132,113,0.3); }
.results-item.is-incorrect { border-color: rgba(107,46,46,0.15); }
.results-thumb {
  width: 52px;
  height: 52px;
  object-fit: cover;
  border-radius: var(--radius-sm);
  flex-shrink: 0;
  background: var(--color-paper-deep);
}
.results-item__body { flex: 1; min-width: 0; }
.results-item__title {
  font-family: var(--font-serif);
  font-size: var(--type-body-s);
  color: var(--color-ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.results-item__verdict {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  font-weight: 600;
  margin-top: 3px;
}
.results-item.is-correct .results-item__verdict { color: var(--color-sage); }
.results-item.is-incorrect .results-item__verdict { color: var(--color-burgundy-soft); }
.results-actions {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
  margin: var(--space-5) 0 var(--space-4);
}
.results-share {
  text-align: center;
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  color: var(--color-sepia-light);
  padding-top: var(--space-4);
  border-top: 1px solid var(--color-line);
}

/* ============================================================
   FINAL EXHIBITIONS VIEW
   ============================================================ */

.view-fe {
  padding: var(--space-4) var(--space-6) calc(var(--tab-bar-height) + var(--space-8));
}
.view-fe--intro, .view-fe--quiz, .view-fe--results {
  padding: var(--space-4) var(--space-6) var(--space-10);
}

/* Era list */
.fe-era-list { display: flex; flex-direction: column; gap: var(--space-3); margin-top: var(--space-2); }

.fe-era-row {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  background: var(--color-paper-light);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-lg);
  padding: var(--space-4) var(--space-5);
  cursor: default;
  transition: background var(--duration-fast);
}
.fe-era-row.is-unlocked { cursor: pointer; border-color: var(--color-gold-soft); }
.fe-era-row.is-unlocked:active { background: var(--color-paper-deep); }
.fe-era-row.is-passed { border-color: var(--color-sage-soft); }

.fe-era-row__body { flex: 1; min-width: 0; }
.fe-era-row__name {
  font-family: var(--font-display);
  font-size: var(--type-body-l);
  color: var(--color-ink);
  margin-bottom: 2px;
}
.fe-era-row__meta {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  color: var(--color-sepia-light);
  margin-bottom: var(--space-3);
}
.fe-era-progress { }
.fe-era-progress__bar {
  height: 3px;
  background: var(--color-line-strong);
  border-radius: var(--radius-pill);
  overflow: hidden;
}
.fe-era-progress__fill {
  height: 100%;
  background: var(--color-burgundy);
  border-radius: var(--radius-pill);
}
.fe-era-row.is-passed .fe-era-progress__fill { background: var(--color-sage); }

.fe-era-row__right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: var(--space-2);
  flex-shrink: 0;
}

.fe-badge {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  font-weight: 600;
  padding: 2px 8px;
  border-radius: var(--radius-pill);
  white-space: nowrap;
}
.fe-badge--locked { background: var(--color-paper-deep); color: var(--color-sepia-light); }
.fe-badge--unlocked { background: rgba(184,148,90,0.15); color: var(--color-gold); }
.fe-badge--passed { background: rgba(122,132,113,0.15); color: var(--color-sage); }
.fe-badge--refresher { background: rgba(107,46,46,0.1); color: var(--color-burgundy-soft); }

.fe-era-action {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  color: var(--color-sepia);
  text-align: right;
}
.fe-era-action--disabled { color: var(--color-sepia-light); }

/* Intro */
.view-fe--intro { text-align: center; }
.fe-intro-era {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  font-weight: 600;
  color: var(--color-sepia);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin: var(--space-6) 0 var(--space-3);
}
.fe-intro-title {
  font-family: var(--font-display);
  font-size: var(--type-display-l);
  color: var(--color-ink);
  margin-bottom: var(--space-6);
  letter-spacing: -0.02em;
}
.fe-intro-body {
  font-family: var(--font-serif);
  font-size: var(--type-body-m);
  color: var(--color-ink-soft);
  line-height: var(--leading-relaxed);
  text-align: left;
  margin-bottom: var(--space-8);
}
.fe-intro-body p { margin: 0 0 var(--space-3); }
.fe-intro-previous {
  color: var(--color-sage);
  font-style: italic;
}
.fe-intro-actions { display: flex; flex-direction: column; gap: var(--space-3); }

/* Quiz */
.fe-quiz-header {
  display: flex;
  justify-content: space-between;
  padding: var(--space-4) 0 var(--space-2);
}
.fe-quiz-progress, .fe-quiz-score {
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  font-weight: 600;
  color: var(--color-sepia);
}
.fe-quiz-score { color: var(--color-burgundy); }
.fe-quiz-progress-bar {
  height: 3px;
  background: var(--color-line-strong);
  border-radius: var(--radius-pill);
  overflow: hidden;
  margin-bottom: var(--space-5);
}
.fe-quiz-progress-fill {
  height: 100%;
  background: var(--color-burgundy);
  border-radius: var(--radius-pill);
  transition: width var(--duration-base);
}
.fe-quiz-question {
  font-family: var(--font-serif);
  font-size: var(--type-body-l);
  font-weight: 500;
  color: var(--color-ink);
  text-align: center;
  margin-bottom: var(--space-5);
}
.fe-quiz-img--full {
  width: 100%;
  max-height: 240px;
  object-fit: cover;
  border-radius: var(--radius-lg);
  background: var(--color-paper-deep);
  display: block;
}
.fe-quiz-artwork-label {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  color: var(--color-sepia-light);
  text-align: center;
  margin: var(--space-2) 0 var(--space-4);
  font-style: italic;
}
.fe-quiz-two-images {
  display: flex;
  gap: var(--space-3);
  margin-bottom: var(--space-5);
}
.fe-quiz-two-item { flex: 1; }
.fe-quiz-two-item .fe-quiz-img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: var(--radius-md);
  background: var(--color-paper-deep);
  display: block;
}
.fe-quiz-two-label {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  color: var(--color-sepia);
  text-align: center;
  margin-top: var(--space-1);
  font-style: italic;
}
.fe-quiz-options { display: flex; flex-direction: column; gap: var(--space-3); }
.fe-quiz-option {
  width: 100%;
  padding: var(--space-4) var(--space-5);

<script>window.__BUNDLED_DATA={"paths": {"met-chronological": {"id": "met-chronological", "title": "The Met, Chronologically", "subtitle": "A journey through art history, anchored in the Metropolitan Museum of Art", "museumId": "met", "movements": ["egyptian-ancient", "italian-renaissance", "northern-renaissance", "dutch-golden-age", "impressionism", "american-modernism"]}}, "eras": {"ancient-worlds": {"id": "ancient-worlds", "name": "Ancient Worlds", "order": 1, "yearStart": -3500, "yearEnd": 500, "color": "#C9A961", "blurb": "The first cities, the first gods, the first art made to outlast its makers.", "longForm": "Across four millennia, the earliest sustained art traditions appeared independently and almost simultaneously in different river valleys: the Nile, the Tigris and Euphrates, the Indus, the Yellow River. Cities formed. Writing was invented. Hierarchies hardened. Art in this era is almost universally tied to power, ritual, and the dead \u2014 pyramids, tombs, oracle bones, temple sculpture, jade burial suits. Stylistic conservatism is the norm: a 2000 BCE Egyptian sculpture and a 1000 BCE Egyptian sculpture look strikingly similar by design. Art was a stabilizing force, not an expressive one.", "themes": ["the first cities", "art for the dead", "power and ritual", "writing emerges"]}, "contemporary-global": {"id": "contemporary-global", "name": "Contemporary Global Art", "order": 6, "yearStart": 1970, "yearEnd": 2030, "color": "#4A6741", "blurb": "Biennials, the internet, repatriation, and a global conversation with no single center.", "longForm": "From roughly 1970 onward, contemporary art becomes genuinely global in a way it had never been before. The biennial circuit spreads from Venice to S\u00e3o Paulo to Dakar to Sharjah to Yokohama. Repatriation debates intensify around objects looted during the colonial period. Digital work, performance, social practice, installation, and traditional media coexist. Indigenous and diasporic artists shape the discourse rather than being shaped by it. The Western canon doesn't disappear, but it becomes one of many.", "themes": ["biennials", "the internet", "repatriation", "Indigenous contemporary", "global south", "digital art"]}, "modernism": {"id": "modernism", "name": "Modernism", "order": 5, "yearStart": 1900, "yearEnd": 1970, "color": "#A0392B", "blurb": "Cubism, abstraction, two world wars, and the slow shattering of Western art's centrality.", "longForm": "The 20th century opens with European artists looking outward \u2014 Picasso to West African masks, Matisse to North African pattern, the German Expressionists to Polynesian carving \u2014 and using what they see (often without credit) to break the inherited rules of representation. Cubism, abstraction, and the various -isms accelerate one another. Mexican muralism gives painting public scale in the Americas. Japanese Nihonga reinvents traditional brushwork for a modern audience. African and Asian artists trained in European academies turn that training back on colonial conditions. After WWII, New York briefly replaces Paris as the world's art center, but the deeper story is the slow loss of any single center at all.", "themes": ["Cubism", "abstraction", "Mexican muralism", "global modernisms", "Abstract Expressionism", "decolonization begins"]}, "prehistoric": {"id": "prehistoric", "name": "Prehistoric", "order": 0, "yearStart": -40000, "yearEnd": -3500, "color": "#8B7355", "blurb": "Before cities, before writing, before recorded history \u2014 the first images made by human hands.", "longForm": "The Paleolithic period spans roughly 3 million years of human prehistory, ending around 10,000 BCE when agriculture began. The Upper Paleolithic (40,000\u201310,000 BCE) is when Homo sapiens first arrived in Europe and produced the cave paintings of southwestern France and northern Spain. These are the oldest unambiguous works of art ever found \u2014 images made in darkness, deep inside mountains, by people whose lives we can barely reconstruct. The cave paintings are not primitive. They demonstrate compositional intelligence, perspective techniques, observation of animal behavior, and a sustained artistic tradition that lasted for 25,000 years. We do not know why they were made. We do not know whether the people who made them thought of themselves as artists. We know that they worked in flickering lamplight, in total silence except for the sounds of the cave, and that what they left behind is among the most beautiful art ever produced by any human culture.", "themes": ["the origins of image-making", "animal observation", "the deep past", "the darkness underground"]}, "renaissances-empires": {"id": "renaissances-empires", "name": "Renaissances & Empires", "order": 3, "yearStart": 1400, "yearEnd": 1800, "color": "#8B5A3C", "blurb": "Florence rediscovers antiquity, Mughals build, Ming porcelain crosses oceans, and the global art market is born.", "longForm": "The four centuries between 1400 and 1800 see something close to simultaneous flowering across multiple civilizations. The Italian Renaissance reinvents perspective and the cult of the individual artist. The Ottomans, Safavids, and Mughals build vast, sophisticated visual cultures fusing Persian, Turkic, and Indian traditions. Ming and Qing China produce porcelain that becomes the first truly global luxury good. Benin bronzes reach their technical peak in West Africa. Mesoamerican empires are conquered, and a new hybrid Hispano-Indigenous art emerges. Trade routes \u2014 overland, maritime, transatlantic \u2014 carry pigments, techniques, motifs, and entire painters across continents.", "themes": ["European Renaissance", "Mughal & Safavid empires", "Ming/Qing porcelain", "global trade", "Benin bronzes", "colonial encounter"]}, "revolution-industry": {"id": "revolution-industry", "name": "Revolution & Industry", "order": 4, "yearStart": 1800, "yearEnd": 1900, "color": "#5C7A8E", "blurb": "Steam, photography, colonial extraction, and a hundred years of overthrowing how to look.", "longForm": "Industrial production, the camera, mass-circulation prints, and a steady erosion of patronage by church and aristocracy all destabilize what painting is for. In Europe, Romanticism gives way to Realism gives way to Impressionism in three generations. In Japan, the Meiji Restoration ends the shogunate and Japanese prints flood into Europe, reshaping European modernism. In India, colonial schools introduce British academic painting just as Indian artists invent the Bengal School in counter-reaction. Photography by 1890 is everywhere. The 19th century is when global art history becomes genuinely entangled \u2014 and when colonial museums begin pulling objects out of their cultures of origin.", "themes": ["photography", "Romanticism to Impressionism", "Japonisme", "colonial extraction", "Bengal School"]}, "sacred-medieval": {"id": "sacred-medieval", "name": "Sacred & Medieval Worlds", "order": 2, "yearStart": 500, "yearEnd": 1400, "color": "#7B5A2E", "blurb": "Empires collapse, religions rise, and art becomes a vessel for the divine.", "longForm": "The collapse of the Roman Empire in the West, the rise of Christianity and Islam, the great Tang and Song dynasties in China, the apex of Khmer Angkor, the height of classical Maya \u2014 all happen in roughly the same nine centuries. Across Eurasia, art turns away from naturalism toward symbolic, hieratic forms suited to expressing the sacred. Byzantine icons, Islamic calligraphy and tile, illuminated manuscripts, Chinese landscape painting as philosophical practice, Hindu temple sculpture, Mesoamerican stelae \u2014 the visual languages are radically different but the underlying impulse is similar: making the invisible visible, and giving the religious or cosmic order a permanent form.", "themes": ["world religions", "post-Roman fragmentation", "manuscript and icon", "Tang and Song China", "classical Maya"]}}, "regions": {"americas": {"id": "americas", "name": "The Americas", "order": 7, "color": "#C46B3D", "blurb": "From the Olmec to O'Keeffe \u2014 five thousand years of civilization across two continents.", "longForm": "The Americas were home to some of the most sophisticated civilizations in the ancient world: the Olmec, Maya, Zapotec, Aztec, and Inca, each developing independently of the Old World. After 1492, European contact produced violent rupture and hybrid cultures \u2014 Hispano-Indigenous painting in Mexico and Peru, colonial baroque, and eventually the distinct modern art traditions of the United States, Mexico, Brazil, Argentina, and beyond. The thread running through it all is an astonishing diversity of visual languages within a single interconnected geographic zone.", "subRegions": ["olmec", "maya", "aztec", "mixtec", "zapotec", "north-american-indigenous", "andean", "amazonian", "hispano-indigenous", "us-american", "mexican", "brazilian", "argentinian", "canadian", "caribbean"]}, "east-asia": {"id": "east-asia", "name": "East Asia", "order": 4, "color": "#9C3F3F", "blurb": "Three thousand unbroken years of brush, ink, lacquer, and porcelain.", "longForm": "China, Japan, Korea, and Vietnam share writing systems, religions, and aesthetic vocabulary in degrees that make 'East Asia' a meaningful category \u2014 but each developed a distinct artistic identity. China set the terms for most of the era; Japan absorbed and transformed; Korea innovated within the tradition; Vietnam pulled toward Southeast Asia. Tibet sits adjacent, with deep ties to South Asian Buddhist art.", "subRegions": ["chinese", "japanese", "korean", "vietnamese", "tibetan"]}, "europe": {"id": "europe", "name": "Europe", "order": 1, "color": "#8B5A3C", "blurb": "The Mediterranean and its long northward reach. Half a dozen distinct traditions wearing the label.", "longForm": "The Latin West, the Greek East, and a dozen national traditions inside them \u2014 Italian, Flemish, Dutch, Spanish, French, German, English, Northern, Russian, Greek/Byzantine, Eastern. European art is so often presented as a single story that its internal divergences get flattened. A Flemish 1500s panel and an Italian 1500s panel were made in cultures with different religious settlements, different patron classes, different paint chemistry. The deeper you go, the less Europe is one place.", "subRegions": ["italian", "flemish", "dutch", "spanish", "french", "german", "austrian", "english", "northern-european", "russian", "greek-byzantine", "eastern-european"]}, "middle-east-north-africa": {"id": "middle-east-north-africa", "name": "Middle East & North Africa", "order": 2, "color": "#C9A961", "blurb": "Where writing was invented, and where most of the world's empires worth the name have started.", "longForm": "From the Sumerians to the Ottomans, the lands between the Nile and the Tigris have produced more imperial visual languages than any equivalent region. Egyptian conservatism, Mesopotamian innovation, Persian luxury, Byzantine icon, Islamic calligraphic and geometric abstraction, Ottoman tile \u2014 vastly different but mutually entangled traditions.", "subRegions": ["egyptian", "mesopotamian", "persian", "islamic", "maghreb"]}, "oceania": {"id": "oceania", "name": "Oceania", "order": 9, "color": "#5E7A8C", "blurb": "Australia, Polynesia, Melanesia, and the world's longest continuous artistic tradition \u2014 Aboriginal Australian art.", "longForm": "Aboriginal Australian art has been continuously practiced for at least 60,000 years, making it the longest unbroken artistic tradition on Earth. Polynesian tatau, Maori whakairo carving, Melanesian masks and bilum bags \u2014 sophisticated visual cultures often grouped together as 'Pacific art' that have very little in common with each other beyond geography.", "subRegions": ["aboriginal-australian", "polynesian", "maori", "melanesian"]}, "south-asia": {"id": "south-asia", "name": "South Asia", "order": 5, "color": "#B8862A", "blurb": "The continent that produced Hindu temple sculpture, Buddhist cave painting, Mughal miniature, and a dozen things in between.", "longForm": "South Asia's artistic history is layered like nowhere else: pre-Vedic, Vedic, Buddhist, Jain, Hindu, Indo-Islamic, Sikh, colonial, modern. Hindu temple architecture and sculpture is among the most sophisticated visual traditions humans have produced. The Mughal miniature, which fused Persian technique with Indian subject matter, is one of the great cross-cultural art forms.", "subRegions": ["indian", "sri-lankan", "nepalese"]}, "southeast-asia": {"id": "southeast-asia", "name": "Southeast Asia", "order": 6, "color": "#7E6B3F", "blurb": "The pivot between India and China, and the home of Angkor \u2014 the largest religious complex ever built.", "longForm": "Indianized and Sinicized cultural spheres met across mainland and maritime Southeast Asia, producing wildly distinctive traditions: Khmer temple-mountain architecture, Javanese gamelan-and-batik aesthetic, Thai golden Buddhas, Burmese lacquer. Often underrepresented in Western museums and survey courses.", "subRegions": ["khmer", "thai", "javanese", "burmese", "vietnamese-southeast"]}, "sub-saharan-africa": {"id": "sub-saharan-africa", "name": "Sub-Saharan Africa", "order": 3, "color": "#7A4D2E", "blurb": "Sophisticated artistic civilizations whose existence was systematically denied during the colonial period.", "longForm": "When Benin bronzes reached London in 1897, they so contradicted European assumptions about African art that some scholars insisted they must have been made by visiting Europeans. They were not. Nok terracottas, Ife heads, Benin bronzes, Kongo nkisi, Ethiopian Christian art, Yoruba ibeji \u2014 sustained traditions stretching back two and a half thousand years, with court workshops, master-apprentice lineages, and technical innovations that anticipated European discoveries by centuries.", "subRegions": ["nok", "ife", "benin", "kongo", "ethiopian", "yoruba", "contemporary-african"]}}, "subregions": {"aboriginal-australian": {"id": "aboriginal-australian", "name": "Aboriginal Australian", "parentRegionId": "oceania", "blurb": "The oldest continuous artistic tradition on Earth. Rock art at least 40,000 years old, and a still-active contemporary tradition."}, "africa-prehistoric": {"id": "africa-prehistoric", "name": "Prehistoric Africa", "regionId": "sub-saharan-africa", "blurb": "The oldest known symbolic marks made by Homo sapiens.", "longForm": "Africa is where Homo sapiens evolved, and Africa is where the earliest known evidence of symbolic thought has been found. The Blombos Cave on the southern Cape coast of South Africa has yielded engraved ochre dated to 75,000\u2013100,000 years ago \u2014 abstract cross-hatched patterns that predate European cave art by at least 30,000 years. The Apollo 11 Cave in Namibia has produced painted animal figures dated to ~25,000 BCE."}, "amazonian": {"id": "amazonian", "name": "Amazonian", "parentRegionId": "americas", "blurb": "Marajoara pottery, Shipibo geometric body painting and textile, feather work \u2014 sophisticated lowland traditions often invisible in museums."}, "americas-prehistoric": {"id": "americas-prehistoric", "name": "Prehistoric Americas", "regionId": "americas", "blurb": "The rock shelters and canyon walls of Patagonia, the Andes, and the Pampas.", "longForm": "Prehistoric art in the Americas spans from the earliest known Paleoindian occupations (~13,000 BCE) through thousands of years of hunter-gatherer traditions. In South America, the Pinturas River canyon of Patagonia contains the most concentrated body of prehistoric rock art on the continent, dominated by hand stencils made with pigment blown through hollow bones."}, "andean": {"id": "andean", "name": "Andean", "parentRegionId": "americas", "blurb": "Chav\u00edn, Moche, Nazca, Wari, Inca, and contemporary Quechua and Aymara traditions. Textiles, ceramics, and goldwork at the highest technical level."}, "argentinian": {"id": "argentinian", "name": "Argentinian", "parentRegionId": "modern-americas", "blurb": "A strong tradition of conceptual and geometric abstraction \u2014 Xul Solar, Berni, Le Parc."}, "austrian": {"id": "austrian", "name": "Austrian", "parentRegionId": "europe", "blurb": "The Habsburg court at Vienna, Klimt and the Secession, Egon Schiele. A small region with outsized artistic gravity."}, "aztec": {"id": "aztec", "name": "Aztec (Mexica)", "parentRegionId": "mesoamerica", "blurb": "The Triple Alliance of Tenochtitlan, Texcoco, and Tlacopan, 1428-1521. Stone sculpture, featherwork, codices."}, "benin": {"id": "benin", "name": "Benin", "parentRegionId": "sub-saharan-africa", "blurb": "The Kingdom of Benin produced cast-bronze plaques and heads from the 13th century onward. Most are now in European museums."}, "brazilian": {"id": "brazilian", "name": "Brazilian", "parentRegionId": "modern-americas", "blurb": "Tarsila do Amaral's anthropophagic modernism, Concrete and Neo-Concrete art, Lygia Clark, H\u00e9lio Oiticica, contemporary."}, "bronze-age-europe": {"id": "bronze-age-europe", "name": "Bronze Age Europe", "regionId": "europe", "blurb": "The non-Mediterranean Bronze Age cultures of central and northern Europe, ~3000\u2013800 BCE.", "longForm": "While Mediterranean civilizations were building cities and writing histories, the cultures of central and northern Europe \u2014 from the \u00dan\u011btice culture of Bohemia to the Atlantic Bronze Age of Britain and Ireland \u2014 were producing sophisticated metalwork, building astronomical monuments, and trading amber, tin, and bronze across vast networks. Their art survives almost entirely in metal: weapons, vessels, and ritual objects of extraordinary technical accomplishment, made by people whose names and languages are unknown."}, "burmese": {"id": "burmese", "name": "Burmese", "parentRegionId": "southeast-asia", "blurb": "Pagan-era stupas, gilded Buddha sculpture, and one of the great lacquerware traditions."}, "canadian": {"id": "canadian", "name": "Canadian", "parentRegionId": "modern-americas", "blurb": "Group of Seven landscape painting, Inuit printmaking, contemporary First Nations and M\u00e9tis art."}, "caribbean": {"id": "caribbean", "name": "Caribbean", "parentRegionId": "modern-americas", "blurb": "Cuban, Haitian, Jamaican, Trinidadian, Puerto Rican traditions \u2014 often overlooked, deeply important to global modernism."}, "chinese": {"id": "chinese", "name": "Chinese", "parentRegionId": "east-asia", "blurb": "Three thousand years of brush, ink, and porcelain. The original East Asian tradition that the others responded to."}, "contemporary-african": {"id": "contemporary-african", "name": "Contemporary African", "parentRegionId": "sub-saharan-africa", "blurb": "Since 1960s independence, a generation of artists \u2014 El Anatsui, Yinka Shonibare, Wangechi Mutu \u2014 has taken the global stage."}, "dong-son": {"id": "dong-son", "name": "\u0110\u00f4ng S\u01a1n", "regionId": "southeast-asia", "blurb": "The Bronze Age culture of the Red River Delta, Vietnam, ~600 BCE\u2013100 CE.", "longForm": "The \u0110\u00f4ng S\u01a1n culture (600 BCE\u2013100 CE) flourished in the Red River Delta of northern Vietnam and was the dominant Bronze Age civilization of mainland Southeast Asia. Their bronze drums \u2014 cast by lost-wax technique, decorated with elaborate geometric and figurative scenes \u2014 were traded across an enormous area from Yunnan to Java to New Guinea, becoming the most widely distributed prestige objects of ancient Southeast Asia. The drums depict houses on stilts, boats with warriors, ceremonial dancers, and birds, providing the most detailed visual record of Bronze Age Southeast Asian society."}, "dutch": {"id": "dutch", "name": "Dutch", "parentRegionId": "europe", "blurb": "After Dutch independence in 1648, a small Protestant republic invents the modern art market and produces Rembrandt and Vermeer."}, "east-asia-prehistoric": {"id": "east-asia-prehistoric", "name": "Prehistoric East Asia"
