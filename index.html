let currentLesson = null;
let currentCardIndex = 0;
let correctCount = 0;
let incorrectCount = 0;

/**
 * Start a lesson. Renders into a full-screen shell.
 * Called by app.js's startLesson wrapper; views should call that, not this.
 */
function startLessonImpl(lessonId) {
  currentLesson = getLesson(lessonId);
  if (!currentLesson) {
    alert('Lesson not found: ' + lessonId);
    return;
  }
  currentCardIndex = 0;
  correctCount = 0;
  incorrectCount = 0;
  tickStreak();
  renderShell();
  renderCurrentCard();
}

function renderShell() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="lesson-shell">
      <div class="lesson-progress-bar">
        <div class="lesson-progress-bar__fill" id="lesson-progress-fill" style="width: 0%"></div>
      </div>
      <header class="lesson-header">
        <button class="lesson-close" id="lesson-close" aria-label="Close lesson">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
        <span class="lesson-step" id="lesson-step"></span>
        <div style="width: 36px;"></div>
      </header>
      <main class="lesson-body" id="lesson-body"></main>
      <footer class="lesson-footer" id="lesson-footer"></footer>
    </div>
  `;
  document.getElementById('lesson-close').addEventListener('click', () => {
    if (confirm('Leave this lesson? Your progress will be lost.')) navigate('today');
  });
}

function renderCurrentCard() {
  const card = currentLesson.cards[currentCardIndex];
  if (!card) {
    finishLesson();
    return;
  }
  // Update progress bar and step indicator
  const progress = ((currentCardIndex) / currentLesson.cards.length) * 100;
  document.getElementById('lesson-progress-fill').style.width = progress + '%';
  document.getElementById('lesson-step').textContent =
    `${currentCardIndex + 1} of ${currentLesson.cards.length}`;

  const body = document.getElementById('lesson-body');
  const footer = document.getElementById('lesson-footer');
  body.innerHTML = '';
  footer.innerHTML = '';

  switch (card.type) {
    case 'context':       renderContextCard(card, body, footer); break;
    case 'wall-label':    renderWallLabelCard(card, body, footer); break;
    case 'quiz-artist':   renderArtistQuiz(card, body, footer); break;
    case 'quiz-movement': renderMovementQuiz(card, body, footer); break;
    case 'quiz-date':     renderDateQuiz(card, body, footer); break;
    case 'quiz-before-after': renderBeforeAfterQuiz(card, body, footer); break;
    case 'reward':        renderReward(body, footer); break;
    default:
      body.innerHTML = `<p>Unknown card type: ${card.type}</p>`;
      renderContinueButton(footer);
  }
}

function advance() {
  currentCardIndex += 1;
  renderCurrentCard();
}

/* ===== CARD RENDERERS ===== */

// 1. CONTEXT CARD: pure historical prose, no quiz.
function renderContextCard(card, body, footer) {
  body.innerHTML = `
    <div class="lesson-card-title">${card.title}</div>
    <div class="lesson-card-meta">Historical context</div>
    <div class="lesson-card-body">${card.body}</div>
  `;

}

// 2. WALL LABEL: artwork image with description, like a museum wall.
function renderWallLabelCard(card, body, footer) {
  const art = getArtwork(card.artworkId);
  if (!art) return;
  markEncountered(art.id);

  const artist = art.artistId ? getArtist(art.artistId) : null;
  const artistLine = artist
    ? `${artist.name} <span class="year">${formatYear(art.year)}</span>`
    : `<span class="year">${formatYear(art.year)}</span>`;

  body.innerHTML = `
    <img class="lesson-card-image" src="${art.image || buildPlacard(art)}" data-placard="${buildPlacard(art)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" data-met-id="${art.metObjectId || ''}" alt="${art.title}" />

// 3. ARTIST QUIZ: image + 4 artist names, pick the painter.
function renderArtistQuiz(card, body, footer) {
  const art = getArtwork(card.artworkId);

  body.innerHTML = `

      }).join('')}
    </div>
    <div id="quiz-feedback"></div>

  bindQuizOptions({
    artworkId: art.id,

function renderMovementQuiz(card, body, footer) {

// 5. DATE QUIZ: drag a slider to guess the year.
function renderDateQuiz(card, body, footer) {
  const art = getArtwork(card.artworkId);
  if (!art) return;
  const midYear = Math.round((card.rangeStart + card.rangeEnd) / 2);

  body.innerHTML = `
    <img class="lesson-card-image lesson-card-image--quiz" src="${art.image || buildPlacard(art)}" data-placard="${buildPlacard(art)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" data-met-id="${art.metObjectId || ''}" alt="" />

  rangeEl.addEventListener('input', () => { valEl.textContent = rangeEl.value; });

  // Submit button
  footer.innerHTML = `<button class="btn btn--primary btn--full btn--lg" id="submit-date">Confirm guess</button>`;
  document.getElementById('submit-date').addEventListener('click', () => {
    const guess = parseInt(rangeEl.value, 10);
    const diff = Math.abs(guess - card.correctYear);
    rangeEl.disabled = true;
    const isClose = diff <= 25;
    if (isClose) {
      correctCount++;
      markMastered(art.id);
    } else {
      incorrectCount++;
    }
    const feedback = document.getElementById('quiz-feedback');
    feedback.className = 'lesson-feedback' + (isClose ? '' : ' is-incorrect');
    feedback.innerHTML = `
      <span class="lesson-feedback__label">${isClose ? 'Within 25 years' : 'Off by ' + diff + ' years'}</span>
      <strong>${art.title}</strong> was painted in ${formatYear(card.correctYear)}.
    `;
    renderContinueButton(footer, 'Continue');
  });
}

// 6. BEFORE / AFTER: two artworks, which came first?
function renderBeforeAfterQuiz(card, body, footer) {
  const earlier = getArtwork(card.earlierArtworkId);
  const later = getArtwork(card.laterArtworkId);
  if (!earlier || !later) return;
  // Randomly position them
  const swap = Math.random() < 0.5;
  const left = swap ? later : earlier;
  const right = swap ? earlier : later;

  body.innerHTML = `
    <div class="lesson-question">Which came first?</div>
    <div class="before-after-grid">
      <button class="before-after-option" data-id="${left.id}">
        <img src="${left.image || buildPlacard(left)}" data-placard="${buildPlacard(left)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" data-met-id="${left.metObjectId || ''}" alt="" />
        <div class="before-after-option__caption">${left.title}</div>
      </button>
      <button class="before-after-option" data-id="${right.id}">
        <img src="${right.image || buildPlacard(right)}" data-placard="${buildPlacard(right)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" data-met-id="${right.metObjectId || ''}" alt="" />
        <div class="before-after-option__caption">${right.title}</div>
      </button>
    </div>
    <div id="quiz-feedback"></div>
  `;
  body.querySelectorAll('.before-after-option').forEach(btn => {
    btn.addEventListener('click', () => {
      const guess = btn.dataset.id;
      const isCorrect = guess === earlier.id;
      // Reveal answers
      body.querySelectorAll('.before-after-option').forEach(b => {
        b.disabled = true;
        if (b.dataset.id === earlier.id) b.classList.add('is-correct');
        else if (b === btn) b.classList.add('is-incorrect');
      });
      if (isCorrect) {
        correctCount++;
        markMastered(earlier.id);
      } else {
        incorrectCount++;
      }
      const feedback = document.getElementById('quiz-feedback');
      feedback.className = 'lesson-feedback' + (isCorrect ? '' : ' is-incorrect');
      feedback.innerHTML = `
        <span class="lesson-feedback__label">${isCorrect ? 'Correct' : 'Other way around'}</span>
        <strong>${earlier.title}</strong> (${formatYear(earlier.year)}) came before <strong>${later.title}</strong> (${formatYear(later.year)}).
      `;
      renderContinueButton(footer, 'Continue');
    });
  });
}

function showSeenInPersonPrompt(artworkId) {

  const v = choice.toLowerCase().trim();
  if (['yes', 'no', 'maybe'].includes(v)) {
    setSeenInPerson(artworkId, v);
  }
}

function shuffle(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function countNewArtworks() {
  // Count artworks referenced in this lesson
  const ids = new Set();
  for (const card of currentLesson.cards) {
    if (card.artworkId) ids.add(card.artworkId);
    if (card.earlierArtworkId) ids.add(card.earlierArtworkId);
    if (card.laterArtworkId) ids.add(card.laterArtworkId);
  }
  return ids.size;
}

function formatYear(year) {
  if (year < 0) return `${Math.abs(year)} BCE`;
  return year;
}

/* ===== HELPERS ===== */

function pickCardOfTheDay() {
  // Pick a stable random per day, deterministic so it doesn't flicker.
  const artworks = getAllArtworks();
  if (artworks.length === 0) return null;
  const today = new Date();
  const dayKey = today.getFullYear() * 1000 + dayOfYear(today);
  const idx = dayKey % artworks.length;
  return artworks[idx];
}

function dayOfYear(d) {
  const start = new Date(d.getFullYear(), 0, 0);
  const diff = d - start;
  return Math.floor(diff / (1000 * 60 * 60 * 24));
}

function timeOfDayGreeting() {
  const h = new Date().getHours();
  if (h < 5) return 'evening';
  if (h < 12) return 'morning';
  if (h < 17) return 'afternoon';
  return 'evening';
}

function formatDate() {
  return new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric',
  });
}

function streakCaption(days) {
  if (days === 0) return 'Begin a streak today.';
  if (days < 3) return 'A quiet start.';
  if (days < 7) return 'Building momentum.';
  if (days < 30) return 'A real practice now.';
  return 'A serious accession.';
}

function formatYear(year) {
  if (!year && year !== 0) return '';
  if (year < 0) return `${Math.abs(year)} BCE`;
  return year;
}

/**
 * Render a constellation of nodes by movement, all artworks visible.
 * Faint = unencountered, lit = mastered, gold = seen-in-person + mastered.
 */
function renderConstellation(container) {
  const artworks = getAllArtworks();
  const movements = [...new Set(artworks.map(a => a.movementId))];

  // We arrange artworks in rings, one per movement, around a center.
  // Simple radial layout that works without computing collisions.
  const w = 360;
  const h = 480;
  const cx = w / 2;
  const cy = h / 2;

  // Pre-compute positions
  const positions = [];
  movements.forEach((movId, mIdx) => {
    const ringRadius = 70 + mIdx * 30;
    const movArtworks = artworks.filter(a => a.movementId === movId);
    const angleStep = (Math.PI * 2) / movArtworks.length;
    const angleOffset = mIdx * 0.4; // Stagger so rings don't line up
    movArtworks.forEach((art, i) => {
      const angle = angleStep * i + angleOffset;
      positions.push({
        id: art.id,
        title: art.title,
        x: cx + Math.cos(angle) * ringRadius,
        y: cy + Math.sin(angle) * ringRadius,
        movementId: movId,
        state: getNodeState(art.id),
      });
    });
  });

  // Edges connect each artwork to its movement's center node
  // (we'll place a movement center on its ring's "top")
  const movementCenters = movements.map((movId, mIdx) => {
    const ringRadius = 70 + mIdx * 30;
    return {
      id: movId,
      x: cx + Math.cos(-Math.PI / 2 + mIdx * 0.4) * (ringRadius - 20),
      y: cy + Math.sin(-Math.PI / 2 + mIdx * 0.4) * (ringRadius - 20),
      movement: getMovement(movId),
    };
  });

  const svgEdges = positions.map(p => {
    const center = movementCenters.find(c => c.id === p.movementId);
    if (!center) return '';
    const stateOpacity = p.state === 'unencountered' ? '0.06' : p.state === 'faint' ? '0.15' : '0.3';
    return `<line x1="${center.x}" y1="${center.y}" x2="${p.x}" y2="${p.y}" stroke="var(--color-sepia)" stroke-width="0.5" opacity="${stateOpacity}" />`;
  }).join('');

  const svgMovementNodes = movementCenters.map(c => `
    <circle cx="${c.x}" cy="${c.y}" r="6" fill="${c.movement?.color || 'var(--color-sepia)'}" opacity="0.7" />
    <text x="${c.x}" y="${c.y - 12}" font-family="Inter" font-size="8" fill="var(--color-sepia)" text-anchor="middle" letter-spacing="0.06em" text-transform="uppercase">${c.movement?.shortName || ''}</text>
  `).join('');

  const svgNodes = positions.map(p => {
    let color = 'var(--color-sepia)';
    let r = 3;
    if (p.state === 'lit') { color = 'var(--color-burgundy)'; r = 4; }
    if (p.state === 'gold') { color = 'var(--color-gold)'; r = 5; }
    const opacity = p.state === 'unencountered' ? '0.2' : p.state === 'faint' ? '0.45' : '1';
    return `
      <g class="constellation-node" data-state="${p.state}">
        <circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${color}" opacity="${opacity}">
          <title>${p.title}</title>
        </circle>
        ${p.state === 'gold' ? `<circle cx="${p.x}" cy="${p.y}" r="${r + 3}" fill="none" stroke="var(--color-gold)" stroke-width="0.5" opacity="0.4"/>` : ''}
      </g>
    `;
  }).join('');

  container.innerHTML = `
    <div class="card" style="padding: 0; overflow: hidden;">
      <svg class="constellation-svg" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
        ${svgEdges}
        ${svgMovementNodes}
        ${svgNodes}
      </svg>
    </div>
    <div style="padding: var(--space-4); text-align: center; font-family: var(--font-serif); font-style: italic; color: var(--color-sepia); font-size: var(--type-body-s);">
      Faint nodes await your encounter. Burgundy means mastered. Gold means you have stood in front of them.
    </div>
  `;
}

/**
 * Grid view: every artwork as a square tile.
 */
function renderGrid(container) {
  const artworks = getAllArtworks();
  const state = getState();

  container.innerHTML = `
    <div class="collection-grid">
      ${artworks.map(art => {
        const s = state.artworkState[art.id];
        const encountered = s && s.encountered;
        return `
          <div class="collection-tile ${encountered ? '' : 'is-faint'}">
            <img src="${art.image || buildPlacard(art)}" data-placard="${buildPlacard(art)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" data-met-id="${art.metObjectId || ''}" alt="${art.title}" />
            <div class="collection-tile__caption">${art.title}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

let avatarTapCount = 0;
let avatarTapTimer = null;

function renderProfile() {
  const app = document.getElementById('app');

  const sync = syncStatus();

  app.innerHTML = `

          ${(state.displayName || 'A').charAt(0).toUpperCase()}

        <p style="font-size: var(--type-body-m); margin-bottom: var(--space-3);">
          ${state.partnerName ? `Connected with <strong>${state.partnerName}</strong>` : 'Not paired with anyone yet.'}
        </p>
        ${sync.configured ? `
          <div style="display: flex; gap: var(--space-2);">
            <button class="btn btn--secondary" id="pair-btn" style="flex: 1;">
              ${state.partnerName ? 'Change partner code' : 'Pair with Brandon'}
            </button>
          </div>
          <p style="margin-top: var(--space-3); font-size: var(--type-body-s); color: var(--color-sepia);">
            Your code: <strong style="font-family: monospace;">${state.userId}</strong>
          </p>
        ` : `
          <p style="font-size: var(--type-body-s); color: var(--color-sepia);">

          </p>
        `}
      </div>

      <h3 class="today-section__title"><span>Settings</span></h3>
      <div class="card" style="margin-bottom: var(--space-6);">
        <div style="display: flex; flex-direction: column; gap: var(--space-3);">

          </button>

          ${state.authorModeUnlocked ? `

          ` : ''}

        </button>
      </div>

  document.getElementById('profile-avatar').addEventListener('click', () => {
    avatarTapCount += 1;
    clearTimeout(avatarTapTimer);
    avatarTapTimer = setTimeout(() => { avatarTapCount = 0; }, 1500);
    if (avatarTapCount >= 5) {
      avatarTapCount = 0;
      updateState({ authorModeUnlocked: true });

      renderProfile();

function renderRankRow(movement) {
  const rank = getCuratorRank(movement.id);
  const nextThreshold = rank < 4 ? [0.2, 0.4, 0.7, 1.0][rank] : 1;
  const prevThreshold = rank > 0 ? [0, 0.2, 0.4, 0.7][rank] : 0;
  // Compute progress towards next rank
  // We need mastery percent to display, but rank derives it; just visualize current rank.
  const pct = (rank / 4) * 100;
  return `
    <div class="rank-row">
      <div class="rank-row__name">
        <div class="rank-row__movement" style="color: ${movement.color || 'var(--color-ink)'}">${movement.shortName}</div>
        <div class="rank-row__rank">${RANK_NAMES[rank]}</div>
      </div>
      <div class="rank-row__progress">
        <div class="rank-row__progress-fill" style="width: ${pct}%; background: ${movement.color || 'var(--color-burgundy)'}"></div>
      </div>
    </div>
  `;
}


/* ========== js/views/onboarding.js ========== */

/* ============================================================
   ACCESSION - ONBOARDING
   Three steps:
   1. Intro / name
   2. Museum checklist (which of the big ones have you visited?)
   3. Walkthrough: sweep through artworks marking seen/not/maybe.
   ============================================================ */





// Museum list — based on what the user has visited per memory.
const MUSEUMS_TO_ASK = [
  { id: 'met', name: 'The Met (New York)' },
  { id: 'moma', name: 'MoMA (New York)' },
  { id: 'whitney', name: 'Whitney (New York)' },
  { id: 'frick', name: 'The Frick (New York)' },
  { id: 'neue-galerie', name: 'Neue Galerie (New York)' },
  { id: 'nga-dc', name: 'National Gallery of Art (Washington DC)' },
  { id: 'aic', name: 'Art Institute of Chicago' },
  { id: 'dma', name: 'Dallas Museum of Art' },
  { id: 'national-gallery-london', name: 'National Gallery (London)' },
  { id: 'tokyo-national', name: 'Tokyo National Museum' },
  { id: 'national-western-tokyo', name: 'National Museum of Western Art (Tokyo)' },
];

let step = 'intro';
let walkthroughIndex = 0;
let walkthroughQueue = [];

function renderOnboarding() {
  const state = getState();
  // Resume at the right step
  if (!state.displayName) step = 'intro';
  else if (!state.hasCompletedIntro) step = 'museums';
  else if (!state.hasCompletedWalkthrough) step = 'walkthrough';
  else { navigate('today'); return; }

  if (step === 'intro') renderIntroStep();
  else if (step === 'museums') renderMuseumsStep();
  else if (step === 'walkthrough') renderWalkthroughStep();
}

function renderIntroStep() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="onboarding">
      <div class="onboarding__intro">
        <div class="onboarding__title">Accession</div>
        <div class="onboarding__subtitle">A slow, careful tour through the history of art</div>
      </div>
      <div class="onboarding__body">
        <p style="text-align: center; margin: var(--space-8) auto; max-width: 320px;">
          The plan is simple. Each day, you spend a few minutes with a handful of artworks.
          Over weeks, you build a sense of when, where, and by whom — so that when you next
          walk into a museum, the labels feel like footnotes.
        </p>
        <div style="margin-top: var(--space-8);">
          <label class="eyebrow" style="display: block; margin-bottom: var(--space-2);">Your name</label>
          <input
            type="text"
            id="name-input"
            placeholder="Hunter"
            style="width: 100%; padding: var(--space-4); border: 1.5px solid var(--color-line-strong); border-radius: var(--radius-md); font-family: var(--font-serif); font-size: var(--type-body-l); background: var(--color-paper-light); color: var(--color-ink);"
          />
        </div>
      </div>
      <div class="onboarding__footer">
        <button class="btn btn--primary btn--full btn--lg" id="next-btn">Begin</button>
      </div>
    </div>
  `;
  const input = document.getElementById('name-input');
  input.focus();
  document.getElementById('next-btn').addEventListener('click', () => {
    const name = input.value.trim();
    if (!name) {
      input.focus();
      return;
    }
    updateState({ displayName: name, hasCompletedIntro: true });
    step = 'museums';
    renderMuseumsStep();
  });
}

function renderMuseumsStep() {
  const app = document.getElementById('app');
  const state = getState();
  app.innerHTML = `
    <div class="onboarding">
      <div style="margin-bottom: var(--space-5); padding-top: var(--space-6);">
        <div class="eyebrow" style="margin-bottom: var(--space-2);">Step 1 of 2</div>
        <h1 style="font-size: var(--type-display-l); margin-bottom: var(--space-2);">Which museums have you visited?</h1>
        <p style="font-size: var(--type-body-m);">We will use this to help you remember works you have already stood in front of.</p>
      </div>
      <div class="onboarding__body">
        <div class="museum-checklist" id="museum-checklist">
          ${MUSEUMS_TO_ASK.map(m => `
            <div class="museum-checkbox ${state.visitedMuseums.includes(m.id) ? 'is-checked' : ''}" data-museum-id="${m.id}">
              <div class="museum-checkbox__box"></div>
              <div class="museum-checkbox__name">${m.name}</div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="onboarding__footer">
        <button class="btn btn--primary btn--full btn--lg" id="continue-btn">Continue</button>
      </div>
    </div>
  `;
  app.querySelectorAll('.museum-checkbox').forEach(box => {
    box.addEventListener('click', () => {
      const id = box.dataset.museumId;
      const visited = getState().visitedMuseums;
      const isChecked = visited.includes(id);
      updateState(s => {
        s.visitedMuseums = isChecked
          ? s.visitedMuseums.filter(x => x !== id)
          : [...s.visitedMuseums, id];
      });
      box.classList.toggle('is-checked');
    });
  });
  document.getElementById('continue-btn').addEventListener('click', () => {
    step = 'walkthrough';
    renderWalkthroughStep();
  });
}

function renderWalkthroughStep() {
  const app = document.getElementById('app');
  const state = getState();
  // Build the queue: every artwork from movements that touch visited museums,
  // starting with the Met (since our MVP is Met-anchored).
  if (walkthroughQueue.length === 0) {
    walkthroughQueue = getAllArtworks().slice();
    walkthroughIndex = 0;
  }
  const art = walkthroughQueue[walkthroughIndex];
  if (!art) {
    finishWalkthrough();
    return;
  }
  const artist = art.artistId ? getArtist(art.artistId) : null;
  const movement = getMovement(art.movementId);
  markEncountered(art.id);

  const progressPct = ((walkthroughIndex + 1) / walkthroughQueue.length) * 100;

  app.innerHTML = `
    <div class="onboarding">
      <div style="margin-bottom: var(--space-4); padding-top: var(--space-2);">
        <div class="lesson-progress-bar" style="margin-bottom: var(--space-4);">
          <div class="lesson-progress-bar__fill" style="width: ${progressPct}%"></div>
        </div>
        <div class="eyebrow" style="margin-bottom: var(--space-2);">Step 2 of 2 · ${walkthroughIndex + 1} of ${walkthroughQueue.length}</div>
        <h1 style="font-size: var(--type-display-m); margin-bottom: 0;">Seen this one?</h1>
        <p style="font-size: var(--type-body-s); margin: var(--space-1) 0 0;">Tap once for each work. Quick and approximate is fine.</p>
      </div>
      <div class="onboarding__body">
        <div class="walkthrough-card">
          <img class="walkthrough-card__image" src="${art.image || buildPlacard(art)}" data-placard="${buildPlacard(art)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" data-met-id="${art.metObjectId || ''}" alt="${art.title}" />
          <div class="walkthrough-card__body">
            <h2 class="walkthrough-question" style="font-size: var(--type-display-m);">${art.title}</h2>
            <div class="walkthrough-meta">${artist ? artist.shortName + ' · ' : ''}${formatYear(art.year)} · ${movement?.shortName || ''}</div>
            <div class="walkthrough-choices">
              <button class="walkthrough-choice" data-value="yes">
                <span class="walkthrough-choice__icon">✓</span>
                Yes
              </button>
              <button class="walkthrough-choice" data-value="maybe">
                <span class="walkthrough-choice__icon">?</span>
                Maybe
              </button>
              <button class="walkthrough-choice" data-value="no">
                <span class="walkthrough-choice__icon">·</span>
                No
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="onboarding__footer">
        <button class="btn btn--secondary btn--full" id="skip-btn">Skip rest</button>
      </div>
    </div>
  `;

  app.querySelectorAll('.walkthrough-choice').forEach(btn => {
    btn.addEventListener('click', () => {
      setSeenInPerson(art.id, btn.dataset.value);
      walkthroughIndex += 1;
      renderWalkthroughStep();
    });
  });
  document.getElementById('skip-btn').addEventListener('click', () => {
    if (confirm('Skip the rest of the walkthrough? You can redo it from your profile any time.')) {
      finishWalkthrough();
    }
  });
}

function finishWalkthrough() {
  updateState({ hasCompletedWalkthrough: true });
  walkthroughQueue = [];
  walkthroughIndex = 0;
  navigate('today');
}

function formatYear(year) {
  if (!year && year !== 0) return '';
  if (year < 0) return `${Math.abs(year)} BCE`;
  return year;
}


/* ========== js/app.js ========== */

/* ============================================================
   ACCESSION - APP ENTRY
   Boots the app, loads content, routes between views.
   ============================================================ */











/**
 * Find all <img data-met-id="..."> elements on the page and resolve their
 * canonical Met image URLs. Called automatically after every render.
 */
function hydrateAllMetImages() {
  document.querySelectorAll('img[data-met-id]').forEach(img => {
    const metId = img.getAttribute('data-met-id');
    if (metId && metId !== 'null') hydrateMetImage(img, metId);
  });
}

// Currently rendered view ID, used to highlight the tab.
let currentView = null;

/**
 * Navigate to a named view. Renders the view and updates the tab bar.
 */
function navigate(view) {
  currentView = view;

  switch (view) {
    case 'today':       renderToday(); break;
    case 'learn':       renderLearn(); break;
    case 'collection':  renderCollection(); break;
    case 'profile':     renderProfile(); break;
    case 'onboarding':  renderOnboarding(); break;
    default:            renderToday();
  }

  // The tab bar lives outside the #app, so we render it once and update its active state.
  renderTabBar();
  // Hydrate any Met images on the page
  hydrateAllMetImages();
  // Scroll to top on navigation
  window.scrollTo(0, 0);
}

/**
 * Start a lesson by ID. Exposed from app.js so views can call it without
 * importing the engine directly (cleaner dependency graph).
 */
function startLesson(lessonId) {
  currentView = 'lesson';
  startLessonImpl(lessonId);
  renderTabBar(); // Hide tab bar during lesson
}

/**
 * Render the bottom tab bar. Hidden during lessons and onboarding.
 */
function renderTabBar() {
  let bar = document.getElementById('tab-bar');
  const showBar = ['today', 'learn', 'collection', 'profile'].includes(currentView);

  if (!showBar) {
    if (bar) bar.remove();
    return;
  }

  const html = `
    <nav class="tab-bar" id="tab-bar" role="tablist">
      ${tabItem('today', 'Today', tabIcon('today'))}
      ${tabItem('learn', 'Learn', tabIcon('learn'))}
      ${tabItem('collection', 'Collection', tabIcon('collection'))}
      ${tabItem('profile', 'Profile', tabIcon('profile'))}
    </nav>
  `;

  if (!bar) {
    document.body.insertAdjacentHTML('beforeend', html);
    bar = document.getElementById('tab-bar');
    // Wire up clicks once
    bar.querySelectorAll('.tab-bar__item').forEach(btn => {
      btn.addEventListener('click', () => navigate(btn.dataset.view));
    });
  } else {
    // Just update active state
    bar.querySelectorAll('.tab-bar__item').forEach(btn => {
      btn.classList.toggle('is-active', btn.dataset.view === currentView);
    });
  }
}

function tabItem(id, label, iconSvg) {
  return `
    <button class="tab-bar__item ${currentView === id ? 'is-active' : ''}" data-view="${id}" role="tab" aria-label="${label}">
      ${iconSvg}
      <span>${label}</span>
    </button>
  `;
}

/**
 * Inline SVG icons for the tab bar.
 * Drawn fresh rather than imported to keep the bundle tiny.
 */
function tabIcon(name) {
  const stroke = `class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"`;
  switch (name) {
    case 'today':
      // Sunrise / horizon glyph
      return `<svg ${stroke}><path d="M3 18h18M5 14l7-7 7 7M9 18v-3M15 18v-3"/></svg>`;
    case 'learn':
      // Open book glyph
      return `<svg ${stroke}><path d="M4 5v14a2 2 0 002 2h5V7a2 2 0 00-2-2H4zM20 5v14a2 2 0 01-2 2h-5V7a2 2 0 012-2h5z"/></svg>`;
    case 'collection':
      // Constellation: three dots with connecting lines
      return `<svg ${stroke}><circle cx="6" cy="7" r="1.5"/><circle cx="18" cy="9" r="1.5"/><circle cx="12" cy="17" r="1.5"/><path d="M7 8l10 1M17 10l-5 6M7 8l5 9"/></svg>`;
    case 'profile':
      // Simple person glyph
      return `<svg ${stroke}><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>`;
    default:
      return '';
  }
}

/**
 * Decide what to show on first load.
 * - Brand-new user: onboarding.
 * - Returning user: today.
 */
function decideStartView() {
  const state = getState();
  if (!state.hasCompletedIntro || !state.hasCompletedWalkthrough) {
    return 'onboarding';
  }
  return 'today';
}

/* ===== BOOT SEQUENCE ===== */
async function boot() {
  // 1. Load persisted state from localStorage
  loadState();
  // 2. Load all bundled content (small JSON files)
  await loadContent();
  // 3. Initialize sync (fires & forgets — works without it)
  initSync().catch(err => console.warn('Sync init error:', err));
  // 4. Route to first view
  navigate(decideStartView());
}

// Kick off when the DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}

})();
</script>
