ay to the smooth, symmetrical, narratively explicit aesthetic of the Yayoi. The fire-flame vessels disappeared. The dog\u016b disappeared. In their place: bronze bells with scenes of daily life. The oldest known narrative images in Japan show people pounding rice."}, {"type": "wall-label", "artworkId": "jomon-goggle-dogu"}, {"type": "wall-label", "artworkId": "yayoi-dotaku-bell"}, {"type": "comparison", "title": "Goggle-eyed dog\u016b and d\u014dtaku: the J\u014dmon and Yayoi visual worlds", "artworkIds": ["jomon-goggle-dogu", "yayoi-dotaku-bell"], "body": "The goggle-eyed dog\u016b: clay, dense surface pattern, supernatural eyes, female body, ritual purpose unknown, found broken in domestic contexts. The d\u014dtaku: bronze, geometric surface pattern, bell shape that doesn't ring, agricultural iconography, communal ritual use, found buried intact in hilltop groups. Every contrast holds. Where the dog\u016b speaks of the body, the supernatural, and mystery, the d\u014dtaku speaks of the community, the land, and the harvest. Where the dog\u016b was made by and for individuals (or small groups), the d\u014dtaku was communally owned. Where the dog\u016b's meaning is opaque after 10,000 years of accumulation, the d\u014dtaku's narrative panels \u2014 deer, herons, granaries, rice-pounding \u2014 are among the most legible images in prehistoric Japan. The transition from J\u014dmon to Yayoi is the transition from mystery to narrative."}, {"type": "wall-label", "artworkId": "jomon-flame-vessel"}, {"type": "quiz-before-after", "earlierArtworkId": "jomon-venus", "laterArtworkId": "yayoi-dotaku-bell"}, {"type": "reward"}]}, "maya-sacred-medieval-01": {"id": "maya-sacred-medieval-01", "eraId": "sacred-medieval", "regionId": "americas", "title": "The Maya Classic: A Civilization in Image and Text", "subtitle": "The most intellectually sophisticated visual culture in the ancient Americas \u2014 and what it tells us about how the Maya understood death", "estimatedMinutes": 8, "cards": [{"type": "context", "title": "Reading the Maya", "body": "The Classic Maya period (250\u2013900 CE) produced a fully deciphered writing system, a precise 365-day solar calendar, an accurate 584-day Venus cycle, long-count dates extending millions of years into the past and future, and a visual art so iconographically dense that almost every element carries a specific, documented meaning. The Maya were not the mysterious, unknowable people of popular imagination \u2014 they are one of the best-documented ancient civilizations on earth, because they wrote everything down and we can now read it. What the texts and images tell us: a civilization organized around the king as cosmic axis, the underworld as the engine of rebirth, and jade as the material of transformation. Death was not an ending. It was a descent that preceded a rising."}, {"type": "wall-label", "artworkId": "pakal-sarcophagus-lid"}, {"type": "wall-label", "artworkId": "maya-jade-death-mask"}, {"type": "comparison", "title": "Sarcophagus lid and jade mask: descent and transformation", "artworkIds": ["pakal-sarcophagus-lid", "maya-jade-death-mask"], "body": "The sarcophagus lid shows the king in motion \u2014 falling, transforming, descending. The jade mask shows the king in stasis \u2014 a face made permanent in stone, eyes that still seem to see. Together they represent the two aspects of Maya royal death: the narrative (the cosmological journey) and the material (the body transformed into jade, green and immortal). Both objects were hidden in the same tomb, never meant to be seen after burial. They weren't made for the living \u2014 they were made for the king's journey, and for the gods who would witness it."}, {"type": "wall-label", "artworkId": "met-maya-vessel"}, {"type": "wall-label", "artworkId": "met-maya-stela"}, {"type": "comparison", "title": "Vessel and stela: private ritual and public declaration", "artworkIds": ["met-maya-vessel", "met-maya-stela"], "body": "The cylinder vessel was a private object \u2014 used in feasts, buried with the dead, circulated among elites. Its painted scenes show lords and attendants in ritual contexts, legible to those who knew the iconographic system. The stela was public: a carved stone monument erected in a plaza where the whole city could see it, declaring the ruler's name, dates, titles, and connection to the gods. The Maya elite operated simultaneously in these two registers \u2014 the intimate ritual object and the civic monument \u2014 each encoding the same ideology of divine kingship in different formats for different audiences."}, {"type": "quiz-region", "artworkId": "pakal-sarcophagus-lid", "correctRegionId": "americas", "distractorRegionIds": ["south-asia", "middle-east-north-africa", "east-asia"]}, {"type": "reward"}]}, "mesopotamian-ancient-01": {"id": "mesopotamian-ancient-01", "eraId": "ancient-worlds", "regionId": "middle-east-north-africa", "subRegionId": "mesopotamian", "title": "The First Cities", "subtitle": "Sumer, Akkad, Babylon \u2014 what the first urban civilization looked like", "estimatedMinutes": 6, "cards": [{"type": "context", "title": "Between Two Rivers", "body": "Mesopotamia means 'land between the rivers' \u2014 the Tigris and Euphrates, whose annual floods deposited the fertile silt that made southern Iraq, in the 4th millennium BCE, one of the few places on Earth where the food surplus for urban civilization was possible. The Sumerians built the first cities: Uruk, Ur, Nippur, Lagash. They invented writing \u2014 initially to keep grain accounts. They built ziggurats, developed legal codes, and created the first sustained tradition of large-scale sculpture. Every subsequent Mesopotamian civilization \u2014 Akkadian, Babylonian, Assyrian \u2014 inherited and transformed their cultural forms over three thousand years."}, {"type": "wall-label", "artworkId": "british-ram-thicket"}, {"type": "quiz-region", "artworkId": "british-ram-thicket", "correctRegionId": "middle-east-north-africa", "distractorRegionIds": ["east-asia", "americas", "south-asia"]}, {"type": "wall-label", "artworkId": "met-standard-of-ur"}, {"type": "wall-label", "artworkId": "louvre-naram-sin-stele"}, {"type": "comparison", "title": "Power in three objects from the same city", "artworkIds": ["british-ram-thicket", "met-standard-of-ur", "louvre-naram-sin-stele"], "body": "The Ram in a Thicket, the Standard of Ur, and the Victory Stele of Naram-Sin all speak to power \u2014 but differently. The Ram makes wealth visible: gold, lapis lazuli, and shell brought from hundreds of miles away, assembled into an object so extraordinary it could only belong to a king. The Standard narrates social order: war and peace in horizontal registers, with size indicating hierarchy. The Stele performs divinity: a century after Sumer, the Akkadian king is depicted as a god-king ascending into the heavens, towering over enemies and soldiers alike. Each object is a different answer to the same question: what does supreme power look like?"}, {"type": "quiz-before-after", "earlierArtworkId": "met-standard-of-ur", "laterArtworkId": "louvre-naram-sin-stele"}, {"type": "reward"}]}, "mesopotamian-ancient-02": {"id": "mesopotamian-ancient-02", "eraId": "ancient-worlds", "regionId": "middle-east-north-africa", "title": "The Visual Language of Mesopotamian Power", "subtitle": "From Sumerian cylinder seals to Assyrian colossus to Persian gold \u2014 2,000 years of the same fundamental idea", "estimatedMinutes": 9, "cards": [{"type": "context", "title": "The Oldest Visual Propaganda", "body": "Ancient Mesopotamia invented written law, the city, the wheeled vehicle, and \u2014 arguably \u2014 the idea that images can be instruments of political power. From the Akkadian period (~2300 BCE) through the Assyrian empire (~900\u2013600 BCE) to the Achaemenid Persian empire (~550\u2013330 BCE), the rulers of the ancient Near East used images with extraordinary consistency: the ruler is always larger than everyone else; the king always faces right while enemies face left; supernatural strength is shown through hybrid creatures; and the king's military victories are recorded in stone as permanent testimony. The specific style changes across two millennia. The argument never does."}, {"type": "wall-label", "artworkId": "met-cylinder-seal"}, {"type": "wall-label", "artworkId": "met-gudea-statue"}, {"type": "comparison", "title": "Cylinder seal and Gudea: administrative power and devotional presence", "artworkIds": ["met-cylinder-seal", "met-gudea-statue"], "body": "The cylinder seal (~2400 BCE) is the smallest object in this lesson \u2014 3 centimeters \u2014 and one of the most consequential. Rolled across wet clay, it produced an impression that served simultaneously as a signature, a brand, and a legal instrument. The hunting scene on this seal is a statement of the owner's identity: the heroic hunter is a royal or elite archetype in ancient Mesopotamia. Gudea's statue (~2090 BCE) works at the opposite scale and serves the opposite purpose: not an administrative instrument but a votive offering, a stand-in for Gudea himself in the temple, perpetually praying before the god on the ruler's behalf. Both objects are images of power \u2014 one transactional and intimate, one monumental and eternal."}, {"type": "wall-label", "artworkId": "met-assyrian-lamassu"}, {"type": "wall-label", "artworkId": "met-achaemenid-rhyton"}, {"type": "comparison", "title": "Lamassu and Achaemenid rhyton: the hybrid creature across two empires", "artworkIds": ["met-assyrian-lamassu", "met-achaemenid-rhyton"], "body": "The lamassu from Ashurnasirpal II's palace at Nimrud (~875 BCE) is an apotropaic guardian \u2014 a being that is simultaneously human (intelligence), bull (strength), eagle (freedom) \u2014 placed at palace entrances to ward off evil and announce the supernatural power of the Assyrian king. The Achaemenid rhyton (~400 BCE) is a gold drinking vessel terminating in a lion-griffin: another human-animal hybrid, rendered in precious metal for elite ritual use. Three centuries apart, two different empires, the same visual logic: supernatural power is expressed through hybridization, the combining of the strongest attributes of different beings into a single impossible creature. This is one of the most persistent ideas in Mesopotamian art, running from the earliest Sumerian cylinder seals to the last Achaemenid goldwork."}, {"type": "quiz-date", "artworkId": "met-assyrian-lamassu", "correctYear": -875, "rangeStart": -3000, "rangeEnd": 500}, {"type": "quiz-before-after", "earlierArtworkId": "met-gudea-statue", "laterArtworkId": "met-assyrian-lamassu"}, {"type": "reward"}]}, "mesopotamian-royal-power-comparison": {"id": "mesopotamian-royal-power-comparison", "eraId": "ancient-worlds", "regionId": "middle-east-north-africa", "title": "The Law, the Stele, and the Hunt: How Mesopotamian Kings Ruled in Images", "subtitle": "From Hammurabi's legal code to Ashurbanipal's lion hunt \u2014 the visual rhetoric of ancient Near Eastern power", "estimatedMinutes": 9, "cards": [{"type": "context", "title": "Ruling Through Images", "body": "For more than 2,000 years \u2014 from the Akkadian Empire (~2334 BCE) to the Achaemenid Persian Empire (~550\u2013330 BCE) \u2014 the kings of Mesopotamia and the ancient Near East used art with remarkable consistency as a tool of political argument. The same repertoire recurs: the ruler larger than everyone else; the king facing right while enemies and suppliants face left; supernatural hybrid creatures flanking doorways; military victories depicted as divine-approved massacres; and the king as the sole mediator between the human world and the gods. The specific style changed across civilizations and centuries. The argument never did. What varied was the specific register: Hammurabi's code (~1754 BCE) used law and divine authority; Ashurbanipal's palace reliefs (~640 BCE) used the lion hunt as a metaphor for royal mastery of nature; the Naram-Sin stele (~2250 BCE) used celestial intervention to validate military victory. Each found a different visual form for the same fundamental claim: that the king's power was cosmically ordained and humanly irresistible."}, {"type": "wall-label", "artworkId": "louvre-hammurabi-code"}, {"type": "wall-label", "artworkId": "louvre-naram-sin-stele"}, {"type": "comparison", "title": "Hammurabi's Code and the Naram-Sin Stele: law and conquest as divine argument", "artworkIds": ["louvre-hammurabi-code", "louvre-naram-sin-stele"], "body": "The Stele of Hammurabi (~1754 BCE) is a 2.25-meter black basalt column inscribed with 282 laws covering property, trade, marriage, debt, and criminal punishment. At the top, Hammurabi receives the law from Shamash, the sun god and god of justice \u2014 making the legal code not a human political document but a divine dispensation. The laws themselves are detailed and practical: if a builder builds a house and the house collapses and kills the owner's son, the builder's son shall be put to death. The framing is cosmic but the content is commercial. The Victory Stele of Naram-Sin (~2250 BCE) celebrates the Akkadian king's defeat of the Lullubi people of the Zagros mountains. Naram-Sin is the largest figure, wearing a horned helmet marking divine status \u2014 the first Mesopotamian king to claim divinity in his own lifetime. He strides up the mountain, trampling enemies. A dying enemy reaches up toward him in a gesture of supplication. Gods appear as stars in the sky. Both steles were set up in public places to be read and seen. Both are using the permanent medium of stone to make claims about divine authorization that the king's physical mortality would otherwise undermine."}, {"type": "wall-label", "artworkId": "british-ashurbanipal-hunt"}, {"type": "comparison", "title": "Hammurabi's Code and the lion hunt: legal order and animal conquest as parallel arguments", "artworkIds": ["louvre-hammurabi-code", "british-ashurbanipal-hunt"], "body": "The lion hunt reliefs from Nineveh (~640 BCE), now in the British Museum, show Ashurbanipal \u2014 the last great Assyrian king \u2014 hunting lions from a chariot. The lions are released from cages into an enclosed arena specifically for the royal hunt. This was not sport: it was political theater. In ancient Mesopotamian symbolic vocabulary, the lion was the symbol of untamed natural power. The king who could kill lions demonstrated mastery over nature itself \u2014 the same mastery over chaos that the gods had demonstrated in the creation myth (the Enuma Elish) when they killed the chaos dragon Tiamat to create the world. Hammurabi's code argued that the king brought order through law. Ashurbanipal's lion hunt argued that the king brought order through force. Both are the same argument in different visual registers: the king as the agent through whom cosmic order operates in the human world. The lion hunt reliefs are among the greatest achievements of Assyrian art and among the most affecting works in the British Museum \u2014 the dying lioness, shot through with arrows, raising herself on her front legs for a last effort, is one of the most emotionally resonant images in ancient art."}, {"type": "quiz-before-after", "earlierArtworkId": "louvre-naram-sin-stele", "laterArtworkId": "louvre-hammurabi-code"}, {"type": "quiz-region", "artworkId": "louvre-hammurabi-code", "correctRegionId": "middle-east-north-africa", "distractorRegionIds": ["europe", "south-asia", "east-asia"]}, {"type": "reward"}]}, "minoan-ancient-01": {"id": "minoan-ancient-01", "eraId": "ancient-worlds", "regionId": "europe", "title": "Knossos: Europe's First Palace Civilization", "subtitle": "The Minoans built Europe's first cities, invented its first writing, and made its most joyful art \u2014 then vanished into myth as the kingdom of Minos", "estimatedMinutes": 9, "cards": [{"type": "context", "title": "Before Greece", "body": "When the Greeks told stories about Crete, they told stories of monsters: the Minotaur, the Labyrinth, the vengeful king Minos. These myths preserve a memory, however distorted, of the Minoan civilization (~3000\u20131100 BCE), which preceded and in many ways founded the conditions for Classical Greek culture. The Minoans built the first multi-story palaces in Europe at Knossos, Phaistos, and other sites on Crete. They developed Europe's first writing systems (Linear A, which remains undeciphered). They traded throughout the Mediterranean, establishing connections with Egypt, the Levant, and mainland Greece. And they decorated every surface of their palaces with frescoes of an exuberance and naturalistic joy \u2014 dolphins, flowers, athletes, birds \u2014 that has no parallel in any contemporary civilization. They did not build temples. They did not build city walls. They appear to have spent their surplus on beauty."}, {"type": "wall-label", "artworkId": "minoan-snake-goddess"}, {"type": "wall-label", "artworkId": "minoan-bull-leaping-fresco"}, {"type": "comparison", "title": "Snake Goddess and Bull-Leaping Fresco: the Minoan visual world at its most iconic", "artworkIds": ["minoan-snake-goddess", "minoan-bull-leaping-fresco"], "body": "Both objects come from the Palace of Knossos, discovered by Arthur Evans in the early 20th century. Both have been reproduced so often they've become visual shorthand for 'Minoan civilization.' But they show very different aspects of that civilization. The Snake Goddess \u2014 small, portable, made of precious faience \u2014 belongs to a private ritual context: a sealed deposit of sacred objects hidden beneath the floor. She is intimate, mysterious, focused on a single figure of power. The Bull-Leaping Fresco is monumental and public: a palace wall painting showing a dramatic athletic or ritual performance. She suggests interiority and cult practice; the fresco suggests spectacle and community. Together they are the two poles of Minoan artistic production: the precious object for private ritual and the grand image for collective experience."}, {"type": "quiz-medium", "artworkId": "minoan-snake-goddess", "correctMedium": "Faience (glazed quartz frit)", "distractorMediums": ["Ivory", "Marble", "Terracotta"], "explanation": "Faience is a non-clay ceramic made from ground quartz (sand) or crushed steatite, coated with a glass glaze fired at high temperature. The result is a vitreous, often brilliantly colored surface \u2014 the turquoise-blue of the Snake Goddess's skin is characteristic of faience glazed with copper compounds. Faience was first developed in ancient Egypt and Mesopotamia and reached the Aegean through trade. Its brightness and durability made it a prestige material associated with divine radiance and transformation."}, {"type": "quiz-medium", "artworkId": "minoan-bull-leaping-fresco", "correctMedium": "True fresco (buon fresco) on plaster", "distractorMediums": ["Tempera on panel", "Encaustic (wax paint)", "Mosaic tesserae"], "explanation": "The Minoan fresco tradition at Knossos used true fresco (buon fresco) \u2014 pigment applied to fresh wet plaster, binding chemically as the plaster carbonates. This required planning each day's work in a section ('giornata') that could be completed while the plaster stayed wet. The characteristic Minoan palette \u2014 deep blues and ochre yellows, Aegean red, white \u2014 was limited by the alkaline plaster to pigments that resist lime: natural earths, Egyptian blue, carbon black. The 'Pompeian red' of Roman fresco centuries later shares the same technical constraints."}, {"type": "quiz-date", "artworkId": "minoan-snake-goddess", "correctYear": -1600, "rangeStart": -3000, "rangeEnd": 500}, {"type": "reward"}]}, "modernism-americas-02": {"id": "modernism-americas-02", "eraId": "modernism", "regionId": "americas", "title": "Mexican Modernism: Rivera and the Mural Tradition", "subtitle": "How Diego Rivera turned fresco technique into a political weapon \u2014 and why Luz Jim\u00e9nez matters", "estimatedMinutes": 7, "cards": [{"type": "context", "title": "The Mexican Muralist Movement", "body": "After the Mexican Revolution (1910\u20131920), the new government commissioned a generation of painters \u2014 Rivera, Orozco, Siqueiros \u2014 to paint public murals on government buildings, using art as a tool for building national identity. The muralists looked back to pre-Columbian civilization and forward to socialist politics simultaneously. They adopted fresco \u2014 painting into wet plaster \u2014 because it was the medium of the Italian Renaissance masters, associating Mexican public art with the highest traditions of Western monumental painting. Rivera became the most internationally famous of the three, partly through his relationship with the United States, where he made major murals in Detroit and New York, and partly through his marriage to Frida Kahlo."}, {"type": "wall-label", "artworkId": "aic-rivera-weaving"}, {"type": "wall-label", "artworkId": "aic-american-gothic"}, {"type": "comparison", "title": "Rivera's Weaving and Wood's American Gothic: two different Americas", "artworkIds": ["aic-rivera-weaving", "aic-american-gothic"], "body": "Both paintings were made in the 1930s in the Americas. Both depict figures performing traditional labor associated with their cultural identity. Both use a style that emphasizes clarity and specificity over European avant-garde abstraction. But their politics are mirror images: Wood's Regionalism celebrated the rural Midwest as the authentic American core, implicitly pushing back against urban cosmopolitan modernism. Rivera's muralism celebrated indigenous Mexican culture and labor as the foundation of national identity, explicitly countering the legacy of colonial European values. Both are paintings about who counts as the real America. They give completely different answers."}, {"type": "quiz-date", "artworkId": "aic-rivera-weaving", "correctYear": 1936, "rangeStart": 1900, "rangeEnd": 1970}, {"type": "reward"}]}, "modernism-europe-01": {"id": "modernism-europe-01", "eraId": "modernism", "regionId": "europe", "title": "Blue Period and the Body in Crisis", "subtitle": "Picasso and Matisse in the early 20th century \u2014 two entirely different responses to the same crisis", "estimatedMinutes": 8, "cards": [{"type": "context", "title": "What Modernism Was Responding To", "body": "By 1900 the two foundational certainties of Western painting \u2014 accurate perspective space and recognizable human form \u2014 were under sustained pressure. Photography had made accurate representation obsolete as a goal. C\u00e9zanne had shown that space could be treated as multiple simultaneous viewpoints. The human body, still the central subject of Western art, was becoming strange. Picasso's Blue Period (1901\u201304) made it strange through poverty and grief: elongated, transparent, almost dematerialized. Matisse's project was the opposite \u2014 to make bodies sensuous, warm, and present \u2014 but by 1917 the bodies in Bathers by a River had become grey vertical bands. Both painters were trying to hold the body together. Both were watching it come apart."}, {"type": "wall-label", "artworkId": "aic-old-guitarist"}, {"type": "wall-label", "artworkId": "aic-bathers-by-river"}, {"type": "comparison", "title": "The Old Guitarist and Bathers by a River: two ways the body becomes abstract", "artworkIds": ["aic-old-guitarist", "aic-bathers-by-river"], "body": "The Old Guitarist (1904): the body is elongated almost to transparency, the color entirely cold blue except for the one warm note of the guitar. The person is present but barely \u2014 his body is less solid than the instrument he plays. Bathers by a River (1909\u20131917): the bodies began as warm pastoral figures and were revised, over eight years and through a world war, into grey vertical bands with mask-like faces and a black river. Both paintings show the human figure becoming abstract under pressure \u2014 poverty and grief in Picasso's case, historical catastrophe in Matisse's. Both reach the same visual destination through completely different paths."}, {"type": "quiz-date", "artworkId": "aic-old-guitarist", "correctYear": 1904, "rangeStart": 1880, "rangeEnd": 1940}, {"type": "quiz-region", "artworkId": "aic-bathers-by-river", "correctRegionId": "europe", "distractorRegionIds": ["americas", "middle-east-north-africa", "east-asia"]}, {"type": "reward"}]}, "mughal-renaissances-01": {"id": "mughal-renaissances-01", "eraId": "renaissances-empires", "regionId": "south-asia", "title": "The Mughal Court and the Art of Imperial Self-Representation", "subtitle": "Shah Jahan's portrait and the visual program of the world's wealthiest dynasty", "estimatedMinutes": 7, "cards": [{"type": "context", "title": "The Mughal Empire, 1526\u20131857: The Wealthiest Court on Earth", "body": "In 1600, the Mughal Empire's annual revenue was approximately \u00a317.5 million \u2014 compared to England's \u00a316,000. The empire controlled roughly a quarter of world GDP. Its founder Babur (r. 1526\u20131530) was a descendant of both Timur and Genghis Khan; he conquered northern India from his base in Kabul and brought with him the Timurid Persian court culture of Samarkand \u2014 a tradition of exquisite miniature painting, calligraphy, poetry, and garden design that had flourished in Central Asia for two centuries. His grandson Akbar (r. 1556\u20131605) established the court atelier (kitab-khana, literally 'house of books') that would define Mughal painting: workshops of hundreds of painters, working collaboratively on manuscripts and individual works, combining Timurid Persian, Hindu Indian, and increasingly European conventions learned from the Jesuit missionaries who brought illustrated Flemish bibles to Akbar's court. The Emperor Jahangir (r. 1605\u20131627) was himself an accomplished naturalist painter who kept detailed journals of his observations of birds, animals, and plants \u2014 and whose court produced the finest Mughal miniature painting. Shah Jahan (r. 1628\u20131658) \u2014 who commissioned the Taj Mahal as a mausoleum for his wife Mumtaz Mahal, who died in childbirth in 1631 \u2014 is the subject of the Met's portrait, his jewels and formal attire communicating the cosmic status of an emperor who styled himself 'King of the World.'"}, {"type": "wall-label", "artworkId": "met-mughal-emperor"}, {"type": "quiz-date", "artworkId": "met-mughal-emperor", "correctYear": 1630, "rangeStart": 1400, "rangeEnd": 1800}, {"type": "quiz-region", "artworkId": "met-mughal-emperor", "correctRegionId": "south-asia", "distractorRegionIds": ["middle-east-north-africa", "europe", "east-asia"]}, {"type": "reward"}]}, "northern-renaissance-01": {"id": "northern-renaissance-01", "movementId": "northern-renaissance", "title": "Oil and Detail", "subtitle": "What painters in Flanders did instead of looking south", "estimatedMinutes": 5, "cards": [{"type": "context", "title": "Bruges and the Low Countries, 1420\u20131550: Oil Paint, Protestant Reform, and the Art Market", "body": "In the early 15th century, Bruges was the commercial capital of northern Europe \u2014 the endpoint of the Baltic grain trade and the Atlantic wool trade, home to the Hanseatic League merchants, the Italian banking houses, and the Burgundian court that commissioned the most lavish art in the North. The city's wealth paid for an extraordinary flowering of panel painting by artists including Jan van Eyck, Rogier van der Weyden, and Hans Memling. By the mid-16th century, Bruges had been superseded by Antwerp, whose harbor could accommodate the new ocean-going vessels, and then by Amsterdam, whose merchants were building an empire across the Indian Ocean and the Atlantic. The northern European art market underwent two profound disruptions during this period. First, the Protestant Reformation beginning in 1517 transformed the primary patron of art: Catholic religious imagery was either preserved (in the Spanish Netherlands) or violently destroyed \u2014 churches whitewashed, statues smashed, altarpieces burned \u2014 in the newly Protestant regions. Second, this same disruption created a secular art market: without the church as a buyer, painters turned to the merchant class, and merchant-class buyers wanted different things \u2014 portraits of themselves and their wives, maps, still lifes of their trade goods, landscapes of their countryside."}, {"type": "wall-label", "artworkId": "met-christus-carthusian"}, {"type": "quiz-artist", "artworkId": "met-christus-carthusian", "correctArtistId": "petrus-christus", "distractorArtistIds": ["bruegel-elder", "vermeer", "botticelli"]}, {"type": "wall-label", "artworkId": "met-bruegel-harvesters"}, {"type": "quiz-movement", "artworkId": "met-bruegel-harvesters", "correctMovementId": "northern-renaissance", "distractorMovementIds": ["italian-renaissance", "dutch-golden-age", "impressionism"]}, {"type": "quiz-date", "artworkId": "met-bruegel-harvesters", "correctYear": 1565, "rangeStart": 1400, "rangeEnd": 1700}, {"type": "reward"}], "eraId": "renaissances-empires", "regionId": "europe"}, "oceania-ancient-01": {"id": "oceania-ancient-01", "eraId": "ancient-worlds", "regionId": "oceania", "title": "The Lapita and the Peopling of the Pacific", "subtitle": "How pottery fragments trace the greatest maritime migration in human prehistory \u2014 and what the people who made them were like", "estimatedMinutes": 8, "cards": [{"type": "context", "title": "The Sea of Islands", "body": "The Pacific Ocean covers more than a third of the earth's surface. Getting from the Asian mainland to its furthest islands \u2014 Hawaii, Easter Island, New Zealand \u2014 required crossing thousands of kilometers of open water with no visible landmarks, in an era before compasses, charts, or instruments of any kind. The people who did this were not adventurers stumbling across uncharted waters; they were skilled navigators who read the ocean's surface features, swell patterns, star paths, wind directions, and the flight patterns of birds with a precision that modern sailing instruments can only approximate. They did it progressively, settling one island group at a time, over roughly 3,000 years. And they left a trail: a distinctive style of pottery whose geometric dentate-stamped patterns are instantly recognizable across 4,500 kilometers of the Pacific. The people who made it are called the Lapita."}, {"type": "wall-label", "artworkId": "met-lapita-pottery"}, {"type": "wall-label", "artworkId": "murujuga-petroglyphs"}, {"type": "comparison", "title": "Lapita pottery and Murujuga petroglyphs: two Pacific traditions, two kinds of record", "artworkIds": ["met-lapita-pottery", "murujuga-petroglyphs"], "body": "The Murujuga petroglyphs (Western Australia, ~30,000 BCE) are the oldest art tradition in Oceania \u2014 made by the ancestors of Aboriginal Australians who arrived on the continent at least 50,000 years ago and whose descendants never left. The Lapita pottery (~2500\u20131000 BCE) marks a completely different migration: people moving east from the Bismarck Archipelago into the empty Pacific, settling islands no human had ever reached. Both traditions record the same fundamental fact \u2014 that humans navigated to Oceania's islands and made art there \u2014 but they represent entirely different populations, entirely different timescales, and entirely different artistic vocabularies. Australia was settled once, very early, overland. Remote Oceania was settled later, by sea, by people whose pottery is their most durable legacy."}, {"type": "quiz-medium", "artworkId": "met-lapita-pottery", "correctMedium": "Earthenware (low-fire terracotta)", "distractorMediums": ["Stoneware", "Glazed porcelain", "Faience"], "explanation": "Lapita pottery is low-fire earthenware \u2014 clay fired at relatively low temperatures in open bonfires rather than kilns. No Lapita kilns have been found. The characteristic buff-to-red color comes from the clay's iron content. The dentate-stamped geometric patterns were pressed into the wet clay surface before firing using a comb-like tool. The pottery is not waterproof and was used for dry food storage and serving rather than cooking."}, {"type": "quiz-date", "artworkId": "met-lapita-pottery", "correctYear": -2500, "rangeStart": -5000, "rangeEnd": 0}, {"type": "quiz-region", "artworkId": "met-lapita-pottery", "correctRegionId": "oceania", "distractorRegionIds": ["southeast-asia", "east-asia", "south-asia"]}, {"type": "reward"}]}, "prehistoric-africa-01": {"id": "prehistoric-africa-01", "eraId": "prehistoric", "regionId": "sub-saharan-africa", "title": "Before the Caves: Africa and the Origin of Symbolic Thought", "subtitle": "The Blombos ochre engravings are 75,000 years old. They are the oldest known geometric designs made by Homo sapiens \u2014 and they predate any European cave painting by at least 35,000 years.", "estimatedMinutes": 8, "cards": [{"type": "context", "title": "Rewriting the Origin Story", "body": "For most of the 20th century, the story of human symbolic thought went like this: anatomically modern humans evolved in Africa around 200,000 years ago, but didn't develop symbolic behavior \u2014 art, personal ornament, abstract representation \u2014 until they arrived in Europe around 40,000 years ago, triggering the 'Upper Paleolithic Revolution.' This narrative had a convenient geography: the origins of art coincided with the origins of European civilization. Then, in 2002, Christopher Henshilwood's team published their analysis of engraved ochre from Blombos Cave, South Africa, dated to approximately 75,000 years ago. The crosshatch patterns were deliberate, complex, and repeated across multiple fragments and thousands of years. They were not European. They were African. And they were 35,000 years older than Chauvet."}, {"type": "wall-label", "artworkId": "blombos-engraved-ochre"}, {"type": "wall-label", "artworkId": "chauvet-panel-horses"}, {"type": "comparison", "title": "Blombos ochre (75,000 BCE) and Chauvet horses (33,000 BCE): the gap that rewrote art history", "artworkIds": ["blombos-engraved-ochre", "chauvet-panel-horses"], "body": "Blombos: abstract crosshatch pattern engraved on a prepared ochre surface, 75,000 years ago, southern Cape coast of South Africa. Chauvet: naturalistic horses painted in a limestone cave, 33,000 years ago, Ard\u00e8che, France. The Blombos pattern is not figurative \u2014 it doesn't represent anything in the visible world. It is a geometric design: regular, symmetrical, repeated. Making it required intentional symbolic thought. It predates Chauvet by 42,000 years. The people who walked out of Africa and into Europe 60,000\u201380,000 years ago, eventually making the paintings at Chauvet and Lascaux, were carrying with them a symbolic tradition that was already ancient. The 'origin of art' is not European. It is African."}, {"type": "quiz-date", "artworkId": "blombos-engraved-ochre", "correctYear": -75000, "rangeStart": -100000, "rangeEnd": -10000}, {"type": "quiz-region", "artworkId": "blombos-engraved-ochre", "correctRegionId": "sub-saharan-africa", "distractorRegionIds": ["europe", "middle-east-north-africa", "south-asia"]}, {"type": "reward"}]}, "prehistoric-americas-01": {"id": "prehistoric-americas-01", "eraId": "prehistoric", "regionId": "americas", "title": "The Cave of Hands", "subtitle": "800 hand stencils in a Patagonian canyon \u2014 the oldest personal archive in the Americas", "estimatedMinutes": 7, "cards": [{"type": "context", "title": "A Hand on the Wall", "body": "Place your left hand flat against a stone wall. Press it firmly. Now blow mineral pigment over it through a hollow bone. Lift your hand. Your silhouette remains \u2014 not your hand, but its outline, a negative space where you were. This technique was used at Cueva de las Manos in Patagonian Argentina beginning around 9,300 BCE. The same technique was used at El Castillo in Spain around 37,900 BCE. And at Sulawesi in Indonesia around 39,000 BCE. And at dozens of other sites across four continents. The hand stencil may be the most universal image in prehistoric art \u2014 made by people who had never had contact with each other, on every inhabited continent, across tens of thousands of years. Its universality is either the most remarkable coincidence in cultural history or evidence of something fundamental about what human beings want to express when they first encounter a blank surface."}, {"type": "wall-label", "artworkId": "cueva-de-las-manos"}, {"type": "wall-label", "artworkId": "el-castillo-hand-stencils"}, {"type": "comparison", "title": "Cueva de las Manos and El Castillo: the same image, 28,000 years apart", "artworkIds": ["cueva-de-las-manos", "el-castillo-hand-stencils"], "body": "El Castillo hand stencils (~37,900 BCE, Cantabria, Spain). Cueva de las Manos hand stencils (~9,300 BCE, Patagonia, Argentina). Same technique: hand pressed to wall, pigment blown over it. Same subject: the human hand in negative. Same effect: the presence of an individual recorded as an absence. 28,600 years apart. No contact between the makers was possible. Either the technique was invented independently at least twice \u2014 possibly many more times \u2014 or it was part of the cognitive toolkit that modern humans carried out of Africa 60,000\u201380,000 years ago and deployed wherever they went. The debate is unresolved. The image is the same."}, {"type": "quiz-date", "artworkId": "cueva-de-las-manos", "correctYear": -7300, "rangeStart": -15000, "rangeEnd": 0}, {"type": "quiz-region", "artworkId": "cueva-de-las-manos", "correctRegionId": "americas", "distractorRegionIds": ["europe", "sub-saharan-africa", "oceania"]}, {"type": "reward"}]}, "prehistoric-cave-art-01": {"id": "prehistoric-cave-art-01", "eraId": "prehistoric", "regionId": "europe", "title": "The First Artists", "subtitle": "Chauvet, Lascaux, Altamira \u2014 what was made in the darkness 36,000 years ago, and why we still can't explain it", "estimatedMinutes": 9, "cards": [{"type": "context", "title": "In the Dark", "body": "Between approximately 40,000 and 10,000 years ago, human beings entered caves in what is now southern France and northern Spain, often crawling through narrow passages in total darkness, and painted, drew, and engraved images of animals on the walls. They used animal fat lamps for light. They made pigments by grinding ochre, hematite, and manganese ore. They scraped the cave walls smooth before painting. They used the natural relief of the limestone \u2014 the bulges, the hollows, the cracks \u2014 to give their subjects three-dimensional mass. They painted lions, rhinoceroses, bears, horses, bison, aurochs, mammoths, deer. They almost never painted the animals they actually ate. We don't know why any of this happened. We know the result: some of the most beautiful images ever made by human beings."}, {"type": "wall-label", "artworkId": "chauvet-panel-horses"}, {"type": "wall-label", "artworkId": "lascaux-hall-bulls"}, {"type": "comparison", "title": "Chauvet (36,000 BCE) and Lascaux (17,000 BCE): 19,000 years apart, equally accomplished", "artworkIds": ["chauvet-panel-horses", "lascaux-hall-bulls"], "body": "Chauvet is 19,000 years older than Lascaux. Both show perspective, exploitation of natural rock contours, and confident fluid lines. Both show animals in motion. Neither looks 'primitive' relative to the other. This is the fact that collapsed the theory of progressive artistic development in the Paleolithic: if the earliest cave art is already fully accomplished, the narrative of gradual improvement doesn't hold. The alternative \u2014 that modern humans arrived in Europe 40,000 years ago already fully capable of making images \u2014 is better supported by the evidence."}, {"type": "wall-label", "artworkId": "altamira-polychrome-ceiling"}, {"type": "quiz-date", "artworkId": "chauvet-panel-horses", "correctYear": -33000, "rangeStart": -40000, "rangeEnd": -10000}, {"type": "quiz-region", "artworkId": "lascaux-hall-bulls", "correctRegionId": "europe", "distractorRegionIds": ["middle-east-north-africa", "americas", "sub-saharan-africa"]}, {"type": "reward"}]}, "prehistoric-cave-art-altamira": {"id": "prehistoric-cave-art-altamira", "eraId": "prehistoric", "regionId": "europe", "title": "Altamira: The Cave That Science Refused to Believe", "subtitle": "Discovered in 1879. Vindicated in 1902. The 22-year story of how assumptions defeat evidence.", "estimatedMinutes": 7, "cards": [{"type": "context", "title": "What an Eight-Year-Old Saw", "body": "In 1879, an amateur Spanish archaeologist named Marcelino Sanz de Sautuola was excavating the floor of the Altamira cave in Cantabria when his daughter Mar\u00eda \u2014 eight years old \u2014 wandered ahead into a low side chamber and looked up at the ceiling. 'Mira, pap\u00e1, bueyes!' she called out. Her father came and saw: bison, horses, and deer painted across a ceiling just over a meter above the floor in vivid polychrome \u2014 red, black, violet, and ochre, modeling the animals' mass with shading that anticipated the chiaroscuro techniques European painters would develop 14,000 years later. Sautuola published his findings the following year. The scientific establishment called him a forger. He died in 1888 without vindication. It took 22 more years before the scientific community accepted that what Mar\u00eda had found was real."}, {"type": "wall-label", "artworkId": "altamira-polychrome-ceiling"}, {"type": "wall-label", "artworkId": "lascaux-hall-bulls"}, {"type": "comparison", "title": "Altamira and Lascaux: Spain and France, 2,000 years apart, the same tradition", "artworkIds": ["altamira-polychrome-ceiling", "lascaux-hall-bulls"], "body": "Altamira (~14,000 BCE) and Lascaux (~17,000 BCE) are separated by roughly 3,000 years and about 1,000 kilometers. Both are in the Franco-Cantabrian zone \u2014 the region that produced nearly all the great Paleolithic painted caves. Both use natural rock contours to give animals three-dimensional mass. Both use multiple pigments mixed to different tones to suggest texture and depth. Neither shows a landscape, a sky, plants, or any context \u2014 just animals, floating against an undifferentiated rock surface. This consistent set of choices, repeated across thousands of years and hundreds of kilometers, suggests not random individual decisions but a tradition \u2014 something that was learned, transmitted, and deliberately continued across dozens of generations."}, {"type": "quiz-before-after", "earlierArtworkId": "chauvet-panel-horses", "laterArtworkId": "altamira-polychrome-ceiling"}, {"type": "reward"}]}, "prehistoric-east-asia-01": {"id": "prehistoric-east-asia-01", "eraId": "prehistoric", "regionId": "east-asia", "title": "The First Potters: Southern China, 18,000 BCE", "subtitle": "The oldest fired-clay vessels in the world were made by hunter-gatherers in the Yangtze River basin \u2014 before agriculture, before settled life, before the Neolithic Revolution", "estimatedMinutes": 8, "cards": [{"type": "context", "title": "Pottery Without Farming", "body": "The conventional story of the Neolithic Revolution goes like this: around 10,000 BCE, in the Fertile Crescent of the Near East, humans began farming. Farming required staying in one place. Staying in one place enabled pottery. Pottery enabled better food storage and cooking. The technologies arrived together as a package. This is the model taught in most textbooks, and it is substantially wrong \u2014 or at least, it describes one regional pattern while missing a deeper and older story. In the limestone karst caves of southern China, along the Yangtze River basin in Jiangxi and Hunan provinces, hunter-gatherers were firing clay vessels at least 20,000 years ago. At Xianrendong Cave in Jiangxi \u2014 the oldest confirmed site \u2014 the pottery dates to 20,000\u201319,000 BCE. At Yuchanyan Cave in Hunan, 16,000\u201318,000 BCE. These people were not farmers. They had no permanent settlements. They hunted deer, boar, and birds; they fished; they gathered wild plants including wild rice. And they made pottery. The discovery, confirmed in peer-reviewed papers in 2009 and 2012, required archaeologists to separate two things they had assumed were inseparable: the invention of ceramics and the invention of agriculture. They are not the same event. They are not even the same era."}, {"type": "wall-label", "artworkId": "yuchanyan-pottery"}, {"type": "wall-label", "artworkId": "jomon-flame-vessel"}, {"type": "comparison", "title": "Yuchanyan pot and J\u014dmon fire-flame vessel: the oldest and the most exuberant", "artworkIds": ["yuchanyan-pottery", "jomon-flame-vessel"], "body": "Yuchanyan (~16,000 BCE): a small, round-bottomed cooking vessel made by pressing clay mixed with sand and charcoal into a rough shape and firing it at low temperature in an open fire. Coarse, functional, undecorated except for cord impressions pressed into the surface. It holds together well enough to cook food in. That is the full extent of its ambition. J\u014dmon fire-flame vessel (~2,500 BCE): a cooking pot so overwhelmed by its own sculptural decoration that the cooking function almost disappears. The same technology \u2014 hand-built, cord-marked, low-fire earthenware \u2014 used for purposes 13,500 years apart and arriving at completely different conclusions about what a pot should be. The Yuchanyan pot is technology solving a problem. The J\u014dmon vessel is the same technology insisting it is also art. The distance between them is not sophistication; it is intention."}, {"type": "context", "title": "Why Southern China First?", "body": "The Yangtze River basin in southern China sits at a particular ecological intersection that may explain the independent invention of pottery there during the Last Glacial Maximum. During the height of the last ice age (~20,000 BCE), when global temperatures were 5\u20136\u00b0C colder and rainfall was reduced, most of the Northern Hemisphere was either glaciated or too dry and cold to support dense populations. But southern China \u2014 protected by the Himalayas and the Tibetan Plateau from the worst of the cold, and still receiving monsoon rainfall \u2014 maintained diverse forest ecosystems with reliable food resources: fish-rich rivers, wild game, and crucially, wild rice. Processing these resources more efficiently \u2014 cooking grains, fish, and roots in a vessel rather than directly in embers \u2014 may have rewarded the considerable time investment required to make and fire clay. The same logic explains why Japan's J\u014dmon people, living in similarly resource-rich environments on the northwestern Pacific coast, invented pottery around 14,000 BCE \u2014 independently, a few thousand years after southern China. Both inventions predate agriculture in their regions by thousands of years. Both were made by people who had no intention of staying in one place."}, {"type": "quiz-medium", "artworkId": "yuchanyan-pottery", "correctMedium": "Earthenware (low-fire, hand-built)", "distractorMediums": ["Stoneware", "Coiled basketry", "Fired brick"], "explanation": "Yuchanyan pottery is low-fire earthenware \u2014 clay mixed with coarse sand and charcoal as temper (to reduce shrinkage and cracking during firing), shaped by hand without a wheel, and fired at low temperatures in an open bonfire rather than a kiln. The reddish-brown color comes from the iron content of the clay and the oxidizing (oxygen-rich) firing atmosphere. At higher temperatures or in a reducing atmosphere, the same clay produces grey or black pottery, as the J\u014dmon sometimes did."}, {"type": "quiz-date", "artworkId": "yuchanyan-pottery", "correctYear": -16000, "rangeStart": -25000, "rangeEnd": -5000}, {"type": "quiz-before-after", "earlierArtworkId": "yuchanyan-pottery", "laterArtworkId": "jomon-flame-vessel"}, {"type": "reward"}]}, "prehistoric-global-art": {"id": "prehistoric-global-art", "eraId": "prehistoric", "regionId": "southeast-asia", "title": "Art Is Not European: A Global Prehistory", "subtitle": "Sulawesi, Blombos, Murujuga, Cueva de las Manos, Bhimbetka, Tassili \u2014 image-making on every inhabited continent, across 75,000 years", "estimatedMinutes": 9, "cards": [{"type": "context", "title": "The Wrong Origin Story", "body": "Every art history survey written before 1990 begins the same way: with the caves of France and Spain. Lascaux. Altamira. Chauvet. The story then proceeds through Greece, Rome, and the European tradition to the present. Africa, Asia, Australia, and the Americas appear as footnotes or separate chapters with their own 'primitive origins.' This narrative is wrong \u2014 not as a matter of opinion but as a matter of evidence. We now know that symbolic behavior appeared in Africa at least 75,000 years ago. That the oldest dated figurative art in the world is in Sulawesi, Indonesia, not France. That Australia has the world's largest collection of prehistoric engravings. That South America has rock art spanning 10,000 years. The Eurocentric origin story was always a projection of modern assumptions onto the distant past. The actual origin of art is global."}, {"type": "wall-label", "artworkId": "blombos-engraved-ochre"}, {"type": "wall-label", "artworkId": "sulawesi-leang-karampuang"}, {"type": "wall-label", "artworkId": "chauvet-panel-horses"}, {"type": "comparison", "title": "Blombos (75,000 BCE) \u2192 Sulawesi (51,200 BCE) \u2192 Chauvet (33,000 BCE): the real sequence", "artworkIds": ["blombos-engraved-ochre", "sulawesi-leang-karampuang", "chauvet-panel-horses"], "body": "Blombos (75,000 BCE): abstract geometric design in Africa, oldest known symbolic mark by Homo sapiens. Sulawesi (51,200 BCE): oldest known figurative art, oldest known narrative scene, in Southeast Asia. Chauvet (33,000 BCE): spectacular naturalistic animal painting in Europe. The sequence shows art emerging first in Africa, then Asia-Pacific, then Europe \u2014 the reverse of the traditional Western narrative. It also shows something else: by the time humans reached Europe and began painting caves, symbolic image-making was already 40,000 years old. Chauvet is not the beginning. It is a late flowering of a very long tradition."}, {"type": "wall-label", "artworkId": "cueva-de-las-manos"}, {"type": "wall-label", "artworkId": "murujuga-petroglyphs"}, {"type": "wall-label", "artworkId": "tassili-najjer-cattle"}, {"type": "quiz-before-after", "earlierArtworkId": "blombos-engraved-ochre", "laterArtworkId": "sulawesi-leang-karampuang"}, {"type": "quiz-before-after", "earlierArtworkId": "sulawesi-leang-karampuang", "laterArtworkId": "chauvet-panel-horses"}, {"type": "reward"}]}, "prehistoric-global-venus": {"id": "prehistoric-global-venus", "eraId": "prehistoric", "regionId": "europe", "title": "The Venus Figurines: A Global Obsession", "subtitle": "From Moravia to Austria to Japan \u2014 the same exaggerated female body made across 25,000 years. Why?", "estimatedMinutes": 9, "cards": [{"type": "context", "title": "An Obsession Across Time and Space", "body": "Between approximately 38,000 and 10,000 BCE, people across Eurasia made small figurines of female bodies with remarkably consistent features: exaggerated hips, belly, and breasts; minimal or absent faces; small or missing feet; arms often reduced or absent. These are called Venus figurines, a 19th-century nickname that is both widely used and somewhat misleading \u2014 naming them after the Roman goddess of love imposes a modern interpretive frame on objects whose actual meaning is unknown. More than 200 of them have been found at sites stretching from France to Siberia, a distribution spanning roughly 10,000 kilometers. The same exaggerated body type appears repeatedly, across vast distances, across thousands of years. Whether this represents a single tradition that spread, parallel independent inventions, or something else entirely is one of the most debated questions in prehistoric archaeology. What is not debated: these bodies were worth making, and worth carrying."}, {"type": "wall-label", "artworkId": "dolni-vestonice-venus"}, {"type": "wall-label", "artworkId": "venus-of-willendorf"}, {"type": "comparison", "title": "Doln\u00ed V\u011bstonice and Willendorf: two Venusei, same Gravettian world", "artworkIds": ["dolni-vestonice-venus", "venus-of-willendorf"], "body": "Both are approximately 11 centimeters tall \u2014 palm-sized. Both date to the Gravettian culture of the Upper Paleolithic, 29,000\u201325,000 BCE. Both exaggerate the same features: abdomen, hips, breasts. Both have minimal faces. But the materials are completely different: the Willendorf Venus is carved from oolitic limestone \u2014 a stone not found near the site, meaning it was either transported from a distance or traded \u2014 and tinted red with ochre. The Doln\u00ed V\u011bstonice Venus is fired clay mixed with crushed bone, black-surfaced, made in a kiln. Same culture, same approximate period, same formal conventions, two entirely different materials. The choice of fired clay at Doln\u00ed V\u011bstonice was not accidental: the Gravettian people there were experimenting with ceramics deliberately, making hundreds of figurines and pellets and firing them in ways that often produced dramatic breakage. The Willendorf Venus was preserved. The Doln\u00ed V\u011bstonice Venus was preserved. Most of their companions were not."}, {"type": "wall-label", "artworkId": "jomon-venus"}, {"type": "comparison", "title": "European Venusei and the J\u014dmon Venus: 20,000 years apart, strikingly similar", "artworkIds": ["venus-of-willendorf", "jomon-venus"], "body": "The Venus of Willendorf (28,000 BCE, Austria) and the J\u014dmon Venus (~3,000 BCE, Japan) are separated by 25,000 years and 9,000 kilometers. Both are female figurines emphasizing the abdomen, hips, and breasts. Both are small enough to be carried. Both were found at campsites or settled locations rather than in formal burial contexts. Neither has a legible face. Whether this resemblance reflects a shared deep-time tradition carried by human populations as they migrated from Africa through Eurasia \u2014 the same symbolic language dormant for millennia and then expressed independently in different cultures \u2014 or represents genuinely independent parallel invention is unknowable. The distribution of Gravettian figurines across Europe and Siberia suggests at minimum a pan-Eurasian cultural network in the Upper Paleolithic. Whether it reached Japan is a question the objects cannot answer but cannot stop raising."}, {"type": "quiz-medium", "artworkId": "dolni-vestonice-venus", "correctMedium": "Fired clay (ceramic)", "distractorMediums": ["Carved limestone", "Carved mammoth ivory", "Carved bone"], "explanation": "The Doln\u00ed V\u011bstonice Venus is the world's oldest known ceramic object \u2014 fired clay, not carved stone or ivory. The clay was mixed with crushed bone as temper, then fired in an earth kiln to approximately 700\u00b0C. The black surface comes from this bone-clay mixture and the firing conditions. Identifying it as ceramic (rather than carved stone or ivory) is significant: it means the people who made it had already developed fired-clay technology 28,000 years before the oldest known pottery vessels."}, {"type": "quiz-date", "artworkId": "dolni-vestonice-venus", "correctYear": -26000, "rangeStart": -40000, "rangeEnd": -10000}, {"type": "quiz-before-after", "earlierArtworkId": "dolni-vestonice-venus", "laterArtworkId": "jomon-venus"}, {"type": "reward"}]}, "prehistoric-mena-01": {"id": "prehistoric-mena-01", "eraId": "prehistoric", "regionId": "middle-east-north-africa", "title": "When the Sahara Was Green", "subtitle": "The Tassili n'Ajjer paintings record 10,000 years of environmental collapse \u2014 from hippos and elephants to emptiness", "estimatedMinutes": 7, "cards": [{"type": "context", "title": "The Other Sahara", "body": "The Sahara is the largest hot desert on Earth. It was not always. Between roughly 11,000 and 5,000 years ago, a shift in Earth's orbital cycle brought the African monsoons northward, turning the Sahara into a well-watered savanna of lakes, rivers, and grasslands \u2014 the 'African Humid Period,' sometimes called the Green Sahara. Elephants, giraffes, hippopotamuses, and crocodiles lived where there is now only rock and sand. Large human populations hunted, fished, and eventually herded cattle across the landscape. The Tassili n'Ajjer plateau in southeastern Algeria preserves their record: over 15,000 paintings and engravings spanning from ~10,000 BCE to the first centuries CE, showing in sequence the transformation of a fertile world into a desert. This is the only place in prehistoric art where you can see an entire ecosystem die, painted by the people who watched it happen."}, {"type": "wall-label", "artworkId": "tassili-najjer-cattle"}, {"type": "wall-label", "artworkId": "lascaux-hall-bulls"}, {"type": "comparison", "title": "Tassili cattle herders and Lascaux aurochs: different animals, different worlds", "artworkIds": ["tassili-najjer-cattle", "lascaux-hall-bulls"], "body": "Lascaux (~17,000 BCE): wild aurochs in a periglacial landscape \u2014 painted by hunter-gatherers who followed the herds across ice-age France. Tassili (~5,000 BCE): domesticated cattle with herders \u2014 painted by pastoralists who had developed animal husbandry in a temperate Saharan savanna. Both images are fundamentally about the relationship between humans and large bovines. But the relationship is completely different: at Lascaux the aurochs is wild, powerful, other. At Tassili the cattle are owned, managed, depicted in relation to their human caretakers. This shift \u2014 from wild animal to domestic animal \u2014 is one of the most consequential transitions in human history, and the Tassili paintings record it in progress."}, {"type": "quiz-date", "artworkId": "tassili-najjer-cattle", "correctYear": -5000, "rangeStart": -12000, "rangeEnd": 0}, {"type": "quiz-region", "artworkId": "tassili-najjer-cattle", "correctRegionId": "middle-east-north-africa", "distractorRegionIds": ["sub-saharan-africa", "europe", "south-asia"]}, {"type": "reward"}]}, "prehistoric-oceania-01": {"id": "prehistoric-oceania-01", "eraId": "prehistoric", "regionId": "oceania", "title": "Murujuga: A Million Images and a Century to Lose Them", "subtitle": "The world's largest collection of rock art is being dissolved by industrial pollution", "estimatedMinutes": 8, "cards": [{"type": "context", "title": "The Largest Collection", "body": "The Burrup Peninsula in northwestern Australia \u2014 known by its Aboriginal name, Murujuga \u2014 contains an estimated one to two million petroglyphs made over at least 47,000 years. This is the largest, densest, and most diverse collection of rock art in the world. The images depict extinct animals (Tasmanian tiger, fat-tailed kangaroo), human faces that may be the oldest known in world art, sea creatures that appear as the artists' inland world was slowly swallowed by rising sea levels, and ceremonial scenes spanning virtually the entire history of modern human presence in Australia. Surrounding this collection, on three sides, is one of Australia's largest petrochemical industrial complexes. Scientific monitoring published since 2022 confirms that acidic emissions from these facilities are dissolving the rock patina the petroglyphs were carved into. The oldest art in Australia may be gone within a century."}, {"type": "wall-label", "artworkId": "murujuga-petroglyphs"}, {"type": "wall-label", "artworkId": "sulawesi-leang-karampuang"}, {"type": "comparison", "title": "Murujuga and Sulawesi: the deep prehistory of the Asia-Pacific", "artworkIds": ["murujuga-petroglyphs", "sulawesi-leang-karampuang"], "body": "Both sites are in the Asia-Pacific region. Both were made by the ancestors of modern Aboriginal and Indonesian peoples \u2014 people who crossed open ocean to reach these islands, some of the first seafarers in human history. Sulawesi's paintings (~51,200 BCE) are the oldest known figurative art in the world and already show a narrative scene. Murujuga's petroglyphs span at least 47,000 years and constitute the most continuous art record anywhere on earth. Together they establish the Asia-Pacific as one of the most important regions in the global history of art \u2014 a fact almost entirely absent from Western art historical curricula until very recently."}, {"type": "quiz-date", "artworkId": "murujuga-petroglyphs", "correctYear": -30000, "rangeStart": -50000, "rangeEnd": 0}, {"type": "quiz-region", "artworkId": "murujuga-petroglyphs", "correctRegionId": "oceania", "distractorRegionIds": ["southeast-asia", "sub-saharan-africa", "americas"]}, {"type": "reward"}]}, "prehistoric-portable-art": {"id": "prehistoric-portable-art", "eraId": "prehistoric", "regionId": "europe", "title": "Art You Could Carry", "subtitle": "The Lion Man, the Venus of Willendorf, and the hand stencil \u2014 three ways of making a mark before writing existed", "estimatedMinutes": 8, "cards": [{"type": "context", "title": "Beyond the Cave", "body": "The painted caves of France and Spain are the most famous Paleolithic art, but they represent only one strand of prehistoric image-making. Equally important \u2014 and far more portable \u2014 are the small carved figures and decorated objects that people carried with them across the ice-age landscape. These are objects of personal significance: small enough to fit in a hand, light enough to carry on a long migration, intimate in a way that a cave wall twenty meters long cannot be. The Lion Man of Hohlenstein-Stadel (~38,000 BCE) is perhaps the oldest figurative sculpture ever found \u2014 and it depicts something that doesn't exist: a human body with a lion's head. The Venus of Willendorf (~28,000 BCE) is one of thousands of female figurines found across Eurasia, all emphasizing the same features in the same way. Both objects are extraordinary. Neither has a fully agreed explanation."}, {"type": "wall-label", "artworkId": "lion-man-hohlenstein"}, {"type": "wall-label", "artworkId": "venus-of-willendorf"}, {"type": "comparison", "title": "Lion Man and Venus of Willendorf: two kinds of impossible object", "artworkIds": ["lion-man-hohlenstein", "venus-of-willendorf"], "body": "The Lion Man represents something that does not and cannot exist in nature \u2014 a therianthrope, a human-animal hybrid. Creating it required the maker to mentally combine two things they knew and produce a third thing that exists only in imagination. This is direct evidence of symbolic or mythological thought: the capacity to represent not what is, but what might be. The Venus of Willendorf represents something that does exist \u2014 a human female body \u2014 but in an exaggerated, schematized form that emphasizes certain features (abdomen, hips, breasts) while de-emphasizing or omitting others (face, feet). This selective emphasis must have been intentional and meaningful. Both objects are small enough to be carried. Both were made with tools that are themselves older than the figures. Both have been found far from any cave wall. They are the art you carried with you."}, {"type": "wall-label", "artworkId": "el-castillo-hand-stencils"}, {"type": "quiz-date", "artworkId": "lion-man-hohlenstein", "correctYear": -38000, "rangeStart": -45000, "rangeEnd": -10000}, {"type": "quiz-before-after", "earlierArtworkId": "lion-man-hohlenstein", "laterArtworkId": "venus-of-willendorf"}, {"type": "reward"}]}, "prehistoric-south-asia-01": {"id": "prehistoric-south-asia-01", "eraId": "prehistoric", "regionId": "south-asia", "title": "Bhimbetka: The Living Cave", "subtitle": "A rock shelter in central India painted and repainted for 300,000 years \u2014 and still connected to the communities beside it", "estimatedMinutes": 7, "cards": [{"type": "context", "title": "Continuity", "body": "Lascaux was sealed for 17,000 years and opened in 1940. Bhimbetka was never sealed. The same sandstone rock shelters in the Vindhyan foothills of Madhya Pradesh that preserve some of the oldest paintings in South Asia \u2014 images of rhinoceros, bear, and tiger made before 10,000 BCE \u2014 are surrounded today by twenty-one villages whose inhabitants maintain cultural traditions archaeologists have identified in the rock paintings above them. This is not a dead site. It is a palimpsest: a surface written over and over across 300,000 years, the older images showing through beneath the newer ones, the living communities in the valley below still in some sense connected to the people who first made marks on these rocks. Bhimbetka is the only prehistoric art site in the world where this kind of continuity can be argued."}, {"type": "wall-label", "artworkId": "bhimbetka-rock-paintings"}, {"type": "wall-label", "artworkId": "chauvet-panel-horses"}, {"type": "comparison", "title": "Bhimbetka and Chauvet: different worlds, same impulse", "artworkIds": ["bhimbetka-rock-paintings", "chauvet-panel-horses"], "body": "Chauvet (~33,000 BCE, southern France): animals in a sealed dark cave, no human figures, periglacial megafauna, left untouched for 27,000 years. Bhimbetka (~10,000 BCE, central India): animals and humans together in open rock shelters, tropical fauna, painted continuously for millennia. The European and South Asian traditions appear to have evolved independently and produced quite different visual programs. Chauvet is about the animal alone, rendered with naturalistic precision in darkness. Bhimbetka is about the animal in relation to the human \u2014 hunting scenes, gathering scenes, dancing figures alongside the wildlife. Both traditions begin with the same fundamental act \u2014 making a mark on rock \u2014 and arrive at different answers about what that mark should show."}, {"type": "quiz-date", "artworkId": "bhimbetka-rock-paintings", "correctYear": -8000, "rangeStart": -30000, "rangeEnd": 0}, {"type": "quiz-region", "artworkId": "bhimbetka-rock-paintings", "correctRegionId": "south-asia", "distractorRegionIds": ["europe", "southeast-asia", "middle-east-north-africa"]}, {"type": "reward"}]}, "prehistoric-sulawesi-01": {"id": "prehistoric-sulawesi-01", "eraId": "prehistoric", "regionId": "southeast-asia", "title": "The Oldest Story: Sulawesi and the Origin of Image-Making", "subtitle": "51,200 years ago, in a cave in Indonesia, someone painted the world's oldest known narrative scene", "estimatedMinutes": 8, "cards": [{"type": "context", "title": "Before Europe", "body": "For most of the 20th century, the origin story of art was European: Chauvet, Lascaux, Altamira, the caves of the Franco-Cantabrian zone. Then, in the 2010s and 2020s, a series of discoveries in the Maros-Pangkep karst region of South Sulawesi, Indonesia, pushed the record back and moved the origin point eastward. A pig painting at Leang Tedongnge dated to at least 45,500 years ago. Then, in 2024, a narrative scene at Leang Karampuang \u2014 multiple figures interacting with a pig \u2014 was dated to at least 51,200 years ago using a new laser-ablation technique. This is the oldest known figurative artwork in the world, by more than 5,000 years. And it shows not isolated animals, but a scene \u2014 a story. The people who made it crossed open ocean to reach Sulawesi. They were fully modern Homo sapiens. They painted not in a cave in France but in a cave in Indonesia, 34,000 years before Lascaux."}, {"type": "wall-label", "artworkId": "sulawesi-leang-karampuang"}, {"type": "wall-label", "artworkId": "chauvet-panel-horses"}, {"type": "comparison", "title": "Sulawesi (51,200 BCE) and Chauvet (33,000 BCE): the same impulse, different continents", "artworkIds": ["sulawesi-leang-karampuang", "chauvet-panel-horses"], "body": "Both were made by fully modern Homo sapiens. Both used mineral pigments on limestone. Both show animals with care and observation. Both were made deep inside caves, in darkness, using artificial light. The Sulawesi scene is older by 18,000 years and shows something the European caves rarely attempt: figures interacting \u2014 a narrative, a story, a scene. The Chauvet horses show overlapping heads suggesting depth, but not interaction. The Sulawesi scene may be the first story ever told in images. What connects them: wherever modern humans went, they made images. The origin of art is not European. It may be African. It may be wherever our species first fully became itself."}, {"type": "quiz-date", "artworkId": "sulawesi-leang-karampuang", "correctYear": -51200, "rangeStart": -60000, "rangeEnd": -10000}, {"type": "quiz-before-after", "earlierArtworkId": "sulawesi-leang-karampuang", "laterArtworkId": "chauvet-panel-horses"}, {"type": "reward"}]}, "prehistoric-why-animals": {"id": "prehistoric-why-animals", "eraId": "prehistoric", "regionId": "europe", "title": "Why Animals?", "subtitle": "Horses, bison, lions, rhinos \u2014 but almost never the animals they ate. The central mystery of Paleolithic art.", "estimatedMinutes": 7, "cards": [{"type": "context", "title": "The Wrong Animals", "body": "Here is one of the strangest facts about European cave art: the animals most frequently depicted \u2014 horses, bison, mammoths, lions, rhinoceroses, bears \u2014 are largely not the animals the cave artists ate. Archaeologists have excavated the bone refuse from these same caves and found that the diet was dominated by reindeer. Reindeer are rare in cave art. Horses are everywhere. Lions and rhinos appear far more often than their presence in the ecosystem would predict. Whatever purpose the paintings served \u2014 shamanic ritual, hunting magic, territorial marking, something we haven't thought of \u2014 it was not a straightforward inventory of the food supply. The animals that appear most often in the art are the ones that were most powerful, most dangerous, or perhaps most spiritually significant. The artists were not painting what they ate. They were painting what mattered."}, {"type": "wall-label", "artworkId": "chauvet-panel-horses"}, {"type": "wall-label", "artworkId": "altamira-polychrome-ceiling"}, {"type": "comparison", "title": "Chauvet horses and Altamira bison: power and mass in animal form", "artworkIds": ["chauvet-panel-horses", "altamira-polychrome-ceiling"], "body": "Both images are studies in the rendering of animal mass and power. The Chauvet horses are shown overlapping, their heads turned at slightly different angles \u2014 a study of a group in motion, or of the same animal at multiple moments. The Altamira bison are modeled in polychrome to show the depth of their musculature, the curl of their heads, the tension in their haunches. Both paintings were made by people who had spent their lives observing these animals \u2014 who knew exactly how a horse held its head or how a bison gathered itself before charging. The observation is meticulous. The rendering is skilled. Whatever the purpose, the content required deep knowledge of living animals."}, {"type": "quiz-region", "artworkId": "chauvet-panel-horses", "correctRegionId": "europe", "distractorRegionIds": ["americas", "southeast-asia", "oceania"]}, {"type": "reward"}]}, "roman-copies-01": {"id": "roman-copies-01", "eraId": "ancient-worlds", "regionId": "europe", "title": "What Rome Took From Greece", "subtitle": "The systematic Roman copying program, the portrait bust as political theater, and why Roman verism is the opposite of Greek idealism", "estimatedMinutes": 9, "cards": [{"type": "context", "title": "The Roman Art Problem", "body": "Rome conquered Greece militarily in 146 BCE. What happened next was the opposite of what usually happens to conquered cultures. The Roman general Lucius Mummius shipped hundreds of Greek statues to Rome as war spoils. Within a generation, the Roman elite were commissioning Greek artists to make copies of famous Greek sculptures for their villas, and hiring Greek philosophers to tutor their children. The poet Horace, in the 1st century BCE, wrote: 'Conquered Greece took captive her savage conqueror, and brought the arts into rustic Latium.' Rome conquered Greece. Greece colonized Rome's imagination. The result was a paradox: most of what we know about Greek Classical sculpture we know through Roman copies, made centuries later by craftsmen working from the originals. The originals are mostly gone. The copies survive."}, {"type": "wall-label", "artworkId": "met-roman-portrait"}, {"type": "wall-label", "artworkId": "met-hellenistic-head"}, {"type": "comparison", "title": "Hellenistic head and Roman portrait: idealism vs. verism", "artworkIds": ["met-hellenistic-head", "met-roman-portrait"], "body": "The Hellenistic head (~200 BCE) continues the Greek tradition: an idealized youth, emotionally present but still beautiful, the face a refined version of a human face rather than a record of one. The Roman portrait (~50 CE) inverts this entirely. Every wrinkle is preserved. The asymmetry of the jaw is recorded. The thinning hair and heavy neck are there. This specific man looked like this, and whoever commissioned his portrait wanted posterity to know it. The Romans called this tendency verism \u2014 from verus, true. It was a philosophical position, not a limitation: the Roman elite believed that the marks left by a life of public service \u2014 the lines, the weight, the age \u2014 were honorable, and that to smooth them out in a portrait would be to falsely flatter. Greek sculpture asked: what should a person look like? Roman portraiture asked: what did this person actually look like?"}, {"type": "context", "title": "Portrait as Political Instrument", "body": "Roman portrait busts were not primarily aesthetic objects \u2014 they were political ones. The Romans kept wax portrait masks (imagines) of distinguished ancestors and displayed them at funerals, paraded them in processions, and stored them in their homes as proof of lineage and civic achievement. The marble portrait bust was a more permanent version of the same thing: a declaration of ancestry, of civic standing, of the right to take up space in Roman public life. Emperors distributed their official portraits across the empire so that subjects in Britain, Syria, and Egypt would all know what their ruler looked like. A Roman official's portrait was, in a very direct sense, his political presence made portable."}, {"type": "quiz-date", "artworkId": "met-roman-portrait", "correctYear": 50, "rangeStart": -600, "rangeEnd": 500}, {"type": "reward"}]}, "roman-painting-mosaic-01": {"id": "roman-painting-mosaic-01", "eraId": "ancient-worlds", "regionId": "europe", "title": "What Vesuvius Preserved: Roman Painting and Mosaic", "subtitle": "The techniques behind the Villa of the Mysteries fresco and the Alexander Mosaic \u2014 and why they survived 2,000 years", "estimatedMinutes": 9, "cards": [{"type": "context", "title": "The Accident of Preservation", "body": "On August 24, 79 CE, Mount Vesuvius erupted and buried Pompeii, Herculaneum, and several nearby villas under meters of volcanic ash and pumice. The disaster killed thousands of people. It also created the world's largest outdoor museum of Roman daily life \u2014 and, for art historians, it preserved the most complete body of ancient painting and mosaic in existence. Without Vesuvius, we would know almost nothing about Roman wall painting: the medium is fragile, and paintings in unburied buildings were destroyed by weather, fire, and time. The ash sealed the buildings, collapsed the roofs, and then protected the walls for 1,700 years. Pompeii was rediscovered in 1748; its excavation changed European art history, triggered the Neoclassical movement, and gave us our only direct access to the wall painting tradition that ancient writers called the highest art form of the classical world."}, {"type": "wall-label", "artworkId": "pompeii-villa-mysteries-fresco"}, {"type": "context", "title": "The Four Pompeian Styles", "body": "Art historians classify Roman wall painting into four styles based on what they represent. First Style (200\u201380 BCE): imitation of marble panels in painted plaster \u2014 no figures, just colored panels imitating different stone types. Second Style (80\u201320 BCE): illusionistic architecture painted on the wall, creating the impression of looking through the wall into a space beyond; figures, landscapes, and mythological scenes within this architectural frame. The Villa of the Mysteries frieze is Second Style. Third Style (20 BCE\u201350 CE): delicate, ornamental; architectural elements become decorative rather than illusionistic, with fine central panel paintings on flat color grounds. Fourth Style (50\u201379 CE): an eclectic combination of the earlier styles, often elaborate and fantastical. The four styles trace a complete arc from trompe l'oeil illusionism to pure decoration and back \u2014 a cycle that would repeat in Western art history many times."}, {"type": "wall-label", "artworkId": "roman-alexander-mosaic"}, {"type": "comparison", "title": "Fresco and mosaic: the two major techniques of Roman monumental painting", "artworkIds": ["pompeii-villa-mysteries-fresco", "roman-alexander-mosaic"], "body": "Both the Villa of the Mysteries fresco and the Alexander Mosaic are from Pompeii and date to roughly the 1st century BCE. Both demonstrate the ambition of Roman pictorial art to achieve painting-like spatial depth and psychological intensity. But the techniques are completely different. Fresco is painted quickly, before plaster dries, with water-based pigments that bond chemically with the wall. Mosaic is assembled slowly, from thousands of individual tesserae (small pieces of glass, stone, or terracotta), each piece placed individually. Fresco allows brushstroke-like spontaneity; mosaic requires translating painterly effects into discrete units, which the best ancient mosaicists did by using very small tesserae laid in curved lines that follow the forms \u2014 a technique called opus vermiculatum (worm-work). The Alexander Mosaic, with its 1.5 million tesserae, some under 2mm, achieves tonal gradation and spatial depth that approach the effects of painting."}, {"type": "quiz-medium", "artworkId": "roman-alexander-mosaic", "correctMedium": "Opus vermiculatum mosaic", "distractorMediums": ["True fresco", "Encaustic painting", "Tempera on panel"], "explanation": "Opus vermiculatum ('worm-work') is the most refined ancient mosaic technique, using tiny tesserae \u2014 sometimes under 2mm \u2014 laid in curved lines that follow the contours of the forms, like brushstrokes in stone. The Alexander Mosaic's 1.5 million tesserae, laid in this technique, allow it to achieve the tonal gradations and spatial depth of painting. The technique is identifiable by the irregular, curved rows of tesserae visible in close-up views."}, {"type": "quiz-before-after", "earlierArtworkId": "pompeii-villa-mysteries-fresco", "laterArtworkId": "met-fayum-portrait"}, {"type": "reward"}]}, "sacred-medieval-sacred-image": {"id": "sacred-medieval-sacred-image", "eraId": "sacred-medieval", "title": "Depicting the Divine", "subtitle": "Christian icon, Islamic calligraphy, Buddhist sculpture \u2014 three answers to the same question", "estimatedMinutes": 7, "cards": [{"type": "context", "title": "The Great Debate: Should Religion Have Images?", "body": "Between the 7th and 9th centuries CE, three of the world's major religions underwent acute crises over the same question: should images of the divine be made, and if so, how? In the Byzantine Empire, the Iconoclast Controversy (726\u2013843 CE) pitted emperors who ordered religious images destroyed against theologians who argued that the Incarnation \u2014 God becoming human in Christ \u2014 made depiction not only permissible but theologically mandatory. The controversy killed people, destroyed thousands of images, and was only resolved by a church
