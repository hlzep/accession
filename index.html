function renderLeaderboardRow({ name, streak, mastered, isYou, loading }) {
  if (loading) {
    return `
      <div class="leaderboard-row" style="opacity: 0.5;">
        <div class="leaderboard-row__avatar">B</div>
        <div class="leaderboard-row__name">${name}</div>
        <div><div class="leaderboard-row__substat">connecting…</div></div>
      </div>
    `;
  }
  const initial = (name || '?').charAt(0).toUpperCase();
  return `
    <div class="leaderboard-row">
      <div class="leaderboard-row__avatar">${initial}</div>
      <div class="leaderboard-row__name">${name}${isYou ? ' <span class="leaderboard-row__substat">you</span>' : ''}</div>
      <div style="text-align: right;">
        <div class="leaderboard-row__stat">${streak}</div>
        <div class="leaderboard-row__substat">day streak</div>
      </div>
    </div>
  `;
}

function pickCardOfTheDay() {
  const artworks = getAllArtworks();
  if (artworks.length === 0) return null;
  const today = new Date();
  const dayKey = today.getFullYear() * 1000 + dayOfYear(today);
  return artworks[dayKey % artworks.length];
}

function dayOfYear(d) {
  const start = new Date(d.getFullYear(), 0, 0);
  return Math.floor((d - start) / (1000 * 60 * 60 * 24));
}

function timeOfDayGreeting() {
  const h = new Date().getHours();
  if (h < 5) return 'evening';
  if (h < 12) return 'morning';
  if (h < 17) return 'afternoon';
  return 'evening';
}

function formatDate() {
  return new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric',
  });
}

function streakCaption(days) {
  if (days === 0) return 'Begin a streak today.';
  if (days < 3) return 'A quiet start.';
  if (days < 7) return 'Building momentum.';
  if (days < 30) return 'A real practice now.';
  return 'A serious accession.';
}

function formatYear(year) {
  if (!year && year !== 0) return '';
  if (year < 0) return `${Math.abs(year)} BCE`;
  return String(year);
}

function renderRegionTile(region) {

function openRegionDetail(regionId) {

    el.addEventListener('click', () => startLesson(el.dataset.lessonId));
  });
}

/**
 * Heuristic: for a given era/region cell, find any lessons whose contents
 * substantially overlap. For our 6 legacy lessons mapped to specific cells.
 */
function findLessonsForCell(eraId, regionId) {
  const map = {
    'ancient-worlds:middle-east-north-africa':       ['egyptian-ancient-01'],
    'renaissances-empires:europe':                   ['italian-renaissance-01', 'northern-renaissance-01', 'dutch-golden-age-01'],
    'revolution-industry:europe':                    ['impressionism-01'],
    'modernism:modern-americas':                     ['american-modernism-01'],
  };
  const key = `${eraId}:${regionId}`;
  const ids = map[key] || [];
  return ids.map(getLesson).filter(Boolean);
}

function isLessonCompleted(lessonId) {
  const state = getState();
  for (const movId in state.movementProgress) {
    if ((state.movementProgress[movId].lessonsCompleted || []).includes(lessonId)) {
      return true;
    }
  }
  return false;
}

function renderTimelineGrid(container) {
  const eras = getEras();
  const regions = getRegions();
  const populatedRegions = regions.filter(r =>
    getAllArtworks().some(a => a.regionId === r.id)
  );

  const headerCells = [`<div class="timeline-grid__cell timeline-grid__header"></div>`];
  for (const era of eras) {
    headerCells.push(`
      <div class="timeline-grid__cell timeline-grid__header" title="${era.name}">${era.name}</div>
    `);
  }

  const rows = populatedRegions.map(region => {
    const cells = [`<div class="timeline-grid__cell timeline-grid__row-label">${region.name}</div>`];
    for (const era of eras) {
      const arts = getArtworksForCell(era.id, region.id);
      if (arts.length === 0) {
        cells.push(`<div class="timeline-grid__cell"></div>`);
      } else {
        const dots = arts.map(a => {
          const state = getNodeState(a.id);
          return `<span class="timeline-dot" data-state="${state}" data-artwork-id="${a.id}" title="${a.title}"></span>`;
        }).join('');
        cells.push(`
          <div class="timeline-grid__cell" data-era-id="${era.id}" data-region-id="${region.id}">
            <div class="timeline-grid__cell-content">${dots}</div>
          </div>
        `);
      }
    }
    return cells.join('');
  }).join('');

  container.innerHTML = `
    <div class="timeline-grid__wrap">
      <div class="timeline-grid" style="grid-template-columns: 100px repeat(${eras.length}, minmax(80px, 1fr));">
        ${headerCells.join('')}
        ${rows}
      </div>
    </div>
    <div style="padding: var(--space-3) 0; text-align: center; font-family: var(--font-serif); font-style: italic; color: var(--color-sepia); font-size: var(--type-body-s);">

    </div>
    <div id="cell-detail"></div>
  `;

  container.querySelectorAll('.timeline-dot').forEach(dot => {
    dot.addEventListener('click', () => showArtworkPreview(dot.dataset.artworkId));
  });
}

function showArtworkPreview(artworkId) {
  const art = getArtwork(artworkId);
  if (!art) return;
  const detail = document.getElementById('cell-detail');
  if (!detail) return;
  const region = getRegion(art.regionId);
  const era = getEra(art.eraId);
  detail.innerHTML = `
    <div class="card" style="margin-top: var(--space-5);">
      <div style="display: flex; gap: var(--space-3); align-items: flex-start;">
        <img src="${art.image || buildPlacard(art)}" data-placard="${buildPlacard(art)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" style="width: 100px; height: 100px; object-fit: cover; border-radius: var(--radius-sm); flex-shrink: 0;" alt="${art.title}" />
        <div style="flex: 1; min-width: 0;">
          <div class="eyebrow" style="margin-bottom: 2px;">${region?.name || ''} · ${era?.name || ''}</div>
          <h3 style="font-size: var(--type-body-l); margin-bottom: 2px;">${art.title}</h3>
          <p style="font-size: var(--type-body-s); color: var(--color-sepia); margin: 0;">${formatYear(art.year)}</p>
        </div>
      </div>
    </div>
  `;
  detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderTileGrid(container) {
  const artworks = getAllArtworks();
  const state = getState();
  container.innerHTML = `
    <div class="collection-grid">
      ${artworks.map(art => {
        const s = state.artworkState[art.id];
        const encountered = s && s.encountered;
        return `
          <div class="collection-tile ${encountered ? '' : 'is-faint'}">
            <img src="${art.image || buildPlacard(art)}" data-placard="${buildPlacard(art)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" alt="${art.title}" />
            <div class="collection-tile__caption">${art.title}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function formatYear(year) {
  if (!year && year !== 0) return '';
  if (year < 0) return `${Math.abs(year)} BCE`;
  return String(year);
}

  { id: 'whitney', name: 'Whitney (New York)' },
  { id: 'frick', name: 'The Frick (New York)' },
  { id: 'neue-galerie', name: 'Neue Galerie (New York)' },
  { id: 'nga-dc', name: 'National Gallery of Art (Washington DC)' },
  { id: 'aic', name: 'Art Institute of Chicago' },
  { id: 'dma', name: 'Dallas Museum of Art' },
  { id: 'national-gallery-london', name: 'National Gallery (London)' },
  { id: 'tokyo-national', name: 'Tokyo National Museum' },
  { id: 'national-western-tokyo', name: 'National Museum of Western Art (Tokyo)' },
];

let step = 'intro';
let walkthroughIndex = 0;
let walkthroughQueue = [];

function renderOnboarding() {
  const state = getState();
  // Resume at the right step
  if (!state.displayName) step = 'intro';
  else if (!state.hasCompletedIntro) step = 'museums';
  else if (!state.hasCompletedWalkthrough) step = 'walkthrough';
  else { navigate('today'); return; }

  if (step === 'intro') renderIntroStep();
  else if (step === 'museums') renderMuseumsStep();
  else if (step === 'walkthrough') renderWalkthroughStep();
}

function renderIntroStep() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="onboarding">
      <div class="onboarding__intro">
        <div class="onboarding__title">Accession</div>
        <div class="onboarding__subtitle">A slow, careful tour through the history of art</div>
      </div>
      <div class="onboarding__body">
        <p style="text-align: center; margin: var(--space-8) auto; max-width: 320px;">
          The plan is simple. Each day, you spend a few minutes with a handful of artworks.
          Over weeks, you build a sense of when, where, and by whom — so that when you next
          walk into a museum, the labels feel like footnotes.
        </p>
        <div style="margin-top: var(--space-8);">
          <label class="eyebrow" style="display: block; margin-bottom: var(--space-2);">Your name</label>
          <input
            type="text"
            id="name-input"
            placeholder="Hunter"
            style="width: 100%; padding: var(--space-4); border: 1.5px solid var(--color-line-strong); border-radius: var(--radius-md); font-family: var(--font-serif); font-size: var(--type-body-l); background: var(--color-paper-light); color: var(--color-ink);"
          />
        </div>
      </div>
      <div class="onboarding__footer">
        <button class="btn btn--primary btn--full btn--lg" id="next-btn">Begin</button>
      </div>
    </div>
  `;
  const input = document.getElementById('name-input');
  input.focus();
  document.getElementById('next-btn').addEventListener('click', () => {
    const name = input.value.trim();
    if (!name) {
      input.focus();
      return;
    }
    updateState({ displayName: name, hasCompletedIntro: true });
    step = 'museums';
    renderMuseumsStep();
  });
}

function renderMuseumsStep() {
  const app = document.getElementById('app');
  const state = getState();
  app.innerHTML = `
    <div class="onboarding">
      <div style="margin-bottom: var(--space-5); padding-top: var(--space-6);">
        <div class="eyebrow" style="margin-bottom: var(--space-2);">Step 1 of 2</div>
        <h1 style="font-size: var(--type-display-l); margin-bottom: var(--space-2);">Which museums have you visited?</h1>
        <p style="font-size: var(--type-body-m);">We will use this to help you remember works you have already stood in front of.</p>
      </div>
      <div class="onboarding__body">
        <div class="museum-checklist" id="museum-checklist">
          ${MUSEUMS_TO_ASK.map(m => `
            <div class="museum-checkbox ${state.visitedMuseums.includes(m.id) ? 'is-checked' : ''}" data-museum-id="${m.id}">
              <div class="museum-checkbox__box"></div>
              <div class="museum-checkbox__name">${m.name}</div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="onboarding__footer">
        <button class="btn btn--primary btn--full btn--lg" id="continue-btn">Continue</button>
      </div>
    </div>
  `;
  app.querySelectorAll('.museum-checkbox').forEach(box => {
    box.addEventListener('click', () => {
      const id = box.dataset.museumId;
      const visited = getState().visitedMuseums;
      const isChecked = visited.includes(id);
      updateState(s => {
        s.visitedMuseums = isChecked
          ? s.visitedMuseums.filter(x => x !== id)
          : [...s.visitedMuseums, id];
      });
      box.classList.toggle('is-checked');
    });
  });
  document.getElementById('continue-btn').addEventListener('click', () => {
    step = 'walkthrough';
    renderWalkthroughStep();
  });
}

function renderWalkthroughStep() {
  const app = document.getElementById('app');
  const state = getState();
  // Build the queue: every artwork from movements that touch visited museums,
  // starting with the Met (since our MVP is Met-anchored).
  if (walkthroughQueue.length === 0) {
    walkthroughQueue = getAllArtworks().slice();
    walkthroughIndex = 0;
  }
  const art = walkthroughQueue[walkthroughIndex];
  if (!art) {
    finishWalkthrough();
    return;
  }
  const artist = art.artistId ? getArtist(art.artistId) : null;
  const movement = getMovement(art.movementId);
  markEncountered(art.id);

  const progressPct = ((walkthroughIndex + 1) / walkthroughQueue.length) * 100;

  app.innerHTML = `
    <div class="onboarding">
      <div style="margin-bottom: var(--space-4); padding-top: var(--space-2);">
        <div class="lesson-progress-bar" style="margin-bottom: var(--space-4);">
          <div class="lesson-progress-bar__fill" style="width: ${progressPct}%"></div>
        </div>
        <div class="eyebrow" style="margin-bottom: var(--space-2);">Step 2 of 2 · ${walkthroughIndex + 1} of ${walkthroughQueue.length}</div>
        <h1 style="font-size: var(--type-display-m); margin-bottom: 0;">Seen this one?</h1>
        <p style="font-size: var(--type-body-s); margin: var(--space-1) 0 0;">Tap once for each work. Quick and approximate is fine.</p>
      </div>
      <div class="onboarding__body">
        <div class="walkthrough-card">
          <img class="walkthrough-card__image" src="${art.image || buildPlacard(art)}" data-placard="${buildPlacard(art)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" data-met-id="${art.metObjectId || ''}" alt="${art.title}" />
          <div class="walkthrough-card__body">
            <h2 class="walkthrough-question" style="font-size: var(--type-display-m);">${art.title}</h2>
            <div class="walkthrough-meta">${artist ? artist.shortName + ' · ' : ''}${formatYear(art.year)} · ${movement?.shortName || ''}</div>
            <div class="walkthrough-choices">
              <button class="walkthrough-choice" data-value="yes">
                <span class="walkthrough-choice__icon">✓</span>
                Yes
              </button>
              <button class="walkthrough-choice" data-value="maybe">
                <span class="walkthrough-choice__icon">?</span>
                Maybe
              </button>
              <button class="walkthrough-choice" data-value="no">
                <span class="walkthrough-choice__icon">·</span>
                No
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="onboarding__footer">
        <button class="btn btn--secondary btn--full" id="skip-btn">Skip rest</button>
      </div>
    </div>
  `;

  app.querySelectorAll('.walkthrough-choice').forEach(btn => {
    btn.addEventListener('click', () => {
      setSeenInPerson(art.id, btn.dataset.value);
      walkthroughIndex += 1;
      renderWalkthroughStep();
    });
  });
  document.getElementById('skip-btn').addEventListener('click', () => {
    if (confirm('Skip the rest of the walkthrough? You can redo it from your profile any time.')) {
      finishWalkthrough();
    }
  });
}

function finishWalkthrough() {
  updateState({ hasCompletedWalkthrough: true });
  walkthroughQueue = [];
  walkthroughIndex = 0;
  navigate('today');
}

function formatYear(year) {
  if (!year && year !== 0) return '';
  if (year < 0) return `${Math.abs(year)} BCE`;
  return year;
}


/* ========== js/app.js ========== */

/* ============================================================
   ACCESSION - APP ENTRY
   Boots the app, loads content, routes between views.
   ============================================================ */











/**
 * Find all <img data-met-id="..."> elements on the page and resolve their
 * canonical Met image URLs. Called automatically after every render.
 */
function hydrateAllMetImages() {
  document.querySelectorAll('img[data-met-id]').forEach(img => {
    const metId = img.getAttribute('data-met-id');
    if (metId && metId !== 'null') hydrateMetImage(img, metId);
  });
}

// Currently rendered view ID, used to highlight the tab.
let currentView = null;

/**
 * Navigate to a named view. Renders the view and updates the tab bar.
 */
function navigate(view) {
  currentView = view;

  switch (view) {
    case 'today':       renderToday(); break;
    case 'learn':       renderLearn(); break;
    case 'collection':  renderCollection(); break;
    case 'profile':     renderProfile(); break;
    case 'onboarding':  renderOnboarding(); break;
    default:            renderToday();
  }

  // The tab bar lives outside the #app, so we render it once and update its active state.
  renderTabBar();
  // Hydrate any Met images on the page
  hydrateAllMetImages();
  // Scroll to top on navigation
  window.scrollTo(0, 0);
}

/**
 * Start a lesson by ID. Exposed from app.js so views can call it without
 * importing the engine directly (cleaner dependency graph).
 */
function startLesson(lessonId) {
  currentView = 'lesson';
  startLessonImpl(lessonId);
  renderTabBar(); // Hide tab bar during lesson
}

/**
 * Render the bottom tab bar. Hidden during lessons and onboarding.
 */
function renderTabBar() {
  let bar = document.getElementById('tab-bar');
  const showBar = ['today', 'learn', 'collection', 'profile'].includes(currentView);

  if (!showBar) {
    if (bar) bar.remove();
    return;
  }

  const html = `
    <nav class="tab-bar" id="tab-bar" role="tablist">
      ${tabItem('today', 'Today', tabIcon('today'))}
      ${tabItem('learn', 'Learn', tabIcon('learn'))}
      ${tabItem('collection', 'Collection', tabIcon('collection'))}
      ${tabItem('profile', 'Profile', tabIcon('profile'))}
    </nav>
  `;

  if (!bar) {
    document.body.insertAdjacentHTML('beforeend', html);
    bar = document.getElementById('tab-bar');
    // Wire up clicks once
    bar.querySelectorAll('.tab-bar__item').forEach(btn => {
      btn.addEventListener('click', () => navigate(btn.dataset.view));
    });
  } else {
    // Just update active state
    bar.querySelectorAll('.tab-bar__item').forEach(btn => {
      btn.classList.toggle('is-active', btn.dataset.view === currentView);
    });
  }
}

function tabItem(id, label, iconSvg) {
  return `
    <button class="tab-bar__item ${currentView === id ? 'is-active' : ''}" data-view="${id}" role="tab" aria-label="${label}">
      ${iconSvg}
      <span>${label}</span>
    </button>
  `;
}

/**
 * Inline SVG icons for the tab bar.
 * Drawn fresh rather than imported to keep the bundle tiny.
 */
function tabIcon(name) {
  const stroke = `class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"`;
  switch (name) {
    case 'today':
      // Sunrise / horizon glyph
      return `<svg ${stroke}><path d="M3 18h18M5 14l7-7 7 7M9 18v-3M15 18v-3"/></svg>`;
    case 'learn':
      // Open book glyph
      return `<svg ${stroke}><path d="M4 5v14a2 2 0 002 2h5V7a2 2 0 00-2-2H4zM20 5v14a2 2 0 01-2 2h-5V7a2 2 0 012-2h5z"/></svg>`;
    case 'collection':
      // Constellation: three dots with connecting lines
      return `<svg ${stroke}><circle cx="6" cy="7" r="1.5"/><circle cx="18" cy="9" r="1.5"/><circle cx="12" cy="17" r="1.5"/><path d="M7 8l10 1M17 10l-5 6M7 8l5 9"/></svg>`;
    case 'profile':
      // Simple person glyph
      return `<svg ${stroke}><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>`;
    default:
      return '';
  }
}

/**
 * Decide what to show on first load.
 * - Brand-new user: onboarding.
 * - Returning user: today.
 */
function decideStartView() {
  const state = getState();
  if (!state.hasCompletedIntro || !state.hasCompletedWalkthrough) {
    return 'onboarding';
  }
  return 'today';
}

/* ===== BOOT SEQUENCE ===== */
async function boot() {
  // 1. Load persisted state from localStorage
  loadState();
  // 2. Load all bundled content (small JSON files)
  await loadContent();
  // 3. Initialize sync (fires & forgets — works without it)
  initSync().catch(err => console.warn('Sync init error:', err));
  // 4. Route to first view
  navigate(decideStartView());
}

// Kick off when the DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}

})();
</script>
