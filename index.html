inferior, using simplified forms because the craft declined after Alexander", "Hellenistic sculpture moved toward emotional intensity and psychological complexity, while Classical sculpture favored serene idealism and composure", "Hellenistic sculpture shows only gods and heroes, while Classical sculpture depicts ordinary people", "The difference is only one of scale \u2014 Hellenistic sculptures are larger but otherwise identical in style"], "correctIndex": 1, "explanation": "Classical sculpture (roughly 480\u2013323 BCE) idealized its subjects \u2014 calm, composed, at their most rational. Hellenistic sculpture (323\u201331 BCE) discovered drama: figures strain, suffer, twist mid-action. The Laoco\u00f6n, the Dying Gaul, the Winged Victory \u2014 all Hellenistic \u2014 reach for emotional states that Classical sculpture deliberately avoided."}, "lat": 37.97, "lng": 23.72}, "met-hokusai-great-wave": {"id": "met-hokusai-great-wave", "title": "Under the Wave off Kanagawa (The Great Wave)", "artistId": "hokusai", "year": 1831, "decade": 1830, "eraId": "revolution-industry", "regionId": "east-asia", "subRegionId": "japanese", "museumId": "met", "medium": "Polychrome woodblock print (nishiki-e)", "dimensions": "25.7 x 37.9 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Tsunami%20by%20hokusai%2019th%20century.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art, H. O. Havemeyer Collection, 1929", "metObjectId": 45434, "famousLevel": 5, "wallLabel": "Three fishing boats race a wave the size of a hill. Mount Fuji sits small in the distance, framed by the wave's claw of spray. The first print in Hokusai's Thirty-six Views of Mount Fuji series, published around 1831 when he was seventy. The blue is Prussian blue, a synthetic pigment imported from Europe \u2014 a small detail of trade that lets us date Japanese prints precisely.", "longForm": "The Great Wave is possibly the most reproduced image in art history. It was made for ordinary buyers in Edo (now Tokyo) and originally sold for the price of a bowl of noodles. Hokusai was in his seventies, working on his series of Mount Fuji views \u2014 Fuji is visible in every one of the thirty-six prints, often hidden cleverly in the composition. When Japan opened to trade in the 1850s and prints flooded into Europe, the Great Wave directly inspired Monet, Van Gogh, Debussy, and an entire wave of European modernism. The wave itself contains echoes of European linear perspective that Hokusai had encountered in Dutch prints \u2014 a quiet two-way exchange of influence between East and West.", "tags": ["woodblock-print", "ukiyo-e", "edo-period", "hokusai-fuji"], "comprehensionQuestion": {"question": "What small detail of the Great Wave reveals the trade connections between Japan and Europe in the early 19th century?", "options": ["The fishing boats use European-style rigging not native to Japan", "The blue pigment is Prussian blue \u2014 a synthetic color invented in Berlin around 1704 and imported to Japan through Dutch traders, making it possible to date Japanese prints that use it", "The wave's shape was copied from a European engraving of the Atlantic Ocean", "Mount Fuji is shown in a style borrowed from Dutch landscape painting"], "correctIndex": 1, "explanation": "Prussian blue \u2014 a vivid, stable synthetic pigment invented in Berlin around 1704 \u2014 reached Japan through the Dutch East India Company's trading post at Nagasaki. Hokusai adopted it enthusiastically in the 1820s-30s. This means we can date Japanese prints that use it to after its arrival in Japan, and it's a quiet reminder that the 'purely Japanese' Great Wave contains a trace of European chemistry."}, "lat": 35.69, "lng": 139.69}, "met-hopper-tables": {"id": "met-hopper-tables", "title": "Tables for Ladies", "artistId": "hopper", "year": 1930, "decade": 1930, "movementId": "american-modernism", "museumId": "met", "medium": "Oil on canvas", "dimensions": "122.6 x 153 cm", "image": "https://upload.wikimedia.org/wikipedia/en/d/da/Tables_for_Ladies%2C_Edward_Hopper%2C_1930.jpg", "imageCredit": "Public domain via fair use, The Metropolitan Museum of Art, George A. Hearn Fund, 1931", "famousLevel": 4, "wallLabel": "A waitress arranges fruit at the front of a New York restaurant whose name, painted on the window, was a Depression-era convention signaling that unaccompanied women were welcome. A cashier counts at the register; a couple dines in the background. The acid yellow electric light is the painting's most modern element.", "longForm": "Hopper painted this in 1930, the first full year of the Great Depression, when 'Tables for Ladies' signs were proliferating as restaurants tried to attract a respectable middle-class clientele who would have previously eaten only at home or in private clubs. The Met acquired it the following year, an unusually quick recognition. Note the construction of the space: the diagonal of the counter pulls the eye in from the lower right, the vertical of the windows holds the composition together, and the small black cat on the chair in the background is the only animate creature not actively at work.", "tags": ["urban-scene", "depression-era", "electric-light", "waitress"], "details": [{"crop": "waitress", "x": 0.3, "y": 0.5, "label": "Waitress arranging fruit"}, {"crop": "couple", "x": 0.75, "y": 0.55, "label": "The dining couple"}], "metObjectId": 488978, "imageSource": "wikipedia-fair-use", "eraId": "modernism", "regionId": "americas", "subRegionId": "us-american", "comprehensionQuestion": {"question": "What social change does the title 'Tables for Ladies' reference, and why did Hopper choose this moment to paint it?", "options": ["The title refers to a new custom of women hosting dinner parties in their own homes", "It references restaurant signs advertising that single women would be treated respectfully \u2014 not assumed to be prostitutes \u2014 a social shift of the early 20th century that Hopper captured at the height of the Depression", "The title ironically refers to the lack of tables available to women in the painting", "Tables for Ladies was a phrase meaning outdoor caf\u00e9 seating, newly fashionable in 1930s New York"], "correctIndex": 1, "explanation": "Restaurants began posting 'Tables for Ladies' signs in the early 20th century to signal that women dining alone or together would not be harassed or assumed to be soliciting. Hopper painted this in 1930, during the Depression, when the women at work in the painting hold newly-available public roles as cashier and waitress. The painting documents a social transition in the way women occupied public space."}, "lat": 40.71, "lng": -74.01}, "met-ife-head": {"id": "met-ife-head", "title": "Crowned Head of an Ooni (King)", "artistId": null, "year": 1300, "decade": 1300, "eraId": "sacred-medieval", "regionId": "sub-saharan-africa", "subRegionId": "ife", "museumId": null, "medium": "Copper alloy with traces of red and black pigment", "dimensions": "approx. 31 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Arte%20yoruba%2C%20nigeria%2C%20testa%20da%20ife%2C%2012-15mo%20secolo.JPG?width=1200", "imageSource": "wikimedia", "imageCredit": "Photo public domain via Wikimedia Commons", "famousLevel": 5, "wallLabel": "A life-size head cast in copper alloy in the Yoruba city of Ife, present-day Nigeria, around 1300 CE. Probably an idealized portrait of an Ooni \u2014 a king-priest of Ife \u2014 used in second burial ceremonies where the deceased's body had decomposed. The naturalism stunned European researchers in 1910; the German anthropologist Leo Frobenius initially claimed they must be evidence of a lost Greek colony in Africa. They were not.", "longForm": "Ife was the spiritual capital of Yoruba civilization and a major political power from roughly the 11th to 15th centuries. Its sculptors produced bronze and terracotta heads of a refined naturalism that has no clear parallel in West African art before or since. The faces have parallel scarification lines, plump cheeks, almond eyes, full lips. They were used in second burials \u2014 re-creations of the deceased ruler's body as part of the ritual transfer of power. Most known Ife heads are now in Nigeria; a small number are at the British Museum and other Western collections. The Ooni of Ife today is still a major Yoruba religious authority.", "tags": ["copper-alloy", "naturalism", "royal-portrait", "yoruba"], "comprehensionQuestion": {"question": "Why did European scholars initially refuse to believe that the Ife heads were made by African artists?", "options": ["The Ife heads were found alongside European trade goods, suggesting a workshop collaboration", "The heads' naturalism was so sophisticated it contradicted colonial-era assumptions that sub-Saharan Africans were incapable of high artistic achievement \u2014 some scholars invented impossible alternative origins including ancient Greece", "The technique of bronze casting was not known in West Africa until European contact", "The Ife heads were made in a style identical to Greek sculpture, suggesting a shared teacher"], "correctIndex": 1, "explanation": "When Leo Frobenius encountered Ife heads in 1910, he attributed them to a lost Greek or Atlantean colony in Africa. This was not ignorance but ideology: the colonial project depended on the idea that African civilizations were primitive. Naturalistic portrait sculpture of this quality \u2014 equal or superior to contemporaneous European work \u2014 was evidence that the ideology was false, so the ideology rejected the evidence. We now know Ife heads date to the 11th-15th centuries CE and represent an indigenous Yoruba tradition of royal portraiture."}, "lat": 7.47, "lng": 4.56}, "met-illuminated-manuscript": {"id": "met-illuminated-manuscript", "title": "Initial Page from the Belles Heures of Jean de France", "artistId": null, "year": 1410, "decade": 1410, "eraId": "sacred-medieval", "regionId": "europe", "subRegionId": "french", "museumId": "met", "medium": "Tempera, gold, ink on vellum", "dimensions": "approx. 24 x 17 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Tr%C3%A8s%20Riches%20Heures%20du%20Duc%20de%20Berry%20Janvier.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art (Cloisters Collection)", "famousLevel": 4, "wallLabel": "A page from the Belles Heures of Jean de France, Duc de Berry \u2014 a richly illustrated book of hours made between 1405 and 1409 by the Limbourg brothers, three Flemish brothers working at the French court. Books of hours were private prayer books for the wealthy, with prayers for each canonical hour of the day.", "longForm": "The Limbourg brothers \u2014 Paul, Jean, and Herman \u2014 were arguably the most skilled illuminators of the late medieval period. They worked exclusively for the Duc de Berry, a fabulously wealthy collector who also commissioned the famous Tr\u00e8s Riches Heures (now at the Mus\u00e9e Cond\u00e9). Both manuscripts demonstrate the technical and observational sophistication that Flemish painters were developing in the decades just before oil paint would revolutionize panel painting. The Belles Heures is one of the only Limbourg manuscripts to survive nearly complete; it is the centerpiece of the Met Cloisters' medieval collection.", "tags": ["illuminated-manuscript", "book-of-hours", "limbourg-brothers", "international-gothic"], "comprehensionQuestion": {"question": "What was a Book of Hours, and who were they made for?", "options": ["A liturgical book used by priests during Mass, made for cathedral libraries", "A private prayer book organized around the canonical hours of the day, made for wealthy laypeople", "A scientific text measuring celestial hours, made for court astronomers", "A book recording the hours of a monastery's daily schedule, made for abbots"], "correctIndex": 1, "explanation": "Books of Hours were the medieval equivalent of a personal spiritual practice guide \u2014 prayers for each of the eight canonical hours (Matins, Lauds, Prime, Terce, Sext, None, Vespers, Compline), richly illustrated for wealthy patrons who could afford them. The Limbourg brothers' Belles Heures was made for one of the wealthiest men in France."}, "lat": 48.86, "lng": 2.35}, "met-indus-seal": {"id": "met-indus-seal", "title": "Indus Valley Steatite Seal", "artistId": null, "year": -2300, "decade": -2300, "eraId": "ancient-worlds", "regionId": "south-asia", "subRegionId": "indian", "museumId": null, "medium": "Steatite (soapstone)", "dimensions": "approx. 3 cm square", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Pashupati%20Seal%20from%20the%20Harappan%20Civilization.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain photo via Wikimedia Commons", "famousLevel": 4, "wallLabel": "A small carved steatite seal from the Indus Valley Civilization (modern Pakistan and northwest India), bearing a humped bull and a line of script that has never been deciphered. Made around 2300 BCE, these seals were used to stamp clay tablets \u2014 probably for trade \u2014 and traveled as far as Mesopotamia.", "longForm": "The Indus Valley Civilization, contemporary with Old Kingdom Egypt and the Sumerian city-states, may have been the largest urban civilization of its time. Its cities \u2014 Mohenjo-daro, Harappa, Dholavira \u2014 were laid out on grids with standardized brick sizes, sophisticated drainage, and what appear to be public granaries. Then, around 1900 BCE, it collapsed. The script on these seals remains undeciphered, possibly because no bilingual key has ever been found. We cannot read their literature, their laws, or even their names.", "tags": ["indus-valley", "seal", "undeciphered-script", "bronze-age"], "comprehensionQuestion": {"question": "What is the most significant unsolved mystery of the Indus Valley Civilization?", "options": ["Where its cities were located", "Its writing system, found on thousands of seals like this one, has never been deciphered", "Whether it had any art at all", "How its people transported the large stone seals"], "correctIndex": 1, "explanation": "The Indus script appears on hundreds of seals and has defied all attempts at decipherment. Without a bilingual text, we cannot read their language. We know more about ancient Sumerian merchants from 4,000 years ago than we know about the Indus people who may have been their trading partners."}, "lat": 27.33, "lng": 68.14}, "met-islamic-ceramic": {"id": "met-islamic-ceramic", "title": "Bowl with Arabic Inscription", "artistId": null, "year": 950, "decade": 950, "eraId": "sacred-medieval", "regionId": "middle-east-north-africa", "subRegionId": "islamic", "museumId": "met", "medium": "Earthenware with slip and underglaze", "dimensions": "approx. 28 cm diameter", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Nishapur%20Samanid%20ware%20inscription.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "A 10th-century earthenware bowl from the Samanid dynasty of present-day Iran and Central Asia, inscribed in elegant Kufic with an Arabic proverb: 'Knowledge: its beginning is bitter to taste, but its end is sweeter than honey.' The text is the entire ornament.", "longForm": "Samanid epigraphic pottery is one of the great expressions of Islamic ceramic art. Made in Nishapur (in present-day Iran) and Samarkand (in present-day Uzbekistan), these bowls used the elegant attenuated Kufic of the period as their sole decoration, often inscribing aphorisms about hospitality, knowledge, or proper conduct around the rim. They were luxury objects, but the messages were everyday wisdom \u2014 meant to be encountered repeatedly by guests at a meal. The technical innovation was applying the script in dark slip directly to the white slip ground, then sealing it under a clear lead glaze.", "tags": ["samanid", "ceramic", "kufic", "central-asia"], "comprehensionQuestion": {"question": "What does the Samanid bowl's inscribed proverb reveal about how Islamic decorative art was experienced?", "options": ["Islamic ceramics were purely decorative with no textual function", "Text on objects was meant to be read during use \u2014 at a meal, a proverb about knowledge would reach the diner as they ate", "The inscriptions were purely ornamental and most viewers couldn't read them", "The proverb identifies the workshop that made the bowl"], "correctIndex": 1, "explanation": "Samanid epigraphic ware placed aphorisms about hospitality, knowledge, and conduct on the interior of bowls \u2014 visible only when in use, during a meal. The text was meant to be encountered repeatedly by diners. The art was designed for active experience, not passive display. This integration of text and object is a defining feature of Islamic visual culture."}, "lat": 36.21, "lng": 59.62}, "met-iznik-tile": {"id": "met-iznik-tile", "title": "Tile Panel with Floral Scrolls", "artistId": null, "year": 1570, "decade": 1570, "eraId": "sacred-medieval", "regionId": "middle-east-north-africa", "subRegionId": "islamic", "museumId": "met", "medium": "Fritware with underglaze painting", "dimensions": "approx. 28 x 28 cm (each tile)", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Rustem%20Pasha%20Mosque%20tile%20detail.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "Ottoman Iznik tiles from the second half of the 16th century, when the workshops of Iznik in western Turkey were producing the finest ceramics in the Islamic world. The brilliant red ('tomato red' or 'sealing-wax red') that appears from around 1555 was a technical breakthrough not achieved by any other ceramic tradition \u2014 a raised slip of Armenian bole that fires to a dense, vivid red under the colorless glaze.", "longForm": "Iznik ceramics are named for the Turkish city of Iznik (ancient Nicaea, where the famous Christian council was held in 325 CE). The Iznik workshops produced tiles, vessels, and architectural revetments for the Ottoman court from the late 15th century until around 1700, when demand and quality declined together. The finest Iznik pieces \u2014 from roughly 1530-1600 \u2014 are distinguished by the so-called 'tomato red,' a thick raised slip of Armenian bole that fires separately from the other pigments, creating a slightly three-dimensional surface. The S\u00fcleymaniye Mosque and the R\u00fcstem Pasha Mosque in Istanbul contain the most extensive Iznik tilework programs.", "tags": ["ottoman", "iznik", "tiles", "underglaze"], "comprehensionQuestion": {"question": "What is the 'tomato red' of Iznik ceramics, and why did it disappear after about 1700?", "options": ["Tomato red was achieved using a Spanish cochineal dye imported after 1492", "Armenian bole \u2014 a thick slip of iron-rich clay \u2014 was applied in raised relief and fired to produce a vivid, slightly three-dimensional red impossible to achieve as a flat underglaze; the technique died when the specialist workshops declined after 1700", "Tomato red was a trade secret discovered by a single Iznik master and lost with his death", "The red pigment was imported from Persia and trade routes were disrupted, ending its supply"], "correctIndex": 1, "explanation": "The vivid 'sealing-wax red' of finest Iznik ware is produced by Armenian bole \u2014 a slip rich in iron oxide \u2014 applied thickly enough to stand slightly above the surface in low relief, then fired under the transparent glaze. The result has a slight three-dimensionality and a density of color that no other ceramic tradition achieved. As the Ottoman empire's imperial patronage declined after 1700, the workshops that maintained this demanding technique contracted and the knowledge was lost."}, "lat": 40.43, "lng": 29.72}, "met-jade-burial-suit": {"id": "met-jade-burial-suit", "title": "Jade Burial Suit", "artistId": null, "year": -120, "decade": -120, "eraId": "ancient-worlds", "regionId": "east-asia", "subRegionId": "chinese", "museumId": null, "medium": "Jade plaques sewn with gold wire", "dimensions": "approx. 175 cm long", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Xihan%20Tomb%201%20Jade%20Burial%20Suit.JPG?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain photo via Wikimedia Commons", "famousLevel": 4, "wallLabel": "A Han dynasty jade burial suit, made of over 2,000 small jade plaques sewn together with gold wire to encase the body of an aristocrat. Jade was believed to prevent decomposition. The most famous example, found in the tomb of Prince Liu Sheng at Mancheng in 1968, contained over 4 kilograms of gold thread.", "longForm": "Han dynasty (206 BCE-220 CE) elite tombs were vast underground palaces stocked with everything the deceased might need in the afterlife \u2014 food, servants, attendants, animals, currency. The jade burial suits represented the most extreme expression of this practice. Jade had been considered a substance with magical preservative properties in China since the Neolithic; encasing the body in jade was meant to preserve it intact for the soul to return to. They didn't work \u2014 the bodies inside have invariably decomposed \u2014 but the suits survive in stunning condition, monuments to the labor and wealth of the Han aristocracy.", "tags": ["han-dynasty", "jade", "burial", "elite-tomb"], "comprehensionQuestion": {"question": "Did jade burial suits actually preserve the bodies inside them?", "options": ["Yes \u2014 all known suits contain perfectly preserved remains", "No \u2014 every known suit contains fully decomposed remains; the belief that jade prevented decay was simply wrong", "Partially \u2014 jade preserved the skeleton but not soft tissue", "Unknown \u2014 no suits have ever been opened"], "correctIndex": 1, "explanation": "The jade burial suits failed at their stated purpose. Every suit opened by archaeologists has contained fully decomposed remains. The belief that jade \u2014 connected to heaven, eternal, imperishable \u2014 could prevent bodily decay was a religious conviction, not an empirical one. The suits survive; the bodies do not."}, "lat": 38.87, "lng": 115.47}, "met-korean-celadon": {"id": "met-korean-celadon", "title": "Maebyeong (Plum) Bottle with Inlaid Cranes and Clouds", "artistId": null, "year": 1250, "decade": 1250, "eraId": "sacred-medieval", "regionId": "east-asia", "subRegionId": "korean", "museumId": "met", "medium": "Stoneware with inlaid decoration under celadon glaze", "dimensions": "approx. 34 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Korean%20-%20Maebyong%20-%20Walters%20491326.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "A Goryeo dynasty Korean celadon bottle inlaid with white and black slip in patterns of cranes and clouds, made around 1250. The technique \u2014 sanggam, where designs are carved into the leather-hard clay body, filled with contrasting slips, then covered with the characteristic blue-green celadon glaze \u2014 was a Korean innovation that produced some of the most prized ceramics in East Asia.", "longForm": "Goryeo celadon (918-1392) was so prized that it was exported to Song dynasty China, which itself produced extraordinary celadon \u2014 a rare case of Chinese collectors importing Korean ceramics rather than the other way around. The sanggam inlay technique was perfected in Korea in the 12th century and produced these characteristic decorative designs of cranes, lotus, clouds, and willows, all rendered in delicate white and black slip beneath the soft blue-green glaze. After the Mongol invasions of the 13th century and the subsequent fall of the Goryeo, the technique declined; later Joseon dynasty Korean ceramics took a different aesthetic direction entirely.", "tags": ["goryeo", "celadon", "sanggam", "korean"], "comprehensionQuestion": {"question": "What made Goryeo celadon remarkable enough to be exported back to Song dynasty China?", "options": ["Korean celadon was cheaper than Chinese ceramics", "The Korean sanggam inlay technique \u2014 filling carved designs with contrasting slips \u2014 was a uniquely Korean innovation that Chinese potters admired and could not replicate", "Chinese demand for celadon had declined, making Korean exports fill a gap", "Korean celadon was heavier and more durable than Chinese equivalents"], "correctIndex": 1, "explanation": "China produced extraordinary celadon in the Song period, yet Chinese collectors imported Korean Goryeo celadon. The sanggam technique \u2014 carving the leather-hard clay body, filling the incisions with white and black slips, then applying celadon glaze \u2014 produced patterns of cranes, lotus, and clouds that were uniquely Korean. This represents a rare case of cultural flow from Korea to China rather than the reverse."}, "lat": 35.16, "lng": 128.6}, "met-kouros": {"id": "met-kouros", "title": "Marble Statue of a Kouros (Youth)", "artistId": null, "year": -590, "decade": -590, "eraId": "ancient-worlds", "regionId": "europe", "subRegionId": "greek-byzantine", "museumId": "met", "medium": "Marble", "dimensions": "194.6 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Marble%20statue%20of%20a%20kouros%20%28youth%29%20MET%20DT247656.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "metObjectId": 253370, "famousLevel": 5, "wallLabel": "An early Greek statue of a nude young man, made in Attica around 590 BCE. The pose \u2014 left foot forward, arms at sides, fists clenched \u2014 was borrowed directly from Egyptian sculpture, but the Greeks would, within two centuries, evolve it into the contrapposto realism of the Classical period.", "longForm": "Kouros statues were freestanding marble figures of young men, made in Greece between roughly 600 and 480 BCE. They were used as grave markers and as votive offerings at sanctuaries. The earliest examples like this one are recognizably indebted to Egyptian sculpture: the strict frontal pose, the symmetrical stance, the stylized hair. But the Greeks made one critical change \u2014 their kouroi are nude, while Egyptian figures wore the shendyt-kilt. Over the next century, Greek sculptors would gradually loosen the rigid pose, ultimately producing the radical naturalism of Classical sculpture.", "tags": ["archaic-greek", "marble", "grave-marker", "kouros"], "comprehensionQuestion": {"question": "What does the kouros's pose reveal about the relationship between early Greek and Egyptian art?", "options": ["Greek sculptors invented the pose independently", "The kouros directly borrowed its stride, arm position, and proportional system from Egyptian sculpture", "The pose was borrowed from Mesopotamian guardian figures", "Egyptian artists traveled to Greece to teach their methods"], "correctIndex": 1, "explanation": "The kouros pose \u2014 left foot forward, arms at sides, rigid frontal stance \u2014 is directly derived from Egyptian sculpture. Greek artists encountered monumental Egyptian statues and deliberately adopted the convention, then gradually evolved away from it over the following century."}, "lat": 37.97, "lng": 23.72}, "met-mamluk-mosque-lamp": {"id": "met-mamluk-mosque-lamp", "title": "Mosque Lamp", "artistId": null, "year": 1340, "decade": 1340, "eraId": "sacred-medieval", "regionId": "middle-east-north-africa", "subRegionId": "islamic", "museumId": "met", "medium": "Glass, enamel, and gold", "dimensions": "approx. 36 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Mosque%20lamp%20%28mamluk%29%2C%20Louvre%2C%2014th%20century.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 3, "wallLabel": "A Mamluk enameled glass mosque lamp from Egypt or Syria, made around 1340. These lamps were suspended from the ceilings of mosques by chains, casting tinted light during prayer. The Arabic inscription quotes the famous 'Light Verse' from the Qur'an (24:35), which compares God to a lamp in a niche.", "longForm": "The Mamluk Sultanate (1250-1517) ruled Egypt and Syria for two and a half centuries and produced some of the most technically sophisticated metalwork, glass, and architecture of the late medieval Islamic world. The enameled glass mosque lamps are among the most prized; they were commissioned in large numbers by sultans and emirs to be donated to specific mosques, often inscribed with the donor's name and titles. After the Mamluks fell to the Ottomans in 1517, the technique of enameling glass at this level was lost and not recovered for several centuries.", "tags": ["mamluk", "glass", "enamel", "mosque"], "comprehensionQuestion": {"question": "What Quranic verse appears on Mamluk mosque lamps, and why was it particularly appropriate?", "options": ["The opening verse of the Quran (Al-Fatiha), used in all Islamic ritual contexts", "The 'Light Verse' (24:35), which compares God to a lamp in a niche \u2014 the lamp's function and its inscription became inseparable", "A verse about paradise and its gardens, connecting the lamp's light to heavenly beauty", "The verse commanding Muslims to pray five times daily"], "correctIndex": 1, "explanation": "The Light Verse \u2014 'God is the light of the heavens and the earth; His light is like a niche in which is a lamp' \u2014 appears on virtually all Mamluk mosque lamps. The verse describes God through the metaphor of a lamp; inscribing it on an actual lamp creates a perfect fusion of object and meaning. The lamp holding the light verse becomes a theological statement."}, "lat": 30.06, "lng": 31.25}, "met-maya-stela": {"id": "met-maya-stela", "title": "Stela Showing a Ruler", "artistId": null, "year": 750, "decade": 750, "eraId": "sacred-medieval", "regionId": "americas", "subRegionId": "maya", "museumId": "met", "medium": "Limestone", "dimensions": "approx. 220 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Copan%20stela%20A.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "A Late Classic Maya limestone stela depicting a ruler in ceremonial regalia, accompanied by hieroglyphic inscriptions that name him, give the date of his accession, and record his ritual deeds. Most Maya city-states erected stelae like this at twenty-year intervals (k'atun-endings) to commemorate the ruling dynasty's relationship to the gods of time.", "longForm": "Maya stelae are the densest surviving record of any Mesoamerican civilization. Each carries dates calculated according to the Maya Long Count calendar (which begins, by convention, on a day equivalent to August 11, 3114 BCE), the names of specific rulers, references to wars, alliances, marriages, and rituals. Because the Maya script has been substantially deciphered since the 1970s, we can read these inscriptions today \u2014 making the Maya the only Mesoamerican civilization for which we have anything approaching a written historical record. Around 800 CE the southern Maya cities entered a still-unexplained collapse; by 950 most had been abandoned, the dynasties forgotten, the script forgotten until the 19th century.", "tags": ["maya", "stela", "limestone", "classic-period"], "comprehensionQuestion": {"question": "Why do Maya stelae matter so much to historians that they call the Maya 'the only Mesoamerican civilization with a written historical record'?", "options": ["Maya stelae are the only pre-Columbian objects to survive in significant numbers", "Because Maya hieroglyphic script has been substantially deciphered, stelae can be read \u2014 they name specific rulers, record dates, battles, and alliances \u2014 giving us the only readable political history from pre-contact Mesoamerica", "Maya stelae contain maps of their cities that allow archaeologists to reconstruct urban plans", "The Maya were the only Mesoamerican people who carved stone monuments"], "correctIndex": 1, "explanation": "The Maya script has been largely deciphered since the 1970s-80s \u2014 a feat of linguistic detective work without a Rosetta Stone. This means we can now read the stelae: we know specific rulers' names and titles, the dates of their births, accessions, wars, and deaths, and the genealogical claims they made. No other Mesoamerican civilization has left us a comparable readable record."}, "lat": 14.85, "lng": -89.14}, "met-maya-vessel": {"id": "met-maya-vessel", "title": "Cylinder Vessel with Lord and Attendants", "artistId": null, "year": 750, "decade": 750, "eraId": "sacred-medieval", "regionId": "americas", "subRegionId": "maya", "museumId": "met", "medium": "Ceramic with polychrome slip", "dimensions": "approx. 18 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Maya%20vase%20of%20the%20seven%20gods.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 3, "wallLabel": "A Late Classic Maya drinking vessel painted with a court scene: a seated lord receives tribute or counsel from attendants, with glyphs naming each figure and the painter himself. Made around 750 CE in the Pet\u00e9n lowlands. The Maya were the only Mesoamerican civilization with a fully developed writing system; we can read these inscriptions today.", "longForm": "Maya 'codex-style' painted vessels are some of the most informationally rich art objects in the world. Each scene typically depicts a moment from court life or mythology, and many are signed by the painters. The pigments \u2014 particularly the brilliant Maya blue \u2014 used a chemical bond between indigo dye and palygorskite clay that European chemists couldn't replicate until the late 20th century. These vessels held kakaw, a frothy unsweetened chocolate drink consumed by elites in formal contexts. The civilization that produced them entered a still-unexplained collapse beginning around 800 CE; by 950, the southern Maya cities were abandoned to the jungle.", "tags": ["ceramic", "classic-maya", "polychrome", "courtly"], "comprehensionQuestion": {"question": "What does the fact that many Maya vessels are signed by their painters tell us about Maya artistic culture?", "options": ["Only royal family members were allowed to paint vessels, and signing identified their lineage", "The Maya had a concept of the named individual artist \u2014 an artist identity \u2014 that is unusual in pre-modern non-Western art", "Signatures were ownership marks indicating which noble household commissioned the vessel", "Vessel signatures were part of the hieroglyphic text identifying the contents"], "correctIndex": 1, "explanation": "Signed Maya vessels reveal a concept of artistic identity that's rare in the pre-modern world outside Renaissance Europe. Painters identified themselves by name \u2014 sometimes as 'he of the holy writing' \u2014 and certain individual hands can be tracked across multiple vessels. The Maya valued the artist's individual contribution, not just the object's ritual function."}, "lat": 15.5, "lng": -89.5}, "met-monet-bridge": {"id": "met-monet-bridge", "title": "Bridge over a Pond of Water Lilies", "artistId": "monet", "year": 1899, "decade": 1890, "movementId": "impressionism", "museumId": "met", "medium": "Oil on canvas", "dimensions": "92.7 x 73.7 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Bridge%20over%20a%20Pond%20of%20Water%20Lilies.JPG?width=1200", "imageCredit": "Public domain, The Metropolitan Museum of Art, H. O. Havemeyer Collection, 1929", "famousLevel": 5, "wallLabel": "Monet painted the Japanese footbridge in his Giverny garden a dozen times in 1899, in different lights and seasons. Here the foliage is at full summer green, the lilies open on the water below, and the bridge sits high in the composition like a Japanese print. The painting is built almost entirely from layered green and lavender, with the bridge as the only horizontal anchor.", "longForm": "Monet had bought his property in Giverny in 1890 and immediately began transforming the marsh below the house into a water garden, importing exotic plants and building the footbridge himself, modeled on prints he had collected by Hokusai and Hiroshige. The 1899 bridge series was his first sustained attempt at painting the water garden, a subject that would absorb him for the rest of his life and culminate in the monumental late Water Lilies panels at the Musee de l'Orangerie in Paris. The Met holds two paintings from this 1899 series; the other shows the bridge in a cooler, more silver light.", "tags": ["water-garden", "giverny", "series-painting", "japanese-influence"], "details": [{"crop": "bridge", "x": 0.5, "y": 0.3, "label": "The Japanese footbridge"}, {"crop": "lilies", "x": 0.4, "y": 0.75, "label": "Water lilies on the surface"}], "metObjectId": 437127, "imageSource": "wikimedia", "eraId": "revolution-industry", "regionId": "europe", "subRegionId": "french", "comprehensionQuestion": {"question": "Why did Monet paint the same subject \u2014 haystacks, Rouen Cathedral, water lilies \u2014 dozens of times?", "options": ["Monet suffered from memory loss and forgot he had already painted each subject", "Monet was investigating how light transforms the same subject at different times of day and season \u2014 the series format made the theme of perception and transience explicit", "Each painting in a series was commissioned by a different collector", "Monet repeated subjects because he could not afford to travel to new locations"], "correctIndex": 1, "explanation": "The series paintings were Monet's most radical statement. By showing the same object \u2014 a haystack, a cathedral, a bridge \u2014 in thirty different light conditions, he made the argument that there is no fixed appearance, only perception under specific conditions of light, atmosphere, and time. The subject was almost irrelevant; light was the actual subject."}, "lat": 49.08, "lng": 1.53}, "met-mughal-emperor": {"id": "met-mughal-emperor", "title": "Portrait of the Emperor Shah Jahan", "artistId": null, "year": 1630, "decade": 1630, "eraId": "renaissances-empires", "regionId": "south-asia", "subRegionId": "indian", "museumId": "met", "medium": "Opaque watercolor, ink, and gold on paper", "dimensions": "approx. 39 x 27 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Shah%20Jahan%20on%20a%20Terrace%2C%20Holding%20a%20Pendant%20Set%20with%20His%20Portrait%20MET%20DP240791.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "The Mughal emperor Shah Jahan, who built the Taj Mahal, in a court portrait by one of his miniaturists. Mughal painting fused Persian technique with Indian observation: the gold-leaf halo and the precise rendering of textile, jewel, and horse furniture are characteristic. Painted around 1630, contemporary with the Dutch Golden Age in Europe.", "longForm": "Mughal court painting is one of the great cross-cultural art forms in human history. The first Mughal emperors brought painters from Safavid Persia to India in the 16th century; their workshops trained Indian artists in Persian conventions but also absorbed Indian color, attention to plant and animal life, and a different sense of what a portrait should do. By Shah Jahan's reign in the 1630s, Mughal miniature was at its zenith \u2014 astonishingly refined, often political, always made for the emperor's private viewing in albums. The Taj Mahal was begun in 1632, the year this kind of portrait was at its peak.", "tags": ["miniature", "mughal", "portrait", "court-painting"], "comprehensionQuestion": {"question": "How did Mughal miniature painting achieve its characteristic style, and where did it come from?", "options": ["Mughal miniature was a pure Indian invention with no foreign influence", "Mughal emperors brought Persian court painters to India; their workshops trained Indian artists, fusing Persian technique with Indian subjects, observation, and color sensibility", "Mughal painting derived from Chinese scroll painting brought by Silk Road merchants", "Mughal painting was invented by a single genius artist at Akbar's court whose name is unknown"], "correctIndex": 1, "explanation": "The first Mughal emperor Babur and his son Humayun brought Persian painters from the Safavid court; Humayun himself spent years in Persian exile and returned with master painters who became the foundation of the imperial workshops. Under Akbar, these Persian foundations were transformed: Indian painters brought observation of local plants and animals, warmer color, and a different sense of portraiture. The result was a hybrid unique in art history."}, "lat": 28.64, "lng": 77.22}, "met-nok-head": {"id": "met-nok-head", "title": "Nok Terracotta Head", "artistId": null, "year": -300, "decade": -300, "eraId": "ancient-worlds", "regionId": "sub-saharan-africa", "subRegionId": "nok", "museumId": null, "medium": "Terracotta", "dimensions": "approx. 36 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Nok%20head%20Louvre%2070.1998.11.1.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain photo via Wikimedia Commons", "famousLevel": 4, "wallLabel": "A terracotta head from the Nok culture of present-day central Nigeria, made between 500 BCE and 200 CE. The Nok are the earliest known sub-Saharan African civilization to produce large-scale figurative sculpture. Most surviving heads are fragments of full standing figures, broken in antiquity.", "longForm": "The Nok culture was discovered accidentally in 1928 when tin miners in central Nigeria began turning up terracotta heads from the alluvial gravels they were dredging. The figures share a striking set of features: triangular eyes with the pupils pierced through, elaborate hairstyles, naturalistic proportions. They predate by over a thousand years the better-known Ife heads that emerged from the same broad region around 1100 CE \u2014 meaning sub-Saharan African figurative sculpture had a much deeper history than colonial-era scholars assumed.", "tags": ["nok", "terracotta", "iron-age", "west-african"], "comprehensionQuestion": {"question": "Why is the Nok culture's existence significant for the history of African art?", "options": ["The Nok invented bronze casting in Africa", "Nok terracottas push the date of large-scale sub-Saharan African figurative sculpture back to 500 BCE, far earlier than European scholars once assumed", "The Nok were the ancestors of the ancient Egyptians", "Nok art directly influenced Greek sculpture"], "correctIndex": 1, "explanation": "When European scholars first encountered West African sculpture, they assumed it was a recent tradition. The Nok discovery revealed sustained, sophisticated figurative sculpture in sub-Saharan Africa from at least 500 BCE \u2014 contemporaneous with ancient Greece. The colonial assumption that African art had no deep history was false."}, "lat": 10.0, "lng": 8.0}, "met-okeeffe-cow-skull": {"id": "met-okeeffe-cow-skull", "title": "Cow's Skull: Red, White, and Blue", "artistId": "okeeffe", "year": 1931, "decade": 1930, "movementId": "american-modernism", "museumId": "met", "medium": "Oil on canvas", "dimensions": "101.3 x 91.1 cm", "image": "https://upload.wikimedia.org/wikipedia/en/9/9b/Cow%27s_Skull-_Red%2C_White%2C_and_Blue.jpg", "imageCredit": "Public domain via fair use, The Metropolitan Museum of Art, Alfred Stieglitz Collection, 1952", "famousLevel": 5, "wallLabel": "A bleached cow skull hangs against a black vertical band flanked by red borders, suggesting the American flag. O'Keeffe painted it in 1931, the year of her first long summer in New Mexico, in deliberate response to critics who insisted that the truly American subject matter was urban and industrial. She offered desert bones instead.", "longForm": "O'Keeffe wrote later that she had been listening to male artists in New York talk about painting the Great American Novel, and decided to make the Great American Painting herself, with the most quintessentially American subject she could think of: the bleached skull of a Western range cow against red, white, and blue. The painting is partly serious and partly a joke at the expense of her colleagues. It was acquired by the Met as part of the Stieglitz collection after his death, when his executors distributed his enormous holdings of modern American art to several major museums.", "tags": ["southwest", "skull", "abstraction", "american-symbol"], "details": [], "metObjectId": 488694, "imageSource": "wikipedia-fair-use", "eraId": "modernism", "regionId": "americas", "subRegionId": "us-american", "comprehensionQuestion": {"question": "What was O'Keeffe's stated intention in painting a cow skull against the American flag's colors?", "options": ["She was making an anti-war statement about American imperialism", "She wanted to capture the spirit of the American West \u2014 its harshness and vitality \u2014 against the colors that East Coast intellectuals associated only with colonial history and political power", "The skull represented death of the American dream during the Depression", "O'Keeffe painted several works with skulls purely for formal reasons, with no symbolic intent"], "correctIndex": 1, "explanation": "O'Keeffe described this as her 'American' painting \u2014 a response to what she saw as Eastern establishment culture's inability to see the American West clearly. She placed the skull \u2014 something the East would see as morbid, something she found beautiful and alive with the desert \u2014 against the red, white, and blue, insisting that this bone-bleached landscape was as American as anything in New York."}, "lat": 36.17, "lng": -105.72}, "met-olmec-head": {"id": "met-olmec-head", "title": "Olmec Colossal Head (replica context)", "artistId": null, "year": -900, "decade": -900, "eraId": "ancient-worlds", "regionId": "americas", "subRegionId": "olmec", "museumId": null, "medium": "Basalt", "dimensions": "Up to 3.4 m tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Olmec%20Head%20No.%201.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Photo public domain via Wikimedia Commons", "famousLevel": 5, "wallLabel": "Seventeen colossal heads carved from basalt have been found in the Olmec heartland of present-day Veracruz and Tabasco, Mexico. Each is a portrait of a specific ruler. The basalt was quarried in the Tuxtla mountains and dragged dozens of miles to the political centers of San Lorenzo and La Venta \u2014 without metal tools, without the wheel, without draft animals. They date to roughly 1200-400 BCE.", "longForm": "The Olmec are sometimes called the 'mother culture' of Mesoamerica \u2014 their visual vocabulary, religious iconography, and architectural conventions appear in modified form in every later Mesoamerican civilization, from the Maya to the Aztec. The colossal heads each wear a distinctive helmet, possibly representing the protective headgear of the rulers' role as ballgame players. They were carved using stone hammers and abrasives, then deliberately defaced and buried \u2014 likely as part of a ritual transition between rulers. Most are now displayed near where they were excavated; one (Head N\u00ba 8) is at the Anthropology Museum in Veracruz.", "tags": ["sculpture", "ruler-portrait", "basalt", "preclassic"], "comprehensionQuestion": {"question": "What does the deliberate defacement of Olmec colossal heads reveal about Mesoamerican political culture?", "options": ["The heads were damaged by natural disaster, not intentionally", "Defacement and burial were ritual acts when a ruler died \u2014 monuments were killed alongside their subjects", "Later civilizations like the Maya destroyed Olmec monuments out of cultural rivalry", "The defacement was done by Spanish conquistadors in the 16th century"], "correctIndex": 1, "explanation": "The colossal heads were systematically defaced and buried, apparently as part of a ritual transition between rulers. The monument died with its subject. This practice of deliberately ending the monumental life of objects appears across Mesoamerican cultures \u2014 the Maya sometimes buried their own stelae in a similar way."}, "lat": 18.46, "lng": -95.08}, "met-parvati": {"id": "met-parvati", "title": "Standing Parvati", "artistId": null, "year": 1000, "decade": 1000, "eraId": "sacred-medieval", "regionId": "south-asia", "subRegionId": "indian", "museumId": "met", "medium": "Copper alloy", "dimensions": "approx. 70 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Parvati%2C%20Chola%20bronze%2C%20c.%2010th%20century.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "The Hindu goddess Parvati stands in the elegant tribhanga pose \u2014 three bends, hip and shoulder and head, that became the iconic stance of Indian sculpture for over a thousand years. Cast in copper alloy by the lost-wax process in the Chola dynasty of South India, when Tamil bronze casting reached a technical peak that has never been surpassed.", "longForm": "The Chola dynasty ruled South India from the 9th through 13th centuries and produced bronze sculpture so technically refined that contemporary Chola masters in Tamil Nadu still work from the same iconographic books, called shilpa shastras, that the originals followed. These bronzes were never made as static museum objects: they were dressed in textiles, garlanded, carried in procession through temple complexes, and bathed in milk and honey. The empty rings on her belt held actual cloth and jewelry. To see a Chola bronze in a Western museum is to see it stripped of about ninety percent of its intended visual life.", "tags": ["bronze", "chola", "hindu", "tribhanga"], "comprehensionQuestion": {"question": "Why do Chola bronze sculptures of deities like Parvati include empty rings and attachment points?", "options": ["The rings were functional handles for moving the heavy sculptures", "The bronzes were dressed in actual textiles and jewels for ceremonies \u2014 the rings held fabric and real ornaments; a 'bare' Chola bronze in a museum is missing roughly 90% of its intended visual life", "The rings were added by later restorers who misunderstood the originals", "Empty attachment points indicate unfinished sculptures that were never completed"], "correctIndex": 1, "explanation": "Chola bronzes were not made as static art objects but as living ritual presences. They were dressed in silk garments, garlanded with flowers, adorned with actual gold jewelry, and carried through temple streets in procession. The empty rings you see in museums held fabric and jewels. Seeing a Chola bronze unclothed is like seeing a king stripped of all regalia \u2014 technically accurate to the bronze, but not to the intended experience."}, "lat": 11.06, "lng": 77.37}, "met-persian-battle-folio": {"id": "met-persian-battle-folio", "title": "Battle Scene from the Shahnameh of Firdawsi", "artistId": null, "year": 1525, "decade": 1520, "eraId": "sacred-medieval", "regionId": "middle-east-north-africa", "subRegionId": "persian", "museumId": "met", "medium": "Opaque watercolor, ink, and gold on paper", "dimensions": "approx. 47 x 32 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Shahnameh%20folio%20-%20battle%20scene.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "A battle scene from a Safavid manuscript of the Shahnameh, the 'Book of Kings' \u2014 the Persian national epic written by Firdawsi around 1000 CE. Two armies clash on a gold-streaked sky. The Tabriz school of the early 16th century brought Persian manuscript painting to its technical peak: mineral pigments ground to a powder, brushwork at the scale of hairs, faces expressive within a 3cm circle.", "longForm": "The Shahnameh is Firdawsi's 60,000-verse retelling of the pre-Islamic history of Persia, from the mythological kings of the primordial world through the Arab conquest in 651 CE. It is the longest epic written by a single author in world literature. Persian manuscripts of the Shahnameh were the most prestigious luxury objects of the Safavid court and among the most valued things money could buy across the Islamic world. The Houghton Shahnameh, commissioned by Shah Tahmasp around 1520-40, is the finest \u2014 742 pages with 258 full-page paintings, scattered across institutions worldwide after its disassembly in the 1970s.", "tags": ["safavid", "manuscript", "shahnameh", "miniature-painting"], "comprehensionQuestion": {"question": "What is the Houghton Shahnameh, and why is its story controversial?", "options": ["The Houghton Shahnameh is a later copy that was mistakenly attributed to Shah Tahmasp's court", "The most magnificent Shahnameh ever made \u2014 258 full-page paintings commissioned by Shah Tahmasp \u2014 was disassembled and sold page by page in the 1970s, and now exists scattered across 30+ institutions worldwide", "The Houghton Shahnameh was destroyed during the Iranian Revolution", "Arthur Houghton forged the manuscript and sold fakes to museums across the world"], "correctIndex": 1, "explanation": "The Houghton Shahnameh was commissioned by Shah Tahmasp around 1520-40 and is considered the finest illustrated manuscript ever made. It was given by Tahmasp to the Ottoman Sultan as a diplomatic gift. It eventually reached Arthur Houghton Jr., who began selling individual pages at Christie's in 1976. The dismemberment was controversial and irreversible: the complete manuscript no longer exists as an object."}, "lat": 38.08, "lng": 46.3}, "met-quran-folio": {"id": "met-quran-folio", "title": "Folio from a Qur'an Manuscript in Kufic Script", "artistId": null, "year": 900, "decade": 900, "eraId": "sacred-medieval", "regionId": "middle-east-north-africa", "subRegionId": "islamic", "museumId": "met", "medium": "Ink, gold, and color on parchment", "dimensions": "approx. 30 x 40 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Quran%20folio%209th%20century%20kufic.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "A page from an early Qur'an manuscript written in Kufic, an angular and monumental form of Arabic script developed in the Iraqi city of Kufa. Made in the 9th-10th century, possibly in North Africa. The Qur'an is the foundational text of Islam, and the act of copying it was \u2014 and remains \u2014 a profound religious practice.", "longForm": "Islamic visual culture has often been described, inaccurately, as image-free. In fact, the Islamic world produced abundant figurative art in secular contexts (palace painting, illustrated books, miniatures). What it rigorously excluded was figurative imagery in religious contexts. Into that space rushed two other arts: calligraphy and geometric pattern, both of which the Islamic world brought to a level of sophistication unsurpassed anywhere. Kufic was the dominant Qur'anic script from the 7th through 11th centuries; later it was largely replaced by the more cursive Naskh and Thuluth scripts for everyday writing, while Kufic continued in monumental and decorative contexts.", "tags": ["quran", "kufic", "calligraphy", "abbasid"], "comprehensionQuestion": {"question": "Why is calligraphy considered the highest art form in Islamic culture?", "options": ["Because figurative art was banned universally across all Islamic contexts", "Because the Quran is the direct word of God, and writing it beautifully is an act of devotion \u2014 the art form closest to the divine source", "Because calligraphy requires more technical skill than any other art form", "Because the first Muslim artists happened to be calligraphers"], "correctIndex": 1, "explanation": "The Quran is believed to be the literal word of God, dictated to Muhammad in Arabic. Writing it \u2014 rendering the divine word in beautiful, precise script \u2014 is an act of devotion with no parallel in other traditions. Calligraphy became the mother art of Islamic visual culture, influencing architecture, metalwork, ceramics, and textile."}, "lat": 30.06, "lng": 31.25}, "met-red-figure-kylix": {"id": "met-red-figure-kylix", "title": "Terracotta Red-Figure Kylix (Drinking Cup)", "artistId": null, "year": -490, "decade": -490, "eraId": "ancient-worlds", "regionId": "europe", "subRegionId": "greek-byzantine", "museumId": "met", "medium": "Terracotta with red-figure decoration", "dimensions": "30 cm diameter", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Peleus%20and%20Thetis%20attic%20red%20figure%20kylix%20by%20Douris%20Painter%20ca%20490BCE%201200%20cropped.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain photo via Wikimedia Commons", "famousLevel": 4, "wallLabel": "A shallow Attic drinking cup (kylix) painted in the red-figure technique \u2014 the figures left in the natural orange-red of the terracotta while the background is painted black. Made in Athens around 490 BCE. The kylix was the standard Greek drinking vessel at the symposium, a formal all-male drinking party where politics, philosophy, and poetry were discussed over wine.", "longForm": "The shift from black-figure to red-figure vase painting happened around 530 BCE and is one of the clearest technological leaps in ancient art history. In black-figure, the figures are painted on as silhouettes; interior details are incised. In red-figure, the background is painted black and figures are left in the clay's natural color; details are added with a fine brush. The reversal gave painters enormously more expressive range \u2014 they could now show anatomy, foreshortening, and facial expression in ways impossible with a sharp tool. The kylix presented a particular challenge: the painter had to compose a coherent circular image (the tondo on the interior) and a continuous frieze around the exterior, all visible only when the cup was tilted toward the drinker.", "tags": ["red-figure", "attic", "kylix", "symposium"], "comprehensionQuestion": {"question": "Why was the shift from black-figure to red-figure vase painting around 530 BCE such a significant technical advance?", "options": ["Red-figure was faster to produce, allowing more vases to be made for export", "Red-figure left figures in the natural clay color, allowing fine brushwork to add detail \u2014 giving painters far more expressive range than incised lines in black-figure", "Red-figure required imported pigments unavailable in black-figure, making the vessels more prestigious", "The shift was primarily aesthetic \u2014 red was considered a more beautiful color than black in Greek culture"], "correctIndex": 1, "explanation": "In black-figure, interior details were scratched into the painted silhouette with a sharp tool \u2014 limited and linear. In red-figure, a fine-tipped brush could add subtle curves, overlapping anatomy, and expressive faces. The technique gave Greek painters something approximating the freedom of drawing, resulting in a century of increasingly naturalistic figural work."}, "lat": 37.97, "lng": 23.72}, "met-rembrandt-self-portrait": {"id": "met-rembrandt-self-portrait", "title": "Self-Portrait", "artistId": "rembrandt", "year": 1660, "decade": 1660, "movementId": "dutch-golden-age", "museumId": "met", "medium": "Oil on canvas", "dimensions": "80.3 x 67.3 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Rembrandt%20-%20Self-portrait%2C%201660.JPG?width=1200", "imageCredit": "Public domain, The Metropolitan Museum of Art, Benjamin Altman Bequest, 1913", "famousLevel": 5, "wallLabel": "Rembrandt at fifty-four, recently bankrupt, holding the tools of his trade. He has just had to sell his house and his art collection. The white cap and brown smock are studio clothes. The unfinished, almost roughened surface of the face is deliberate, and entirely characteristic of his late style.", "longForm": "Rembrandt painted himself almost ninety times across his life, the most sustained self-examination in the history of Western art before the modern era. This portrait dates from the year after his bankruptcy, in which he was forced to sell his collection of art, antiquities, and the house on the Jodenbreestraat that he had bought in better times. Yet he depicts himself not as defeated but as a working painter in his studio, holding his palette and brushes, his identity untouchable even as his finances collapsed. The brushwork around the eyes is unbelievably economical: a few thick scumbles of paint that resolve, from a step back, into the most searching gaze in seventeenth-century art.", "tags": ["self-portrait", "late-rembrandt", "post-bankruptcy", "tronie"], "details": [], "metObjectId": 437394, "imageSource": "wikimedia", "eraId": "renaissances-empires", "regionId": "europe", "subRegionId": "dutch", "comprehensionQuestion": {"question": "Rembrandt painted approximately 80-90 self-portraits over his career. What makes this late self-portrait different from his early ones?", "options": ["The late self-portraits use brighter colors than the early ones", "The late self-portraits show an aging face without vanity \u2014 the loose brushwork and unflinching gaze at failure and age represent a different relationship to self-representation than his celebrated early portraits", "Late self-portraits were made after Rembrandt went blind and had to work from touch", "The difference is only technical \u2014 Rembrandt simply changed his technique, not his self-image"], "correctIndex": 1, "explanation": "Rembrandt's early self-portraits (1620s-30s) show a young man experimenting with expression, sometimes in theatrical costumes. The late self-portraits (1650s-60s), made after bankruptcy, the death of his common-law wife Hendrickje, and the death of his son Titus, have a different gravity. The face is not beautiful; the paint is loose; the man looks back without self-pity."}, "lat": 52.37, "lng": 4.9}, "met-roman-portrait": {"id": "met-roman-portrait", "title": "Marble Portrait Bust of a Roman Man", "artistId": null, "year": 50, "decade": 50, "eraId": "ancient-worlds", "regionId": "europe", "subRegionId": "greek-byzantine", "museumId": "met", "medium": "Marble", "dimensions": "36 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Head%20of%20a%20Roman%20Patrician.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 3, "wallLabel": "A Roman portrait bust from the mid-1st century CE \u2014 verist tradition, with every wrinkle and asymmetry of an individual face recorded in marble. Roman portrait sculpture rejected the idealized beauty of Greek Classical statues in favor of specific, often unflattering realism.", "longForm": "Roman portrait sculpture is one of the most distinctive contributions of Roman art. The verist style \u2014 from the Latin verus, meaning 'true' \u2014 developed during the late Republic and emphasized individual features over idealization. This was a deliberate political statement: a powerful Roman wanted to be seen as a specific person whose hard life had earned him authority, not as a generic idealized type. Once the imperial period began, official portraiture grew more idealized again, but private commissions continued in the verist mode for centuries.", "tags": ["roman", "portrait", "verism", "marble"], "comprehensionQuestion": {"question": "What is 'verism' in Roman portraiture, and why was it politically significant?", "options": ["A technique for painting portraits using wax pigments", "The deliberate recording of every wrinkle and asymmetry, asserting that authority comes from lived experience", "An idealization of facial features to resemble Greek gods", "A convention of showing only the right side of the face"], "correctIndex": 1, "explanation": "Verist portraiture \u2014 showing every wrinkle, sagging jowl, and imperfection \u2014 was a Republican-era political statement: power belongs to the man weathered by service, not to the idealized beauty of kings. It was a rejection of Hellenistic royal portraiture."}, "lat": 41.9, "lng": 12.49}, "met-romanesque-virgin": {"id": "met-romanesque-virgin", "title": "Enthroned Virgin and Child", "artistId": null, "year": 1180, "decade": 1180, "eraId": "sacred-medieval", "regionId": "europe", "subRegionId": "french", "museumId": "met", "medium": "Walnut with paint, tin relief on a lead white ground", "dimensions": "approx. 80 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Enthroned%20Virgin%20and%20Child%2C%20Auvergne%2C%201150-1200%20%285462327110%29.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art (Cloisters Collection)", "famousLevel": 3, "wallLabel": "A Romanesque carved wood sculpture of the Virgin enthroned with the Christ Child on her lap, made in Auvergne, France, in the late 12th century. The Virgin is the throne; the Child is the new ruler. Romanesque sculpture is severely frontal and hieratic \u2014 qualities that Gothic sculpture, beginning around 1200, would gradually soften.", "longForm": "The 'Sedes Sapientiae' (Throne of Wisdom) type was one of the dominant sculptural forms of Romanesque Europe. These figures sat on altars, were paraded in processions, and were sometimes used as reliquaries \u2014 small relics of saints sealed inside the wooden body. The strict symmetry, the frontal stare, and the architectural rigidity of pose were features, not limitations: the image was meant to function as a stable presence of the divine, not as a naturalistic representation. The transition to Gothic naturalism began in France around 1200 and took two centuries to fully replace this hieratic mode across Europe.", "tags": ["romanesque", "wood-sculpture", "auvergne", "sedes-sapientiae"], "comprehensionQuestion": {"question": "What does the 'Sedes Sapientiae' (Throne of Wisdom) iconographic type communicate about Mary's role?", "options": ["That Mary is the ruler of heaven with Christ as her subordinate", "That Mary is the throne \u2014 the physical vessel \u2014 upon which divine wisdom (Christ) is enthroned; the architecture of incarnation", "That Mary represents earthly wisdom while Christ represents divine wisdom", "That the sculpture was used as an actual throne during liturgical ceremonies"], "correctIndex": 1, "explanation": "The Sedes Sapientiae type shows Mary as a formal, frontal throne upon which the Christ Child sits as judge and ruler. Mary's rigid posture is architectural \u2014 she is the throne, not merely holding the child. The type expresses the theological idea of Mary as the vehicle of incarnation through which divine wisdom entered the world."}, "lat": 45.5, "lng": 3.0}, "met-sasanian-plate": {"id": "met-sasanian-plate", "title": "Plate with King Hunting Lions", "artistId": null, "year": 400, "decade": 400, "eraId": "sacred-medieval", "regionId": "middle-east-north-africa", "subRegionId": "persian", "museumId": "met", "medium": "Silver with gilding", "dimensions": "21.5 cm diameter", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Sasanian%20-%20Plate%20with%20a%20King%20Hunting%20-%20Walters%20571351.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "A Sasanian silver plate showing a king on horseback, drawing his bow at a charging lion. Hunting scenes on silver were the canonical royal imagery of the Sasanian Empire, which ruled Persia from 224 to 651 CE. The tradition of the Assyrian royal hunt \u2014 the king as conqueror of chaos \u2014 continues here across fifteen centuries.", "longForm": "The Sasanian Empire was the cultural heir of the Achaemenid Persian Empire and the main rival of Rome and later Byzantium for five centuries. Its silverwork \u2014 plates, ewers, and bowls with hunting and feasting scenes \u2014 was the luxury export par excellence of the Iranian world, spreading as diplomatic gifts and traded commodities from China to Scandinavia. The hunting plate tradition connects directly back to the Assyrian lion hunt reliefs (same iconography: king on horse, drawn bow, charging lion) while anticipating the Islamic royal hunting scenes that would follow. Sasanian silver influenced Byzantine, Central Asian, and later Islamic metalwork profoundly.", "tags": ["sasanian", "silver", "hunting", "royal-iconography"], "comprehensionQuestion": {"question": "How does the Sasanian silver plate tradition connect the Assyrian past to the Islamic future?", "options": ["The connection is only chronological \u2014 there is no visual continuity between the three traditions", "The Assyrian royal lion hunt (640 BCE), Sasanian hunting plates (400 CE), and later Islamic royal hunting imagery all use the same iconographic program \u2014 king on horse, drawn bow, animal prey \u2014 to assert that the ruler tames the forces of chaos", "Sasanian plates were found in Assyrian tombs, suggesting the two civilizations were contemporary", "The Islamic tradition rejected the hunting imagery as pagan and invented new symbols of royal authority"], "correctIndex": 1, "explanation": "Royal hunting imagery is one of the most persistent iconographic programs in Near Eastern art history. From Ashurbanipal's lion hunt reliefs in 640 BCE through Sasanian silverwork to Abbasid court painting and beyond, the basic image \u2014 mounted ruler, drawn bow, fleeing or dying animal \u2014 asserts the same political claim across 1,500 years and three distinct civilizations: the king is the master of wild nature, the human-divine boundary that prevents chaos."}, "lat": 32.0, "lng": 53.0}, "met-shang-bronze-vessel": {"id": "met-shang-bronze-vessel", "title": "Ritual Wine Vessel (Zun) in the Form of an Owl", "artistId": null, "year": -1100, "decade": -1100, "eraId": "ancient-worlds", "regionId": "east-asia", "subRegionId": "chinese", "museumId": "met", "medium": "Bronze", "dimensions": "approx. 16 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Shang%20dynasty%20bronze%20ritual%20vessel.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "A Shang dynasty bronze ritual vessel cast in the form of an owl, used to hold fermented millet wine offered to ancestral spirits. Made in piece-mold casting \u2014 a Chinese technique that produced thinner walls and more elaborate surface decoration than the lost-wax casting used in the Mediterranean world.", "longForm": "The Shang dynasty (c. 1600-1046 BCE) produced some of the most technically sophisticated bronze work in the ancient world. The piece-mold technique they invented allowed for taotie masks and other patterns in low relief that wrapped around the surface of vessels with seamless precision. These bronzes were not for everyday use \u2014 they held offerings of food and wine made to ancestors in temple complexes attached to the royal residence. The vessels were buried in elite tombs to continue the ancestor cult into the afterlife. Recent excavations at Anyang have found tombs with literally hundreds of bronzes.", "tags": ["shang", "bronze", "ritual-vessel", "ancestor-worship"], "comprehensionQuestion": {"question": "How does Chinese piece-mold bronze casting differ from the lost-wax technique used in the Mediterranean world?", "options": ["Piece-mold casting uses clay sections fitted around a model, producing thin walls and complex surface decoration impossible with lost-wax", "Lost-wax casting is older and was borrowed by the Chinese", "Piece-mold casting is simpler and produces cruder results", "There is no meaningful difference between the two techniques"], "correctIndex": 0, "explanation": "Piece-mold casting \u2014 where clay sections are made from a model, separated, reassembled, and filled with molten bronze \u2014 allows for intricate taotie patterns on thin vessel walls. The lost-wax technique (where a wax model is melted away) was used everywhere else in the ancient world and produces different aesthetic possibilities. China developed piece-mold independently."}, "lat": 36.1, "lng": 114.3}, "met-song-landscape": {"id": "met-song-landscape", "title": "Summer Mountains", "artistId": null, "year": 1050, "decade": 1050, "eraId": "sacred-medieval", "regionId": "east-asia", "subRegionId": "chinese", "museumId": "met", "medium": "Handscroll; ink and color on silk", "dimensions": "45 x 115 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Summer%20Mountains%20MET%20DP163088.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 5, "wallLabel": "A Northern Song dynasty landscape handscroll, attributed to Qu Ding, painted around 1050. Chinese landscape painting reached an early peak in the 11th century. The convention is shifting perspective: the eye moves across the scroll as it unrolls, looking at the foreground hill, then up to the middle mountains, then deep into mist.", "longForm": "Song dynasty landscape painting (960-1279) is one of the great achievements of human art. Northern Song painters like Fan Kuan and Guo Xi developed monumental compositions of towering mountains; Southern Song painters like Ma Yuan and Xia Gui shifted to intimate corners of nature. Throughout, the practice was conceived not as picture-making but as philosophy: the painter, brush in hand, was charting the relationship between the human and the cosmos. The viewer of a handscroll did not see the whole work at once but unrolled it section by section, often pausing to read inscriptions added by later collectors. The painter's identity was less important than the lineage of teachers and styles he participated in.", "tags": ["song-dynasty", "landscape", "handscroll", "ink-painting"], "comprehensionQuestion": {"question": "How did Song dynasty painters understand the relationship between landscape painting and philosophy?", "options": ["Landscape painting was primarily a commercial genre, valued for its decorative appeal", "Painting landscape was a philosophical practice \u2014 the painter, brush in hand, was mapping the relationship between the human and the cosmos, not just depicting scenery", "Song landscapes were primarily valued as accurate geographic records", "Landscape painting was a religious practice for Buddhist monks, not Confucian scholars"], "correctIndex": 1, "explanation": "For Song dynasty scholar-painters, landscape was a vehicle for philosophical inquiry. The act of painting \u2014 holding the brush, making marks, choosing what to include \u2014 was a form of meditation on the Dao. 'Painting what you see' was a lesser achievement; painting what you understood about the nature of mountains, water, and emptiness was the goal."}, "lat": 30.27, "lng": 120.15}, "met-standard-of-ur": {"id": "met-standard-of-ur", "title": "Standard of Ur", "artistId": null, "year": -2600, "decade": -2600, "eraId": "ancient-worlds", "regionId": "middle-east-north-africa", "subRegionId": "mesopotamian", "museumId": null, "medium": "Wood with shell, lapis lazuli, and red limestone inlay", "dimensions": "21.7 x 50.4 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Standard%20of%20ur%20peace%202013.JPG?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain photo via Wikimedia Commons, British Museum", "famousLevel": 5, "wallLabel": "A hollow box of wood inlaid with shell, lapis lazuli, and red limestone, depicting scenes of war on one face and peace on the other. Made around 2600 BCE in the Sumerian city of Ur, now in present-day Iraq. The function is unknown \u2014 possibly a soundbox for an instrument, possibly a standard carried in procession. Found by Leonard Woolley in a royal tomb in the 1920s.", "longForm": "The Sumerians invented writing, the wheel, and the city, and the Standard of Ur is one of the most informationally rich objects to survive from their civilization. Reading from bottom to top on each face, the scenes show social hierarchy in action: on the war side, defeated enemies are paraded before a king in a chariot; on the peace side, attendants bring tribute to a banquet. The figures are organized in strict horizontal registers \u2014 a convention that will repeat in Egyptian, Assyrian, and Greek vase painting for the next two and a half thousand years.", "tags": ["sumerian", "inlay", "royal-tomb", "early-bronze-age"], "comprehensionQuestion": {"question": "What does the Standard of Ur's register format \u2014 figures arranged in horizontal rows \u2014 communicate about Sumerian social organization?", "options": ["It was simply the easiest way to fill the rectangular space", "Size and position encode hierarchy: the largest figure at top is the king; smaller figures below are subordinates and defeated enemies", "Each register represents a different city-state in an alliance", "The registers tell a story read from bottom to top, like a comic strip"], "correctIndex": 1, "explanation": "The register format is a visual argument about social order. The king appears largest, at the top, receiving tribute and presiding over the feast. Below him, attendants diminish in size according to their status. This convention \u2014 size equals importance \u2014 runs through Egyptian, Assyrian, and early Christian art for millennia."}, "lat": 30.96, "lng": 46.1}, "met-tang-horse": {"id": "met-tang-horse", "title": "Horse", "artistId": null, "year": 700, "decade": 700, "eraId": "sacred-medieval", "regionId": "east-asia", "subRegionId": "chinese", "museumId": "met", "medium": "Earthenware with three-color (sancai) lead glazes", "dimensions": "approx. 76 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Met%2C%20horse%2C%20tang%20dynasty%2C%20late%2007-first%20half%20of%208th%20century.JPG?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "A Tang dynasty horse in three-color sancai glaze, made for elite burial. Tang nobles loved fine horses imported from Central Asia, and the dynasty's tomb sculpture reflects it. The amber, green, and cream glazes pool and run because they were applied wet \u2014 a deliberate aesthetic, not a flaw.", "longForm": "Sancai (three-color) ware is one of the great achievements of Tang ceramic art. The glazes contained iron, copper, and cobalt, and the technical breakthrough was getting them to fuse cleanly over a low-fire white slip without running into mud. Tang tomb sculpture is famously dynamic compared to the more static Han pieces \u2014 these horses turn their heads, paw the ground, snort. China in the Tang dynasty (618-907) was the most cosmopolitan place on Earth: Chang'an, the capital, was a multicultural city of perhaps a million people drawing merchants from Persia, Korea, Sogdiana, and India.", "tags": ["tang-dynasty", "sancai", "burial-sculpture", "horse"], "comprehensionQuestion": {"question": "What does the Tang dynasty's obsession with Central Asian horses reveal about 7th-century China?", "options": ["Tang China was primarily a nomadic culture dependent on horses for survival", "Chang'an was the most cosmopolitan city in the world \u2014 a hub of Silk Road trade \u2014 and Central Asian horses, music, and fashion were luxury goods markin
