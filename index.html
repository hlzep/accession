<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#F5EFE4" />
<title>Accession — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   ACCESSION - DESIGN TOKENS
   The foundational design variables for the entire app.
   Change values here to affect the whole interface.
   ============================================================ */

:root {
  /* ---------- COLORS ----------
     Inspired by warm museum interiors:
     - Paper: aged cream, the dominant background
     - Ink: warm near-black for text
     - Sepia: secondary text and borders
     - Burgundy: active states and important moments
     - Gold: rewards, streak, mastery
     - Sage: success, "you've seen this"
  */
  --color-paper: #F5EFE4;
  --color-paper-deep: #ECE3D2;
  --color-paper-light: #FBF7EE;
  --color-ink: #1F1B16;
  --color-ink-soft: #3A332B;
  --color-sepia: #7A6A55;
  --color-sepia-light: #B8A88E;
  --color-burgundy: #6B2E2E;
  --color-burgundy-soft: #8B4848;
  --color-gold: #B8945A;
  --color-gold-soft: #D4B57E;
  --color-sage: #7A8471;
  --color-sage-soft: #A4AE9B;
  --color-line: rgba(31, 27, 22, 0.12);
  --color-line-strong: rgba(31, 27, 22, 0.22);

  /* ---------- TYPOGRAPHY ----------
     Three families:
     - Display (DM Serif Display): headlines, titles
     - Body serif (Lora): long-form reading
     - UI sans (Inter): nav, buttons, stats
  */
  --font-display: 'DM Serif Display', 'Playfair Display', Georgia, serif;
  --font-serif: 'Lora', 'Georgia', serif;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;

  --type-display-xl: 2.5rem;
  --type-display-l: 1.875rem;
  --type-display-m: 1.5rem;
  --type-body-l: 1.0625rem;
  --type-body-m: 0.9375rem;
  --type-body-s: 0.8125rem;
  --type-caption: 0.6875rem;

  --leading-tight: 1.2;
  --leading-normal: 1.5;
  --leading-relaxed: 1.7;

  /* ---------- SPACING ----------
     Based on 4px grid for tight UI control.
  */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;

  /* ---------- RADII ---------- */
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-pill: 999px;

  /* ---------- SHADOWS ----------
     Subtle, warm shadows. Never harsh.
  */
  --shadow-sm: 0 1px 2px rgba(31, 27, 22, 0.06), 0 1px 1px rgba(31, 27, 22, 0.04);
  --shadow-md: 0 4px 12px rgba(31, 27, 22, 0.08), 0 2px 4px rgba(31, 27, 22, 0.04);
  --shadow-lg: 0 12px 32px rgba(31, 27, 22, 0.12), 0 4px 8px rgba(31, 27, 22, 0.06);
  --shadow-inset: inset 0 1px 0 rgba(255, 255, 255, 0.4);

  /* ---------- MOTION ----------
     Everything fades and settles. No bounces.
  */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.45, 0, 0.55, 1);
  --duration-fast: 150ms;
  --duration-base: 250ms;
  --duration-slow: 400ms;
  --duration-pageturn: 600ms;

  /* ---------- LAYOUT ---------- */
  --max-width-mobile: 480px;
  --tab-bar-height: 72px;
  --header-height: 56px;
}

/* ============================================================
   ACCESSION - BASE STYLES
   Reset, body, typography defaults.
   ============================================================ */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-sans);
  font-size: var(--type-body-m);
  line-height: var(--leading-normal);
  color: var(--color-ink);
  background: var(--color-paper);
  /* Subtle paper grain texture via CSS, no image needed */
  background-image:
    radial-gradient(circle at 25% 35%, rgba(122, 106, 85, 0.04) 0%, transparent 50%),
    radial-gradient(circle at 75% 65%, rgba(184, 148, 90, 0.03) 0%, transparent 50%);
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overscroll-behavior: none;
}

/* Lock the app to mobile-friendly width but allow desktop centering */
#app {
  max-width: var(--max-width-mobile);
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  position: relative;
  background: var(--color-paper);
  /* Subtle vertical edges on desktop only */
  box-shadow: 0 0 0 1px var(--color-line) inset;
}

@media (min-width: 481px) {
  body {
    background: linear-gradient(180deg, #ECE3D2 0%, #DCD0BC 100%);
  }
  #app {
    box-shadow: 0 0 60px rgba(31, 27, 22, 0.08);
  }
}

/* Typography defaults */
h1, h2, h3, h4 {
  font-family: var(--font-display);
  font-weight: 400;
  line-height: var(--leading-tight);
  color: var(--color-ink);
}

h1 { font-size: var(--type-display-xl); letter-spacing: -0.02em; }
h2 { font-size: var(--type-display-l); letter-spacing: -0.01em; }
h3 { font-size: var(--type-display-m); }

p {
  font-family: var(--font-serif);
  font-size: var(--type-body-l);
  line-height: var(--leading-relaxed);
  color: var(--color-ink-soft);
}

button {
  font-family: var(--font-sans);
  font-size: var(--type-body-m);
  border: none;
  background: none;
  cursor: pointer;
  color: inherit;
}

a {
  color: var(--color-burgundy);
  text-decoration: none;
}

img {
  max-width: 100%;
  height: auto;
  display: block;
}

/* Utility classes */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
}

.serif { font-family: var(--font-serif); }
.display { font-family: var(--font-display); }
.eyebrow {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-sepia);
  font-weight: 500;
}

/* ============================================================
   ACCESSION - COMPONENT STYLES
   Reusable UI components.
   ============================================================ */

/* ---------- TAB BAR (bottom navigation) ---------- */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: var(--max-width-mobile);
  height: var(--tab-bar-height);
  background: var(--color-paper-light);
  border-top: 1px solid var(--color-line);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 100;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: rgba(251, 247, 238, 0.88);
}

.tab-bar__item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--color-sepia);
  transition: color var(--duration-fast) var(--ease-out);
  padding: var(--space-2);
}

.tab-bar__item.is-active {
  color: var(--color-burgundy);
}

.tab-bar__icon {
  width: 22px;
  height: 22px;
  stroke: currentColor;
  stroke-width: 1.5;
  fill: none;
}

/* ---------- HEADER ---------- */
.header {
  height: var(--header-height);
  padding: 0 var(--space-5);
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--color-line);
  background: var(--color-paper);
  position: sticky;
  top: 0;
  z-index: 50;
}

.header__title {
  font-family: var(--font-display);
  font-size: var(--type-display-m);
  color: var(--color-ink);
}

/* ---------- VIEW CONTAINER ---------- */
.view {
  padding: var(--space-5);
  padding-bottom: calc(var(--tab-bar-height) + var(--space-8));
  min-height: 100vh;
  min-height: 100dvh;
  animation: fadeIn var(--duration-base) var(--ease-out);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ---------- CARDS ---------- */
.card {
  background: var(--color-paper-light);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  box-shadow: var(--shadow-sm);
  position: relative;
}

.card--accent {
  border-left: 3px solid var(--color-burgundy);
}

.artwork-card {
  background: var(--color-paper-light);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--color-line);
}

.artwork-card__image {
  width: 100%;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  background: var(--color-paper-deep);
  display: block;
}

.artwork-card__body {
  padding: var(--space-5);
}

.artwork-card__title {
  font-family: var(--font-display);
  font-size: var(--type-display-m);
  line-height: var(--leading-tight);
  color: var(--color-ink);
  margin-bottom: var(--space-2);
}

.artwork-card__artist {
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  letter-spacing: 0.04em;
  color: var(--color-sepia);
  text-transform: uppercase;
  margin-bottom: var(--space-4);
}

.artwork-card__artist .year {
  font-style: normal;
  color: var(--color-sepia-light);
  margin-left: var(--space-2);
}

.artwork-card__label {
  font-family: var(--font-serif);
  font-size: var(--type-body-m);
  line-height: var(--leading-relaxed);
  color: var(--color-ink-soft);
}

/* ---------- BUTTONS ---------- */
.btn {
  font-family: var(--font-sans);
  font-size: var(--type-body-m);
  font-weight: 500;
  padding: var(--space-3) var(--space-6);
  border-radius: var(--radius-pill);
  border: 1px solid transparent;
  transition: all var(--duration-fast) var(--ease-out);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  letter-spacing: 0.02em;
  min-height: 44px;
  user-select: none;
}

.btn--primary {
  background: var(--color-ink);
  color: var(--color-paper);
}

.btn--primary:active {
  transform: scale(0.98);
  background: var(--color-burgundy);
}

.btn--secondary {
  background: transparent;
  color: var(--color-ink);
  border-color: var(--color-line-strong);
}

.btn--secondary:active {
  background: var(--color-paper-deep);
}

.btn--full {
  width: 100%;
}

.btn--lg {
  padding: var(--space-4) var(--space-8);
  font-size: var(--type-body-l);
}

/* ---------- WAX SEAL ---------- */
.wax-seal {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, var(--color-burgundy-soft) 0%, var(--color-burgundy) 60%, #4A1F1F 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow:
    inset -2px -3px 4px rgba(0,0,0,0.3),
    inset 2px 2px 4px rgba(255,255,255,0.15),
    0 2px 8px rgba(74, 31, 31, 0.4);
}

.wax-seal::before {
  content: '';
  position: absolute;
  inset: 6px;
  border-radius: 50%;
  border: 1px dashed rgba(255, 235, 200, 0.3);
}

.wax-seal__number {
  font-family: var(--font-display);
  font-size: 1.75rem;
  color: var(--color-paper);
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  line-height: 1;
}

.wax-seal--with-ring {
  box-shadow:
    0 0 0 3px var(--color-gold),
    0 0 0 5px var(--color-paper),
    inset -2px -3px 4px rgba(0,0,0,0.3),
    inset 2px 2px 4px rgba(255,255,255,0.15),
    0 2px 8px rgba(74, 31, 31, 0.4);
}

/* ---------- PROGRESS LINE ---------- */
.progress-line {
  height: 2px;
  background: var(--color-line);
  border-radius: 1px;
  overflow: hidden;
  position: relative;
}

.progress-line__fill {
  height: 100%;
  background: var(--color-burgundy);
  border-radius: 1px;
  transition: width var(--duration-slow) var(--ease-out);
}

/* ---------- ACCESSION PLAQUE (badges) ---------- */
.plaque {
  background: var(--color-paper-deep);
  border: 1px solid var(--color-line-strong);
  border-radius: var(--radius-sm);
  padding: var(--space-3) var(--space-4);
  font-family: var(--font-sans);
  display: flex;
  flex-direction: column;
  gap: 2px;
  position: relative;
}

.plaque__label {
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-sepia);
}

.plaque__value {
  font-family: var(--font-display);
  font-size: var(--type-body-l);
  color: var(--color-ink);
}

/* ---------- MOVEMENT TILE ---------- */
.movement-tile {
  display: block;
  padding: var(--space-5);
  background: var(--color-paper-light);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-lg);
  margin-bottom: var(--space-4);
  position: relative;
  transition: transform var(--duration-fast) var(--ease-out);
}

.movement-tile:active {
  transform: scale(0.99);
}

.movement-tile.is-locked {
  opacity: 0.5;
  pointer-events: none;
}

.movement-tile__years {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  color: var(--color-sepia);
  margin-bottom: var(--space-1);
}

.movement-tile__name {
  font-family: var(--font-display);
  font-size: var(--type-display-m);
  margin-bottom: var(--space-2);
  color: var(--color-ink);
}

.movement-tile__blurb {
  font-family: var(--font-serif);
  font-size: var(--type-body-m);
  color: var(--color-ink-soft);
  line-height: var(--leading-normal);
  margin-bottom: var(--space-4);
}

.movement-tile__footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
}

.movement-tile__progress {
  flex: 1;
  height: 2px;
  background: var(--color-line);
  border-radius: 1px;
  overflow: hidden;
}

.movement-tile__progress-fill {
  height: 100%;
  background: var(--color-burgundy);
}

.movement-tile__seal {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--color-burgundy);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.movement-tile__seal svg {
  width: 12px;
  height: 12px;
  stroke: var(--color-paper);
  fill: none;
  stroke-width: 2.5;
}

/* ---------- QUIZ OPTION ---------- */
.quiz-option {
  width: 100%;
  background: var(--color-paper-light);
  border: 1.5px solid var(--color-line-strong);
  border-radius: var(--radius-md);
  padding: var(--space-4) var(--space-5);
  text-align: left;
  font-family: var(--font-serif);
  font-size: var(--type-body-l);
  color: var(--color-ink);
  margin-bottom: var(--space-3);
  transition: all var(--duration-fast) var(--ease-out);
  min-height: 56px;
}

.quiz-option:active {
  transform: scale(0.99);
  background: var(--color-paper-deep);
}

.quiz-option.is-correct {
  background: rgba(122, 132, 113, 0.18);
  border-color: var(--color-sage);
  color: var(--color-sage);
}

.quiz-option.is-incorrect {
  background: rgba(107, 46, 46, 0.1);
  border-color: var(--color-burgundy);
  color: var(--color-burgundy);
}

.quiz-option.is-disabled {
  opacity: 0.4;
  pointer-events: none;
}

/* ---------- HERO PANEL (today view) ---------- */
.hero-panel {
  background: linear-gradient(180deg, var(--color-paper-light) 0%, var(--color-paper) 100%);
  border-radius: var(--radius-xl);
  overflow: hidden;
  margin-bottom: var(--space-5);
  border: 1px solid var(--color-line);
  box-shadow: var(--shadow-md);
}

.hero-panel__image {
  width: 100%;
  aspect-ratio: 16 / 11;
  object-fit: cover;
  background: var(--color-paper-deep);
}

.hero-panel__body {
  padding: var(--space-5);
}

/* ---------- LEADERBOARD ROW ---------- */
.leaderboard-row {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) 0;
  border-bottom: 1px solid var(--color-line);
}

.leaderboard-row:last-child {
  border-bottom: none;
}

.leaderboard-row__avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--color-paper-deep);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: var(--type-body-l);
  color: var(--color-ink);
  flex-shrink: 0;
}

.leaderboard-row__name {
  flex: 1;
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: var(--type-body-m);
}

.leaderboard-row__stat {
  font-family: var(--font-display);
  font-size: var(--type-body-l);
  color: var(--color-burgundy);
}

.leaderboard-row__substat {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.06em;
  color: var(--color-sepia);
  text-transform: uppercase;
}

/* ---------- DIVIDER WITH ORNAMENT ---------- */
.divider-ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: var(--space-6) 0;
  gap: var(--space-3);
}

.divider-ornament::before,
.divider-ornament::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--color-line);
}

.divider-ornament__symbol {
  font-family: var(--font-display);
  color: var(--color-sepia);
  font-size: var(--type-body-l);
}

/* ---------- CONSTELLATION NODE ---------- */
.constellation-svg {
  width: 100%;
  height: auto;
  display: block;
}

.constellation-node {
  transition: all var(--duration-base) var(--ease-out);
}

.constellation-node[data-state="faint"] {
  opacity: 0.25;
}

.constellation-node[data-state="lit"] {
  opacity: 1;
}

.constellation-node[data-state="gold"] {
  opacity: 1;
}

/* ============================================================
   ACCESSION - VIEW STYLES & ANIMATIONS
   Per-view layouts and motion.
   ============================================================ */

/* ---------- ONBOARDING / WALKTHROUGH ---------- */
.onboarding {
  padding: var(--space-6) var(--space-5) calc(var(--tab-bar-height) + var(--space-5));
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

.onboarding__intro {
  text-align: center;
  padding-top: var(--space-10);
}

.onboarding__title {
  font-family: var(--font-display);
  font-size: 3rem;
  letter-spacing: -0.02em;
  line-height: 0.95;
  margin-bottom: var(--space-3);
  color: var(--color-ink);
}

.onboarding__subtitle {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: var(--type-body-l);
  color: var(--color-sepia);
  margin-bottom: var(--space-10);
}

.onboarding__body {
  flex: 1;
}

.onboarding__footer {
  padding-top: var(--space-6);
}

.museum-checklist {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.museum-checkbox {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-4);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-md);
  background: var(--color-paper-light);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
}

.museum-checkbox.is-checked {
  background: rgba(107, 46, 46, 0.06);
  border-color: var(--color-burgundy);
}

.museum-checkbox__box {
  width: 20px;
  height: 20px;
  border: 1.5px solid var(--color-line-strong);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.museum-checkbox.is-checked .museum-checkbox__box {
  background: var(--color-burgundy);
  border-color: var(--color-burgundy);
}

.museum-checkbox.is-checked .museum-checkbox__box::after {
  content: '✓';
  color: var(--color-paper);
  font-size: 13px;
  font-weight: bold;
}

.museum-checkbox__name {
  font-family: var(--font-sans);
  font-size: var(--type-body-m);
  color: var(--color-ink);
}

/* Walkthrough card swiping */
.walkthrough-card {
  background: var(--color-paper-light);
  border-radius: var(--radius-xl);
  overflow: hidden;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--color-line);
  margin-bottom: var(--space-5);
}

.walkthrough-card__image {

.walkthrough-question {

.walkthrough-choice__icon {

  font-family: var(--font-display);

}

.today-date {

.today-section__title {

}

.streak-row__count {

.streak-row__caption {

  top: 0;

}

.lesson-progress-bar__fill {

}

.lesson-header {

  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-5);

  top: 4px;
  z-index: 50;

}

.lesson-close {

  height: 36px;

}

.lesson-step {

  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  text-transform: uppercase;

}

.lesson-body {

  padding: var(--space-3) var(--space-5);
  display: flex;
  flex-direction: column;
}

.lesson-footer {

}

.lesson-card-image {
  width: 100%;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  border-radius: var(--radius-lg);
  background: var(--color-paper-deep);
  margin-bottom: var(--space-5);
}

.lesson-card-image--quiz {
  aspect-ratio: 1;
}

.lesson-card-title {
  font-family: var(--font-display);
  font-size: var(--type-display-m);
  margin-bottom: var(--space-1);
}

.lesson-card-meta {
  font-family: var(--font-sans);
  font-size: var(--type-body-s);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--color-sepia);
  margin-bottom: var(--space-4);
}

.lesson-card-body {
  font-family: var(--font-serif);
  font-size: var(--type-body-l);
  line-height: var(--leading-relaxed);
  color: var(--color-ink-soft);
  margin-bottom: var(--space-5);
}

.lesson-question {
  font-family: var(--font-display);
  font-size: var(--type-display-m);
  margin-bottom: var(--space-5);
  line-height: var(--leading-tight);
}

.lesson-feedback {
  font-family: var(--font-serif);
  font-size: var(--type-body-m);
  color: var(--color-ink-soft);

  background: var(--color-paper-deep);
  border-radius: var(--radius-md);
  margin-top: var(--space-3);
  border-left: 3px solid var(--color-sage);
  animation: slideUp var(--duration-base) var(--ease-out);
}

.lesson-feedback.is-incorrect {
  border-left-color: var(--color-burgundy);
}

.lesson-feedback__label {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-sage);
  margin-bottom: var(--space-1);
  display: block;
}

.lesson-feedback.is-incorrect .lesson-feedback__label {

}

@keyframes slideUp {

.date-slider {
  margin: var(--space-5) 0;
}

.date-slider__value {

  text-align: center;
  margin-bottom: var(--space-3);
  letter-spacing: -0.01em;
}

.date-slider__bce {

  color: var(--color-sepia);
  margin-left: var(--space-1);
}

.date-slider input[type="range"] {

  appearance: none;
  -webkit-appearance: none;
  height: 2px;

  border-radius: var(--radius-md);

}

  object-fit: cover;

.before-after-option__caption {

  font-size: var(--type-body-s);
  text-align: center;
  background: var(--color-paper-light);
}

.reward-screen {

  padding: var(--space-10) var(--space-5);
  animation: fadeIn var(--duration-slow) var(--ease-out);
}

.reward-seal-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: var(--space-6);
}

.reward-seal-wrap .wax-seal {
  animation: sealStamp 500ms var(--ease-out);
}

@keyframes sealStamp {
  0% { transform: scale(0.6) rotate(-15deg); opacity: 0; }
  60% { transform: scale(1.15) rotate(2deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

.reward-title {
  font-family: var(--font-display);
  font-size: var(--type-display-l);
  margin-bottom: var(--space-3);
}

.reward-eyebrow {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--color-burgundy);
  margin-bottom: var(--space-2);
}

.reward-subtitle {
  font-family: var(--font-serif);
  font-style: italic;
  color: var(--color-sepia);
  margin-bottom: var(--space-8);
}

.reward-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-3);
  margin-bottom: var(--space-8);
}

/* ---------- COLLECTION ---------- */
.collection-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--space-3);
}

.collection-tile {
  aspect-ratio: 1;
  border-radius: var(--radius-md);
  overflow: hidden;
  position: relative;
  background: var(--color-paper-deep);
  border: 1px solid var(--color-line);
}

.collection-tile img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.collection-tile.is-faint img {
  filter: grayscale(1) opacity(0.3);
}

.collection-tile__caption {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: var(--space-2) var(--space-3);
  background: linear-gradient(transparent, rgba(31, 27, 22, 0.8));
  color: var(--color-paper);
  font-family: var(--font-display);
  font-size: var(--type-body-s);
}

.collection-tile.is-faint .collection-tile__caption {
  color: var(--color-sepia-light);
}

/* ---------- PROFILE / RANKS ---------- */
.rank-row {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  padding: var(--space-4) 0;
  border-bottom: 1px solid var(--color-line);
}

.rank-row:last-child {
  border-bottom: none;
}

.rank-row__name {

}

.rank-row__movement {
  font-family: var(--font-display);
  font-size: var(--type-body-l);
  color: var(--color-ink);
  margin-bottom: 2px;
}

.rank-row__rank {
  font-family: var(--font-sans);
  font-size: var(--type-caption);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-sepia);
}

.rank-row__progress {
  width: 80px;
  height: 2px;
  background: var(--color-line);
}

.rank-row__progress-fill {
  height: 100%;
  background: var(--color-burgundy);
}

nist collections in the world, including Monet's Water Lilies, Degas' dancers, and a wall of Cezanne that bridges to what came next.", "keyArtworks": ["met-monet-bridge", "met-degas-rehearsal"], "lessons": ["impressionism-01"]}, "italian-renaissance": {"id": "italian-renaissance", "name": "Italian Renaissance", "shortName": "Italian Renaissance", "yearStart": 1400, "yearEnd": 1600, "color": "#8B5A3C", "blurb": "Florence and Venice rediscover antiquity and invent the modern artist.", "longForm": "Beginning in early 15th-century Florence, painters and sculptors began to study the ancient Greeks and Romans not as relics but as rivals. They reinvented perspective, anatomy, and the very idea of the artist as an individual genius rather than an anonymous craftsman. The movement crested with Leonardo, Michelangelo, and Raphael, then radiated outward to Venice, where Titian and Tintoretto traded Florentine line for sumptuous color. The Met's holdings are deep here, from Botticelli's late religious panels to a small but ravishing collection of Italian drawings.", "keyArtworks": ["met-botticelli-jerome", "met-bellini-madonna"], "lessons": ["italian-renaissance-01"]}, "northern-renaissance": {"id": "northern-renaissance", "name": "Northern Renaissance", "shortName": "Northern Renaissance", "yearStart": 1400, "yearEnd": 1600, "color": "#4A6741", "blurb": "Oil paint, miraculous detail, and a colder, more intricate world than Italy.", "longForm": "While Italy looked to ancient marble for inspiration, painters in Flanders and the Low Countries looked instead through windows, into mirrors, at the precise grain of a velvet sleeve. The breakthrough was oil paint, which let Jan van Eyck and his successors build up layers of nearly invisible glaze and render the visible world with hallucinatory clarity. Northern Renaissance art is generally smaller, denser, and stranger than its Italian counterpart, packed with symbolism that contemporary viewers could read like text. The Met's collection includes Bruegel, Memling, and a stunning Petrus Christus portrait.", "keyArtworks": ["met-bruegel-harvesters", "met-christus-carthusian"], "lessons": ["northern-renaissance-01"]}}, "museums": {"met": {"id": "met", "name": "The Metropolitan Museum of Art", "shortName": "The Met", "city": "New York", "country": "USA", "founded": 1870, "blurb": "One of the largest and most encyclopedic museums in the world. Two million works spanning 5,000 years across the entire history of art."}}, "artists": {"bellini": {"id": "bellini", "name": "Giovanni Bellini", "shortName": "Bellini", "yearBorn": 1430, "yearDied": 1516, "nationality": "Italian", "movementId": "italian-renaissance", "blurb": "The Venetian master who taught his city to paint, founder of a school that would produce Titian, Giorgione, and Tintoretto.", "longForm": "Bellini lived a long life and worked at the geographic edge of the Italian Renaissance, in Venice, where he absorbed both the Florentine love of line and the Northern Renaissance discovery of oil paint. He brought oil glazing to Venetian painting and in doing so changed what color could do in Western art. His pupils and assistants included most of the next generation of Venetian masters. The Met owns several Bellinis, including a quiet, intimate Madonna and Child from around 1485.", "influencedBy": ["jacopo-bellini"], "influenced": ["titian", "giorgione"]}, "botticelli": {"id": "botticelli", "name": "Sandro Botticelli", "shortName": "Botticelli", "yearBorn": 1445, "yearDied": 1510, "nationality": "Italian", "movementId": "italian-renaissance", "blurb": "Florentine painter of impossibly graceful Madonnas, Venuses, and mythological dreams.", "longForm": "Botticelli worked in Florence under the patronage of the Medici family, producing some of the most recognizable images in Western art, including The Birth of Venus and Primavera. His mature style favored linear elegance over the volumetric realism his contemporaries were developing, which fell out of fashion almost immediately after his death. He was forgotten for nearly four centuries until the Pre-Raphaelites and Walter Pater rediscovered him in the 19th century. The Met owns several late religious works, including a striking small Annunciation.", "influencedBy": ["lippi"], "influenced": ["pre-raphaelites"]}, "bruegel-elder": {"id": "bruegel-elder", "name": "Pieter Bruegel the Elder", "shortName": "Bruegel", "yearBorn": 1525, "yearDied": 1569, "nationality": "Flemish", "movementId": "northern-renaissance", "blurb": "The greatest painter of peasants, weather, and the strangeness of being alive in 16th-century Flanders.", "longForm": "Bruegel was a learned man who painted as if he wasn't. His scenes of villagers harvesting, dancing, and freezing in winter are so vivid that we sometimes forget they are also moral allegories, drawn from a humanist's library of proverbs and biblical parables. He founded a painter dynasty: his sons Pieter the Younger and Jan continued the workshop, but the original Bruegel remains unmatched. Of his fewer than fifty surviving works, the Met owns one masterpiece, The Harvesters, painted in 1565 as part of a series depicting the months of the year.", "influencedBy": ["bosch"], "influenced": ["rubens"]}, "degas": {"id": "degas", "name": "Edgar Degas", "shortName": "Degas", "yearBorn": 1834, "yearDied": 1917, "nationality": "French", "movementId": "impressionism", "blurb": "The Impressionist who hated being called one. Obsessed with the human figure, especially dancers caught off-guard.", "longForm": "Degas exhibited with the Impressionists but resented the label. Unlike Monet, he had little interest in landscape or outdoor light. He was a draftsman first, trained in the academic tradition, and his subject was the human figure in unguarded moments: laundresses ironing, jockeys before the race, and above all, ballet dancers stretching, yawning, adjusting their slippers backstage. He took up sculpture in his later years as his eyesight failed, producing wax figures that were cast in bronze after his death.", "influencedBy": ["ingres"], "influenced": ["toulouse-lautrec"]}, "hopper": {"id": "hopper", "name": "Edward Hopper", "shortName": "Hopper", "yearBorn": 1882, "yearDied": 1967, "nationality": "American", "movementId": "american-modernism", "blurb": "The great painter of American loneliness. Diners, hotel rooms, gas stations, all empty of small talk.", "longForm": "Hopper trained as an illustrator and worked commercially for years before his paintings began to sell. He married another painter, Josephine Nivison, who modeled for nearly every female figure in his mature work. He painted slowly, sometimes finishing only two or three canvases a year. His subjects are American spaces drained of their usual activity: a diner at 3 a.m., a hotel lobby with one figure reading, a Sunday morning street with the shops closed. The Whitney holds the largest Hopper collection in the world, but the Met owns his luminous Tables for Ladies.", "influencedBy": ["henri"], "influenced": ["wyeth", "rothko"]}, "monet": {"id": "monet", "name": "Claude Monet", "shortName": "Monet", "yearBorn": 1840, "yearDied": 1926, "nationality": "French", "movementId": "impressionism", "blurb": "The longest-lived Impressionist, who painted the same haystacks, cathedrals, and water lilies hundreds of times to chase the changing light.", "longForm": "Monet gave Impressionism its name, with his 1872 painting Impression, Sunrise. He spent the second half of his life at his house in Giverny, where he designed an elaborate water garden specifically so he could paint it. As his eyesight failed in old age, his late Water Lilies became increasingly abstract, anticipating Abstract Expressionism by half a century. The Met has thirty-two Monets, including key examples from his series paintings of haystacks and Rouen Cathedral, where the subject barely matters and the light is everything.", "influencedBy": ["boudin", "turner"], "influenced": ["pollock"]}, "okeeffe": {"id": "okeeffe", "name": "Georgia O'Keeffe", "shortName": "O'Keeffe", "yearBorn": 1887, "yearDied": 1986, "nationality": "American", "movementId": "american-modernism", "blurb": "Made American modernism out of magnified flowers, bleached desert bones, and New Mexico skies.", "longForm": "O'Keeffe came of age in the orbit of the photographer Alfred Stieglitz, whom she married. Her early work was abstract, but she became famous for her enormous close-ups of flowers, painted so large that they nearly tip into pure form. From 1929 she spent summers in New Mexico, and after Stieglitz's death she moved there permanently. The bleached cattle skulls, adobe churches, and red hills of her late work are inseparable from American modernism's frontier mythology. She lived to ninety-eight and was nearly blind at the end.", "influencedBy": ["dow"], "influenced": ["mitchell"]}, "petrus-christus": {"id": "petrus-christus", "name": "Petrus Christus", "shortName": "Petrus Christus", "yearBorn": 1410, "yearDied": 1475, "nationality": "Flemish", "movementId": "northern-renaissance", "blurb": "Bruges painter who took over Jan van Eyck's workshop and his role as the leading painter of the Low Countries.", "longForm": "Petrus Christus became the most important painter in Bruges after Jan van Eyck's death in 1441, almost certainly inheriting his workshop and many of his patrons. He was one of the first Northern painters to use single-point linear perspective, an Italian innovation, and one of the first to set portrait subjects in real interior spaces rather than against flat backgrounds. The Met's Portrait of a Carthusian, dated 1446, is among the earliest dated Netherlandish portraits and one of his most famous works.", "influencedBy": ["van-eyck"], "influenced": ["memling"]}, "rembrandt": {"id": "rembrandt", "name": "Rembrandt van Rijn", "shortName": "Rembrandt", "yearBorn": 1606, "yearDied": 1669, "nationality": "Dutch", "movementId": "dutch-golden-age", "blurb": "The towering genius of 17th-century painting. Painted his own face from youth to ruin.", "longForm": "Rembrandt was the most successful painter in Amsterdam for the first half of his career and bankrupt for the second. He left nearly a hundred self-portraits, an unprecedented act of self-examination that lets us watch him age in close to real time. His handling of paint became increasingly thick and free as he aged, and his late works, including several Met masterpieces, anticipate the broken brushwork of two centuries later. He outlived his wife, his mistress, and his only surviving son.", "influencedBy": ["lastman", "caravaggio"], "influenced": ["vermeer", "kokoschka"]}, "vermeer": {"id": "vermeer", "name": "Johannes Vermeer", "shortName": "Vermeer", "yearBorn": 1632, "yearDied": 1675, "nationality": "Dutch", "movementId": "dutch-golden-age", "blurb": "A Delft painter of quiet interiors who left only about 34 paintings, each one a small miracle of light.", "longForm": "Almost nothing is known about Vermeer's life. He lived in Delft, painted slowly, died in debt at 43, and was largely forgotten for two centuries before being rediscovered in the 1860s. His paintings are nearly all the same: a woman in a corner of a room, light entering from a window on the left, the world reduced to a moment so quiet it seems to hold its breath. He may have used a camera obscura, an optical device, to achieve his particular soft focus and pearl-like highlights. The Met owns five Vermeers, the largest concentration outside the Mauritshuis in The Hague.", "influencedBy": ["fabritius"], "influenced": ["hammershoi"]}}, "artworks": {"met-bellini-madonna": {"id": "met-bellini-madonna", "title": "Madonna and Child", "artistId": "bellini", "year": 1485, "decade": 1480, "movementId": "italian-renaissance", "museumId": "met", "medium": "Oil on wood", "dimensions": "88.9 x 71.1 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Madonna%20and%20Child%20MET%20DT375.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art, Rogers Fund, 1908", "metObjectId": 435641, "famousLevel": 4, "wallLabel": "Mary holds the Christ Child against a parapet, with a Venetian landscape behind her. The composition is one Bellini painted dozens of times across his long career, each version a small variation in pose, light, and mood. The greens and reds here have the saturated depth that comes only from oil paint built up in layers of nearly invisible glaze.", "longForm": "Bellini painted Madonna and Child compositions for forty years. The format \u2014 half-length figure, parapet in the foreground, landscape vignette to one side \u2014 became almost a meditative exercise, a returning subject through which he worked out the central concerns of his art: how light models flesh, how color shifts across distance, how to make a religious image feel like an intimate human moment. This version from around 1485 is one of his middle-period masterpieces, painted in oil on wood, with the small distant landscape that would become a Venetian hallmark.", "tags": ["madonna", "venetian", "oil-on-wood", "religious"], "details": []}, "met-botticelli-jerome": {"id": "met-botticelli-jerome", "title": "The Last Communion of Saint Jerome", "artistId": "botticelli", "year": 1495, "decade": 1490, "movementId": "italian-renaissance", "museumId": "met", "medium": "Tempera and gold on wood", "dimensions": "34.5 x 25.4 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/The%20Last%20Communion%20of%20Saint%20Jerome%20MET%20DP358982.jpg?width=1200", "imageCredit": "Public domain, The Metropolitan Museum of Art, Benjamin Altman Bequest, 1913", "famousLevel": 3, "wallLabel": "The aged hermit Saint Jerome, supported by his brothers, receives final communion from a priest. A small panel painted for private devotion, it shows Botticelli late in life turning from the mythological pictures of his Medici years toward an austere religious style influenced by the preacher Savonarola.", "longForm": "Saint Jerome, the fourth-century scholar who translated the Bible into Latin, was a favorite subject of Renaissance painters who saw in him an image of the learned, ascetic life. Botticelli paints the dying saint in his desert cell, with a palm-frond crucifix, a straw mat, and his red cardinal's hat hanging on the wall as a memento of the worldly position he renounced. The composition is unusually intimate for Botticelli, designed to be looked at closely and held in the hand. The picture entered the Met as part of the great Benjamin Altman bequest of 1913, which formed the core of the museum's early Italian collection.", "tags": ["religious", "private-devotion", "late-botticelli", "tempera-gold"], "details": [], "metObjectId": 436106, "imageSource": "wikimedia"}, "met-bruegel-harvesters": {"id": "met-bruegel-harvesters", "title": "The Harvesters", "artistId": "bruegel-elder", "year": 1565, "decade": 1560, "movementId": "northern-renaissance", "museumId": "met", "medium": "Oil on wood", "dimensions": "119 x 162 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Pieter%20Bruegel%20the%20Elder-%20The%20Harvesters%20-%20Google%20Art%20Project.jpg?width=1200", "imageCredit": "Public domain, The Metropolitan Museum of Art, Rogers Fund, 1919", "famousLevel": 5, "wallLabel": "One of six surviving panels from a series depicting the months of the year, this is August or possibly late July. Peasants harvest wheat in the foreground while others nap under a tree, eat bread, and drink from a jug. The horizon falls a third of the way down the panel, giving the sky enormous breathing room. Bruegel treats labor and lunch with the same dignity.", "longForm": "Bruegel painted six panels representing the months for the wealthy Antwerp merchant Niclaes Jongelinck, who installed them in his country house outside Antwerp in 1565. Five survive: three are in Vienna, one in Prague, and this one at the Met. The series may be the first European paintings in which landscape itself is the protagonist, with the human figures functioning as one element among many. The composition is built on a series of diagonals: the swath of cut wheat, the path receding into the distance, the line of sleeping bodies. Look closely at the figures eating bread under the pear tree, the cluster of distant figures playing a stick-game, and the church spire of the village beyond.", "tags": ["landscape", "peasant-life", "seasons", "oil-on-wood"], "details": [{"crop": "lunch", "x": 0.32, "y": 0.55, "label": "The midday meal under the pear tree"}, {"crop": "village", "x": 0.85, "y": 0.45, "label": "Distant village with church spire"}], "metObjectId": 435809, "imageSource": "wikimedia"}, "met-christus-carthusian": {"id": "met-christus-carthusian", "title": "Portrait of a Carthusian", "artistId": "petrus-christus", "year": 1446, "decade": 1440, "movementId": "northern-renaissance", "museumId": "met", "medium": "Oil on wood", "dimensions": "29.2 x 21.6 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Portrait%20of%20a%20Carthusian%20MET%20DT26.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art, The Jules Bache Collection, 1949", "metObjectId": 435896, "famousLevel": 5, "wallLabel": "A Carthusian lay brother turns his head sharply to meet the viewer's gaze, his red robe glowing against deep shadow. At the bottom of the painting, in trompe-l'\u0153il, sits a single fly \u2014 painted next to Petrus Christus's signature as both a memento mori and a small joke about the painter's skill at illusion.", "longForm": "Painted in 1446, this is among the earliest dated Netherlandish portraits and a watershed in the history of portraiture. Petrus Christus broke from the convention of showing sitters against a flat, indeterminate background and placed his subject in a believable interior space, with light falling from a specific direction. The trompe-l'\u0153il fly at the bottom is famous: in part a traditional memento mori, in part a display of painterly trickery announcing the artist's hand. A halo above the monk's head, visible for centuries, was determined to be a 17th-century Spanish addition and removed by Met conservators in 1994.", "tags": ["portrait", "monk", "trompe-loeil", "early-netherlandish"], "details": [{"crop": "fly", "x": 0.5, "y": 0.93, "label": "The trompe-l'\u0153il fly"}]}, "met-degas-rehearsal": {"id": "met-degas-rehearsal", "title": "The Rehearsal of the Ballet Onstage", "artistId": "degas", "year": 1874, "decade": 1870, "movementId": "impressionism", "museumId": "met", "medium": "Pastel and ink on paper", "dimensions": "54.3 x 73 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/The%20Rehearsal%20of%20the%20Ballet%20Onstage%20MET%20DT1565.jpg?width=1200", "imageCredit": "Public domain, The Metropolitan Museum of Art, H. O. Havemeyer Collection, 1929", "famousLevel": 4, "wallLabel": "Two ballet masters watch from chairs at the right while dancers in white tulle take instruction at the center and others wait in the wings. Degas favored these in-between moments, when the performance had not yet begun and the dancers were still arranging themselves, stretching, scratching, yawning.", "longForm": "Degas was a passionate ballet enthusiast and was granted unusual access behind the scenes at the Paris Opera. He produced over 1,500 works on the subject across his career, ranging from oil paintings to pastels to wax sculptures. This work is notable for its unusual high vantage point, as if the viewer were leaning over a balcony to look down, and for its asymmetrical composition, with the dancers pushed to one side and a great deal of empty stage at the other. Both were influenced by Japanese prints and the new technology of photography, which were teaching European artists to see space in new ways.", "tags": ["ballet", "pastel", "japanese-influence", "behind-scenes"], "details": [{"crop": "ballet-master", "x": 0.8, "y": 0.5, "label": "The ballet masters watching"}, {"crop": "dancers-center", "x": 0.45, "y": 0.55, "label": "Dancers receiving instruction"}], "metObjectId": 436155, "imageSource": "wikimedia"}, "met-hatshepsut-kneeling": {"id": "met-hatshepsut-kneeling", "title": "Large Kneeling Statue of Hatshepsut", "artistId": null, "year": -1470, "decade": -1470, "movementId": "egyptian-ancient", "museumId": "met", "medium": "Granite, paint", "dimensions": "295.9 x 82.6 x 149.9 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Large%20Kneeling%20Statue%20of%20Hatshepsut%20MET%20DP116045.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art, Rogers Fund, 1929", "metObjectId": 544449, "famousLevel": 5, "wallLabel": "Hatshepsut, one of the few women to rule as pharaoh, kneels to make an offering to the god Amun. She wears the false beard and head-cloth of an Egyptian king. The statue is one of several that lined the processional way to her mortuary temple at Deir el-Bahri, smashed after her death and reassembled by Met excavators in the 1920s.", "longForm": "Hatshepsut ruled Egypt for about twenty years in the early 15th century BCE, first as regent for her young stepson Thutmose III, then as pharaoh in her own right. Female rulers were not unheard of in Egypt, but assuming the formal regalia of kingship \u2014 the false beard, the nemes head-cloth, the kilt \u2014 was a striking choice. After her death, Thutmose III ordered her image systematically erased from her monuments. The shattered fragments of this statue and several like it were discovered in pits near her temple at Deir el-Bahri during a Met excavation in 1927-28 and reassembled in New York. The pink granite came from Aswan, six hundred miles up the Nile.", "tags": ["sculpture", "pharaoh", "female-ruler", "new-kingdom"], "details": []}, "met-hopper-tables": {"id": "met-hopper-tables", "title": "Tables for Ladies", "artistId": "hopper", "year": 1930, "decade": 1930, "movementId": "american-modernism", "museumId": "met", "medium": "Oil on canvas", "dimensions": "122.6 x 153 cm", "image": null, "imageCredit": "Public domain via fair use, The Metropolitan Museum of Art, George A. Hearn Fund, 1931", "famousLevel": 4, "wallLabel": "A waitress arranges fruit at the front of a New York restaurant whose name, painted on the window, was a Depression-era convention signaling that unaccompanied women were welcome. A cashier counts at the register; a couple dines in the background. The acid yellow electric light is the painting's most modern element.", "longForm": "Hopper painted this in 1930, the first full year of the Great Depression, when 'Tables for Ladies' signs were proliferating as restaurants tried to attract a respectable middle-class clientele who would have previously eaten only at home or in private clubs. The Met acquired it the following year, an unusually quick recognition. Note the construction of the space: the diagonal of the counter pulls the eye in from the lower right, the vertical of the windows holds the composition together, and the small black cat on the chair in the background is the only animate creature not actively at work.", "tags": ["urban-scene", "depression-era", "electric-light", "waitress"], "details": [{"crop": "waitress", "x": 0.3, "y": 0.5, "label": "Waitress arranging fruit"}, {"crop": "couple", "x": 0.75, "y": 0.55, "label": "The dining couple"}], "metObjectId": 488978, "imageSource": "placard"}, "met-monet-bridge": {"id": "met-monet-bridge", "title": "Bridge over a Pond of Water Lilies", "artistId": "monet", "year": 1899, "decade": 1890, "movementId": "impressionism", "museumId": "met", "medium": "Oil on canvas", "dimensions": "92.7 x 73.7 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Bridge%20over%20a%20Pond%20of%20Water%20Lilies.JPG?width=1200", "imageCredit": "Public domain, The Metropolitan Museum of Art, H. O. Havemeyer Collection, 1929", "famousLevel": 5, "wallLabel": "Monet painted the Japanese footbridge in his Giverny garden a dozen times in 1899, in different lights and seasons. Here the foliage is at full summer green, the lilies open on the water below, and the bridge sits high in the composition like a Japanese print. The painting is built almost entirely from layered green and lavender, with the bridge as the only horizontal anchor.", "longForm": "Monet had bought his property in Giverny in 1890 and immediately began transforming the marsh below the house into a water garden, importing exotic plants and building the footbridge himself, modeled on prints he had collected by Hokusai and Hiroshige. The 1899 bridge series was his first sustained attempt at painting the water garden, a subject that would absorb him for the rest of his life and culminate in the monumental late Water Lilies panels at the Musee de l'Orangerie in Paris. The Met holds two paintings from this 1899 series; the other shows the bridge in a cooler, more silver light.", "tags": ["water-garden", "giverny", "series-painting", "japanese-influence"], "details": [{"crop": "bridge", "x": 0.5, "y": 0.3, "label": "The Japanese footbridge"}, {"crop": "lilies", "x": 0.4, "y": 0.75, "label": "Water lilies on the surface"}], "metObjectId": 437127, "imageSource": "wikimedia"}, "met-okeeffe-cow-skull": {"id": "met-okeeffe-cow-skull", "title": "Cow's Skull: Red, White, and Blue", "artistId": "okeeffe", "year": 1931, "decade": 1930, "movementId": "american-modernism", "museumId": "met", "medium": "Oil on canvas", "dimensions": "101.3 x 91.1 cm", "image": null, "imageCredit": "Public domain via fair use, The Metropolitan Museum of Art, Alfred Stieglitz Collection, 1952", "famousLevel": 5, "wallLabel": "A bleached cow skull hangs against a black vertical band flanked by red borders, suggesting the American flag. O'Keeffe painted it in 1931, the year of her first long summer in New Mexico, in deliberate response to critics who insisted that the truly American subject matter was urban and industrial. She offered desert bones instead.", "longForm": "O'Keeffe wrote later that she had been listening to male artists in New York talk about painting the Great American Novel, and decided to make the Great American Painting herself, with the most quintessentially American subject she could think of: the bleached skull of a Western range cow against red, white, and blue. The painting is partly serious and partly a joke at the expense of her colleagues. It was acquired by the Met as part of the Stieglitz collection after his death, when his executors distributed his enormous holdings of modern American art to several major museums.", "tags": ["southwest", "skull", "abstraction", "american-symbol"], "details": [], "metObjectId": 488694, "imageSource": "placard"}, "met-rembrandt-self-portrait": {"id": "met-rembrandt-self-portrait", "title": "Self-Portrait", "artistId": "rembrandt", "year": 1660, "decade": 1660, "movementId": "dutch-golden-age", "museumId": "met", "medium": "Oil on canvas", "dimensions": "80.3 x 67.3 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Rembrandt%20-%20Self-portrait%2C%201660.JPG?width=1200", "imageCredit": "Public domain, The Metropolitan Museum of Art, Benjamin Altman Bequest, 1913", "famousLevel": 5, "wallLabel": "Rembrandt at fifty-four, recently bankrupt, holding the tools of his trade. He has just had to sell his house and his art collection. The white cap and brown smock are studio clothes. The unfinished, almost roughened surface of the face is deliberate, and entirely characteristic of his late style.", "longForm": "Rembrandt painted himself almost ninety times across his life, the most sustained self-examination in the history of Western art before the modern era. This portrait dates from the year after his bankruptcy, in which he was forced to sell his collection of art, antiquities, and the house on the Jodenbreestraat that he had bought in better times. Yet he depicts himself not as defeated but as a working painter in his studio, holding his palette and brushes, his identity untouchable even as his finances collapsed. The brushwork around the eyes is unbelievably economical: a few thick scumbles of paint that resolve, from a step back, into the most searching gaze in seventeenth-century art.", "tags": ["self-portrait", "late-rembrandt", "post-bankruptcy", "tronie"], "details": [], "metObjectId": 437394, "imageSource": "wikimedia"}, "met-temple-dendur": {"id": "met-temple-dendur", "title": "Temple of Dendur", "artistId": null, "year": -15, "decade": -10, "movementId": "egyptian-ancient", "museumId": "met", "medium": "Aeolian sandstone", "dimensions": "Approx. 25 m long", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/The%20Temple%20of%20Dendur%20MET%20DT563.jpg?width=1200", "imageCredit": "Public domain, The Metropolitan Museum of Art, Given to the United States by Egypt in 1965", "famousLevel": 5, "wallLabel": "A small Nubian temple built around 15 BCE by the Roman emperor Augustus, who was at the time the new pharaoh of Egypt. Given to the United States in 1965 in gratitude for American aid in saving Nubian monuments from the rising waters of the Aswan High Dam. Reassembled stone by stone inside a purpose-built glass-walled wing at the Met.", "longForm": "When Egypt built the Aswan High Dam in the 1960s, dozens of ancient monuments along the Nile faced submersion. UNESCO led an international effort to dismantle and relocate the most important sites; the United States contributed significantly. As a gesture of thanks, Egypt offered four temples to four different countries. Dendur came to the United States and after a competition between several cities was awarded to the Met, which built a vast glass-walled hall to house it overlooking Central Park. The temple was originally dedicated to Isis and to two deified brothers, sons of a local Nubian chieftain who had drowned in the Nile.", "tags": ["architecture", "egyptian", "nubian", "gift-of-egypt"], "details": [], "metObjectId": 547802, "imageSource": "wikimedia"}, "met-vermeer-water-pitcher": {"id": "met-vermeer-water-pitcher", "title": "Young Woman with a Water Pitcher", "artistId": "vermeer", "year": 1662, "decade": 1660, "movementId": "dutch-golden-age", "museumId": "met", "medium": "Oil on canvas", "dimensions": "45.7 x 40.6 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Johannes%20Vermeer%20%28Dutch%2C%20Delft%201632%E2%80%931675%20Delft%29%20-%20Young%20Woman%20with%20a%20Water%20Pitcher%20-%20Google%20Art%20Project.jpg?width=1200", "imageCredit": "Public domain, The Metropolitan Museum of Art, Marquand Collection, 1889", "famousLevel": 5, "wallLabel": "A woman in a starched white linen cap holds a brass pitcher in one hand and the casement window in the other. Cool morning light enters from the left and turns the white wall behind her into a quiet field of pearl-grey. The blue of her gown and the cobalt of the tablecloth are the only saturated notes in the room. Nothing is happening, and everything is happening.", "longForm": "This was the first Vermeer to enter an American collection, acquired in 1887 when Vermeer was still relatively obscure. The painting demonstrates Vermeer's mature interest in the geometry of interior space and the precise behavior of natural light. The woman's gesture is ambiguous \u2014 is she opening the window or steadying herself? \u2014 which is exactly the point. Vermeer rarely depicted a clearly readable narrative. Note the map on the back wall, a recurring Vermeer prop, and the gilt-edged Persian carpet draped over the table, an expensive imported object that signaled the household's prosperity.", "tags": ["interior", "woman-alone", "light-study", "vermeer-canon"], "details": [{"crop": "hand-on-window", "x": 0.3, "y": 0.35, "label": "The hand on the casement"}, {"crop": "pitcher", "x": 0.55, "y": 0.6, "label": "Brass pitcher catching the morning (function() {


/* ========== js/core/state.js ========== */

/* ============================================================
   ACCESSION - STATE MANAGEMENT
   The single source of truth for user data.

   ============================================================ */

// We version the storage key so future migrations are clean.
const STORAGE_KEY = 'accession:userState:v1';

// Default state shape. Every property must exist here so that

const DEFAULT_STATE = {

  userId: null,           // Generated on first launch
  displayName: null,      // Set during onboarding
  partnerName: null,      // Brandon, set during onboarding

  // Onboarding
  hasCompletedIntro: false,
  hasCompletedWalkthrough: false,
  visitedMuseums: [],     // Array of museum IDs

  // Streak
  streakDays: 0,
  lastSessionDate: null,  // ISO date string YYYY-MM-DD

  // Per-artwork state

  artworkState: {},

  // Per-movement progress (lessons completed)

  movementProgress: {},

  // Per-movement curator rank: 0=Visitor, 1=Member, 2=Apprentice, 3=Curator, 4=Emeritus
  curatorRanks: {},

  authorEdits: {},

  // Author mode flag (hidden, toggled via 5-tap easter egg)
  authorModeUnlocked: false,

    reducedMotion: false,
  },
};

// In-memory copy of state, mutated then saved.
let state = null;

/**
 * Load state from localStorage, or initialize defaults.
 * Always returns a complete state object.

function loadState() {

    if (!raw) {
      state = createFreshState();
      saveState();
      return state;
    }

    state = { ...DEFAULT_STATE, ...parsed };
    return state;
  } catch (err) {
    console.warn('Failed to load state, resetting:', err);
    state = createFreshState();
    saveState();
    return state;
  }
}

/**
 * Create a fresh state object with a generated user ID.
 */
function createFreshState() {
  return {
    ...DEFAULT_STATE,
    userId: generateUserId(),

}

/**
 * Generate a simple user ID. Not cryptographically secure;
 * just unique enough to identify this user's writes to Firebase.

 * Get the current state. Read-only — use updateState to modify.

}

/**
 * Update state with a partial object or a mutation function.
 * Saves to localStorage and notifies listeners.

  if (typeof patch === 'function') {

  } else {
    Object.assign(state, patch);
  }
  saveState();
  notifyListeners();
}

/**
 * Save state to localStorage. Called automatically by updateState.

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (err) {
    console.error('Failed to save state:', err);
  }
}

/**
 * Reset all state (for testing, or "start over" feature).

function resetState() {
  state = createFreshState();
  saveState();
  notifyListeners();
}

// Simple pub/sub for state changes
const listeners = new Set();

function onStateChange(fn) {
  listeners.add(fn);
  return () => listeners.delete(fn);
}

function notifyListeners() {
  listeners.forEach(fn => {
    try { fn(state); } catch (err) { console.error(err); }
  });
}

/* ===== Convenience helpers for specific state operations ===== */

/**
 * Mark an artwork as encountered (shown to the user at least once).

function markEncountered(artworkId) {

    if (!s.artworkState[artworkId]) {
      s.artworkState[artworkId] = { encountered: false, masteredCount: 0, seenInPerson: null };
    }
    s.artworkState[artworkId].encountered = true;
    s.artworkState[artworkId].lastSeenAt = new Date().toISOString();
  });
}

/**
 * Mark an artwork as correctly identified in a quiz.
 * Increments mastery count.
 */
function markMastered(artworkId) {
  updateState(s => {
    if (!s.artworkState[artworkId]) {
      s.artworkState[artworkId] = { encountered: true, masteredCount: 0, seenInPerson: null };
    }
    s.artworkState[artworkId].masteredCount += 1;
    s.artworkState[artworkId].lastSeenAt = new Date().toISOString();
  });
}

/**
 * Record the user's response to "have you seen this in person?"
 * value can be 'yes', 'no', or 'maybe'.
 */
function setSeenInPerson(artworkId, value) {
  updateState(s => {
    if (!s.artworkState[artworkId]) {
      s.artworkState[artworkId] = { encountered: true, masteredCount: 0 };
    }
    s.artworkState[artworkId].seenInPerson = value;
  });
}

/**
 * Mark a lesson as completed within a movement.
 */
function markLessonCompleted(movementId, lessonId) {
  updateState(s => {
    if (!s.movementProgress[movementId]) {
      s.movementProgress[movementId] = { lessonsCompleted: [], finalExhibitionPassed: false };
    }
    if (!s.movementProgress[movementId].lessonsCompleted.includes(lessonId)) {
      s.movementProgress[movementId].lessonsCompleted.push(lessonId);
    }
  });
}

/**
 * Update streak based on whether the user did any activity today.
 * Sundays are "rest days" — they don't break a streak even if missed.
 */
function tickStreak() {
  const today = new Date().toISOString().slice(0, 10);
  const s = getState();

  if (s.lastSessionDate === today) {
    // Already counted today
    return;
  }

  if (!s.lastSessionDate) {
    // First session ever
    updateState({ streakDays: 1, lastSessionDate: today });
    return;
  }

  // Calculate days between
  const last = new Date(s.lastSessionDate);
  const now = new Date(today);
  const dayDiff = Math.round((now - last) / (1000 * 60 * 60 * 24));

  if (dayDiff === 1) {
    // Consecutive day, increment
    updateState({ streakDays: s.streakDays + 1, lastSessionDate: today });
  } else if (dayDiff === 2 && new Date(s.lastSessionDate).getDay() === 6) {
    // Missed only Sunday — Sunday is a rest day, preserve streak
    updateState({ streakDays: s.streakDays + 1, lastSessionDate: today });
  } else {
    // Streak broken, restart at 1
    updateState({ streakDays: 1, lastSessionDate: today });
  }
}

      <pattern id="p${hash(artwork.id)}" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
        <circle cx="3" cy="3" r="0.4" fill="${accentColor}" opacity="0.12"/>
      </pattern>
    </defs>
    <rect width="400" height="300" fill="url(#g${hash(artwork.id)})"/>
    <rect width="400" height="300" fill="url(#p${hash(artwork.id)})"/>
    <rect x="20" y="20" width="360" height="260" fill="none" stroke="${accentColor}" stroke-width="0.5" opacity="0.4"/>

    <!-- Large initial as a quiet visual anchor -->
    <text x="200" y="135" font-family="DM Serif Display, Georgia, serif" font-size="86" fill="${accentColor}" text-anchor="middle" opacity="0.18">${escapeXml(initials)}</text>

    <!-- Movement eyebrow -->
    <text x="200" y="175" font-family="Inter, sans-serif" font-size="9" font-weight="500" letter-spacing="2" fill="#7A6A55" text-anchor="middle">${escapeXml((movement?.shortName || '').toUpperCase())}</text>

    <!-- Title -->
    <text x="200" y="208" font-family="DM Serif Display, Georgia, serif" font-size="18" fill="#1F1B16" text-anchor="middle">${escapeXml(truncate(artwork.title, 36))}</text>

    <!-- Artist + year -->
    <text x="200" y="232" font-family="Lora, Georgia, serif" font-style="italic" font-size="12" fill="#7A6A55" text-anchor="middle">${escapeXml(artist?.name || 'Anonymous')} · ${escapeXml(yearLabel)}</text>

    <!-- Small accession plaque at bottom -->
    <line x1="170" y1="252" x2="230" y2="252" stroke="${accentColor}" stroke-width="0.5" opacity="0.4"/>
    <text x="200" y="270" font-family="Inter, sans-serif" font-size="8" letter-spacing="1.5" fill="#B8A88E" text-anchor="middle">THE MET COLLECTION</text>
  </svg>`;

  const url = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  placardCache.set(artwork.id, url);
  return url;
}

/**
 * Hash a string into a short ID for use in SVG defs.
 * Avoids collisions when multiple placards are on the page at once.
 */
function hash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = ((h << 5) - h) + s.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h).toString(36);
}

function escapeXml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&apos;');
}

function truncate(s, max) {
  if (!s) return '';
  return s.length > max ? s.slice(0, max - 1) + '…' : s;
}

function formatYear(year) {
  if (!year && year !== 0) return '';
  if (year < 0) return `${Math.abs(year)} BCE`;
  return String(year);
}


/* ========== js/core/progression.js ========== */

/* ============================================================
   ACCESSION - PROGRESSION LOGIC
   Rules for what's unlocked, what rank you are, etc.
   ============================================================ */



// Curator rank names, in order. Index = rank level.
const RANK_NAMES = [
  'Visitor',
  'Member',
  'Apprentice Curator',
  'Curator',
  'Curator Emeritus',
];

/**
 * For a given movement, what curator rank has the user earned?
 * Based on the percentage of works in that movement they have mastered.
 *  0%   -> Visitor
 *  20%  -> Member
 *  40%  -> Apprentice Curator
 *  70%  -> Curator
 *  100% -> Curator Emeritus
 */
function getCuratorRank(movementId) {
  const artworks = getArtworksForMovement(movementId);
  if (artworks.length === 0) return 0;
  const state = getState();
  const mastered = artworks.filter(a => {
    const s = state.artworkState[a.id];
    return s && s.masteredCount >= 2;
  }).length;
  const pct = mastered / artworks.length;
  if (pct >= 1.0) return 4;
  if (pct >= 0.7) return 3;
  if (pct >= 0.4) return 2;
  if (pct >= 0.2) return 1;
  return 0;
}

/**
 * What proportion of a movement has been completed?
 * Used for the thin progress line under each movement.
 * Counts lessons completed against total lessons.
 */
function getMovementProgress(movementId) {
  const lessons = getLessonsForMovement(movementId);
  if (lessons.length === 0) return 0;
  const state = getState();
  const progress = state.movementProgress[movementId];
  if (!progress) return 0;
  return Math.min(1, progress.lessonsCompleted.length / lessons.length);
}

/**
 * Is this movement unlocked? Chronological gating:
 * - First movement is always unlocked.
 * - Subsequent movements unlock when the previous one has at least
 *   one lesson completed (we don't want to force perfection).
 */
function isMovementUnlocked(movementId, pathId = 'met-chronological') {
  // Lazy import to avoid circular deps at module load
  const path = window.__contentCache?.paths?.[pathId];
  // Fallback: look it up via content module
  const movements = window.__movementOrder || [];
  // We accept being called before content is loaded; default to true for first
  // The proper check happens after content loads.
  if (!movements.length) return true;
  const idx = movements.indexOf(movementId);
  if (idx <= 0) return true;
  const prevId = movements[idx - 1];
  return getMovementProgress(prevId) > 0;
}

/**
 * Determine the "next" thing the user should do, for the Today view.
 * Returns either an unfinished lesson or a "start movement" prompt.
 */
function getNextLesson(pathMovements) {
  for (const movId of pathMovements) {
    const lessons = getLessonsForMovement(movId);
    const state = getState();
    const progress = state.movementProgress[movId];
    const completed = (progress?.lessonsCompleted) || [];
    const next = lessons.find(l => !completed.includes(l.id));
    if (next) {
      return { movementId: movId, lesson: next };
    }
  }
  return null;
}

/**
 * Get the "node state" for an artwork in the constellation:
 * - 'unencountered': never shown
 * - 'faint': encountered but not yet mastered
 * - 'lit': mastered (correctly identified 2+ times)
 * - 'gold': mastered AND seen in person
 */
function getNodeState(artworkId) {
  const s = getState().artworkState[artworkId];
  if (!s || !s.encountered) return 'unencountered';
  if (s.masteredCount >= 2) {
    if (s.seenInPerson === 'yes') return 'gold';
    return 'lit';
  }
  return 'faint';
}

/**
 * Aggregate stats across the user's whole collection.
 */
function getCollectionStats() {
  const state = getState();
  const entries = Object.values(state.artworkState);
  return {
    encountered: entries.filter(e => e.encountered).length,
    mastered: entries.filter(e => e.masteredCount >= 2).length,
    seenInPerson: entries.filter(e => e.seenInPerson === 'yes').length,
  };
}


/* ========== js/core/metApi.js ========== */

/* ============================================================
   ACCESSION - MET API RESOLVER
   Fetches canonical CC0 image URLs from the Met Open Access API
   the first time an artwork is rendered. Caches in localStorage
   so subsequent loads are instant and don't hit the API.

   Why runtime?
   - Image URLs at the Met have shifted historically; resolving at runtime
     means we always get whatever is current.
   - Two of our nine artworks (Hopper, O'Keeffe) are still under copyright,
     and the API correctly returns no primaryImage — we fall back to
     placeholder automatically with no special-casing.
   - The bundle stays tiny: we don't ship multi-megabyte JPEGs.
   ============================================================ */

const CACHE_KEY = 'accession:metImageCache:v1';
const API_BASE = 'https://collectionapi.metmuseum.org/public/collection/v1/objects';

let metImageCache = null;
const inFlight = new Map(); // metObjectId -> Promise

function loadCache() {
  if (metImageCache !== null) return metImageCache;
  try {
    metImageCache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
  } catch {
    metImageCache = {};
  }
  return metImageCache;
}

function saveCache() {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(metImageCache));
  } catch (e) {
    console.warn('Failed to save Met metImageCache:', e);
  }
}

/**
 * Resolve an artwork's image URL by Met object ID. Returns a Promise that
 * resolves to a string URL or null. Null means "use placeholder."
 *
 * Caches both hits (URL) and misses (null) to avoid re-fetching.
 */
async function resolveMetImage(metObjectId) {
  if (!metObjectId) return null;
  const cacheCopy = loadCache();
  const key = String(metObjectId);
  if (key in cacheCopy) return cacheCopy[key];
  if (inFlight.has(key)) return inFlight.get(key);

  const promise = (async () => {
    try {
      const res = await fetch(`${API_BASE}/${metObjectId}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      // primaryImageSmall is the IIIF "web-large" derivative, perfect for mobile.
      // Falls back to primaryImage if that field is missing.
      const url = data.primaryImageSmall || data.primaryImage || null;
      cacheCopy[key] = url || null;
      saveCache();
      return url || null;
    } catch (err) {
      // On error, metImageCache null so we don't hammer the API on every load.
      cacheCopy[key] = null;
      saveCache();
      return null;
    } finally {
      inFlight.delete(key);
    }
  })();
  inFlight.set(key, promise);
  return promise;
}

/**
 * Convenience: hydrate an <img> element. Sets src once the URL resolves
 * to a real photo. If resolution fails (CORS, offline, copyright), the
 * element keeps its current placard src so the card still looks complete.
 */
function hydrateMetImage(imgEl, metObjectId) {
  if (!imgEl || !metObjectId) return;
  resolveMetImage(metObjectId).then(url => {
    if (!url) return;
    // Test that the image actually loads before swapping out the placard.
    // This handles cases where the URL resolves but the image 404s.
    const test = new Image();
    test.onload = () => { imgEl.src = url; };
    test.onerror = () => { /* keep the placard */ };
    test.src = url;
  }).catch(() => { /* keep the placard */ });
}

/**
 * Resolve all artworks in a list, optionally returning a map of id -> url.
 * Useful for views that render many works at once.
 */
async function preloadMetImages(artworks) {
  await Promise.all(artworks.map(a => resolveMetImage(a.metObjectId)));
}

let firebase = null;
let db = null;
let isReady = false;

/**
 * Subscribers waiting for partner data updates.
 */
const partnerListeners = new Set();
let lastPartnerData = null;

/**
 * Initialize Firebase if configured. Idempotent.
 */
async function initSync() {
  if (!FIREBASE_CONFIG) {
    console.info('Sync: running in offline-only mode (no Firebase config).');
    return false;
  }
  try {
    // Dynamically import Firebase modules from the CDN.
    // This means we ship no Firebase code in the bundle for offline users.
    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const { getDatabase, ref, set, onValue, push } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    firebase = { initializeApp, ref, set, onValue, push };
    const app = initializeApp(FIREBASE_CONFIG);
    db = getDatabase(app);
    isReady = true;
    // Push current state once, then subscribe to changes.
    pushUserStats();
    onStateChange(pushUserStats);
    return true;
  } catch (err) {
    console.warn('Sync: Firebase init failed, running offline:', err);
    return false;
  }
}

/**
 * Push a summarized version of the user's stats to Firebase.
 * We never push raw content edits or personal data — only public scoreboard fields.
 */
function pushUserStats() {
  if (!isReady) return;
  const s = getState();
  if (!s.userId || !s.displayName) return;

  const stats = {
    displayName: s.displayName,
    streakDays: s.streakDays,
    lastSessionDate: s.lastSessionDate,
    encountered: Object.values(s.artworkState).filter(a => a.encountered).length,
    mastered: Object.values(s.artworkState).filter(a => a.masteredCount >= 2).length,
    seenInPerson: Object.values(s.artworkState).filter(a => a.seenInPerson === 'yes').length,
    updatedAt: Date.now(),
  };
  firebase.set(firebase.ref(db, `users/${s.userId}`), stats);
}

/**
 * Subscribe to the partner's stats. Returns an unsubscribe function.
 * If sync isn't ready, the callback fires once with null.
 */
function subscribeToPartner(partnerUserId, callback) {
  partnerListeners.add(callback);

  if (!isReady || !partnerUserId) {
    callback(lastPartnerData);
    return () => partnerListeners.delete(callback);
  }

  const partnerRef = firebase.ref(db, `users/${partnerUserId}`);
  const unsub = firebase.onValue(partnerRef, snapshot => {
    lastPartnerData = snapshot.val();
    partnerListeners.forEach(fn => {
      try { fn(lastPartnerData); } catch (e) { console.error(e); }
    });
  });

  return () => {
    partnerListeners.delete(callback);
    unsub();
  };
}

/**
 * Send a challenge to the partner. A challenge is a set of pre-baked
 * quiz questions both players take, scores compared.
 */
async function sendChallenge(challenge) {
  if (!isReady) {
    // Fallback: copy a shareable code to clipboard
    const code = btoa(JSON.stringify(challenge));
    try {
      await navigator.clipboard.writeText(code);
      return { mode: 'code', code };
    } catch {
      return { mode: 'code', code };
    }
  }
  const challengeRef = firebase.push(firebase.ref(db, 'challenges'));
  await firebase.set(challengeRef, {
    ...challenge,
    fromUserId: getState().userId,
    createdAt: Date.now(),
  });
  return { mode: 'live', id: challengeRef.key };
}

function syncStatus() {
  return {
    configured: !!FIREBASE_CONFIG,
    ready: isReady,
  };
}

/* ============================================================

   Plays through a lesson card by card.
   Each card type is a small render function below.
