tion in pose, light, and mood. The greens and reds here have the saturated depth that comes only from oil paint built up in layers of nearly invisible glaze.", "longForm": "Bellini painted Madonna and Child compositions for forty years. The format \u2014 half-length figure, parapet in the foreground, landscape vignette to one side \u2014 became almost a meditative exercise, a returning subject through which he worked out the central concerns of his art: how light models flesh, how color shifts across distance, how to make a religious image feel like an intimate human moment. This version from around 1485 is one of his middle-period masterpieces, painted in oil on wood, with the small distant landscape that would become a Venetian hallmark.", "tags": ["madonna", "venetian", "oil-on-wood", "religious"], "details": [], "eraId": "renaissances-empires", "regionId": "europe", "subRegionId": "italian"}, "met-benin-plaque": {"id": "met-benin-plaque", "title": "Plaque with Warrior and Attendants", "artistId": null, "year": 1550, "decade": 1550, "eraId": "renaissances-empires", "regionId": "sub-saharan-africa", "subRegionId": "benin", "museumId": "met", "medium": "Brass", "dimensions": "47 x 38 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Plaque-%20Warrior%20and%20Attendants%20MET%20DP231460.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 5, "wallLabel": "A brass plaque from the royal palace of Benin (in present-day Nigeria), made in the 16th century. Hundreds of these adorned the wooden pillars of the palace audience hall, narrating the kingdom's military victories and court ceremonies. Looted by a British punitive expedition in 1897 and dispersed to museums worldwide; the question of returning them is one of the central debates in contemporary museum ethics.", "longForm": "The Kingdom of Benin produced some of the most technically refined brass casting in pre-modern history, using a lost-wax process to make work whose precision rivals or exceeds contemporaneous European bronze. When the British looted Benin City in 1897 and removed approximately 4,000 objects, the technical sophistication contradicted European racist assumptions so completely that some scholars insisted the plaques must have been made by visiting Portuguese \u2014 they were not. The Benin Bronzes are scattered across the British Museum, the Berlin Ethnological Museum, the Met, and roughly 160 other institutions. Several major museums have begun returning them. The Edo descendants of the original artists are still active brass-casters in Benin City today.", "tags": ["brass", "lost-wax", "royal-court", "colonial-loot"]}, "met-botticelli-jerome": {"id": "met-botticelli-jerome", "title": "The Last Communion of Saint Jerome", "artistId": "botticelli", "year": 1495, "decade": 1490, "movementId": "italian-renaissance", "museumId": "met", "medium": "Tempera and gold on wood", "dimensions": "34.5 x 25.4 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/The%20Last%20Communion%20of%20Saint%20Jerome%20MET%20DP358982.jpg?width=1200", "imageCredit": "Public domain, The Metropolitan Museum of Art, Benjamin Altman Bequest, 1913", "famousLevel": 3, "wallLabel": "The aged hermit Saint Jerome, supported by his brothers, receives final communion from a priest. A small panel painted for private devotion, it shows Botticelli late in life turning from the mythological pictures of his Medici years toward an austere religious style influenced by the preacher Savonarola.", "longForm": "Saint Jerome, the fourth-century scholar who translated the Bible into Latin, was a favorite subject of Renaissance painters who saw in him an image of the learned, ascetic life. Botticelli paints the dying saint in his desert cell, with a palm-frond crucifix, a straw mat, and his red cardinal's hat hanging on the wall as a memento of the worldly position he renounced. The composition is unusually intimate for Botticelli, designed to be looked at closely and held in the hand. The picture entered the Met as part of the great Benjamin Altman bequest of 1913, which formed the core of the museum's early Italian collection.", "tags": ["religious", "private-devotion", "late-botticelli", "tempera-gold"], "details": [], "metObjectId": 436106, "imageSource": "wikimedia", "eraId": "renaissances-empires", "regionId": "europe", "subRegionId": "italian"}, "met-bruegel-harvesters": {"id": "met-bruegel-harvesters", "title": "The Harvesters", "artistId": "bruegel-elder", "year": 1565, "decade": 1560, "movementId": "northern-renaissance", "museumId": "met", "medium": "Oil on wood", "dimensions": "119 x 162 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Pieter%20Bruegel%20the%20Elder-%20The%20Harvesters%20-%20Google%20Art%20Project.jpg?width=1200", "imageCredit": "Public domain, The Metropolitan Museum of Art, Rogers Fund, 1919", "famousLevel": 5, "wallLabel": "One of six surviving panels from a series depicting the months of the year, this is August or possibly late July. Peasants harvest wheat in the foreground while others nap under a tree, eat bread, and drink from a jug. The horizon falls a third of the way down the panel, giving the sky enormous breathing room. Bruegel treats labor and lunch with the same dignity.", "longForm": "Bruegel painted six panels representing the months for the wealthy Antwerp merchant Niclaes Jongelinck, who installed them in his country house outside Antwerp in 1565. Five survive: three are in Vienna, one in Prague, and this one at the Met. The series may be the first European paintings in which landscape itself is the protagonist, with the human figures functioning as one element among many. The composition is built on a series of diagonals: the swath of cut wheat, the path receding into the distance, the line of sleeping bodies. Look closely at the figures eating bread under the pear tree, the cluster of distant figures playing a stick-game, and the church spire of the village beyond.", "tags": ["landscape", "peasant-life", "seasons", "oil-on-wood"], "details": [{"crop": "lunch", "x": 0.32, "y": 0.55, "label": "The midday meal under the pear tree"}, {"crop": "village", "x": 0.85, "y": 0.45, "label": "Distant village with church spire"}], "metObjectId": 435809, "imageSource": "wikimedia", "eraId": "renaissances-empires", "regionId": "europe", "subRegionId": "flemish"}, "met-christus-carthusian": {"id": "met-christus-carthusian", "title": "Portrait of a Carthusian", "artistId": "petrus-christus", "year": 1446, "decade": 1440, "movementId": "northern-renaissance", "museumId": "met", "medium": "Oil on wood", "dimensions": "29.2 x 21.6 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Portrait%20of%20a%20Carthusian%20MET%20DT26.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art, The Jules Bache Collection, 1949", "metObjectId": 435896, "famousLevel": 5, "wallLabel": "A Carthusian lay brother turns his head sharply to meet the viewer's gaze, his red robe glowing against deep shadow. At the bottom of the painting, in trompe-l'\u0153il, sits a single fly \u2014 painted next to Petrus Christus's signature as both a memento mori and a small joke about the painter's skill at illusion.", "longForm": "Painted in 1446, this is among the earliest dated Netherlandish portraits and a watershed in the history of portraiture. Petrus Christus broke from the convention of showing sitters against a flat, indeterminate background and placed his subject in a believable interior space, with light falling from a specific direction. The trompe-l'\u0153il fly at the bottom is famous: in part a traditional memento mori, in part a display of painterly trickery announcing the artist's hand. A halo above the monk's head, visible for centuries, was determined to be a 17th-century Spanish addition and removed by Met conservators in 1994.", "tags": ["portrait", "monk", "trompe-loeil", "early-netherlandish"], "details": [{"crop": "fly", "x": 0.5, "y": 0.93, "label": "The trompe-l'\u0153il fly"}], "eraId": "renaissances-empires", "regionId": "europe", "subRegionId": "flemish"}, "met-degas-rehearsal": {"id": "met-degas-rehearsal", "title": "The Rehearsal of the Ballet Onstage", "artistId": "degas", "year": 1874, "decade": 1870, "movementId": "impressionism", "museumId": "met", "medium": "Pastel and ink on paper", "dimensions": "54.3 x 73 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/The%20Rehearsal%20of%20the%20Ballet%20Onstage%20MET%20DT1565.jpg?width=1200", "imageCredit": "Public domain, The Metropolitan Museum of Art, H. O. Havemeyer Collection, 1929", "famousLevel": 4, "wallLabel": "Two ballet masters watch from chairs at the right while dancers in white tulle take instruction at the center and others wait in the wings. Degas favored these in-between moments, when the performance had not yet begun and the dancers were still arranging themselves, stretching, scratching, yawning.", "longForm": "Degas was a passionate ballet enthusiast and was granted unusual access behind the scenes at the Paris Opera. He produced over 1,500 works on the subject across his career, ranging from oil paintings to pastels to wax sculptures. This work is notable for its unusual high vantage point, as if the viewer were leaning over a balcony to look down, and for its asymmetrical composition, with the dancers pushed to one side and a great deal of empty stage at the other. Both were influenced by Japanese prints and the new technology of photography, which were teaching European artists to see space in new ways.", "tags": ["ballet", "pastel", "japanese-influence", "behind-scenes"], "details": [{"crop": "ballet-master", "x": 0.8, "y": 0.5, "label": "The ballet masters watching"}, {"crop": "dancers-center", "x": 0.45, "y": 0.55, "label": "Dancers receiving instruction"}], "metObjectId": 436155, "imageSource": "wikimedia", "eraId": "revolution-industry", "regionId": "europe", "subRegionId": "french"}, "met-han-tomb-figures": {"id": "met-han-tomb-figures", "title": "Tomb Figures of a Standing Woman", "artistId": null, "year": -100, "decade": -100, "eraId": "ancient-worlds", "regionId": "east-asia", "subRegionId": "chinese", "museumId": "met", "medium": "Earthenware with pigment", "dimensions": "approx. 60 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Standing%20Female%20Attendant%20MET%20DP170433.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 3, "wallLabel": "A pottery attendant from a Western Han tomb, made to accompany an aristocrat into the afterlife. Where earlier Chinese rulers were buried with live retainers, by the Han dynasty (206 BCE-220 CE) terracotta figures had become the convention \u2014 the same shift in attitudes that Egyptian shabti figures represent two millennia earlier.", "longForm": "The Han dynasty produced enormous quantities of these tomb figures, called mingqi, meaning 'spirit objects.' Made cheaply in molds and painted with mineral pigments that have mostly faded, they reproduced the world of the living for the dead: musicians, dancers, animals, soldiers, granaries, even toilets. The painting was applied after firing in cool earth tones \u2014 white, vermillion, indigo \u2014 much of which has flaked away over two thousand years. The most famous mingqi army is the Terracotta Warriors of the First Emperor; these later Han examples are scaled-down and far more common.", "tags": ["tomb", "mingqi", "han-dynasty", "earthenware"]}, "met-hatshepsut-kneeling": {"id": "met-hatshepsut-kneeling", "title": "Large Kneeling Statue of Hatshepsut", "artistId": null, "year": -1470, "decade": -1470, "movementId": "egyptian-ancient", "museumId": "met", "medium": "Granite, paint", "dimensions": "295.9 x 82.6 x 149.9 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Large%20Kneeling%20Statue%20of%20Hatshepsut%20MET%20DP116045.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art, Rogers Fund, 1929", "metObjectId": 544449, "famousLevel": 5, "wallLabel": "Hatshepsut, one of the few women to rule as pharaoh, kneels to make an offering to the god Amun. She wears the false beard and head-cloth of an Egyptian king. The statue is one of several that lined the processional way to her mortuary temple at Deir el-Bahri, smashed after her death and reassembled by Met excavators in the 1920s.", "longForm": "Hatshepsut ruled Egypt for about twenty years in the early 15th century BCE, first as regent for her young stepson Thutmose III, then as pharaoh in her own right. Female rulers were not unheard of in Egypt, but assuming the formal regalia of kingship \u2014 the false beard, the nemes head-cloth, the kilt \u2014 was a striking choice. After her death, Thutmose III ordered her image systematically erased from her monuments. The shattered fragments of this statue and several like it were discovered in pits near her temple at Deir el-Bahri during a Met excavation in 1927-28 and reassembled in New York. The pink granite came from Aswan, six hundred miles up the Nile.", "tags": ["sculpture", "pharaoh", "female-ruler", "new-kingdom"], "details": [], "eraId": "ancient-worlds", "regionId": "middle-east-north-africa", "subRegionId": "egyptian"}, "met-hokusai-great-wave": {"id": "met-hokusai-great-wave", "title": "Under the Wave off Kanagawa (The Great Wave)", "artistId": "hokusai", "year": 1831, "decade": 1830, "eraId": "revolution-industry", "regionId": "east-asia", "subRegionId": "japanese", "museumId": "met", "medium": "Polychrome woodblock print (nishiki-e)", "dimensions": "25.7 x 37.9 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Tsunami%20by%20hokusai%2019th%20century.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art, H. O. Havemeyer Collection, 1929", "metObjectId": 45434, "famousLevel": 5, "wallLabel": "Three fishing boats race a wave the size of a hill. Mount Fuji sits small in the distance, framed by the wave's claw of spray. The first print in Hokusai's Thirty-six Views of Mount Fuji series, published around 1831 when he was seventy. The blue is Prussian blue, a synthetic pigment imported from Europe \u2014 a small detail of trade that lets us date Japanese prints precisely.", "longForm": "The Great Wave is possibly the most reproduced image in art history. It was made for ordinary buyers in Edo (now Tokyo) and originally sold for the price of a bowl of noodles. Hokusai was in his seventies, working on his series of Mount Fuji views \u2014 Fuji is visible in every one of the thirty-six prints, often hidden cleverly in the composition. When Japan opened to trade in the 1850s and prints flooded into Europe, the Great Wave directly inspired Monet, Van Gogh, Debussy, and an entire wave of European modernism. The wave itself contains echoes of European linear perspective that Hokusai had encountered in Dutch prints \u2014 a quiet two-way exchange of influence between East and West.", "tags": ["woodblock-print", "ukiyo-e", "edo-period", "hokusai-fuji"]}, "met-hopper-tables": {"id": "met-hopper-tables", "title": "Tables for Ladies", "artistId": "hopper", "year": 1930, "decade": 1930, "movementId": "american-modernism", "museumId": "met", "medium": "Oil on canvas", "dimensions": "122.6 x 153 cm", "image": null, "imageCredit": "Public domain via fair use, The Metropolitan Museum of Art, George A. Hearn Fund, 1931", "famousLevel": 4, "wallLabel": "A waitress arranges fruit at the front of a New York restaurant whose name, painted on the window, was a Depression-era convention signaling that unaccompanied women were welcome. A cashier counts at the register; a couple dines in the background. The acid yellow electric light is the painting's most modern element.", "longForm": "Hopper painted this in 1930, the first full year of the Great Depression, when 'Tables for Ladies' signs were proliferating as restaurants tried to attract a respectable middle-class clientele who would have previously eaten only at home or in private clubs. The Met acquired it the following year, an unusually quick recognition. Note the construction of the space: the diagonal of the counter pulls the eye in from the lower right, the vertical of the windows holds the composition together, and the small black cat on the chair in the background is the only animate creature not actively at work.", "tags": ["urban-scene", "depression-era", "electric-light", "waitress"], "details": [{"crop": "waitress", "x": 0.3, "y": 0.5, "label": "Waitress arranging fruit"}, {"crop": "couple", "x": 0.75, "y": 0.55, "label": "The dining couple"}], "metObjectId": 488978, "imageSource": "placard", "eraId": "modernism", "regionId": "modern-americas", "subRegionId": "us-american"}, "met-ife-head": {"id": "met-ife-head", "title": "Crowned Head of an Ooni (King)", "artistId": null, "year": 1300, "decade": 1300, "eraId": "sacred-medieval", "regionId": "sub-saharan-africa", "subRegionId": "ife", "museumId": null, "medium": "Copper alloy with traces of red and black pigment", "dimensions": "approx. 31 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Ife%20Head%20British%20Museum.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Photo public domain via Wikimedia Commons", "famousLevel": 5, "wallLabel": "A life-size head cast in copper alloy in the Yoruba city of Ife, present-day Nigeria, around 1300 CE. Probably an idealized portrait of an Ooni \u2014 a king-priest of Ife \u2014 used in second burial ceremonies where the deceased's body had decomposed. The naturalism stunned European researchers in 1910; the German anthropologist Leo Frobenius initially claimed they must be evidence of a lost Greek colony in Africa. They were not.", "longForm": "Ife was the spiritual capital of Yoruba civilization and a major political power from roughly the 11th to 15th centuries. Its sculptors produced bronze and terracotta heads of a refined naturalism that has no clear parallel in West African art before or since. The faces have parallel scarification lines, plump cheeks, almond eyes, full lips. They were used in second burials \u2014 re-creations of the deceased ruler's body as part of the ritual transfer of power. Most known Ife heads are now in Nigeria; a small number are at the British Museum and other Western collections. The Ooni of Ife today is still a major Yoruba religious authority.", "tags": ["copper-alloy", "naturalism", "royal-portrait", "yoruba"]}, "met-maya-vessel": {"id": "met-maya-vessel", "title": "Cylinder Vessel with Lord and Attendants", "artistId": null, "year": 750, "decade": 750, "eraId": "sacred-medieval", "regionId": "mesoamerica", "subRegionId": "maya", "museumId": "met", "medium": "Ceramic with polychrome slip", "dimensions": "approx. 18 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Cylinder%20Vessel%20Mythological%20Scene%20MET%20DP-13533-001.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 3, "wallLabel": "A Late Classic Maya drinking vessel painted with a court scene: a seated lord receives tribute or counsel from attendants, with glyphs naming each figure and the painter himself. Made around 750 CE in the Pet\u00e9n lowlands. The Maya were the only Mesoamerican civilization with a fully developed writing system; we can read these inscriptions today.", "longForm": "Maya 'codex-style' painted vessels are some of the most informationally rich art objects in the world. Each scene typically depicts a moment from court life or mythology, and many are signed by the painters. The pigments \u2014 particularly the brilliant Maya blue \u2014 used a chemical bond between indigo dye and palygorskite clay that European chemists couldn't replicate until the late 20th century. These vessels held kakaw, a frothy unsweetened chocolate drink consumed by elites in formal contexts. The civilization that produced them entered a still-unexplained collapse beginning around 800 CE; by 950, the southern Maya cities were abandoned to the jungle.", "tags": ["ceramic", "classic-maya", "polychrome", "courtly"]}, "met-monet-bridge": {"id": "met-monet-bridge", "title": "Bridge over a Pond of Water Lilies", "artistId": "monet", "year": 1899, "decade": 1890, "movementId": "impressionism", "museumId": "met", "medium": "Oil on canvas", "dimensions": "92.7 x 73.7 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Bridge%20over%20a%20Pond%20of%20Water%20Lilies.JPG?width=1200", "imageCredit": "Public domain, The Metropolitan Museum of Art, H. O. Havemeyer Collection, 1929", "famousLevel": 5, "wallLabel": "Monet painted the Japanese footbridge in his Giverny garden a dozen times in 1899, in different lights and seasons. Here the foliage is at full summer green, the lilies open on the water below, and the bridge sits high in the composition like a Japanese print. The painting is built almost entirely from layered green and lavender, with the bridge as the only horizontal anchor.", "longForm": "Monet had bought his property in Giverny in 1890 and immediately began transforming the marsh below the house into a water garden, importing exotic plants and building the footbridge himself, modeled on prints he had collected by Hokusai and Hiroshige. The 1899 bridge series was his first sustained attempt at painting the water garden, a subject that would absorb him for the rest of his life and culminate in the monumental late Water Lilies panels at the Musee de l'Orangerie in Paris. The Met holds two paintings from this 1899 series; the other shows the bridge in a cooler, more silver light.", "tags": ["water-garden", "giverny", "series-painting", "japanese-influence"], "details": [{"crop": "bridge", "x": 0.5, "y": 0.3, "label": "The Japanese footbridge"}, {"crop": "lilies", "x": 0.4, "y": 0.75, "label": "Water lilies on the surface"}], "metObjectId": 437127, "imageSource": "wikimedia", "eraId": "revolution-industry", "regionId": "europe", "subRegionId": "french"}, "met-mughal-emperor": {"id": "met-mughal-emperor", "title": "Portrait of the Emperor Shah Jahan", "artistId": null, "year": 1630, "decade": 1630, "eraId": "renaissances-empires", "regionId": "south-asia", "subRegionId": "indian", "museumId": "met", "medium": "Opaque watercolor, ink, and gold on paper", "dimensions": "approx. 39 x 27 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Shah%20Jahan%20on%20horseback%20MET%20DP240791.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "The Mughal emperor Shah Jahan, who built the Taj Mahal, in a court portrait by one of his miniaturists. Mughal painting fused Persian technique with Indian observation: the gold-leaf halo and the precise rendering of textile, jewel, and horse furniture are characteristic. Painted around 1630, contemporary with the Dutch Golden Age in Europe.", "longForm": "Mughal court painting is one of the great cross-cultural art forms in human history. The first Mughal emperors brought painters from Safavid Persia to India in the 16th century; their workshops trained Indian artists in Persian conventions but also absorbed Indian color, attention to plant and animal life, and a different sense of what a portrait should do. By Shah Jahan's reign in the 1630s, Mughal miniature was at its zenith \u2014 astonishingly refined, often political, always made for the emperor's private viewing in albums. The Taj Mahal was begun in 1632, the year this kind of portrait was at its peak.", "tags": ["miniature", "mughal", "portrait", "court-painting"]}, "met-okeeffe-cow-skull": {"id": "met-okeeffe-cow-skull", "title": "Cow's Skull: Red, White, and Blue", "artistId": "okeeffe", "year": 1931, "decade": 1930, "movementId": "american-modernism", "museumId": "met", "medium": "Oil on canvas", "dimensions": "101.3 x 91.1 cm", "image": null, "imageCredit": "Public domain via fair use, The Metropolitan Museum of Art, Alfred Stieglitz Collection, 1952", "famousLevel": 5, "wallLabel": "A bleached cow skull hangs against a black vertical band flanked by red borders, suggesting the American flag. O'Keeffe painted it in 1931, the year of her first long summer in New Mexico, in deliberate response to critics who insisted that the truly American subject matter was urban and industrial. She offered desert bones instead.", "longForm": "O'Keeffe wrote later that she had been listening to male artists in New York talk about painting the Great American Novel, and decided to make the Great American Painting herself, with the most quintessentially American subject she could think of: the bleached skull of a Western range cow against red, white, and blue. The painting is partly serious and partly a joke at the expense of her colleagues. It was acquired by the Met as part of the Stieglitz collection after his death, when his executors distributed his enormous holdings of modern American art to several major museums.", "tags": ["southwest", "skull", "abstraction", "american-symbol"], "details": [], "metObjectId": 488694, "imageSource": "placard", "eraId": "modernism", "regionId": "modern-americas", "subRegionId": "us-american"}, "met-olmec-head": {"id": "met-olmec-head", "title": "Olmec Colossal Head (replica context)", "artistId": null, "year": -900, "decade": -900, "eraId": "ancient-worlds", "regionId": "mesoamerica", "subRegionId": "olmec", "museumId": null, "medium": "Basalt", "dimensions": "Up to 3.4 m tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Olmec%20Head%20No.%208.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Photo public domain via Wikimedia Commons", "famousLevel": 5, "wallLabel": "Seventeen colossal heads carved from basalt have been found in the Olmec heartland of present-day Veracruz and Tabasco, Mexico. Each is a portrait of a specific ruler. The basalt was quarried in the Tuxtla mountains and dragged dozens of miles to the political centers of San Lorenzo and La Venta \u2014 without metal tools, without the wheel, without draft animals. They date to roughly 1200-400 BCE.", "longForm": "The Olmec are sometimes called the 'mother culture' of Mesoamerica \u2014 their visual vocabulary, religious iconography, and architectural conventions appear in modified form in every later Mesoamerican civilization, from the Maya to the Aztec. The colossal heads each wear a distinctive helmet, possibly representing the protective headgear of the rulers' role as ballgame players. They were carved using stone hammers and abrasives, then deliberately defaced and buried \u2014 likely as part of a ritual transition between rulers. Most are now displayed near where they were excavated; one (Head N\u00ba 8) is at the Anthropology Museum in Veracruz.", "tags": ["sculpture", "ruler-portrait", "basalt", "preclassic"]}, "met-parvati": {"id": "met-parvati", "title": "Standing Parvati", "artistId": null, "year": 1000, "decade": 1000, "eraId": "sacred-medieval", "regionId": "south-asia", "subRegionId": "indian", "museumId": "met", "medium": "Copper alloy", "dimensions": "approx. 70 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Standing%20Parvati%20MET%20DP170433.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "The Hindu goddess Parvati stands in the elegant tribhanga pose \u2014 three bends, hip and shoulder and head, that became the iconic stance of Indian sculpture for over a thousand years. Cast in copper alloy by the lost-wax process in the Chola dynasty of South India, when Tamil bronze casting reached a technical peak that has never been surpassed.", "longForm": "The Chola dynasty ruled South India from the 9th through 13th centuries and produced bronze sculpture so technically refined that contemporary Chola masters in Tamil Nadu still work from the same iconographic books, called shilpa shastras, that the originals followed. These bronzes were never made as static museum objects: they were dressed in textiles, garlanded, carried in procession through temple complexes, and bathed in milk and honey. The empty rings on her belt held actual cloth and jewelry. To see a Chola bronze in a Western museum is to see it stripped of about ninety percent of its intended visual life.", "tags": ["bronze", "chola", "hindu", "tribhanga"]}, "met-rembrandt-self-portrait": {"id": "met-rembrandt-self-portrait", "title": "Self-Portrait", "artistId": "rembrandt", "year": 1660, "decade": 1660, "movementId": "dutch-golden-age", "museumId": "met", "medium": "Oil on canvas", "dimensions": "80.3 x 67.3 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Rembrandt%20-%20Self-portrait%2C%201660.JPG?width=1200", "imageCredit": "Public domain, The Metropolitan Museum of Art, Benjamin Altman Bequest, 1913", "famousLevel": 5, "wallLabel": "Rembrandt at fifty-four, recently bankrupt, holding the tools of his trade. He has just had to sell his house and his art collection. The white cap and brown smock are studio clothes. The unfinished, almost roughened surface of the face is deliberate, and entirely characteristic of his late style.", "longForm": "Rembrandt painted himself almost ninety times across his life, the most sustained self-examination in the history of Western art before the modern era. This portrait dates from the year after his bankruptcy, in which he was forced to sell his collection of art, antiquities, and the house on the Jodenbreestraat that he had bought in better times. Yet he depicts himself not as defeated but as a working painter in his studio, holding his palette and brushes, his identity untouchable even as his finances collapsed. The brushwork around the eyes is unbelievably economical: a few thick scumbles of paint that resolve, from a step back, into the most searching gaze in seventeenth-century art.", "tags": ["self-portrait", "late-rembrandt", "post-bankruptcy", "tronie"], "details": [], "metObjectId": 437394, "imageSource": "wikimedia", "eraId": "renaissances-empires", "regionId": "europe", "subRegionId": "dutch"}, "met-tang-horse": {"id": "met-tang-horse", "title": "Horse", "artistId": null, "year": 700, "decade": 700, "eraId": "sacred-medieval", "regionId": "east-asia", "subRegionId": "chinese", "museumId": "met", "medium": "Earthenware with three-color (sancai) lead glazes", "dimensions": "approx. 76 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Horse%20MET%20DP170457.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 4, "wallLabel": "A Tang dynasty horse in three-color sancai glaze, made for elite burial. Tang nobles loved fine horses imported from Central Asia, and the dynasty's tomb sculpture reflects it. The amber, green, and cream glazes pool and run because they were applied wet \u2014 a deliberate aesthetic, not a flaw.", "longForm": "Sancai (three-color) ware is one of the great achievements of Tang ceramic art. The glazes contained iron, copper, and cobalt, and the technical breakthrough was getting them to fuse cleanly over a low-fire white slip without running into mud. Tang tomb sculpture is famously dynamic compared to the more static Han pieces \u2014 these horses turn their heads, paw the ground, snort. China in the Tang dynasty (618-907) was the most cosmopolitan place on Earth: Chang'an, the capital, was a multicultural city of perhaps a million people drawing merchants from Persia, Korea, Sogdiana, and India.", "tags": ["tang-dynasty", "sancai", "burial-sculpture", "horse"]}, "met-temple-dendur": {"id": "met-temple-dendur", "title": "Temple of Dendur", "artistId": null, "year": -15, "decade": -10, "movementId": "egyptian-ancient", "museumId": "met", "medium": "Aeolian sandstone", "dimensions": "Approx. 25 m long", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/The%20Temple%20of%20Dendur%20MET%20DT563.jpg?width=1200", "imageCredit": "Public domain, The Metropolitan Museum of Art, Given to the United States by Egypt in 1965", "famousLevel": 5, "wallLabel": "A small Nubian temple built around 15 BCE by the Roman emperor Augustus, who was at the time the new pharaoh of Egypt. Given to the United States in 1965 in gratitude for American aid in saving Nubian monuments from the rising waters of the Aswan High Dam. Reassembled stone by stone inside a purpose-built glass-walled wing at the Met.", "longForm": "When Egypt built the Aswan High Dam in the 1960s, dozens of ancient monuments along the Nile faced submersion. UNESCO led an international effort to dismantle and relocate the most important sites; the United States contributed significantly. As a gesture of thanks, Egypt offered four temples to four different countries. Dendur came to the United States and after a competition between several cities was awarded to the Met, which built a vast glass-walled hall to house it overlooking Central Park. The temple was originally dedicated to Isis and to two deified brothers, sons of a local Nubian chieftain who had drowned in the Nile.", "tags": ["architecture", "egyptian", "nubian", "gift-of-egypt"], "details": [], "metObjectId": 547802, "imageSource": "wikimedia", "eraId": "ancient-worlds", "regionId": "middle-east-north-africa", "subRegionId": "egyptian"}, "met-vermeer-water-pitcher": {"id": "met-vermeer-water-pitcher", "title": "Young Woman with a Water Pitcher", "artistId": "vermeer", "year": 1662, "decade": 1660, "movementId": "dutch-golden-age", "museumId": "met", "medium": "Oil on canvas", "dimensions": "45.7 x 40.6 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Johannes%20Vermeer%20%28Dutch%2C%20Delft%201632%E2%80%931675%20Delft%29%20-%20Young%20Woman%20with%20a%20Water%20Pitcher%20-%20Google%20Art%20Project.jpg?width=1200", "imageCredit": "Public domain, The Metropolitan Museum of Art, Marquand Collection, 1889", "famousLevel": 5, "wallLabel": "A woman in a starched white linen cap holds a brass pitcher in one hand and the casement window in the other. Cool morning light enters from the left and turns the white wall behind her into a quiet field of pearl-grey. The blue of her gown and the cobalt of the tablecloth are the only saturated notes in the room. Nothing is happening, and everything is happening.", "longForm": "This was the first Vermeer to enter an American collection, acquired in 1887 when Vermeer was still relatively obscure. The painting demonstrates Vermeer's mature interest in the geometry of interior space and the precise behavior of natural light. The woman's gesture is ambiguous \u2014 is she opening the window or steadying herself? \u2014 which is exactly the point. Vermeer rarely depicted a clearly readable narrative. Note the map on the back wall, a recurring Vermeer prop, and the gilt-edged Persian carpet draped over the table, an expensive imported object that signaled the household's prosperity.", "tags": ["interior", "woman-alone", "light-study", "vermeer-canon"], "details": [{"crop": "hand-on-window", "x": 0.3, "y": 0.35, "label": "The hand on the casement"}, {"crop": "pitcher", "x": 0.55, "y": 0.6, "label": "Brass pitcher catching the morning light"}], "metObjectId": 437881, "imageSource": "wikimedia", "eraId": "renaissances-empires", "regionId": "europe", "subRegionId": "dutch"}}, "lessons": {"american-modernism-01": {"id": "american-modernism-01", "movementId": "american-modernism", "title": "An American Subject", "subtitle": "Hopper, O'Keeffe, and the shape of the 20th-century United States", "estimatedMinutes": 5, "cards": [{"type": "context", "title": "After Europe", "body": "By 1900, ambitious American painters had spent a century looking to Europe for instruction. They studied in Paris, copied Old Masters in Florence, painted Roman ruins. The shift came slowly between the wars: a small group of New York painters and the photographer Alfred Stieglitz's circle began making work whose subjects were specifically American \u2014 the gridded city, the sparse Western desert, the small town at midnight. After World War II, with Europe in ruins and many of its leading artists in exile in New York, the United States briefly became the world's art capital. Abstract Expressionism \u2014 Pollock, Rothko, de Kooning \u2014 was the result. But the earlier figurative work of Hopper and O'Keeffe is in some ways more revealing about what the country looked like and felt like in the first half of the century."}, {"type": "wall-label", "artworkId": "met-hopper-tables"}, {"type": "quiz-artist", "artworkId": "met-hopper-tables", "correctArtistId": "hopper", "distractorArtistIds": ["okeeffe", "monet", "degas"]}, {"type": "wall-label", "artworkId": "met-okeeffe-cow-skull"}, {"type": "quiz-movement", "artworkId": "met-okeeffe-cow-skull", "correctMovementId": "american-modernism", "distractorMovementIds": ["impressionism", "dutch-golden-age", "italian-renaissance"]}, {"type": "quiz-date", "artworkId": "met-okeeffe-cow-skull", "correctYear": 1931, "rangeStart": 1850, "rangeEnd": 2000}, {"type": "reward"}]}, "ancient-worlds-sampler": {"id": "ancient-worlds-sampler", "eraId": "ancient-worlds", "isSampler": true, "title": "The First Cities", "subtitle": "What humans were making, at the same moment, in different parts of the world", "estimatedMinutes": 7, "cards": [{"type": "context", "title": "A Synchronous World", "body": "Around 1300 BCE, the pharaoh Hatshepsut had been dead for two centuries. The Olmec were carving basalt heads in the river valleys of present-day Veracruz. The Shang dynasty in China was inscribing oracle bones with the first Chinese writing. The first templ ill but a deliberate choice \u2014 the goal was to render every part of the body in its most recognizable, complete form, so that the depicted person would arrive in the afterlife intact. Egyptian art prized permanence over expression, which is part of why it looks so consistent over three thousand years."}, {"type": "wall-label", "artworkId": "met-hatshepsut-kneeling"}, {"type": "quiz-movement", "artworkId": "met-hatshepsut-kneeling", "correctMovementId": "egyptian-ancient", "distractorMovementIds": ["italian-renaissance", "northern-renaissance", "american-modernism"]}, {"type": "wall-label", "artworkId": "met-temple-dendur"}, {"type": "quiz-date", "artworkId": "met-temple-dendur", "correctYear": -15, "rangeStart": -2000, "rangeEnd": 500}, {"type": "quiz-before-after", "earlierArtworkId": "met-hatshepsut-kneeling", "laterArtworkId": "met-temple-dendur"}, {"type": "reward"}]}, "impressionism-01": {"id": "impressionism-01", "movementId": "impressionism", "title": "The Light Keeps Changing", "subtitle": "Monet, Degas, and the painting of the present moment", "estimatedMinutes": 4, "cards": [{"type": "context", "title": "The Salon des Refus\u00e9s", "body": "In 1863, the official Paris Salon rejected so many paintings that Napoleon III created a parallel exhibition for the rejected works. It was called the Salon des Refus\u00e9s \u2014 the Salon of the Refused. A decade later, a group of these refused painters organized their own exhibition. A critic, reviewing Monet's loose harbor scene Impression, Sunrise, mocked the entire group as mere 'impressionists.' Within a generation, the name had become an honorific, and Impressionism was the most popular movement in Western art."}, {"type": "wall-label", "artworkId": "met-monet-bridge"}, {"type": "quiz-artist", "artworkId": "met-monet-bridge", "correctArtistId": "monet", "distractorArtistIds": ["degas", "vermeer", "okeeffe"]}, {"type": "wall-label", "artworkId": "met-degas-rehearsal"}, {"type": "quiz-movement", "artworkId": ssance-01", "movementId": "northern-renaissance", "title": "Oil and Detail", "subtitle": "What painters in Flanders did instead of looking south", "estimatedMinutes": 5, "cards": [{"type": "context", "title": "A Different Renaissance", "body": "While Florentine painters were measuring perspective and reading Cicero, painters two weeks' ride to the north \u2014 in Bruges, Ghent, and Antwerp \u2014 were doing something almost completely different. They had access to a new medium, oil paint, which dried slowly enough to be glazed in dozens of nearly transparent layers, producing a luminosity and detail that egg tempera could not. Where Italian Renaissance paintings tend toward generous space and idealized figures, Northern Renaissance paintings tend toward dense detail, specific weather, and uncannily real surfaces \u2014 the precise grain of a velvet sleeve, the faint reflection in a pewter cup. Both traditions are obsessed with the visible world; they simply look at it through different ends of the telescope."}, {"type": "wall-label", "artworkId": "met-christus-carthusian"}, {"type": "quiz-artist", "artworkId": "met-christus-carthusian", "correctArtistId": "petrus-christus", "distractorArtistIds": ["bruegel-elder", "vermeer", "botticelli"]}, {"type": "wall-label", "artworkId": "met-bruegel-harvesters"}, {"type": "quiz-movement", "artworkId": "met-bruegel-harvesters", "correctMovementId": "northern-renaissance", "distractorMovementIds": ["italian-renaissance", "dutch-golden-age", "impressionism"]}, {"type": "quiz-date", "artworkId": "met-bruegel-harvesters", "correctYear": 1565, "rangeStart": 1400, "rangeEnd": 1700}, {"type": "reward"}]}}};

// We version the storage key so future migrations are clean.
const STORAGE_KEY = 'accession:userState:v1';

// In-memory copy of state, mutated then saved.

/**
 * Load state from localStorage, or initialize defaults.
 * Always returns a complete state object.

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      state = createFreshState();
      saveState();
      return state;
    }
    const parsed = JSON.parse(raw);

    state = { ...DEFAULT_STATE, ...parsed };
    return state;
  } catch (err) {
    console.warn('Failed to load state, resetting:', err);
    state = createFreshState();
    saveState();
    return state;
  }
}

/**
 * Create a fresh state object with a generated user ID.
 */
function createFreshState() {
  return {
    ...DEFAULT_STATE,
    userId: generateUserId(),

/**
 * Generate a simple user ID. Not cryptographically secure;
 * just unique enough to identify this user's writes to Firebase.

  return 'u_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

/**

 * Saves to localStorage and notifies listeners.

  if (typeof patch === 'function') {
    patch(state);
  } else {
    Object.assign(state, patch);
  }
  saveState();
  notifyListeners();
}

/**
 * Save state to localStorage. Called automatically by updateState.

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (err) {
    console.error('Failed to save state:', err);

}

/**
 * Reset all state (for testing, or "start over" feature).

function resetState() {
  state = createFreshState();
  saveState();
  notifyListeners();
}

// Simple pub/sub for state changes
const listeners = new Set();

function onStateChange(fn) {
  listeners.add(fn);
  return () => listeners.delete(fn);
}

function notifyListeners() {
  listeners.forEach(fn => {
    try { fn(state); } catch (err) { console.error(err); }

/**

    }
    s.artworkState[artworkId].encountered = true;
    s.artworkState[artworkId].lastSeenAt = new Date().toISOString();

    s.artworkState[artworkId].masteredCount += 1;

/**
 * Mark a lesson as completed. The first argument is a "scope key" — could be
 * a movementId (legacy) or an eraId (new model) or any other grouping. The
 * lesson record is stored in s.movementProgress for backward compat.
 */
function markLessonCompleted(scopeKey, lessonId) {
  if (!scopeKey) scopeKey = '_global';  // Fall-through bucket
  updateState(s => {
    if (!s.movementProgress[scopeKey]) {
      s.movementProgress[scopeKey] = { lessonsCompleted: [], finalExhibitionPassed: false };
    }
    if (!s.movementProgress[scopeKey].lessonsCompleted.includes(lessonId)) {
      s.movementProgress[scopeKey].lessonsCompleted.push(lessonId);
    }
  });
}

/**
 * Update streak based on whether the user did any activity today.
 * Sundays are "rest days" — they don't break a streak even if missed.
 */
function tickStreak() {
  const today = new Date().toISOString().slice(0, 10);
  const s = getState();

  if (s.lastSessionDate === today) {
    // Already counted today
    return;
  }

  if (!s.lastSessionDate) {
    // First session ever
    updateState({ streakDays: 1, lastSessionDate: today });
    return;
  }

  // Calculate days between
  const last = new Date(s.lastSessionDate);
  const now = new Date(today);
  const dayDiff = Math.round((now - last) / (1000 * 60 * 60 * 24));

  if (dayDiff === 1) {
    // Consecutive day, increment
    updateState({ streakDays: s.streakDays + 1, lastSessionDate: today });
  } else if (dayDiff === 2 && new Date(s.lastSessionDate).getDay() === 6) {
    // Missed only Sunday — Sunday is a rest day, preserve streak
    updateState({ streakDays: s.streakDays + 1, lastSessionDate: today });
  } else {
    // Streak broken, restart at 1
    updateState({ streakDays: 1, lastSessionDate: today });
  }
}

 */
function loadContent() {
  if (isLoaded) return Promise.resolve();
  if (loadPromise) return loadPromise;

  loadPromise = (async () => {
    const types = Object.keys(MANIFEST);
    await Promise.all(types.map(loadType));
    isLoaded = true;
  })();
  return loadPromise;
}

async function loadType(type) {
  const ids = MANIFEST[type];
  await Promise.all(ids.map(async id => {
    try {
      const json = window.__BUNDLED_DATA[type] && window.__BUNDLED_DATA[type][id]; if (json) cache[type][id] = json;
    } catch (err) {
      console.error(`Failed to load ${type}/${id}:`, err);
    }
  }));
}

/**

/**

/* ========== js/core/placard.js ========== */

/* ============================================================
   ACCESSION - PLACARD GENERATOR
   Builds a museum-placard SVG for any artwork. Used as the visual
   fallback when no image is available (copyrighted works, offline
   use, or while the Met API request is in flight).

   Returns a data: URL string suitable for use as <img src>.
   Cached per artwork ID for performance.
   ============================================================ */


const placardCache = new Map();

/**
 * Build a placard SVG for an artwork and return it as a data: URL.
 * Designed to look like a museum wall label — restrained, editorial,
 * on-brand. Always returns something usable, even with missing data.
 */
function buildPlacard(artwork) {
  if (!artwork) return '';
  if (placardCache.has(artwork.id)) return placardCache.get(artwork.id);

  const artist = artwork.artistId ? getArtist(artwork.artistId) : null;
  const movement = getMovement(artwork.movementId);
  const yearLabel = formatYear(artwork.year);
  const accentColor = movement?.color || '#7A6A55';
  const initials = (artist?.shortName || artwork.title || '?').charAt(0).toUpperCase();

  // Use 400x300 to match a 4:3 aspect ratio.
  // The SVG uses our paper palette so it blends with the card backgrounds.
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="g${hash(artwork.id)}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FBF7EE"/>
        <stop offset="100%" stop-color="#ECE3D2"/>
      </linearGradient>
      <pattern id="p${hash(artwork.id)}" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
        <circle cx="3" cy="3" r="0.4" fill="${accentColor}" opacity="0.12"/>
      </pattern>
    </defs>
    <rect width="400" height="300" fill="url(#g${hash(artwork.id)})"/>
    <rect width="400" height="300" fill="url(#p${hash(artwork.id)})"/>
    <rect x="20" y="20" width="360" height="260" fill="none" stroke="${accentColor}" stroke-width="0.5" opacity="0.4"/>

    <!-- Large initial as a quiet visual anchor -->
    <text x="200" y="135" font-family="DM Serif Display, Georgia, serif" font-size="86" fill="${accentColor}" text-anchor="middle" opacity="0.18">${escapeXml(initials)}</text>

    <!-- Movement eyebrow -->
    <text x="200" y="175" font-family="Inter, sans-serif" font-size="9" font-weight="500" letter-spacing="2" fill="#7A6A55" text-anchor="middle">${escapeXml((movement?.shortName || '').toUpperCase())}</text>

    <!-- Title -->
    <text x="200" y="208" font-family="DM Serif Display, Georgia, serif" font-size="18" fill="#1F1B16" text-anchor="middle">${escapeXml(truncate(artwork.title, 36))}</text>

    <!-- Artist + year -->
    <text x="200" y="232" font-family="Lora, Georgia, serif" font-style="italic" font-size="12" fill="#7A6A55" text-anchor="middle">${escapeXml(artist?.name || 'Anonymous')} · ${escapeXml(yearLabel)}</text>

    <!-- Small accession plaque at bottom -->
    <line x1="170" y1="252" x2="230" y2="252" stroke="${accentColor}" stroke-width="0.5" opacity="0.4"/>
    <text x="200" y="270" font-family="Inter, sans-serif" font-size="8" letter-spacing="1.5" fill="#B8A88E" text-anchor="middle">THE MET COLLECTION</text>
  </svg>`;

  const url = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  placardCache.set(artwork.id, url);
  return url;
}

/**
 * Hash a string into a short ID for use in SVG defs.
 * Avoids collisions when multiple placards are on the page at once.
 */
function hash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = ((h << 5) - h) + s.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h).toString(36);
}

function escapeXml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&apos;');
}

function truncate(s, max) {
  if (!s) return '';
  return s.length > max ? s.slice(0, max - 1) + '…' : s;
}

function formatYear(year) {
  if (!year && year !== 0) return '';
  if (year < 0) return `${Math.abs(year)} BCE`;
  return String(year);
}


/* ========== js/core/progression.js ========== */

/* ============================================================
   ACCESSION - PROGRESSION ENGINE
   The global thesis version.

   The user progresses across two axes (era × region) with depth
   (mastery) as a hidden Z-axis. Key responsibilities:

   1. Compute per-cell mastery (era × region).
   2. Compute per-region mastery (across all eras).
   3. Compute per-era mastery (across all regions).
   4. Detect synchronization gaps — when one region races ahead.
   5. Determine the difficulty tier a user faces for a given artwork
      (Recognition / Context / Synthesis) based on their breadth.
   ============================================================ */



// Curator rank names per region
const RANK_NAMES = [
  'Visitor',
  'Member',
  'Apprentice Curator',
  'Curator',
  'Curator Emeritus',
];

// Difficulty tiers (the Z-axis)
const DIFFICULTY_TIERS = {
  RECOGNITION: 'recognition',
  CONTEXT:     'context',
  SYNTHESIS:   'synthesis',
};

/**
 * Has the user "encountered" an artwork? (Seen it in any lesson.)
 */
function isEncountered(artworkId) {
  const s = getState().artworkState[artworkId];
  return !!(s && s.encountered);
}

/**
 * Per-artwork mastery count (number of correct quiz answers).
 */
function masteryCount(artworkId) {
  const s = getState().artworkState[artworkId];
  return s ? s.masteredCount : 0;
}

/**
 * Per-artwork mastery level (0-3).
 */
function getArtworkMastery(artworkId) {
  const count = masteryCount(artworkId);
  if (count >= 4) return 3;
  if (count >= 2) return 2;
  if (count >= 1) return 1;
  if (isEncountered(artworkId)) return 1;
  return 0;
}

/* ===== CELL MASTERY (era × region) ===== */

function getCellMastery(eraId, regionId) {
  const arts = getArtworksForCell(eraId, regionId);
  if (arts.length === 0) return null;
  const totalMastery = arts.reduce((sum, a) => sum + getArtworkMastery(a.id), 0);
  return totalMastery / (arts.length * 3);
}

function getNewArtworksInCell(eraId, regionId) {
  const state = getState();
  const lastCompletedAt = (state.cellCompletions || {})[`${eraId}:${regionId}`];
  if (!lastCompletedAt) return [];
  return getArtworksForCell(eraId, regionId).filter(a => {
    const seen = state.artworkState[a.id];
    return !seen || !seen.encountered;
  });
}

/* ===== REGION MASTERY (Y-axis) ===== */

function getRegionMastery(regionId) {
  const eras = getEras();
  let cells = 0;
  let totalFraction = 0;
  for (const era of eras) {
    const cm = getCellMastery(era.id, regionId);
    if (cm !== null) {
      cells += 1;
      totalFraction += cm;
    }
  }
  return cells === 0 ? 0 : totalFraction / cells;
}

function getCuratorRank(regionId) {
  const m = getRegionMastery(regionId);
  if (m >= 1.0) return 4;
  if (m >= 0.7) return 3;
  if (m >= 0.4) return 2;
  if (m >= 0.2) return 1;
  return 0;
}

function getFurthestEraInRegion(regionId) {
  const eras = getEras();
  let furthest = null;
  for (const era of eras) {
    const arts = getArtworksForCell(era.id, regionId);
    if (arts.length === 0) continue;
    const anyEncountered = arts.some(a => isEncountered(a.id));
    if (anyEncountered) furthest = era;
  }
  return furthest;
}

/* ===== ERA MASTERY (X-axis) ===== */

function getEraMastery(eraId) {
  const regions = getRegions();
  let cells = 0;
  let totalFraction = 0;
  for (const region of regions) {
    const cm = getCellMastery(eraId, region.id);
    if (cm !== null) {
      cells += 1;
      totalFraction += cm;
    }
  }
  return cells === 0 ? 0 : totalFraction / cells;
}

/* ===== GLOBAL SYNCHRONIZATION RULE (soft nudge) ===== */

function getSynchronizationGap() {
  const regions = getRegions();
  const furthestPerRegion = {};
  for (const region of regions) {
    const furthest = getFurthestEraInRegion(region.id);
    furthestPerRegion[region.id] = furthest ? furthest.order : 0;
  }
  const sorted = Object.entries(furthestPerRegion)
    .map(([id, order]) => ({ id, order }))
    .filter(r => r.order > 0)
    .sort((a, b) => b.order - a.order);

  if (sorted.length < 2) return null;
  const leader = sorted[0];
  const second = sorted[1];
  if (leader.order < 2) return null;
  const gap = leader.order - second.order;
  if (gap < 3) return null;
  return {
    aheadRegion: leader.id,
    behindRegions: sorted.slice(1).map(s => s.id),
    gap,
  };
}

function shouldFireNudge() {
  const gap = getSynchronizationGap();
  if (!gap) return null;
  const state = getState();
  const lastFiredGap = state.lastSyncNudgeGap || 0;
  if (gap.gap > lastFiredGap) return gap;
  return null;
}

/* ===== Z-AXIS: DIFFICULTY TIER SELECTION ===== */

function pickDifficultyTier(artworkId) {
  const art = getAllArtworks().find(a => a.id === artworkId);
  if (!art) return DIFFICULTY_TIERS.RECOGNITION;

  const ownMastery = getArtworkMastery(artworkId);
  if (ownMastery >= 2) {
    const regionM = getRegionMastery(art.regionId);
    if (regionM >= 0.4) return DIFFICULTY_TIERS.SYNTHESIS;
    return DIFFICULTY_TIERS.CONTEXT;
  }
  const cellMastery = getCellMastery(art.eraId, art.regionId);
  if (cellMastery && cellMastery >= 0.5) return DIFFICULTY_TIERS.CONTEXT;
  return DIFFICULTY_TIERS.RECOGNITION;
}

/* ===== COLLECTION VIEW HELPERS ===== */

function getNodeState(artworkId) {
  const s = getState().artworkState[artworkId];
  if (!s || !s.encountered) return 'unencountered';
  if (s.masteredCount >= 2) {
    if (s.seenInPerson === 'yes') return 'gold';
    return 'lit';
  }
  return 'faint';
}

function getCollectionStats() {
  const state = getState();
  const entries = Object.values(state.artworkState);
  return {
    encountered: entries.filter(e => e.encountered).length,
    mastered: entries.filter(e => e.masteredCount >= 2).length,
    seenInPerson: entries.filter(e => e.seenInPerson === 'yes').length,
  };
}

/* ===== "WHAT NEXT" RECOMMENDER ===== */

function getNextLesson() {
  // Preserves the legacy six-lesson flow for now. When we author
  // region-specific lessons, this will get smarter.
  const state = getState();
  const completed = new Set();
  for (const movId in state.movementProgress) {
    for (const lid of state.movementProgress[movId].lessonsCompleted || []) {
      completed.add(lid);
    }
  }
  // Start with the new sampler lesson if it exists and isn't done
  const candidates = [
    'ancient-worlds-sampler',
    'egyptian-ancient-01', 'italian-renaissance-01', 'northern-renaissance-01',
    'dutch-golden-age-01', 'impressionism-01', 'american-modernism-01',
  ];
  for (const lid of candidates) {
    if (!completed.has(lid)) return { lessonId: lid };
  }
  return null;
}


/* ========== js/core/metApi.js ========== */

/* ============================================================
   ACCESSION - MET API RESOLVER
   Fetches canonical CC0 image URLs from the Met Open Access API
   the first time an artwork is rendered. Caches in localStorage
   so subsequent loads are instant and don't hit the API.

   Why runtime?
   - Image URLs at the Met have shifted historically; resolving at runtime
     means we always get whatever is current.
   - Two of our nine artworks (Hopper, O'Keeffe) are still under copyright,
     and the API correctly returns no primaryImage — we fall back to
     placeholder automatically with no special-casing.
   - The bundle stays tiny: we don't ship multi-megabyte JPEGs.
   ============================================================ */

const CACHE_KEY = 'accession:metImageCache:v1';
const API_BASE = 'https://collectionapi.metmuseum.org/public/collection/v1/objects';

let metImageCache = null;
const inFlight = new Map(); // metObjectId -> Promise

function loadCache() {
  if (metImageCache !== null) return metImageCache;
  try {
    metImageCache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
  } catch {
    metImageCache = {};
  }
  return metImageCache;
}

function saveCache() {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(metImageCache));
  } catch (e) {
    console.warn('Failed to save Met metImageCache:', e);
  }
}

/**
 * Resolve an artwork's image URL by Met object ID. Returns a Promise that
 * resolves to a string URL or null. Null means "use placeholder."
 *
 * Caches both hits (URL) and misses (null) to avoid re-fetching.
 */
async function resolveMetImage(metObjectId) {
  if (!metObjectId) return null;
  const cacheCopy = loadCache();
  const key = String(metObjectId);
  if (key in cacheCopy) return cacheCopy[key];
  if (inFlight.has(key)) return inFlight.get(key);

  const promise = (async () => {
    try {
      const res = await fetch(`${API_BASE}/${metObjectId}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      // primaryImageSmall is the IIIF "web-large" derivative, perfect for mobile.
      // Falls back to primaryImage if that field is missing.
      const url = data.primaryImageSmall || data.primaryImage || null;
      cacheCopy[key] = url || null;
      saveCache();
      return url || null;
    } catch (err) {
      // On error, metImageCache null so we don't hammer the API on every load.
      cacheCopy[key] = null;
      saveCache();
      return null;
    } finally {
      inFlight.delete(key);
    }
  })();
  inFlight.set(key, promise);
  return promise;
}

/**
 * Convenience: hydrate an <img> element. Sets src once the URL resolves
 * to a real photo. If resolution fails (CORS, offline, copyright), the
 * element keeps its current placard src so the card still looks complete.
 */
function hydrateMetImage(imgEl, metObjectId) {
  if (!imgEl || !metObjectId) return;
  resolveMetImage(metObjectId).then(url => {
    if (!url) return;
    // Test that the image actually loads before swapping out the placard.
    // This handles cases where the URL resolves but the image 404s.
    const test = new Image();
    test.onload = () => { imgEl.src = url; };
    test.onerror = () => { /* keep the placard */ };
    test.src = url;
  }).catch(() => { /* keep the placard */ });
}

/**
 * Resolve all artworks in a list, optionally returning a map of id -> url.
 * Useful for views that render many works at once.
 */
async function preloadMetImages(artworks) {
  await Promise.all(artworks.map(a => resolveMetImage(a.metObjectId)));
}

  if (!s.userId || !s.displayName) return;

/**

 * If sync isn't ready, the callback fires once with null.

function subscribeToPartner(partnerUserId, callback) {
  partnerListeners.add(callback);

  if (!isReady || !partnerUserId) {
    callback(lastPartnerData);
    return () => partnerListeners.delete(callback);
  }

  const partnerRef = firebase.ref(db, `users/${partnerUserId}`);
  const unsub = firebase.onValue(partnerRef, snapshot => {
    lastPartnerData = snapshot.val();
    partnerListeners.forEach(fn => {

  return () => {
    partnerListeners.delete(callback);
    unsub();

/* ========== js/lessons/engine.js ========== */

/* ============================================================
   ACCESSION - LESSON ENGINE
   Plays through a lesson card by card.
   Each card type is a small render function below.
   ============================================================ */





let currentLesson = null;
let currentCardIndex = 0;
let correctCount = 0;
let incorrectCount = 0;

/**
 * Start a lesson. Renders into a full-screen shell.
 * Called by app.js's startLesson wrapper; views should call that, not this.
 */
function startLessonImpl(lessonId) {
  currentLesson = getLesson(lessonId);
  if (!currentLesson) {
    alert('Lesson not found: ' + lessonId);
    return;
  }
  currentCardIndex = 0;
  correctCount = 0;
  incorrectCount = 0;
  tickStreak();
  renderShell();
  renderCurrentCard();
}

function renderShell() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="lesson-shell">
      <div class="lesson-progress-bar">
        <div class="lesson-progress-bar__fill" id="lesson-progress-fill" style="width: 0%"></div>
      </div>
      <header class="lesson-header">
        <button class="lesson-close" id="lesson-close" aria-label="Close lesson">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
        <span class="lesson-step" id="lesson-step"></span>
        <div style="width: 36px;"></div>
      </header>
      <main class="lesson-body" id="lesson-body"></main>
      <footer class="lesson-footer" id="lesson-footer"></footer>
    </div>
  `;
  document.getElementById('lesson-close').addEventListener('click', () => {
    if (confirm('Leave this lesson? Your progress will be lost.')) navigate('today');
  });
}

function renderCurrentCard() {
  const card = currentLesson.cards[currentCardIndex];
  if (!card) {
    finishLesson();
    return;
  }
  // Update progress bar and step indicator
  const progress = ((currentCardIndex) / currentLesson.cards.length) * 100;
  document.getElementById('lesson-progress-fill').style.width = progress + '%';
  document.getElementById('lesson-step').textContent =
    `${currentCardIndex + 1} of ${currentLesson.cards.length}`;

  const body = document.getElementById('lesson-body');
  const footer = document.getElementById('lesson-footer');
  body.innerHTML = '';
  footer.innerHTML = '';

  switch (card.type) {
    case 'context':       renderContextCard(card, body, footer); break;
    case 'wall-label':    renderWallLabelCard(card, body, footer); break;
    case 'quiz-artist':   renderArtistQuiz(card, body, footer); break;
    case 'quiz-movement': renderMovementQuiz(card, body, footer); break;
    case 'quiz-region':   renderRegionQuiz(card, body, footer); break;
    case 'quiz-date':     renderDateQuiz(card, body, footer); break;
    case 'quiz-before-after': renderBeforeAfterQuiz(card, body, footer); break;
    case 'comparison':    renderComparisonCard(card, body, footer); break;
    case 'reward':        renderReward(body, footer); break;
    default:
      body.innerHTML = `<p>Unknown card type: ${card.type}</p>`;
      renderContinueButton(footer);
  }
}

function advance() {
  currentCardIndex += 1;
  renderCurrentCard();
}

/* ===== CARD RENDERERS ===== */

// 1. CONTEXT CARD: pure historical prose, no quiz.
function renderContextCard(card, body, footer) {
  body.innerHTML = `
    <div class="lesson-card-title">${card.title}</div>
    <div class="lesson-card-meta">Historical context</div>
    <div class="lesson-card-body">${card.body}</div>
  `;
  renderContinueButton(footer, 'Continue');
}

// 2. WALL LABEL: artwork image with description, like a museum wall.
function renderWallLabelCard(card, body, footer) {
  const art = getArtwork(card.artworkId);
  if (!art) return;
  markEncountered(art.id);

  const artist = art.artistId ? getArtist(art.artistId) : null;
  const artistLine = artist
    ? `${artist.name} <span class="year">${formatYear(art.year)}</span>`
    : `<span class="year">${formatYear(art.year)}</span>`;

  body.innerHTML = `
    <img class="lesson-card-image" src="${art.image || buildPlacard(art)}" data-placard="${buildPlacard(art)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" data-met-id="${art.metObjectId || ''}" alt="${art.title}" />
    <div class="lesson-card-title">${art.title}</div>
    <div class="lesson-card-meta">${artistLine}</div>
    <div class="lesson-card-body">${art.wallLabel}</div>
    <div style="margin-top: var(--space-3);">
      <button class="btn btn--secondary btn--full" id="seen-in-person-btn">
        Have you seen this in person?
      </button>
    </div>
  `;
  document.getElementById('seen-in-person-btn').addEventListener('click', () => {
    showSeenInPersonPrompt(art.id);
  });
  renderContinueButton(footer, 'Continue');
}

// 3. ARTIST QUIZ: image + 4 artist names, pick the painter.
function renderArtistQuiz(card, body, footer) {
  const art = getArtwork(card.artworkId);
  if (!art) return;
  const options = shuffle([card.correctArtistId, ...card.distractorArtistIds]);

  body.innerHTML = `
    <img class="lesson-card-image lesson-card-image--quiz" src="${art.image || buildPlacard(art)}" data-placard="${buildPlacard(art)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" data-met-id="${art.metObjectId || ''}" alt="" />
    <div class="lesson-question">Who painted this?</div>
    <div id="quiz-options">
      ${options.map(id => {
        const artist = getArtist(id);
        return `<button class="quiz-option" data-id="${id}">${artist?.name || id}</button>`;
      }).join('')}
    </div>
    <div id="quiz-feedback"></div>
  `;
  bindQuizOptions({
    artworkId: art.id,
    correctId: card.correctArtistId,
    explanationFn: id => {
      const correct = getArtist(card.correctArtistId);
      if (id === card.correctArtistId) {
        return `${correct.name}, ${formatYear(art.year)}. ${correct.blurb}`;
      }
      const guess = getArtist(id);
      return `Not quite — that's the right era but not the right hand. This is by ${correct.name}.`;
    },
    footer,
  });
}

// 5. DATE QUIZ: drag a slider to guess the year.
function renderDateQuiz(card, body, footer) {
  const art = getArtwork(card.artworkId);
  if (!art) return;
  const midYear = Math.round((card.rangeStart + card.rangeEnd) / 2);

  body.innerHTML = `
    <img class="lesson-card-image lesson-card-image--quiz" src="${art.image || buildPlacard(art)}" data-placard="${buildPlacard(art)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" data-met-id="${art.metObjectId || ''}" alt="" />
    <div class="lesson-question">When was this painted?</div>
    <div class="date-slider">
      <div class="date-slider__value" id="date-value">${midYear}</div>
      <input type="range" id="date-range" min="${card.rangeStart}" max="${card.rangeEnd}" value="${midYear}" />
      <div class="date-slider__range">
        <span>${card.rangeStart}</span>
        <span>${card.rangeEnd}</span>
      </div>
    </div>
    <div id="quiz-feedback"></div>
  `;
  const valEl = document.getElementById('date-value');
  const rangeEl = document.getElementById('date-range');
  rangeEl.addEventListener('input', () => { valEl.textContent = rangeEl.value; });

  // Submit button
  footer.innerHTML = `<button class="btn btn--primary btn--full btn--lg" id="submit-date">Confirm guess</button>`;
  document.getElementById('submit-date').addEventListener('click', () => {
    const guess = parseInt(rangeEl.value, 10);
    const diff = Math.abs(guess - card.correctYear);
    rangeEl.disabled = true;
    const isClose = diff <= 25;
    if (isClose) {
      correctCount++;
      markMastered(art.id);
    } else {
      incorrectCount++;
    }
    const feedback = document.getElementById('quiz-feedback');
    feedback.className = 'lesson-feedback' + (isClose ? '' : ' is-incorrect');
    feedback.innerHTML = `
      <span class="lesson-feedback__label">${isClose ? 'Within 25 years' : 'Off by ' + diff + ' years'}</span>
      <strong>${art.title}</strong> was painted in ${formatYear(card.correctYear)}.
    `;
    renderContinueButton(footer, 'Continue');
  });
}

// 6. BEFORE / AFTER: two artworks, which came first?
function renderBeforeAfterQuiz(card, body, footer) {
  const earlier = getArtwork(card.earlierArtworkId);
  const later = getArtwork(card.laterArtworkId);
  if (!earlier || !later) return;
  // Randomly position them
  const swap = Math.random() < 0.5;
  const left = swap ? later : earlier;
  const right = swap ? earlier : later;

  body.innerHTML = `
    <div class="lesson-question">Which came first?</div>
    <div class="before-after-grid">
      <button class="before-after-option" data-id="${left.id}">
        <img src="${left.image || buildPlacard(left)}" data-placard="${buildPlacard(left)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" data-met-id="${left.metObjectId || ''}" alt="" />
        <div class="before-after-option__caption">${left.title}</div>
      </button>
      <button class="before-after-option" data-id="${right.id}">
        <img src="${right.image || buildPlacard(right)}" data-placard="${buildPlacard(right)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" data-met-id="${right.metObjectId || ''}" alt="" />
        <div class="before-after-option__caption">${right.title}</div>
      </button>
    </div>
    <div id="quiz-feedback"></div>
  `;
  body.querySelectorAll('.before-after-option').forEach(btn => {
    btn.addEventListener('click', () => {
      const guess = btn.dataset.id;
      const isCorrect = guess === earlier.id;
      // Reveal answers
      body.querySelectorAll('.before-after-option').forEach(b => {
        b.disabled = true;
        if (b.dataset.id === earlier.id) b.classList.add('is-correct');
        else if (b === btn) b.classList.add('is-incorrect');
      });
      if (isCorrect) {
        correctCount++;
        markMastered(earlier.id);
      } else {
        incorrectCount++;
      }
      const feedback = document.getElementById('quiz-feedback');
      feedback.className = 'lesson-feedback' + (isCorrect ? '' : ' is-incorrect');
      feedback.innerHTML = `
        <span class="lesson-feedback__label">${isCorrect ? 'Correct' : 'Other way around'}</span>
        <strong>${earlier.title}</strong> (${formatYear(earlier.year)}) came before <strong>${later.title}</strong> (${formatYear(later.year)}).
      `;
      renderContinueButton(footer, 'Continue');
    });
  });
}

// 6c. COMPARISON: 3+ artworks shown side-by-side with an interpretive prompt.
// No quiz; this is a Synthesis-tier card. The user reads, looks, and continues.
function renderComparisonCard(card, body, footer) {
  // Mark all referenced artworks as encountered (the user is studying them)
  for (const aid of card.artworkIds || []) {
    markEncountered(aid);
  }
  const arts = (card.artworkIds || []).map(getArtwork).filter(Boolean);
  if (arts.length === 0) {
    body.innerHTML = `<p>No artworks for this comparison.</p>`;
    renderContinueButton(footer);
    return;
  }

  const itemsHtml = arts.map(art => {
    const artist = art.artistId ? getArtist(art.artistId) : null;
    return `
      <div class="comparison-item">
        <img class="comparison-item__image" src="${art.image || buildPlacard(art)}" data-placard="${buildPlacard(art)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" data-met-id="${art.metObjectId || ''}" alt="${art.title}" />
        <div class="comparison-item__title">${art.title}</div>
        <div class="comparison-item__meta">${artist ? artist.shortName + ' · ' : ''}${formatYear(art.year)} · ${getRegion(art.regionId)?.name || ''}</div>
      </div>
    `;
  }).join('');

  body.innerHTML = `
    <div class="lesson-card-title">${card.title}</div>
    <div class="lesson-card-meta">A comparison across regions</div>
    <div class="comparison-grid">${itemsHtml}</div>
    <div class="lesson-card-body">${card.body || ''}</div>
  `;
  renderContinueButton(footer, 'Continue');
}

function finishLesson() {

}

/* ===== HELPERS ===== */

function bindQuizOptions({ artworkId, correctId, explanationFn, footer }) {
  const container = document.getElementById('quiz-options');
  container.querySelectorAll('.quiz-option').forEach(btn => {
    btn.addEventListener('click', () => {
      const guess = btn.dataset.id;
      const isCorrect = guess === correctId;

      container.querySelectorAll('.quiz-option').forEach(b => {
        if (b.dataset.id === correctId) b.classList.add('is-correct');
        else if (b === btn) b.classList.add('is-incorrect');
        else b.classList.add('is-disabled');
        b.disabled = true;
      });

      if (isCorrect) {
        correctCount++;
        markMastered(artworkId);
      } else {
        incorrectCount++;
      }
      const feedback = document.getElementById('quiz-feedback');
      feedback.className = 'lesson-feedback' + (isCorrect ? '' : ' is-incorrect');
      feedback.innerHTML = `
        <span class="lesson-feedback__label">${isCorrect ? 'Correct' : 'Not this time'}</span>
        ${explanationFn(guess)}
      `;
      renderContinueButton(footer, 'Continue');
    });
  });
}

function renderContinueButton(footer, label = 'Continue') {
  footer.innerHTML = `<button class="btn btn--primary btn--full btn--lg" id="continue-btn">${label}</button>`;
  document.getElementById('continue-btn').addEventListener('click', advance);
}

function showSeenInPersonPrompt(artworkId) {
  // Lightweight inline prompt
  const choice = prompt('Have you seen this in person? Type yes, no, or maybe', 'maybe');
  if (!choice) return;
  const v = choice.toLowerCase().trim();
  if (['yes', 'no', 'maybe'].includes(v)) {
    setSeenInPerson(artworkId, v);
  }
}

function shuffle(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function countNewArtworks() {
  // Count artworks referenced in this lesson
  const ids = new Set();
  for (const card of currentLesson.cards) {
    if (card.artworkId) ids.add(card.artworkId);
    if (card.earlierArtworkId) ids.add(card.earlierArtworkId);
    if (card.laterArtworkId) ids.add(card.laterArtworkId);
  }
  return ids.size;
}

function formatYear(year) {
  if (year < 0) return `${Math.abs(year)} BCE`;
  return year;
}

      `}

      <!-- LEADERBOARD -->

          <span>Wing rivalry</span>
          <span style="font-size:9px;color:var(--color-sepia-light)" id="sync-indicator">offline</span>

          <div id="leaderboard-rows">
            ${renderLeaderboardRow({

              mastered: stats.mastered,
              isYou: true,
            })}
            ${renderLeaderboardRow({
              name: state.partnerName || 'Brandon',
              streak: 0,
              mastered: 0,
              isYou: false,
              loading: true,
            })}
          </div>
        </div>
      </section>
    </div>

    const art = getArtwork(id);
    if (art) alert(art.longForm || art.wallLabel);
  });

  // Next lesson button
  const nextBtn = document.getElementById('start-next-lesson');
  if (nextBtn && nextLesson) {
    nextBtn.addEventListener('click', () => startLesson(nextLesson.id));
  }

  // Partner sync
  subscribeToPartner(localStorage.getItem('accession:partnerUserId'), partnerData => {
    if (!partnerData) return;
    const rows = document.getElementById('leaderboard-rows');
    if (!rows) return;
    rows.innerHTML = `

        mastered: stats.mastered,
        isYou: true,
      })}
      ${renderLeaderboardRow({
        name: partnerData.displayName || 'Brandon',
        streak: partnerData.streakDays || 0,
        mastered: partnerData.mastered || 0,
        isYou: false,

    if (ind) {

function renderCardOfTheDay(art) {
  const artist = art.artistId ? getArtist(art.artistId) : null;
  const region = getRegion(art.regionId);
  const era = getEra(art.eraId);
  // Eyebrow shows region + era, the new model's primary axes
  const eyebrow = [region?.name, era?.name].filter(Boolean).join(' · ');
  return `
    <section class="today-section">
      <h3 class="today-section__title"><span>Card of the day</span></h3>
      <div class="hero-panel" id="cotd-card" data-artwork-id="${art.id}" style="cursor: pointer;">
        <img class="hero-panel__image" src="${art.image || buildPlacard(art)}" data-placard="${buildPlacard(art)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" data-met-id="${art.metObjectId || ''}" alt="${art.title}" />
        <div class="hero-panel__body">
          <div class="lesson-card-meta" style="margin-bottom: var(--space-1);">${eyebrow}</div>

        </p>

      </div>
