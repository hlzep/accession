 council in 843 CE that declared icon veneration orthodox \u2014 the event still celebrated as the Triumph of Orthodoxy in Eastern Christianity. In Islam, the Prophet Muhammad had explicitly warned against the creation of images that might become objects of worship. Early Islamic art channeled visual ambition into calligraphy, geometry, and architecture rather than figurative representation, producing a visual culture of extraordinary sophistication that achieved with abstract pattern what other traditions achieved with the human form. In Buddhist traditions in China and Japan, debates about whether the Buddha could be depicted, and in what form, shaped the entire early history of those traditions. Three religions, the same question, three different answers \u2014 and three visual cultures that remain distinct to this day."}, {"type": "wall-label", "artworkId": "met-byzantine-icon"}, {"type": "quiz-movement", "artworkId": "met-byzantine-icon", "correctMovementId": "sacred-medieval", "distractorMovementIds": ["ancient-worlds", "renaissances-empires", "modernism"]}, {"type": "wall-label", "artworkId": "met-islamic-ceramic"}, {"type": "wall-label", "artworkId": "met-heian-buddha"}, {"type": "comparison", "title": "Three sacred surfaces", "artworkIds": ["met-byzantine-icon", "met-islamic-ceramic", "met-heian-buddha"], "body": "The Byzantine icon offers the divine as a face \u2014 the Virgin's eyes meet yours and the gold ground tells you the encounter is timeless. The Samanid bowl offers the divine as a word \u2014 knowledge described as 'sweeter than honey,' inscribed in elegant Kufic around the rim of an object you would actually drink from. The Heian Buddha offers the divine as a body \u2014 Yakushi Nyorai, the medicine Buddha, who you can approach physically, walk around, gaze at. Same period, three civilizations, three propositions about what counts as a sacred encounter."}, {"type": "quiz-region", "artworkId": "met-islamic-ceramic", "correctRegionId": "middle-east-north-africa", "distractorRegionIds": ["europe", "east-asia", "americas"]}, {"type": "reward"}]}, "sacred-medieval-sampler": {"id": "sacred-medieval-sampler", "eraId": "sacred-medieval", "isSampler": true, "title": "The Sacred Made Visible", "subtitle": "Three civilizations, three answers to the question of how to depict the divine", "estimatedMinutes": 8, "cards": [{"type": "context", "title": "After the Empires", "body": "Around 500 CE, the Western Roman Empire collapsed. Around 600 CE, Islam was born. Around 700 CE, the Tang dynasty reached its height. Around 800 CE, Borobudur was built in Java and Charlemagne was crowned in Aachen. The nine centuries we call 'Sacred & Medieval Worlds' are not a dark age \u2014 they are a period when religious traditions across Eurasia produced some of the most distinctive visual cultures in history. What unites them, across enormous geographic and theological distances, is a shared impulse: to find visual forms for the invisible, the divine, the transcendent. What divides them is how. This sampler shows three answers."}, {"type": "wall-label", "artworkId": "met-byzantine-icon"}, {"type": "quiz-region", "artworkId": "met-byzantine-icon", "correctRegionId": "europe", "distractorRegionIds": ["middle-east-north-africa", "east-asia", "south-asia"]}, {"type": "wall-label", "artworkId": "met-quran-folio"}, {"type": "wall-label", "artworkId": "met-borobudur-photo"}, {"type": "comparison", "title": "Three theologies of the image", "artworkIds": ["met-byzantine-icon", "met-quran-folio", "met-borobudur-photo"], "body": "The Byzantine icon depicts the Virgin and Christ Child with deliberate non-naturalism: the gold background, the flat space, the hieratic frontality all signal that this is a window onto the divine, not a portrait of earthly people. The Qur'an folio refuses figurative imagery entirely; the divine here is the written word itself, exalted in calligraphy. Borobudur takes a third path: figurative Buddha statues, hundreds of them, set inside stone stupas that the worshipper walks past in spiraling clockwise ascent. Three completely different visual theologies, all working on the same problem of how to make the sacred encounterable."}, {"type": "wall-label", "artworkId": "met-tang-horse"}, {"type": "quiz-region", "artworkId": "met-tang-horse", "correctRegionId": "east-asia", "distractorRegionIds": ["americas", "south-asia", "europe"]}, {"type": "reward"}]}, "southeast-asia-ancient-01": {"id": "southeast-asia-ancient-01", "eraId": "ancient-worlds", "regionId": "southeast-asia", "title": "The \u0110\u00f4ng S\u01a1n Drums and the Bronze Age of Southeast Asia", "subtitle": "Vietnam's Red River Delta produced the most sophisticated large-scale bronze casting in ancient Southeast Asia \u2014 and traded it across the entire region", "estimatedMinutes": 8, "cards": [{"type": "context", "title": "The Bronze Age Beyond China", "body": "When Western art historians write about Bronze Age Asia, they almost always mean China \u2014 the Shang dynasty's ritual bronzes, oracle bones, and jade bi discs. But bronze technology spread through mainland Southeast Asia during the same period, producing a tradition of bronze-casting that was independent in its visual vocabulary, technically sophisticated in its execution, and geographically far-reaching in its influence. The \u0110\u00f4ng S\u01a1n culture of the Red River Delta in northern Vietnam (~600 BCE\u2013100 CE) was the most prominent expression of this tradition. Their bronze drums were cast at a scale and quality that astonished later observers: the largest required smelting between one and seven tonnes of copper ore. They were traded across an area stretching from Yunnan in southern China to Java and New Guinea \u2014 a maritime trade network whose reach rivals the contemporary Silk Road."}, {"type": "wall-label", "artworkId": "dong-son-bronze-drum"}, {"type": "wall-label", "artworkId": "yayoi-dotaku-bell"}, {"type": "comparison", "title": "\u0110\u00f4ng S\u01a1n drum and Yayoi d\u014dtaku: two Bronze Age ritual bronzes, two different worlds", "artworkIds": ["dong-son-bronze-drum", "yayoi-dotaku-bell"], "body": "Both objects are bronze ritual instruments from Bronze Age East/Southeast Asia, made within a few centuries of each other. Both were prestige objects associated with elite authority rather than everyday use. Both decorated their surfaces with geometric bands and figurative scenes. And both were buried \u2014 the \u0110\u00f4ng S\u01a1n drums in elite graves, the Yayoi d\u014dtaku on hilltops facing rice fields \u2014 suggesting a ritual logic of deposition rather than continued use. But their visual programs are completely different: the \u0110\u00f4ng S\u01a1n drum depicts a vivid social world \u2014 boats, warriors, rice-pounding, ceremonial dancers \u2014 while the Yayoi bell's narrative panels are quieter, more schematic, focused on agricultural scenes. The \u0110\u00f4ng S\u01a1n drum is louder in every sense: larger, heavier, more complex, and produced by a culture with direct access to long-distance maritime trade networks. The d\u014dtaku is more intimate: a communal agricultural offering, inward-facing, local."}, {"type": "quiz-medium", "artworkId": "dong-son-bronze-drum", "correctMedium": "Cast bronze (lost-wax technique)", "distractorMediums": ["Hammered bronze", "Cast iron", "Cast copper"], "explanation": "\u0110\u00f4ng S\u01a1n drums were made by the lost-wax casting process: a wax model of the drum was made, covered in clay, heated to melt out the wax, and then molten bronze (an alloy of copper and tin) poured into the mold. The technique allowed the casting of complex three-dimensional forms including the protruding frogs that decorate the rim of many drums. The largest drums would have required multiple simultaneous crucibles and considerable organizational capacity."}, {"type": "quiz-before-after", "earlierArtworkId": "dong-son-bronze-drum", "laterArtworkId": "met-angkor-vishnu"}, {"type": "quiz-region", "artworkId": "dong-son-bronze-drum", "correctRegionId": "southeast-asia", "distractorRegionIds": ["east-asia", "south-asia", "oceania"]}, {"type": "reward"}]}, "southeast-asia-sacred-medieval-01": {"id": "southeast-asia-sacred-medieval-01", "eraId": "sacred-medieval", "regionId": "southeast-asia", "title": "The Hindu-Buddhist Cosmos Made Stone", "subtitle": "Borobudur and Angkor: two civilizations, one cosmological project", "estimatedMinutes": 9, "cards": [{"type": "context", "title": "The Imported Universe", "body": "Between roughly 200 BCE and 1500 CE, Indian religious and cosmological ideas spread across Southeast Asia through trade, diplomacy, and the movement of scholars and priests. The result was not simple imitation: Javanese, Khmer, Cham, Mon, and Burman cultures absorbed Hinduism and Buddhism and produced religious art and architecture of extraordinary originality. Borobudur (Java, ~800 CE) and Angkor Wat (Cambodia, ~1130 CE) are the two most spectacular achievements of this Indianized Southeast Asian world \u2014 both conceived as physical models of the cosmic mountain at the center of the Hindu-Buddhist universe, both built at a scale that required the coordinated labor of tens of thousands of people over decades, and both now considered among the greatest architectural achievements in human history."}, {"type": "wall-label", "artworkId": "met-borobudur-photo"}, {"type": "wall-label", "artworkId": "borobudur-stupa-buddha"}, {"type": "comparison", "title": "Borobudur's three realms: architecture as cosmological diagram", "artworkIds": ["met-borobudur-photo", "borobudur-stupa-buddha"], "body": "The exterior view of Borobudur shows the whole cosmological argument at once: a mountain of stone rising through square terraces (the realm of form) into circular platforms (the realm of formlessness). The close-up of a Buddha within a perforated stupa shows how that argument is made concrete at the level of the individual object: the veil of stone enacts the concept of a realm beyond material access. At Borobudur, philosophy becomes architecture, and architecture becomes experience. The pilgrim who walks the full 5-kilometer path from base to summit makes the cosmological journey physical \u2014 they don't read about the three realms, they walk through them."}, {"type": "wall-label", "artworkId": "met-angkor-vishnu"}, {"type": "wall-label", "artworkId": "angkor-wat-devata"}, {"type": "comparison", "title": "Angkor: portable and monumental \u2014 the same cosmos at two scales", "artworkIds": ["met-angkor-vishnu", "angkor-wat-devata"], "body": "The Vishnu sculpture is portable \u2014 moved from its original context, it now stands in a museum. The devata is immovable \u2014 she is the wall. Both are expressions of the same Khmer religious program: a universe populated by divine presences, with the king as cosmic axis and Mount Meru as the cosmic center. The 1,700 unique devatas of Angkor Wat are not interchangeable background decoration; each is an individual divine being attending the sacred ceremonies performed in the temple. The Vishnu is an object of devotion that can travel. The devata is a permanent divine resident. Together they represent the full range of how the Khmer embodied their cosmology in stone."}, {"type": "quiz-date", "artworkId": "borobudur-stupa-buddha", "correctYear": 820, "rangeStart": 500, "rangeEnd": 1400}, {"type": "reward"}]}}};</script>
<script>(function(){

/* ===== js/core/state.js ===== */

/* ============================================================
   ACCESSION - STATE MANAGEMENT
   The single source of truth for user data.
   Persists to localStorage on every change.

   VERSIONING & MIGRATIONS
   -----------------------
   Saved state carries a `schemaVersion` field. The migrations
   below run in sequence to bring an older save up to current.
   When you change the state shape in an incompatible way:
     1. Bump CURRENT_SCHEMA_VERSION
     2. Add a migration function to MIGRATIONS keyed by the old
        version it accepts
     3. Test by hand-editing a localStorage payload to the old
        version and reloading
   The merge with DEFAULT_STATE handles additive changes (new
   fields) automatically — only write a migration when you need
   to restructure or backfill existing data.
   ============================================================ */

const STORAGE_KEY = 'accession:userState:v1';
const CURRENT_SCHEMA_VERSION = 3;

// Migration functions: each takes a state and returns the next-version state.
// Keyed by the version it accepts. Run in sequence until current.
const MIGRATIONS = {
  // v2 -> v3: add SRS (spaced repetition) fields.
  // Existing artworkState entries get default SRS values.
  2: function(s) {
    // Add session counter
    if (!s.sessionCount) s.sessionCount = 0;
    // Add review queue if missing
    if (!s.reviewQueue) s.reviewQueue = {};
    // Backfill: any artwork the user has encountered gets an initial SRS entry
    for (const artId in (s.artworkState || {})) {
      const as = s.artworkState[artId];
      if (as.encountered && !s.reviewQueue[artId]) {
        s.reviewQueue[artId] = {
          // Due in 3 sessions (they've already seen it)
          dueAtSession: (s.sessionCount || 0) + 3,
          intervalIndex: 1,   // index into SRS_INTERVALS
          consecutiveMisses: 0,
          quizTier: 'recognition',
          wallLabelDue: (s.sessionCount || 0) + 5,
        };
      }
    }
    s.schemaVersion = 3;
    return s;
  },
  // v1 didn't have cellCompletions; v2 derives them so Z-axis "new content
  // added" detection works for users who completed lessons before we added
  // the cellCompletions tracking.
  1: function(s) {
    if (!s.cellCompletions) s.cellCompletions = {};
    // Map legacy movement IDs to their era:region cells so older
    // completions register as "you've already seen this cell."
    const legacyMap = {
      'egyptian-ancient':      'ancient-worlds:middle-east-north-africa',
      'italian-renaissance':   'renaissances-empires:europe',
      'northern-renaissance':  'renaissances-empires:europe',
      'dutch-golden-age':      'renaissances-empires:europe',
      'impressionism':         'revolution-industry:europe',
      'american-modernism':    'modernism:americas',
    };
    for (const movId in (s.movementProgress || {})) {
      const cellKey = legacyMap[movId];
      if (cellKey && (s.movementProgress[movId].lessonsCompleted || []).length > 0) {
        // Use the current time as a placeholder completion time
        if (!s.cellCompletions[cellKey]) {
          s.cellCompletions[cellKey] = new Date().toISOString();
        }
      }
    }
    s.schemaVersion = 2;
    return s;
  },
};

// Default state shape. Every property must exist here so that
// upgrades from older versions are predictable.
const DEFAULT_STATE = {
  // Schema version — incremented when state shape changes
  schemaVersion: CURRENT_SCHEMA_VERSION,

  // User identity

// In-memory copy of state, mutated then saved.
let state = null;

/**
 * Load state from localStorage, or initialize defaults.
 * Always returns a complete state object.
 *
 * On load, runs any pending migrations to bring older saves up to
 * the current schema version. Failed loads fall back to a fresh
 * state — and we attempt to preserve the unparseable raw data
 * under a backup key so the user could recover manually.
 */
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      state = createFreshState();
      saveState();
      return state;
    }
    let parsed = JSON.parse(raw);

    // Treat missing schemaVersion as v1 (we introduced versioning in v2)
    const version = parsed.schemaVersion || 1;
    if (version < CURRENT_SCHEMA_VERSION) {
      // Snapshot the pre-migration state so we can recover if the
      // migration is buggy. Overwrites any previous pre-migration backup.
      try {
        localStorage.setItem(
          STORAGE_KEY + ':pre-migration-v' + version,
          raw
        );
      } catch (_) { /* quota errors are non-fatal */ }
      parsed = runMigrations(parsed, version);
    }

    // Merge with defaults to handle additively-added fields
    state = { ...DEFAULT_STATE, ...parsed };
    return state;
  } catch (err) {
    console.warn('Failed to load state:', err);
    // Preserve corrupt data so the user can recover if needed
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) localStorage.setItem(STORAGE_KEY + ':corrupt-backup', raw);
    } catch (_) {}
    state = createFreshState();
    saveState();
    return state;
  }
}

/**
 * Run all migrations from `fromVersion` up to CURRENT_SCHEMA_VERSION.
 */
function runMigrations(s, fromVersion) {
  let current = s;
  for (let v = fromVersion; v < CURRENT_SCHEMA_VERSION; v++) {
    const migrate = MIGRATIONS[v];
    if (migrate) {
      try {
        current = migrate(current);
      } catch (err) {
        console.warn(`Migration v${v} -> v${v + 1} failed, keeping prior state:`, err);
      }
    }
  }
  return current;
}

/**
 * Create a fresh state object with a generated user ID.
 */
function createFreshState() {
  return {
    ...DEFAULT_STATE,
    userId: generateUserId(),
  };
}

/**
 * Generate a simple user ID. Not cryptographically secure;
 * just unique enough to identify this user's writes to Firebase.
 */
function generateUserId() {
  return 'u_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}

/**
 * Get the current state. Read-only — use updateState to modify.
 */
function getState() {
  if (!state) loadState();
  return state;
}

/**
 * Update state with a partial object or a mutation function.
 * Saves to localStorage and notifies listeners.
 */
function updateState(patch) {
  if (!state) loadState();
  if (typeof patch === 'function') {
    patch(state);
  } else {
    Object.assign(state, patch);
  }
  saveState();
  notifyListeners();
}

/**
 * Save state to localStorage. Called automatically by updateState.
 */
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (err) {
    console.error('Failed to save state:', err);
  }
}

/**
 * Reset all state (for testing, or "start over" feature).
 */
function resetState() {
  state = createFreshState();
  saveState();
  notifyListeners();
}

// Simple pub/sub for state changes
const listeners = new Set();

function onStateChange(fn) {
  listeners.add(fn);
  return () => listeners.delete(fn);
}

function notifyListeners() {
  listeners.forEach(fn => {
    try { fn(state); } catch (err) { console.error(err); }
  });
}

/* ===== Convenience helpers for specific state operations ===== */

/**
 * Mark an artwork as encountered (shown to the user at least once).
 */
function markEncountered(artworkId) {
  updateState(s => {
    if (!s.artworkState[artworkId]) {
      s.artworkState[artworkId] = { encountered: false, masteredCount: 0, seenInPerson: null };
    }
    s.artworkState[artworkId].encountered = true;
    s.artworkState[artworkId].lastSeenAt = new Date().toISOString();
  });
}

/**
 * Mark an artwork as correctly identified in a quiz.
 * Increments mastery count.
 */
function markMastered(artworkId) {
  updateState(s => {
    if (!s.artworkState[artworkId]) {
      s.artworkState[artworkId] = { encountered: true, masteredCount: 0, seenInPerson: null };
    }
    s.artworkState[artworkId].masteredCount += 1;
    s.artworkState[artworkId].lastSeenAt = new Date().toISOString();
  });
}

/**
 * Record the user's response to "have you seen this in person?"
 * value can be 'yes', 'no', or 'maybe'.
 */
function setSeenInPerson(artworkId, value) {
  updateState(s => {
    if (!s.artworkState[artworkId]) {
      s.artworkState[artworkId] = { encountered: true, masteredCount: 0 };
    }
    s.artworkState[artworkId].seenInPerson = value;
  });
}

/**
 * Mark a lesson as completed within a movement.
 */
/**
 * Mark a lesson as completed. The first argument is a "scope key" — could be
 * a movementId (legacy) or an eraId (new model) or any other grouping. The
 * lesson record is stored in s.movementProgress for backward compat.
 */
function markLessonCompleted(scopeKey, lessonId) {
  if (!scopeKey) scopeKey = '_global';  // Fall-through bucket
  updateState(s => {
    if (!s.movementProgress[scopeKey]) {
      s.movementProgress[scopeKey] = { lessonsCompleted: [], finalExhibitionPassed: false };
    }
    if (!s.movementProgress[scopeKey].lessonsCompleted.includes(lessonId)) {
      s.movementProgress[scopeKey].lessonsCompleted.push(lessonId);
    }
  });
}

/**
 * Update streak based on whether the user did any activity today.
 * Sundays are "rest days" — they don't break a streak even if missed.
 */
function tickStreak() {
  const today = new Date().toISOString().slice(0, 10);
  const s = getState();

  if (s.lastSessionDate === today) {
    // Already counted today
    return;
  }

  if (!s.lastSessionDate) {
    // First session ever
    updateState({ streakDays: 1, lastSessionDate: today });
    return;
  }

  // Calculate days between
  const last = new Date(s.lastSessionDate);
  const now = new Date(today);
  const dayDiff = Math.round((now - last) / (1000 * 60 * 60 * 24));

  if (dayDiff === 1) {
    // Consecutive day, increment
    updateState({ streakDays: s.streakDays + 1, lastSessionDate: today });
  } else if (dayDiff === 2 && new Date(s.lastSessionDate).getDay() === 6) {
    // Missed only Sunday — Sunday is a rest day, preserve streak
    updateState({ streakDays: s.streakDays + 1, lastSessionDate: today });
  } else {
    // Streak broken, restart at 1
    updateState({ streakDays: 1, lastSessionDate: today });
  }
}

/* ============================================================
   EXPORT / IMPORT
   Lets the user save a JSON backup of their progress and
   restore it on the same or a different device. Critical for
   any case where localStorage is cleared (browser wipe, new
   phone, "reset" tap, paranoid user before a code push).
   ============================================================ */

/**
 * Return the current state as a JSON-serializable object, plus
 * a small metadata envelope identifying it as an Accession backup
 * with a timestamp and the user's display name.
 */
function exportState() {
  if (!state) loadState();
  return {
    _appName: 'Accession',
    _exportedAt: new Date().toISOString(),
    _displayName: state.displayName || null,
    schemaVersion: state.schemaVersion || CURRENT_SCHEMA_VERSION,
    state: state,
  };
}

/**
 * Trigger a browser download of the current state as a JSON file.
 * Filename uses the displayName + date.
 */
function downloadBackup() {
  const payload = exportState();
  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0, 10);
  const name = (state.displayName || 'accession').replace(/[^a-z0-9-]/gi, '_').toLowerCase();
  a.href = url;
  a.download = `accession-backup-${name}-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/**
 * Restore state from a backup payload (the object returned by
 * exportState). Validates the envelope, runs any pending
 * migrations, and saves. Returns { ok: true } or { ok: false, error }.
 *
 * Does NOT prompt for confirmation — the caller (Profile view)
 * handles the "are you sure?" UX.
 */
function importState(payload) {
  try {
    if (!payload || typeof payload !== 'object') {
      return { ok: false, error: 'Backup file is empty or not valid JSON.' };
    }
    if (payload._appName !== 'Accession') {
      return { ok: false, error: 'That file is not an Accession backup.' };
    }
    if (!payload.state || typeof payload.state !== 'object') {
      return { ok: false, error: 'Backup file is missing state data.' };
    }
    // Run migrations if the backup is older
    let restored = payload.state;
    const version = restored.schemaVersion || payload.schemaVersion || 1;
    if (version < CURRENT_SCHEMA_VERSION) {
      restored = runMigrations(restored, version);
    }
    // Merge with current defaults to fill in any fields added since
    state = { ...DEFAULT_STATE, ...restored };
    saveState();
    notifyListeners();
    return { ok: true };
  } catch (err) {
    return { ok: false, error: err.message || 'Unknown error reading backup.' };
  }
}

/* ============================================================
   SPACED REPETITION SYSTEM (SRS)
   Session-based intervals. The session counter increments once
   per app open; review due dates are compared against it.
   Intervals: 1 → 3 → 7 → 21 → 60 sessions.
   ============================================================ */

const SRS_INTERVALS = [1, 3, 7, 21, 60];

/**
 * Increment the session counter. Call once on app boot.
 */
function tickSession() {
  updateState(s => { s.sessionCount = (s.sessionCount || 0) + 1; });
}

/**
 * Schedule an artwork for review after a lesson encounter.
 * Called when the user first encounters an artwork.
 */
function scheduleReview(artworkId) {
  if (!state) loadState();
  const current = state.sessionCount || 0;
  if (state.reviewQueue[artworkId]) return; // already scheduled
  updateState(s => {
    s.reviewQueue[artworkId] = {
      dueAtSession: current + SRS_INTERVALS[0],
      intervalIndex: 0,
      consecutiveMisses: 0,
      quizTier: 'recognition',
      wallLabelDue: current + SRS_INTERVALS[1],
    };
  });
}

/**
 * Record a correct answer for an artwork in the review queue.
 * Advances the interval and resets consecutive misses.
 */
function recordReviewCorrect(artworkId) {
  if (!state) loadState();
  const current = state.sessionCount || 0;
  updateState(s => {
    const entry = s.reviewQueue[artworkId];
    if (!entry) return;
    const nextIndex = Math.min(entry.intervalIndex + 1, SRS_INTERVALS.length - 1);
    entry.intervalIndex = nextIndex;
    entry.dueAtSession = current + SRS_INTERVALS[nextIndex];
    entry.consecutiveMisses = 0;
    // Advance wall label on correct answers too, but more slowly
    entry.wallLabelDue = current + SRS_INTERVALS[Math.min(nextIndex + 1, SRS_INTERVALS.length - 1)];
  });
}

/**
 * Record an incorrect answer.
 * First miss: reschedule +1 session, same tier.
 * Second consecutive miss: step back one tier.
 */
function recordReviewMiss(artworkId) {
  if (!state) loadState();
  const current = state.sessionCount || 0;
  const tiers = ['recognition', 'context', 'synthesis'];
  updateState(s => {
    const entry = s.reviewQueue[artworkId];
    if (!entry) return;
    entry.consecutiveMisses = (entry.consecutiveMisses || 0) + 1;
    // Reschedule for next session regardless
    entry.dueAtSession = current + 1;
    if (entry.consecutiveMisses >= 2) {
      // Step back one tier
      const currentTierIdx = tiers.indexOf(entry.quizTier);
      if (currentTierIdx > 0) {
        entry.quizTier = tiers[currentTierIdx - 1];
      }
      entry.consecutiveMisses = 0; // reset after step-back
      // Also reset interval index
      entry.intervalIndex = Math.max(0, entry.intervalIndex - 1);
    }
  });
}

/**
 * Mark a wall label as reviewed. Advances its due date.
 */
function recordWallLabelReview(artworkId) {
  if (!state) loadState();
  const current = state.sessionCount || 0;
  updateState(s => {
    const entry = s.reviewQueue[artworkId];
    if (!entry) return;
    const nextIndex = Math.min((entry.intervalIndex || 0) + 1, SRS_INTERVALS.length - 1);
    entry.wallLabelDue = current + SRS_INTERVALS[nextIndex];
  });
}

/**
 * Get all items due for review this session.
 * Returns { quizItems: [artworkId], wallLabelItems: [artworkId] }
 */
function getDueReviewItems() {
  if (!state) loadState();
  const current = state.sessionCount || 0;
  const quizItems = [];
  const wallLabelItems = [];
  for (const [artId, entry] of Object.entries(state.reviewQueue || {})) {
    if (entry.dueAtSession <= current) quizItems.push(artId);
    if (entry.wallLabelDue <= current) wallLabelItems.push(artId);
  }
  return { quizItems, wallLabelItems };
}

/**
 * Get the review count for the Today view badge.
 */
function getDueReviewCount() {
  const { quizItems, wallLabelItems } = getDueReviewItems();
  // Deduplicate — an artwork may appear in both
  const all = new Set([...quizItems, ...wallLabelItems]);
  return all.size;
}

    const types = Object.keys(MANIFEST);
    await Promise.all(types.map(loadType));
    isLoaded = true;
  })();
  return loadPromise;
}

async function loadType(type) {
  const ids = MANIFEST[type];
  ids.forEach(id => {
    const json = (window.__BUNDLED_DATA && window.__BUNDLED_DATA[type])
      ? window.__BUNDLED_DATA[type][id]
      : null;
    if (json) cache[type][id] = json;
  });
}

  );

/**
 * Apply any author-mode edits from state on top of the base content.
 * This lets the user override wall labels, etc., without changing files.
 */
function applyEdits(content, id) {
  if (!content) return content;
  const edits = getState().authorEdits[id];
  if (!edits) return content;
  return { ...content, ...edits };
}

/**
 * Save an author edit to a piece of content.
 * Used by author mode.
 */
function saveAuthorEdit(id, patch) {

  (()=>{

      s.authorEdits[id] = { ...(s.authorEdits[id] || {}), ...patch };
    });
  })();
}


/* ===== js/core/placard.js ===== */

/* ============================================================
   ACCESSION - PLACARD GENERATOR
   Builds a museum-placard SVG for any artwork. Used as the visual
   fallback when no image is available (copyrighted works, offline
   use, or while the Met API request is in flight).

   Returns a data: URL string suitable for use as <img src>.
   Cached per artwork ID for performance.
   ============================================================ */


const placardCache = new Map();

const MUSEUM_LABELS = {
  'met':             'THE MET · NEW YORK',
  'british-museum':  'BRITISH MUSEUM · LONDON',
  'louvre':          'MUSÉE DU LOUVRE · PARIS',
  'pergamon-museum': 'PERGAMON MUSEUM · BERLIN',
  'vatican-museums': 'VATICAN MUSEUMS',
};

function locationLabel(artwork) {
  if (artwork.museumId && MUSEUM_LABELS[artwork.museumId]) {
    return MUSEUM_LABELS[artwork.museumId];
  }
  if (artwork.originLabel) return artwork.originLabel.toUpperCase();
  return 'PERMANENT COLLECTION';
}

/**
 * Build a placard SVG for an artwork and return it as a data: URL.
 * Designed to look like a museum wall label — restrained, editorial,
 * on-brand. Always returns something usable, even with missing data.
 */
function buildPlacard(artwork) {
  if (!artwork) return '';
  if (placardCache.has(artwork.id)) return placardCache.get(artwork.id);

  const artist = artwork.artistId ? getArtist(artwork.artistId) : null;
  const movement = getMovement(artwork.movementId);
  const yearLabel = formatYear(artwork.year);
  const accentColor = movement?.color || '#7A6A55';
  const initials = (artist?.shortName || artwork.title || '?').charAt(0).toUpperCase();

  // Use 400x300 to match a 4:3 aspect ratio.
  // The SVG uses our paper palette so it blends with the card backgrounds.
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="g${hash(artwork.id)}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FBF7EE"/>
        <stop offset="100%" stop-color="#ECE3D2"/>
      </linearGradient>
      <pattern id="p${hash(artwork.id)}" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
        <circle cx="3" cy="3" r="0.4" fill="${accentColor}" opacity="0.12"/>
      </pattern>
    </defs>
    <rect width="400" height="300" fill="url(#g${hash(artwork.id)})"/>
    <rect width="400" height="300" fill="url(#p${hash(artwork.id)})"/>
    <rect x="20" y="20" width="360" height="260" fill="none" stroke="${accentColor}" stroke-width="0.5" opacity="0.4"/>

    <!-- Large initial as a quiet visual anchor -->
    <text x="200" y="135" font-family="DM Serif Display, Georgia, serif" font-size="86" fill="${accentColor}" text-anchor="middle" opacity="0.18">${escapeXml(initials)}</text>

    <!-- Movement eyebrow -->
    <text x="200" y="175" font-family="Inter, sans-serif" font-size="9" font-weight="500" letter-spacing="2" fill="#7A6A55" text-anchor="middle">${escapeXml((movement?.shortName || '').toUpperCase())}</text>

    <!-- Title -->
    <text x="200" y="208" font-family="DM Serif Display, Georgia, serif" font-size="18" fill="#1F1B16" text-anchor="middle">${escapeXml(truncate(artwork.title, 36))}</text>

    <!-- Artist + year -->
    <text x="200" y="232" font-family="Lora, Georgia, serif" font-style="italic" font-size="12" fill="#7A6A55" text-anchor="middle">${escapeXml(artist?.name || 'Anonymous')} · ${escapeXml(yearLabel)}</text>

    <!-- Small accession plaque at bottom -->
    <line x1="170" y1="252" x2="230" y2="252" stroke="${accentColor}" stroke-width="0.5" opacity="0.4"/>
    <text x="200" y="270" font-family="Inter, sans-serif" font-size="8" letter-spacing="1.5" fill="#B8A88E" text-anchor="middle">${escapeXml(locationLabel(artwork))}</text>
  </svg>`;

  const url = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  placardCache.set(artwork.id, url);
  return url;
}

/**
 * Hash a string into a short ID for use in SVG defs.
 * Avoids collisions when multiple placards are on the page at once.
 */
function hash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = ((h << 5) - h) + s.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h).toString(36);
}

function escapeXml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&apos;');
}

function truncate(s, max) {
  if (!s) return '';
  return s.length > max ? s.slice(0, max - 1) + '…' : s;
}

function formatYear(year) {
  if (!year && year !== 0) return '';
  if (year < 0) return `${Math.abs(year)} BCE`;
  return String(year);
}


/* ===== js/core/map.js ===== */

/* ============================================================
   ACCESSION - ARTWORK ORIGIN MAP
   Renders an accurate world map using Natural Earth 110m data
   fetched from CDN. The map shows where an artwork was made.

   On first load (online): fetches world-atlas topojson from CDN,
   decodes with topojson-client, projects with d3-geo, caches path.
   On subsequent renders: uses cached SVG path string.
   Fallback (offline/error): shows a simple ocean rectangle with pin.
   ============================================================ */

const MAP_W = 320;
const MAP_H = 160;

// Module-level cache
let _pathCache = null;
let _loadPromise = null;

function pxCoord(lat, lng) {
  const x = Math.round(((lng + 180) / 360) * MAP_W * 10) / 10;
  const y = Math.round(((83 - lat) / 166) * MAP_H * 10) / 10;
  return [x, y];
}

function geoPathString(geojson) {
  // Convert GeoJSON geometry to equirectangular SVG path
  // geojson is a Feature or FeatureCollection or GeometryCollection
  const features = geojson.type === 'FeatureCollection' ? geojson.features
    : geojson.type === 'Feature' ? [geojson]
    : [{ geometry: geojson }];

  let d = '';
  for (const f of features) {
    const geom = f.geometry || f;
    const type = geom.type;
    const coords = geom.coordinates;
    const polys = type === 'Polygon' ? [coords]
      : type === 'MultiPolygon' ? coords : [];

    for (const poly of polys) {
      const ring = poly[0];
      if (!ring || ring.length < 3) continue;
      const pts = [];
      for (const [lon, lat] of ring) {
        const clat = Math.max(-83, Math.min(83, lat));
        const [x, y] = pxCoord(clat, lon);
        if (!pts.length || pts[pts.length-1] !== `${x},${y}`) {
          pts.push(`${x},${y}`);
        }
      }
      if (pts.length >= 3) d += `M${pts.join('L')}Z `;
    }
  }
  return d.trim();
}

async function loadWorldPath() {
  if (_pathCache) return _pathCache;
  if (_loadPromise) return _loadPromise;

  _loadPromise = (async () => {
    try {
      // Load topojson client
      const [topoData, topoLibText] = await Promise.all([
        fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json').then(r => r.json()),
        fetch('https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js').then(r => r.text()),
      ]);

      // Execute topojson library in isolated scope
      const modObj = { exports: {} };
      // eslint-disable-next-line no-new-func
      new Function('module', 'exports', topoLibText)(modObj, modObj.exports);
      const topojson = modObj.exports;

      // Decode land polygons
      const land = topojson.feature(topoData, topoData.objects.land);

      _pathCache = geoPathString(land);
      // Update any waiting map elements
      document.querySelectorAll('[data-map-pending]').forEach(el => {
        const pathEl = el.querySelector('path[data-world]');
        if (pathEl) pathEl.setAttribute('d', _pathCache);
        el.removeAttribute('data-map-pending');
      });
      return _pathCache;
    } catch (err) {
      console.warn('[Accession] Map world path failed:', err.message);
      return null;
    }
  })();

  return _loadPromise;
}

// Pre-fetch on module load
if (typeof window !== 'undefined') loadWorldPath();

function renderSVG(worldPath, pinMarkup, lineMarkup) {
  const w = MAP_W, h = MAP_H;
  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"
      style="width:100%;height:100%;display:block;" shape-rendering="geometricPrecision">
    <rect width="${w}" height="${h}" fill="#EDE4D3"/>
    <path data-world="1" d="${worldPath || ''}" fill="#C8B898"
      stroke="#1F1B16" stroke-width="0.5" stroke-opacity="0.2" fill-rule="evenodd"/>
    <line x1="0" y1="${h/2}" x2="${w}" y2="${h/2}"
      stroke="#1F1B16" stroke-width="0.3" stroke-opacity="0.12" stroke-dasharray="2 5"/>
    ${lineMarkup || ''}${pinMarkup || ''}
  </svg>`;
}

function pinMarkup(x, y) {
  return `<circle cx="${x}" cy="${y}" r="9" fill="#6B2E2E" fill-opacity="0.15"/>
    <circle cx="${x}" cy="${y}" r="5" fill="#6B2E2E" stroke="#F5EFE4" stroke-width="1.5"/>
    <circle cx="${x-1.5}" cy="${y-1.5}" r="1.5" fill="#F5EFE4" fill-opacity="0.5"/>`;
}

/**
 * Build a map div for a single artwork origin.
 * Renders immediately (possibly without world outline if not yet loaded),
 * then upgrades itself once the world path is available.
 */
function buildArtworkMap(lat, lng, label) {
  if (lat == null || lng == null) return '';
  const [pinX, pinY] = pxCoord(lat, lng);
  if (pinX < 2 || pinX > MAP_W - 2 || pinY < 2 || pinY > MAP_H - 2) return '';

  const lbl = label || '';
  const worldPath = _pathCache || '';
  const pending = worldPath ? '' : ' data-map-pending="1"';
  const svg = renderSVG(worldPath, pinMarkup(pinX, pinY), '');

  return `<div class="artwork-map"${pending}${lbl ? ` aria-label="Origin: ${lbl}"` : ''}>
    ${svg}${lbl ? `<div class="artwork-map__label">${lbl}</div>` : ''}
  </div>`;
}

/**
 * Build a multi-pin comparison map.
 */
function buildComparisonMap(points) {
  if (!points || !points.length) return '';
  const valid = points.filter(p => p.lat != null && p.lng != null);
  if (!valid.length) return '';

  const pins = valid.map(p => {
    const [x, y] = pxCoord(p.lat, p.lng);
    if (x < 2 || x > MAP_W - 2 || y < 2 || y > MAP_H - 2) return '';
    return pinMarkup(x, y);
  }).join('');

  const lines = valid.slice(0,-1).map((p,i) => {
    const [x1,y1] = pxCoord(p.lat,p.lng);
    const [x2,y2] = pxCoord(valid[i+1].lat,valid[i+1].lng);
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"
      stroke="#6B2E2E" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="3 3"/>`;
  }).join('');

  const worldPath = _pathCache || '';
  const pending = worldPath ? '' : ' data-map-pending="1"';
  const svg = renderSVG(worldPath, pins, lines);

  return `<div class="artwork-map artwork-map--comparison"${pending} aria-hidden="true">
    ${svg}
  </div>`;
}


/* ===== js/core/progression.js ===== */

/* ============================================================
   ACCESSION - PROGRESSION ENGINE
   The global thesis version.

   The user progresses across two axes (era × region) with depth
   (mastery) as a hidden Z-axis. Key responsibilities:

   1. Compute per-cell mastery (era × region).
   2. Compute per-region mastery (across all eras).
   3. Compute per-era mastery (across all regions).
   4. Detect synchronization gaps — when one region races ahead.
   5. Determine the difficulty tier a user faces for a given artwork
      (Recognition / Context / Synthesis) based on their breadth.
   ============================================================ */



// Curator rank names per region
const RANK_NAMES = [
  'Visitor',
  'Member',
  'Apprentice Curator',
  'Curator',
  'Curator Emeritus',
];

// Difficulty tiers (the Z-axis)
const DIFFICULTY_TIERS = {
  RECOGNITION: 'recognition',
  CONTEXT:     'context',
  SYNTHESIS:   'synthesis',
};

/**
 * Has the user "encountered" an artwork? (Seen it in any lesson.)
 */
function isEncountered(artworkId) {
  const s = getState().artworkState[artworkId];
  return !!(s && s.encountered);
}

/**
 * Per-artwork mastery count (number of correct quiz answers).
 */
function masteryCount(artworkId) {
  const s = getState().artworkState[artworkId];
  return s ? s.masteredCount : 0;
}

/**
 * Per-artwork mastery level (0-3).
 */
function getArtworkMastery(artworkId) {
  const count = masteryCount(artworkId);
  if (count >= 4) return 3;
  if (count >= 2) return 2;
  if (count >= 1) return 1;
  if (isEncountered(artworkId)) return 1;
  return 0;
}

/* ===== CELL MASTERY (era × region) ===== */

function getCellMastery(eraId, regionId) {
  const arts = getArtworksForCell(eraId, regionId);
  if (arts.length === 0) return null;
  const totalMastery = arts.reduce((sum, a) => sum + getArtworkMastery(a.id), 0);
  return totalMastery / (arts.length * 3);
}

function getNewArtworksInCell(eraId, regionId) {
  const state = getState();
  const lastCompletedAt = (state.cellCompletions || {})[`${eraId}:${regionId}`];
  if (!lastCompletedAt) return [];
  return getArtworksForCell(eraId, regionId).filter(a => {
    const seen = state.artworkState[a.id];
    return !seen || !seen.encountered;
  });
}

/* ===== REGION MASTERY (Y-axis) ===== */

function getRegionMastery(regionId) {
  const eras = getEras();
  let cells = 0;
  let totalFraction = 0;
  for (const era of eras) {
    const cm = getCellMastery(era.id, regionId);
    if (cm !== null) {
      cells += 1;
      totalFraction += cm;
    }
  }
  return cells === 0 ? 0 : totalFraction / cells;
}

function getCuratorRank(regionId) {
  const m = getRegionMastery(regionId);
  if (m >= 1.0) return 4;
  if (m >= 0.7) return 3;
  if (m >= 0.4) return 2;
  if (m >= 0.2) return 1;
  return 0;
}

function getFurthestEraInRegion(regionId) {
  const eras = getEras();
  let furthest = null;
  for (const era of eras) {
    const arts = getArtworksForCell(era.id, regionId);
    if (arts.length === 0) continue;
    const anyEncountered = arts.some(a => isEncountered(a.id));
    if (anyEncountered) furthest = era;
  }
  return furthest;
}

/* ===== ERA MASTERY (X-axis) ===== */

function getEraMastery(eraId) {
  const regions = getRegions();
  let cells = 0;
  let totalFraction = 0;
  for (const region of regions) {
    const cm = getCellMastery(eraId, region.id);
    if (cm !== null) {
      cells += 1;
      totalFraction += cm;
    }
  }
  return cells === 0 ? 0 : totalFraction / cells;
}

/* ===== GLOBAL SYNCHRONIZATION RULE (soft nudge) ===== */

function getSynchronizationGap() {
  const regions = getRegions();
  const furthestPerRegion = {};
  for (const region of regions) {
    const furthest = getFurthestEraInRegion(region.id);
    furthestPerRegion[region.id] = furthest ? furthest.order : 0;
  }
  const sorted = Object.entries(furthestPerRegion)
    .map(([id, order]) => ({ id, order }))
    .filter(r => r.order > 0)
    .sort((a, b) => b.order - a.order);

  if (sorted.length < 2) return null;
  const leader = sorted[0];
  const second = sorted[1];
  if (leader.order < 2) return null;
  const gap = leader.order - second.order;
  if (gap < 3) return null;
  return {
    aheadRegion: leader.id,
    behindRegions: sorted.slice(1).map(s => s.id),
    gap,
  };
}

function shouldFireNudge() {
  const gap = getSynchronizationGap();
  if (!gap) return null;
  const state = getState();
  const lastFiredGap = state.lastSyncNudgeGap || 0;
  if (gap.gap > lastFiredGap) return gap;
  return null;
}

/* ===== Z-AXIS: DIFFICULTY TIER SELECTION ===== */

function pickDifficultyTier(artworkId) {
  const art = getAllArtworks().find(a => a.id === artworkId);
  if (!art) return DIFFICULTY_TIERS.RECOGNITION;

  const ownMastery = getArtworkMastery(artworkId);
  if (ownMastery >= 2) {
    const regionM = getRegionMastery(art.regionId);
    if (regionM >= 0.4) return DIFFICULTY_TIERS.SYNTHESIS;
    return DIFFICULTY_TIERS.CONTEXT;
  }
  const cellMastery = getCellMastery(art.eraId, art.regionId);
  if (cellMastery && cellMastery >= 0.5) return DIFFICULTY_TIERS.CONTEXT;
  return DIFFICULTY_TIERS.RECOGNITION;
}

/* ===== COLLECTION VIEW HELPERS ===== */

function getNodeState(artworkId) {
  const s = getState().artworkState[artworkId];
  if (!s || !s.encountered) return 'unencountered';
  if (s.masteredCount >= 2) {
    if (s.seenInPerson === 'yes') return 'gold';
    return 'lit';
  }
  return 'faint';
}

function getCollectionStats() {
  const state = getState();
  const entries = Object.values(state.artworkState);
  return {
    encountered: entries.filter(e => e.encountered).length,
    mastered: entries.filter(e => e.masteredCount >= 2).length,
    seenInPerson: entries.filter(e => e.seenInPerson === 'yes').length,
  };
}

/* ===== "WHAT NEXT" RECOMMENDER ===== */

/**
 * Returns the next lesson the user should take, or null if all are done.
 *
 * Ordering principles:
 *  1. Era-wide samplers/intros before any regional lessons in that era.
 *  2. Breadth before depth: introduce each region before going deeper
 *     in any one. One intro per region across an era before comparisons.
 *  3. Sessions proceed in curriculum order (Ancient -> Sacred & Medieval
 *     -> Renaissances -> Revolution -> Modernism).
 *  4. Within a session, introductory lessons before comparisons.
 *  5. Never return a completed lesson.
 */
function getNextLesson() {
  const state = getState();
  const completed = new Set();
  for (const movId in state.movementProgress) {
    for (const lid of (state.movementProgress[movId].lessonsCompleted || [])) {
      completed.add(lid);
    }
  }

  // Full curriculum sequence.
  // Breadth-first within each era (one intro per region),
  // then depth (comparisons + follow-ups), then next era.
  const sequence = [

    // Prehistoric — Africa (oldest)
    'prehistoric-africa-01',

    // Prehistoric — East Asia
    'prehistoric-east-asia-01',

    // Prehistoric — Europe
    'prehistoric-global-venus',
    'prehistoric-cave-art-01',
    'prehistoric-cave-art-altamira',
    'prehistoric-portable-art',
    'prehistoric-why-animals',

    // Prehistoric — Southeast Asia
    'prehistoric-sulawesi-01',

    // Prehistoric — Oceania
    'prehistoric-oceania-01',

    // Prehistoric — South Asia
    'prehistoric-south-asia-01',

    // Prehistoric — Americas
    'prehistoric-americas-01',

    // Prehistoric — MENA
    'prehistoric-mena-01',

    // Prehistoric — Global synthesis
    'prehistoric-global-art',

    // Ancient Worlds
    'ancient-worlds-sampler',
    'ancient-worlds-first-writing',
    'mesopotamian-ancient-01',
    'egyptian-ancient-01',
    'chinese-ancient-01',
    'indian-ancient-01',
    'greek-ancient-01',
    'greek-arc-ancient-01',
    'minoan-ancient-01',
    'bronze-age-europe-01',
    'etruscan-ancient-01',
    'ancient-materials-01',
    'ancient-europe-materials-comparison',
    'greek-symposium-01',
    'greek-body-politics-01',
    'americas-ancient-01',
    'jomon-ancient-01',

/* ===== js/core/metApi.js ===== */

/* ============================================================
   ACCESSION - MET API RESOLVER
   Fetches canonical CC0 image URLs from the Met Open Access API
   the first time an artwork is rendered. Caches in localStorage
   so subsequent loads are instant and don't hit the API.

   Why runtime?
   - Image URLs at the Met have shifted historically; resolving at runtime
     means we always get whatever is current.
   - Two of our nine artworks (Hopper, O'Keeffe) are still under copyright,
     and the API correctly returns no primaryImage — we fall back to
     placeholder automatically with no special-casing.
   - The bundle stays tiny: we don't ship multi-megabyte JPEGs.
   ============================================================ */

const CACHE_KEY = 'accession:metImageCache:v1';
const API_BASE = 'https://collectionapi.metmuseum.org/public/collection/v1/objects';

let metImageCache = null;
const inFlight = new Map(); // metObjectId -> Promise

function loadCache() {
  if (metImageCache !== null) return metImageCache;
  try {
    metImageCache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
  } catch {
    metImageCache = {};
  }
  return metImageCache;
}

function saveCache() {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(metImageCache));
  } catch (e) {
    console.warn('Failed to save Met metImageCache:', e);
  }
}

/**
 * Resolve an artwork's image URL by Met object ID. Returns a Promise that
 * resolves to a string URL or null. Null means "use placeholder."
 *
 * Caches both hits (URL) and misses (null) to avoid re-fetching.
 */
async function resolveMetImage(metObjectId) {
  if (!metObjectId) return null;
  const cacheCopy = loadCache();
  const key = String(metObjectId);
  if (key in cacheCopy) return cacheCopy[key];
  if (inFlight.has(key)) return inFlight.get(key);

  const promise = (async () => {
    try {
      const res = await fetch(`${API_BASE}/${metObjectId}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      // primaryImageSmall is the IIIF "web-large" derivative, perfect for mobile.
      // Falls back to primaryImage if that field is missing.
      const url = data.primaryImageSmall || data.primaryImage || null;
      cacheCopy[key] = url || null;
      saveCache();
      return url || null;
    } catch (err) {
      // On error, metImageCache null so we don't hammer the API on every load.
      cacheCopy[key] = null;
      saveCache();
      return null;
    } finally {
      inFlight.delete(key);
    }
  })();
  inFlight.set(key, promise);
  return promise;
}

/**
 * Convenience: hydrate an <img> element. Sets src once the URL resolves
 * to a real photo. If resolution fails (CORS, offline, copyright), the
 * element keeps its current placard src so the card still looks complete.
 */
function hydrateMetImage(imgEl, metObjectId) {
  if (!imgEl || !metObjectId) return;
  resolveMetImage(metObjectId).then(url => {
    if (!url) return;
    // Test that the image actually loads before swapping out the placard.
    // This handles cases where the URL resolves but the image 404s.
    const test = new Image();
    test.onload = () => { imgEl.src = url; };
    test.onerror = () => { /* keep the placard */ };
    test.src = url;
  }).catch(() => { /* keep the placard */ });
}

/**
 * Resolve all artworks in a list, optionally returning a map of id -> url.
 * Useful for views that render many works at once.
 */
async function preloadMetImages(artworks) {
  await Promise.all(artworks.map(a => resolveMetImage(a.metObjectId)));
}

let firebase = null;
let db = null;
let isReady = false;

/**
 * Subscribers waiting for partner data updates.
 */
const partnerListeners = new Set();
let lastPartnerData = null;

/**
 * Initialize Firebase if configured. Idempotent.
 */
async function initSync() {
  if (!FIREBASE_CONFIG) {
    console.info('Sync: running in offline-only mode (no Firebase config).');
    return false;
  }
  try {
    // Dynamically import Firebase modules from the CDN.
    // This means we ship no Firebase code in the bundle for offline users.
    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const { getDatabase, ref, set, onValue, push } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    firebase = { initializeApp, ref, set, onValue, push };
    const app = initializeApp(FIREBASE_CONFIG);
    db = getDatabase(app);
    isReady = true;
    // Push current state once, then subscribe to changes.
    pushUserStats();
    onStateChange(pushUserStats);
    return true;
  } catch (err) {
    console.warn('Sync: Firebase init failed, running offline:', err);
    return false;
  }
}

/**
 * Push a summarized version of the user's stats to Firebase.
 * We never push raw content edits or personal data — only public scoreboard fields.
 */
function pushUserStats() {
  if (!isReady) return;
  const s = getState();
  if (!s.userId || !s.displayName) return;

  const stats = {
    displayName: s.displayName,
    streakDays: s.streakDays,
    lastSessionDate: s.lastSessionDate,
    encountered: Object.values(s.artworkState).filter(a => a.encountered).length,
    mastered: Object.values(s.artworkState).filter(a => a.masteredCount >= 2).length,
    seenInPerson: Object.values(s.artworkState).filter(a => a.seenInPerson === 'yes').length,
    updatedAt: Date.now(),
  };
  firebase.set(firebase.ref(db, `users/${s.userId}`), stats);
}

/**
 * Subscribe to the partner's stats. Returns an unsubscribe function.
 * If sync isn't ready, the callback fires once with null.
 */
function subscribeToPartner(partnerUserId, callback) {
  partnerListeners.add(callback);

  if (!isReady || !partnerUserId) {
    callback(lastPartnerData);
    return () => partnerListeners.delete(callback);
  }

  const partnerRef = firebase.ref(db, `users/${partnerUserId}`);
  const unsub = firebase.onValue(partnerRef, snapshot => {
    lastPartnerData = snapshot.val();
    partnerListeners.forEach(fn => {
      try { fn(lastPartnerData); } catch (e) { console.error(e); }
    });
  });

  return () => {
    partnerListeners.delete(callback);
    unsub();
  };
}

/**
 * Send a challenge to the partner. A challenge is a set of pre-baked
 * quiz questions both players take, scores compared.
 */
async function sendChallenge(challenge) {
  if (!isReady) {
    // Fallback: copy a shareable code to clipboard
    const code = btoa(JSON.stringify(challenge));
    try {
      await navigator.clipboard.writeText(code);
      return { mode: 'code', code };
    } catch {
      return { mode: 'code', code };
    }
  }
  const challengeRef = firebase.push(firebase.ref(db, 'challenges'));
  await firebase.set(challengeRef, {
    ...challenge,
    fromUserId: getState().userId,
    createdAt: Date.now(),
  });
  return { mode: 'live', id: challengeRef.key };
}

function syncStatus() {
  return {
    configured: !!FIREBASE_CONFIG,
    ready: isReady,
  };
}


/* ===== js/lessons/review.js ===== */

/* ============================================================
   ACCESSION - REVIEW SESSION BUILDER
   Takes SRS due items and builds a lesson-shaped object that
   the existing lesson engine can play. Supports:
   - Wall label resurfacing with comprehension question
   - Quiz resurfacing at the correct difficulty tier
   ============================================================ */



const MAX_REVIEW_ITEMS = 10;

/**
 * Build a review lesson from whatever is currently due.
 * Returns a lesson object (same shape as data/lessons/*.json)
 * or null if nothing is due.
 */
function buildReviewLesson() {
  const { quizItems, wallLabelItems } = getDueReviewItems();
  if (quizItems.length === 0 && wallLabelItems.length === 0) return null;

  const cards = [];

  // Opening context card
  const totalDue = new Set([...quizItems, ...wallLabelItems]).size;
  cards.push({
    type: 'context',
    title: 'Revisit',
    body: `${totalDue} work${totalDue === 1 ? '' : 's'} to revisit. Some you've seen recently; some haven't crossed your desk in a while. The point is not to test you but to keep these works alive in memory — the way you keep any conversation going.`,
  });

  // Interleave wall labels and quizzes, capped at MAX_REVIEW_ITEMS
  const seen = new Set();
  let count = 0;

  // Wall labels first (re-encounters with the work), then quiz
  const allItems = [...new Set([...wallLabelItems, ...quizItems])].slice(0, MAX_REVIEW_ITEMS);

  for (const artId of allItems) {
    if (count >= MAX_REVIEW_ITEMS) break;
    const art = getArtwork(artId);
    if (!art) continue;

    // Wall label card if it's due
    if (wallLabelItems.includes(artId)) {
      cards.push({ type: 'wall-label', artworkId: artId });
      // Comprehension question if one exists
      if (art.comprehensionQuestion) {
        cards.push({
          type: 'quiz-comprehension',
          artworkId: artId,
          ...art.comprehensionQuestion,
        });
      }
    }

    // Quiz card if it's due (and we haven't already done wall label for this item)
    if (quizItems.includes(artId) && !wallLabelItems.includes(artId)) {
      cards.push(buildQuizCard(art));
    } else if (quizItems.includes(artId) && wallLabelItems.includes(artId)) {
      // Both due — add quiz after the wall label
      cards.push(buildQuizCard(art));
    }

    seen.add(artId);
    count++;
  }

  if (cards.length <= 1) return null; // Only the context card — nothing real to show

  // Reward card at end
  cards.push({ type: 'reward' });

  return {
    id: 'review-session',
    title: 'Revisit',
    subtitle: `${totalDue} work${totalDue === 1 ? '' : 's'} from your collection`,
    estimatedMinutes: Math.max(3, Math.round(cards.length * 0.5)),
    isReviewSession: true,
    cards,
  };
}

/**
 * Build a quiz card for an artwork, respecting its current SRS tier.
 */
function buildQuizCard(art) {
  // Default to region quiz — works for anonymous and attributed works
  // The engine already handles quiz-region and quiz-before-after
  return {
    type: 'quiz-region',
    artworkId: art.id,
    correctRegionId: art.regionId,
    distractorRegionIds: pickDistractors(art.regionId),
    _isReview: true,
  };
}

function pickDistractors(correctRegionId) {
  const all = [
    'europe', 'middle-east-north-africa', 'east-asia', 'south-asia',
    'southeast-asia', 'sub-saharan-africa', 'americas', 'oceania',
  ];
  return all.filter(r => r !== correctRegionId).slice(0, 3);
}


/* ===== js/lessons/engine.js ===== */

/* ============================================================
   ACCESSION - LESSON ENGINE
   Plays through a lesson card by card.
   Each card type is a small render function below.
   ============================================================ */







let currentLesson = null;
let currentCardIndex = 0;
let correctCount = 0;
let incorrectCount = 0;

/**
 * Start a lesson. Renders into a full-screen shell.
 * Called by app.js's startLesson wrapper; views should call that, not this.
 */
function startLessonImpl(lessonId) {
  currentLesson = getLesson(lessonId);
  if (!currentLesson) {
    alert('Lesson not found: ' + lessonId);
    return;
  }
  currentCardIndex = 0;
  correctCount = 0;
  incorrectCount = 0;
  tickStreak();
  renderShell();
  renderCurrentCard();
}

/**
 * Start a review session from the SRS queue.
 */
function startReviewImpl() {
  const lesson = buildReviewLesson();
  if (!lesson) {
    alert('Nothing due for review right now.');
    return;
  }
  currentLesson = lesson;
  currentCardIndex = 0;
  correctCount = 0;
  incorrectCount = 0;
  tickStreak();
  renderShell();
  renderCurrentCard();
}

function renderShell() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="lesson-shell">
      <div class="lesson-progress-bar">
        <div class="lesson-progress-bar__fill" id="lesson-progress-fill" style="width: 0%"></div>
      </div>
      <header class="lesson-header">
        <button class="lesson-close" id="lesson-close" aria-label="Close lesson">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
        <span class="lesson-step" id="lesson-step"></span>
        <div style="width: 36px;"></div>
      </header>
      <main class="lesson-body" id="lesson-body"></main>
      <footer class="lesson-footer" id="lesson-footer"></footer>
    </div>
  `;
  document.getElementById('lesson-close').addEventListener('click', () => {
    if (confirm('Leave this lesson? Your progress will be lost.')) navigate('today');
  });
}

function renderCurrentCard() {
  const card = currentLesson.cards[currentCardIndex];
  if (!card) {
    finishLesson();
    return;
  }
  // Update progress bar and step indicator
  const progress = ((currentCardIndex) / currentLesson.cards.length) * 100;
  document.getElementById('lesson-progress-fill').style.width = progress + '%';
  document.getElementById('lesson-step').textContent =
    `${currentCardIndex + 1} of ${currentLesson.cards.length}`;

  const body = document.getElementById('lesson-body');
  const footer = document.getElementById('lesson-footer');
  body.innerHTML = '';
  footer.innerHTML = '';

  switch (card.type) {
    case 'context':       renderContextCard(card, body, footer); break;
    case 'wall-label':    renderWallLabelCard(card, body, footer); break;
    case 'quiz-artist':   renderArtistQuiz(card, body, footer); break;
    case 'quiz-movement': renderMovementQuiz(card, body, footer); break;
    case 'quiz-region':   renderRegionQuiz(card, body, footer); break;
    case 'quiz-date':     renderDateQuiz(card, body, footer); break;
    case 'quiz-before-after': renderBeforeAfterQuiz(card, body, footer); break;
    case 'quiz-medium':    renderMediumQuiz(card, body, footer); break;
    case 'comparison':    renderComparisonCard(card, body, footer); break;
    case 'reward':        renderReward(body, footer); break;
    default:
      body.innerHTML = `<p>Unknown card type: ${card.type}</p>`;
      renderContinueButton(footer);
  }
}

function advance() {
  currentCardIndex += 1;
  renderCurrentCard();
}

/* ===== CARD RENDERERS ===== */

// 1. CONTEXT CARD: pure historical prose, no quiz.
function renderContextCard(card, body, footer) {
  body.innerHTML = `
    <div class="lesson-card-title">${card.title}</div>
    <div class="lesson-card-meta">Historical context</div>
    <div class="lesson-card-body">${card.body}</div>
  `;
  renderContinueButton(footer, 'Continue');
}

// 2. WALL LABEL: artwork image with description, like a museum wall.
function renderWallLabelCard(card, body, footer) {
  const art = getArtwork(card.artworkId);
  if (!art) return;
  markEncountered(art.id);
  // If this is a review session, record the wall label as reviewed
  if (currentLesson && currentLesson.isReviewSession) {
    recordWallLabelReview(art.id);
  } else {
    // First encounter: schedule for future review
    scheduleReview(art.id);
  }

  const artist = art.artistId ? getArtist(art.artistId) : null;
  const artistLine = artist
    ? `${artist.name} <span class="year">${formatYear(art.year)}</span>`
    : `<span class="year">${formatYear(art.year)}</span>`;

  const mapHtml = buildArtworkMap(art.lat, art.lng, art.originLabel || '');
  const artState = (getState().artworkState || {})[art.id] || {};

  body.innerHTML = `
    <img class="lesson-card-image" src="${art.image || buildPlacard(art)}" data-placard="${buildPlacard(art)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" data-met-id="${art.metObjectId || ''}" alt="${art.title}" />
    ${mapHtml}
    <div class="lesson-card-title">${art.title}</div>
    <div class="lesson-card-meta">${artistLine}</div>
    <div class="lesson-card-body">${art.wallLabel}</div>
    <div class="seen-in-person-row">
      <span class="seen-in-person-label">Seen in person?</span>
      <div class="seen-in-person-btns">
        <button class="seen-in-person-btn${artState && artState.seenInPerson === 'yes' ? ' is-active' : ''}" data-val="yes">Yes</button>
        <button class="seen-in-person-btn${artState && artState.seenInPerson === 'maybe' ? ' is-active' : ''}" data-val="maybe">Maybe</button>
        <button class="seen-in-person-btn${artState && artState.seenInPerson === 'no' ? ' is-active' : ''}" data-val="no">No</button>
      </div>
    </div>
  `;
  body.querySelectorAll('.seen-in-person-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const v = btn.dataset.val;
      setSeenInPerson(art.id, v);
      body.querySelectorAll('.seen-in-person-btn').forEach(b => b.classList.remove('is-active'));
      btn.classList.add('is-active');
    });
  });
  renderContinueButton(footer, 'Continue');
}

// 3. ARTIST QUIZ: image + 4 artist names, pick the painter.
function renderArtistQuiz(card, body, footer) {
  const art = getArtwork(card.artworkId);
  if (!art) return;
  const options = shuffle([card.correctArtistId, ...card.distractorArtistIds]);

  body.innerHTML = `

    </div>
    <div id="quiz-feedback"></div>

  bindQuizOptions({
    artworkId: art.id,
    correctId: card.correctArtistId,

// 5. DATE QUIZ: drag a slider to guess the year.
function renderDateQuiz(card, body, footer) {
  const art = getArtwork(card.artworkId);
  if (!art) return;
  const midYear = Math.round((card.rangeStart + card.rangeEnd) / 2);

  body.innerHTML = `

  const valEl = document.getElementById('date-value');
  const rangeEl = document.getElementById('date-range');
  rangeEl.addEventListener('input', () => { valEl.textContent = rangeEl.value; });

  // Submit button
  footer.innerHTML = `<button class="btn btn--primary btn--full btn--lg" id="submit-date">Confirm guess</button>`;
  document.getElementById('submit-date').addEventListener('click', () => {
    const guess = parseInt(rangeEl.value, 10);
    const diff = Math.abs(guess - card.correctYear);
    rangeEl.disabled = true;
    const isClose = diff <= 25;
    if (isClose) {
      correctCount++;
      markMastered(art.id);
    } else {
      incorrectCount++;
    }
    const feedback = document.getElementById('quiz-feedback');
    feedback.className = 'lesson-feedback' + (isClose ? '' : ' is-incorrect');
    feedback.innerHTML = `
      <span class="lesson-feedback__label">${isClose ? 'Within 25 years' : 'Off by ' + diff + ' years'}</span>
      <strong>${art.title}</strong> was painted in ${formatYear(card.correctYear)}.
    `;
    renderContinueButton(footer, 'Continue');
  });
}

// 6. BEFORE / AFTER: two artworks, which came first?
function renderBeforeAfterQuiz(card, body, footer) {
  const earlier = getArtwork(card.earlierArtworkId);
  const later = getArtwork(card.laterArtworkId);
  if (!earlier || !later) return;
  // Randomly position them
  const swap = Math.random() < 0.5;
  const left = swap ? later : earlier;
  const right = swap ? earlier : later;

  body.innerHTML = `
    <div class="lesson-question">Which came first?</div>
    <div class="before-after-grid">
      <button class="before-after-option" data-id="${left.id}">
        <img src="${left.image || buildPlacard(left)}" data-placard="${buildPlacard(left)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" data-met-id="${left.metObjectId || ''}" alt="" />
        <div class="before-after-option__caption">${left.title}</div>
      </button>
      <button class="before-after-option" data-id="${right.id}">
        <img src="${right.image || buildPlacard(right)}" data-placard="${buildPlacard(right)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" data-met-id="${right.metObjectId || ''}" alt="" />
        <div class="before-after-option__caption">${right.title}</div>
      </button>
    </div>
    <div id="quiz-feedback"></div>
  `;
  body.querySelectorAll('.before-after-option').forEach(btn => {
    btn.addEventListener('click', () => {
      const guess = btn.dataset.id;
      const isCorrect = guess === earlier.id;
      // Reveal answers
      body.querySelectorAll('.before-after-option').forEach(b => {
        b.disabled = true;
        if (b.dataset.id === earlier.id) b.classList.add('is-correct');
        else if (b === btn) b.classList.add('is-incorrect');
      });
      if (isCorrect) {
        correctCount++;
        markMastered(earlier.id);
      } else {
        incorrectCount++;
      }
      const feedback = document.getElementById('quiz-feedback');
      feedback.className = 'lesson-feedback' + (isCorrect ? '' : ' is-incorrect');
      feedback.innerHTML = `
        <span class="lesson-feedback__label">${isCorrect ? 'Correct' : 'Other way around'}</span>
        <strong>${earlier.title}</strong> (${formatYear(earlier.year)}) came before <strong>${later.title}</strong> (${formatYear(later.year)}).
      `;
      renderContinueButton(footer, 'Continue');
    });
  });
}

// 6b. REGION QUIZ: image + 4 region names. "Where was this made?"

// No quiz; this is a Synthesis-tier card. The user reads, looks, and continues.
function renderComparisonCard(card, body, footer) {
  for (const aid of card.artworkIds || []) {
    markEncountered(aid);
  }
  const arts = (card.artworkIds || []).map(getArtwork).filter(Boolean);
  if (arts.length === 0) {
    body.innerHTML = `<p>No artworks for this comparison.</p>`;
    renderContinueButton(footer);
    return;
  }

  // Build comparison map if artworks have coordinates
  const mapPoints = arts
    .filter(a => a.lat != null && a.lng != null)
    .map(a => ({ lat: a.lat, lng: a.lng }));
  const mapHtml = mapPoints.length >= 2 ? buildComparisonMap(mapPoints) : '';

  const itemsHtml = arts.map(art => {
    const artist = art.artistId ? getArtist(art.artistId) : null;
    return `
      <div class="comparison-item">
        <img class="comparison-item__image" src="${art.image || buildPlacard(art)}" data-placard="${buildPlacard(art)}" onerror="if(this.dataset.placard&&this.src!==this.dataset.placard){this.src=this.dataset.placard}" data-met-id="${art.metObjectId || ''}" alt="${art.title}" />

/* ===== HELPERS ===== */

function bindQuizOptions({ artworkId, correctId, explanationFn, footer, isReview }) {
  const container = document.getElementById('quiz-options');
  container.querySelectorAll('.quiz-option').forEach(btn => {
    btn.addEventListener('click', () => {
      const guess = btn.dataset.id;
      const isCorrect = guess === correctId;

      container.querySelectorAll('.quiz-option').forEach(b => {
        if (b.dataset.id === correctId) b.classList.add('is-correct');
        else if (b === btn) b.classList.add('is-incorrect');
        else b.classList.add('is-disabled');
        b.disabled = true;
      });

      if (isCorrect) {
        correctCount++;
        markMastered(artworkId);
        if (isReview) recordReviewCorrect(artworkId);
        else scheduleReview(artworkId);
      } else {
        incorrectCount++;
        if (isReview) recordReviewMiss(artworkId);
      }
      const feedback = document.getElementById('quiz-feedback');
      feedback.className = 'lesson-feedback' + (isCorrect ? '' : ' is-incorrect');
      feedback.innerHTML = `
        <span class="lesson-feedback__label">${isCorrect ? 'Correct' : 'Not this time'}</span>
        ${explanationFn(guess)}
      `;
      renderContinueButton(footer, 'Continue');
    });
  });
}

function renderContinueButton(footer, label = 'Continue') {
  footer.innerHTML = `<button class="btn btn--primary btn--full btn--lg" id="continue-btn">${label}</button>`;
  document.getElementById('continue-btn').addEventListener('click', advance);
}



function shuffle(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function countNewArtworks() {
  // Count artworks referenced in this lesson
  const ids = new Set();
  for (const card of currentLesson.cards) {
    if (card.artworkId) ids.add(card.artworkId);
    if (card.earlierArtworkId) ids.add(card.earlierArtworkId);
    if (card.laterArtworkId) ids.add(card.laterArtworkId);
  }
  return ids.size;
}

function formatYear(year) {
  if (year < 0) return `${Math.abs(year)} BCE`;
  return year;
}

function pickCardOfTheDay() {
  const artworks = getAllArtworks();
  if (artworks.length === 0) return null;
  const today = new Date();
  const dayKey = today.getFullYear() * 1000 + dayOfYear(today);
  return artworks[dayKey % artworks.length];
}

function dayOfYear(d) {
  const start = new Date(d.getFullYear(), 0, 0);
  return Math.floor((d - start) / (1000 * 60 * 60 * 24));
}

function timeOfDayGreeting() {
  const h = new Date().getHours();
  if (h < 5) return 'evening';
  if (h < 12) return 'morning';
  if (h < 17) return 'afternoon';
  return 'evening';
}

function formatDate() {
  return new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric',
  });
}

function streakCaption(days) {
  if (days === 0) return 'Begin a streak today.';
  if (days < 3) return 'A quiet start.';
  if (days < 7) return 'Building momentum.';
  if (days < 30) return 'A real practice now.';
  return 'A serious accession.';
}

function formatYear(year) {
  if (!year && year !== 0) return '';
  if (year < 0) return `${Math.abs(year)} BCE`;
  return String(year);
}

      <!-- Content -->
      <div id="learn-content"></div>
    </div>
  `;

  // Wire toggle
  document.getElementById('mode-region').addEventListener('click', () => {
    learnMode = 'region'; renderLearn();
  });
  document.getElementById('mode-era').addEventListener('click', () => {
    learnMode = 'era'; renderLearn();
  });

  // Wire sampler card
  app.querySelectorAll('[data-lesson-id]').forEach(el => {
    el.addEventListener('click', () => window.__accessionNavigate && window.__accessionNavigate(el.dataset.lessonId));
  });

  const content = document.getElementById('learn-content');
  if (learnMode === 'region') renderByRegion(content);
  else renderByEra(content);
}

/* =========================================================
   BY REGION: populated regions → tap to see era breakdown
   ========================================================= */

function renderByRegion(container) {
  const regions = getRegions();
  const populated = regions.filter(r =>
    getAllArtworks().some(a => a.regionId === r.id)
  );

  container.innerHTML = populated.map(r => {
    const mastery = getRegionMastery(r.id);
    const pct = Math.round(mastery * 100);
    const rank = getCuratorRank(r.id);
    const furthest = getFurthestEraInRegion(r.id);
    return `
      <div class="movement-tile" data-region-id="${r.id}" style="cursor:pointer;">
        <div class="movement-tile__years">${RANK_NAMES[rank]}${furthest ? ' · through ' + furthest.name : ''}</div>
        <h2 class="movement-tile__name" style="color:${r.color||'var(--color-ink)'};">${r.name}</h2>
        <p class="movement-tile__blurb">${r.blurb}</p>
        <div class="movement-tile__footer">
          <div class="movement-tile__progress">
            <div class="movement-tile__progress-fill" style="width:${pct}%; background:${r.color||'var(--color-burgundy)'};"></div>
          </div>
          <div style="font-family:var(--font-sans);font-size:var(--type-caption);letter-spacing:0.06em;color:var(--color-sepia);">${pct}%</div>
        </div>
      </div>
    `;
  }).join('');

  container.querySelectorAll('[data-region-id]').forEach(el => {
    el.addEventListener('click', () => openRegionDetail(el.dataset.regionId));
  });
}

function openRegionDetail(regionId) {
  const app = document.getElementById('app');
  const region = getRegion(regionId);
  if (!region) return;
  const eras = getEras();

  const rows = eras.map(era => {
    const cm = getCellMastery(era.id, region.id);
    if (cm === null) return `
      <div style="padding: var(--space-3) 0; border-bottom: 1px solid var(--color-line);">
        <div class="eyebrow" style="margin-bottom:2px;">${era.name}</div>
        <p style="margin:0; font-size:var(--type-body-s); color:var(--color-sepia-light); font-style:italic;">No content yet.</p>
      </div>
    `;
    const pct = Math.round(cm * 100);
    const lessons = findLessonsForCell(era.id, region.id);
    return `
      <div style="padding: var(--space-4) 0; border-bottom: 1px solid var(--color-line);">
        <div style="display:flex; align-items:center; gap:var(--space-3); margin-bottom:var(--space-2);">
          <div style="flex:1;">
            <div class="eyebrow" style="margin-bottom:2px;">${era.name}</div>
            <div style="font-family:var(--font-sans);font-size:var(--type-body-s);color:var(--color-sepia);">${pct}% mastered</div>
          </div>
          <div style="width:80px;height:2px;background:var(--color-line);">
            <div style="height:100%;background:${region.color||'var(--color-burgundy)'};width:${pct}%;"></div>
          </div>
        </div>
        ${lessons.map(l => lessonCard(l)).join('')}
