g elite status", "Horses were sacred animals in Chinese Buddhism and were buried for religious reasons", "Central Asian horses were better military animals than Chinese breeds"], "correctIndex": 1, "explanation": "The Tang capital Chang'an had a population of perhaps a million, including large communities of Sogdian, Persian, Korean, Japanese, and Indian merchants. Central Asian 'blood-sweating' horses \u2014 taller and faster than Chinese breeds \u2014 were luxury goods traded along the Silk Road, so prized that emperors sent armies to obtain them. The Tang obsession with these horses in tomb art reflects cosmopolitan elite culture."}, "lat": 34.27, "lng": 108.95}, "met-temple-dendur": {"id": "met-temple-dendur", "title": "Temple of Dendur", "artistId": null, "year": -15, "decade": -10, "movementId": "egyptian-ancient", "museumId": "met", "medium": "Aeolian sandstone", "dimensions": "Approx. 25 m long", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/The%20Temple%20of%20Dendur%20MET%20DT563.jpg?width=1200", "imageCredit": "Public domain, The Metropolitan Museum of Art, Given to the United States by Egypt in 1965", "famousLevel": 5, "wallLabel": "A small Nubian temple built around 15 BCE by the Roman emperor Augustus, who was at the time the new pharaoh of Egypt. Given to the United States in 1965 in gratitude for American aid in saving Nubian monuments from the rising waters of the Aswan High Dam. Reassembled stone by stone inside a purpose-built glass-walled wing at the Met.", "longForm": "When Egypt built the Aswan High Dam in the 1960s, dozens of ancient monuments along the Nile faced submersion. UNESCO led an international effort to dismantle and relocate the most important sites; the United States contributed significantly. As a gesture of thanks, Egypt offered four temples to four different countries. Dendur came to the United States and after a competition between several cities was awarded to the Met, which built a vast glass-walled hall to house it overlooking Central Park. The temple was originally dedicated to Isis and to two deified brothers, sons of a local Nubian chieftain who had drowned in the Nile.", "tags": ["architecture", "egyptian", "nubian", "gift-of-egypt"], "details": [], "metObjectId": 547802, "imageSource": "wikimedia", "eraId": "ancient-worlds", "regionId": "middle-east-north-africa", "subRegionId": "egyptian", "comprehensionQuestion": {"question": "Why was the Temple of Dendur built by the Roman emperor Augustus rather than an Egyptian pharaoh?", "options": ["Egypt had no pharaohs left after Alexander the Great", "Rome had conquered Egypt in 30 BCE; Augustus built temples to Egyptian gods to legitimize his rule", "Augustus was raised in Egypt and converted to Egyptian religion", "The temple replaced an older one destroyed in a flood"], "correctIndex": 1, "explanation": "After Rome annexed Egypt in 30 BCE, Augustus and his successors ruled as pharaohs in Egyptian tradition. Building temples to Egyptian gods \u2014 and depicting himself making offerings to Isis \u2014 was a deliberate strategy for local legitimacy."}, "lat": 23.32, "lng": 32.87}, "met-teotihuacan-mask": {"id": "met-teotihuacan-mask", "title": "Stone Mask", "artistId": null, "year": 300, "decade": 300, "eraId": "ancient-worlds", "regionId": "americas", "subRegionId": "olmec", "museumId": "met", "medium": "Greenstone", "dimensions": "21 cm tall", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Mask%20Teotihuacan%20sculpture-70.1999.12.1-DSC00140-black.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "famousLevel": 3, "wallLabel": "A greenstone mask in the Teotihuacan style, made in central Mexico around 300 CE. Teotihuacan, the great Mesoamerican city north of present-day Mexico City, was at its peak the largest city in the Americas and one of the largest in the world. Its art conspicuously omits the named rulers and dynastic propaganda that dominate Maya and later Aztec sculpture.", "longForm": "Teotihuacan flourished from roughly 100 BCE to 550 CE and at its height was home to perhaps 125,000 people, making it one of the largest cities in the world. Its monuments \u2014 the Pyramid of the Sun, the Pyramid of the Moon, the Avenue of the Dead \u2014 are still visible. Stylistically Teotihuacan sculpture is austere, geometric, and surprisingly anonymous: no ruler portraits, no named individuals, no royal tombs. This has led some scholars to suggest it may have been governed by collective rule rather than a single dynasty \u2014 a hypothesis still actively debated.", "tags": ["teotihuacan", "mask", "greenstone", "classic-period"], "comprehensionQuestion": {"question": "What is distinctive about Teotihuacan compared to most other Mesoamerican civilizations?", "options": ["It had no monumental architecture", "Its art conspicuously lacks individual ruler portraits \u2014 no named kings, no dynastic propaganda, suggesting possible collective governance", "It was the only Mesoamerican city without a writing system", "Teotihuacan was founded by Maya migrants"], "correctIndex": 1, "explanation": "Most Mesoamerican civilizations produced abundant ruler-portrait propaganda. Teotihuacan's art is strikingly anonymous \u2014 no named rulers, no royal genealogies, no individual faces. Some scholars argue this reflects a form of collective governance. We still don't know what language its people spoke or what they called themselves."}, "lat": 19.69, "lng": -98.84}, "met-vermeer-water-pitcher": {"id": "met-vermeer-water-pitcher", "title": "Young Woman with a Water Pitcher", "artistId": "vermeer", "year": 1662, "decade": 1660, "movementId": "dutch-golden-age", "museumId": "met", "medium": "Oil on canvas", "dimensions": "45.7 x 40.6 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Johannes%20Vermeer%20%28Dutch%2C%20Delft%201632%E2%80%931675%20Delft%29%20-%20Young%20Woman%20with%20a%20Water%20Pitcher%20-%20Google%20Art%20Project.jpg?width=1200", "imageCredit": "Public domain, The Metropolitan Museum of Art, Marquand Collection, 1889", "famousLevel": 5, "wallLabel": "A woman in a starched white linen cap holds a brass pitcher in one hand and the casement window in the other. Cool morning light enters from the left and turns the white wall behind her into a quiet field of pearl-grey. The blue of her gown and the cobalt of the tablecloth are the only saturated notes in the room. Nothing is happening, and everything is happening.", "longForm": "This was the first Vermeer to enter an American collection, acquired in 1887 when Vermeer was still relatively obscure. The painting demonstrates Vermeer's mature interest in the geometry of interior space and the precise behavior of natural light. The woman's gesture is ambiguous \u2014 is she opening the window or steadying herself? \u2014 which is exactly the point. Vermeer rarely depicted a clearly readable narrative. Note the map on the back wall, a recurring Vermeer prop, and the gilt-edged Persian carpet draped over the table, an expensive imported object that signaled the household's prosperity.", "tags": ["interior", "woman-alone", "light-study", "vermeer-canon"], "details": [{"crop": "hand-on-window", "x": 0.3, "y": 0.35, "label": "The hand on the casement"}, {"crop": "pitcher", "x": 0.55, "y": 0.6, "label": "Brass pitcher catching the morning light"}], "metObjectId": 437881, "imageSource": "wikimedia", "eraId": "renaissances-empires", "regionId": "europe", "subRegionId": "dutch", "comprehensionQuestion": {"question": "Why is Vermeer's technique with light considered so distinctive in the history of painting?", "options": ["Vermeer used a camera obscura to project images onto canvas, making his work technically superior to competitors", "Vermeer's paintings achieve an almost photographic quality of diffuse natural light \u2014 the way light actually looks entering a room \u2014 through layered glazes and precise observation", "Vermeer was the first Dutch painter to use oil paints", "Vermeer's distinctive quality was his use of artificial candlelight rather than natural light"], "correctIndex": 1, "explanation": "Vermeer painted light as it actually behaves in a white-walled Dutch interior \u2014 soft, diffuse, falling from a specific direction, catching the texture of different surfaces differently. The pitcher's metal sheen, the linen cloth's matte surface, the woman's skin \u2014 each material responds to the same light in its own way. Whether he used a camera obscura remains debated; his observational precision is not."}, "lat": 52.01, "lng": 4.36}, "met-wu-zhen-bamboo": {"id": "met-wu-zhen-bamboo", "title": "Bamboo, Old Tree, and Rock", "artistId": "wu-zhen", "year": 1350, "decade": 1350, "eraId": "sacred-medieval", "regionId": "east-asia", "subRegionId": "china-medieval", "museumId": "met", "lat": 30.74, "lng": 120.74, "medium": "Hanging scroll; ink on silk", "dimensions": "121.5 x 58.6 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Wu%20Zhen%20-%20Bamboo%2C%20old%20tree%2C%20and%20rock%20-%202012.526.1%20-%20Metropolitan%20Museum%20of%20Art.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, The Metropolitan Museum of Art", "metObjectId": 39547, "famousLevel": 5, "wallLabel": "Wu Zhen (1280\u20131354) was one of the Four Great Masters of the Yuan dynasty, painting under Mongol occupation of China. His bamboo paintings are the most famous of his work \u2014 bamboo was the literati subject par excellence because it bends in the wind but does not break, standing for the scholar's integrity under pressure. The calligraphic inscription at top right is by Wu Zhen himself, connecting the act of painting to the act of writing.", "longForm": "The literati painting tradition begins with a simple claim: that painting done by a scholar-amateur for pleasure is superior to painting done by a professional artist for hire. This claim \u2014 first systematically articulated by Su Shi (1037\u20131101) and made doctrinally central by Zhao Mengfu (1254\u20131322) \u2014 transformed Chinese painting for six centuries. The logic: a professional painter observes the world and reproduces it; a scholar-painter embodies the world through the brush. The brushstroke is not a description but a self-revelation. The particular subject of bamboo was ideal for this program because painting bamboo was almost literally writing \u2014 each leaf was a single brushstroke, each joint was a measured interval, and the same brushes and inks were used for calligraphy and painting. Su Shi said: 'To paint bamboo, you must have the bamboo inside you first.' Wu Zhen, painting under Mongol occupation as a deliberately obscure scholar who refused court service, made bamboo not just an aesthetic subject but a political one: flexible under pressure, rooted in the ground, refusing to die.", "comprehensionQuestion": {"question": "Why was bamboo the signature subject of literati painting?", "options": ["Bamboo was technically easy to paint, making it accessible to scholar-amateurs who lacked professional training", "Painting bamboo was almost literally calligraphy \u2014 each leaf a single brushstroke \u2014 and bamboo itself symbolized the scholar's ideal: flexible but unbreakable, surviving hardship without changing its nature", "Bamboo grew in the Yangtze Delta where most literati lived, making it the most convenient subject", "A Tang dynasty emperor decreed bamboo to be the official subject of court painting, and the tradition continued into the Song and Yuan"], "correctIndex": 1, "explanation": "The connection between bamboo painting and calligraphy is literal: both use the same brushes, inks, and stroke types. Su Shi's dictum \u2014 'to paint bamboo, you must have the bamboo inside you first' \u2014 means the painting is a self-portrait, not a nature study. And bamboo's physical properties (bending without breaking, recovering after storms, surviving winter) mapped directly onto the literati ideal of integrity under political pressure."}}, "pergamon-abbasid-lusterware": {"id": "pergamon-abbasid-lusterware", "title": "Bowl with Pavonine Bird", "artistId": null, "year": 850, "decade": 850, "eraId": "sacred-medieval", "regionId": "middle-east-north-africa", "subRegionId": "islamic", "museumId": "pergamon-museum", "medium": "Earthenware with glaze and lustre painting", "dimensions": "approx. 24 cm diameter", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Bowl%20with%20pavonine%20bird%20Earthenware%20with%20glaze%20and%20lustre%20painting%20Iraq%209th%20century%208354.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Public domain, Museum f\u00fcr Islamische Kunst, Berlin (Pergamon Museum)", "famousLevel": 4, "wallLabel": "An Abbasid lusterware bowl from Iraq, 9th century CE \u2014 probably made in Basra or Samarra under the caliphate of al-Mu'tasim. The lustrous metallic sheen was achieved through a technically complex reduction firing. Lusterware was the most prestigious ceramic of the Islamic world, spreading from Abbasid Iraq to Fatimid Egypt to Spain over four centuries.", "longForm": "Lusterware is created by painting metallic compounds \u2014 copper, silver \u2014 onto already-fired glazed ceramics, then firing again in a reduction atmosphere (low oxygen). The result is a surface that gleams like polished metal without being metal. The technique was a closely guarded secret that migrated with craftsmen: invented in Abbasid Iraq, it passed to Fatimid Egypt, then to Syria and Persia, and finally to Hispano-Moresque Spain. Each migration produced distinctive regional styles. The peacock motif on this bowl \u2014 two birds flanking a plant \u2014 has roots in late antique paradise imagery and appears consistently across Islamic decorative arts from carpet to tile to metalwork.", "tags": ["abbasid", "lusterware", "basra", "reduction-firing"], "comprehensionQuestion": {"question": "What made lusterware technically revolutionary, and why did its secrets spread slowly?", "options": ["Lusterware was revolutionary because it used color-fired glazes, previously only done in China", "Lusterware required a second 'reduction firing' \u2014 low oxygen, precise temperature \u2014 to deposit metallic copper or silver ions on the glaze surface; the technique was a closely guarded workshop secret that spread only when craftsmen migrated", "The technique was discovered accidentally and could not be reliably reproduced for centuries", "Lusterware's innovation was the use of underglaze painting, not the metallic sheen"], "correctIndex": 1, "explanation": "Producing a metallic luster on a glazed ceramic surface requires painting metallic compounds on an already-fired glaze, then firing again in a reducing atmosphere (low oxygen, high carbon) at a precise temperature. Too hot or too cold and the luster fails. This second firing was technically demanding and the precise conditions were trade secrets. The technique spread from Abbasid Iraq to Fatimid Egypt to Persia to Hispano-Moresque Spain as craftsmen migrated with their knowledge."}, "lat": 33.34, "lng": 44.4}, "ravenna-justinian-mosaic": {"id": "ravenna-justinian-mosaic", "title": "Mosaic of Emperor Justinian and His Retinue", "artistId": null, "year": 547, "decade": 540, "eraId": "sacred-medieval", "regionId": "europe", "subRegionId": "greek-byzantine", "museumId": null, "medium": "Glass and gold tesserae (mosaic)", "dimensions": "approx. 265 cm wide", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Sanvitale03.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "Photo by Roger Culos, CC BY-SA 3.0 via Wikimedia Commons", "famousLevel": 5, "wallLabel": "The Byzantine emperor Justinian I stands at the center of his court in the apse of San Vitale in Ravenna, Italy, consecrated 547 CE. He carries a gold paten (the plate used in the Eucharist) and is flanked by clergy on his left and soldiers on his right. The Bishop Maximianus is identified by an inscription. Every figure floats against gold \u2014 there is no ground, no shadow, no space. They exist outside time.", "longForm": "San Vitale in Ravenna was built by a wealthy local merchant under Byzantine patronage, and its mosaics are the finest surviving examples of early Byzantine art. The Justinian mosaic is one of the most studied images in medieval art because of its explicit political theology: the emperor stands between the Church (clergy) and the State (soldiers), holding the eucharistic paten that makes him a participant in the sacred drama. His halo is the halo of a holy person, not merely a ruler. The gold ground, the flat space, the frontally posed figures \u2014 these are the visual conventions the Byzantine world developed to show that what you are looking at exists not in historical time but in sacred eternity.", "tags": ["byzantine", "mosaic", "ravenna", "justinian", "early-byzantine"], "comprehensionQuestion": {"question": "Why do the figures in the Justinian mosaic float against a flat gold ground with no setting, shadow, or depth?", "options": ["Byzantine artists lacked the technical skill to depict three-dimensional space", "The gold ground and flat space are deliberate theological choices \u2014 figures in sacred art exist in eternal, timeless space, not historical time", "The mosaic was unfinished when the church was consecrated; the background was to be added later", "Gold backgrounds were simply fashionable in 6th-century Ravenna as a sign of wealth"], "correctIndex": 1, "explanation": "The gold ground in Byzantine art is a theological statement: it signifies the eternal, uncreated divine light. Figures in sacred imagery do not inhabit earthly time and space \u2014 they exist in a perpetual present before God. Depicting shadows, receding floors, or atmospheric depth would make the image earthly, which would contradict its purpose."}, "lat": 44.42, "lng": 12.2}, "shang-oracle-bone": {"id": "shang-oracle-bone", "title": "Inscribed Oracle Bone", "artistId": null, "year": -1200, "decade": -1200, "eraId": "ancient-worlds", "regionId": "east-asia", "subRegionId": "china-ancient", "museumId": null, "lat": 36.1, "lng": 114.3, "medium": "Ox scapula or turtle plastron with incised inscription", "dimensions": "approx. 30 x 20 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/CMOC%20Treasures%20of%20Ancient%20China%20exhibit%20-%20oracle%20bone%20inscription.jpg?width=1200", "imageSource": "wikimedia", "imageCredit": "CC BY-SA via Wikimedia Commons", "famousLevel": 5, "wallLabel": "An oracle bone \u2014 an ox scapula or turtle plastron used by Shang dynasty diviners to communicate with royal ancestors. A question was incised in a proto-Chinese script, heat was applied until the bone cracked, and the diviner interpreted the cracks as the ancestor's answer. The inscriptions, discovered accidentally in Beijing in 1899 being sold as 'dragon bone' medicine, turned out to be the earliest surviving Chinese writing \u2014 and the first historical records of the Shang dynasty.", "longForm": "In 1899, Wang Yirong, a Chinese scholar and official, was being treated for malaria. His pharmacist had ground up 'dragon bones' as traditional medicine \u2014 the pharmacist's usual source of ancient, efficacious materials. Wang noticed the bones were covered in scratched marks that looked like writing. He bought every dragon bone in the pharmacy and began collecting more. Within a few years, scholars had traced the source to Anyang in Henan province \u2014 the ruins of Yin, the last Shang capital. The bones were oracle bones, used for pyromantic divination by Shang kings from roughly 1250 to 1050 BCE. Over 150,000 fragments have been recovered. They record questions about war, weather, harvests, illness, and royal decisions \u2014 the first Chinese historical archive. The script on these bones is the direct ancestor of modern Chinese characters, making this one of the most consequential archaeological discoveries in history.", "comprehensionQuestion": {"question": "How were oracle bones discovered in the modern era, and why does this discovery matter?", "options": ["A team of archaeologists excavated them during a planned dig at the Shang capital in 1899", "A Chinese scholar noticed strange markings on bones being ground up as traditional medicine \u2014 tracing them to Anyang and revealing the first historical records of the Shang dynasty", "Oracle bones were found by farmers who reported them to the government, which funded a major excavation", "Western archaeologists identified them during surveys of the Yellow River valley in the early 20th century"], "correctIndex": 1, "explanation": "Wang Yirong's accidental discovery in 1899 \u2014 recognizing writing on bones sold as medicine \u2014 is one of the great detective stories in archaeology. The bones had been coming from Anyang for years, ground up and consumed, before anyone realized they were inscribed with the earliest Chinese writing. The 150,000+ fragments that followed constitute the first archive of Chinese history."}}, "uffizi-cimabue-crucifix": {"id": "uffizi-cimabue-crucifix", "title": "Crucifix", "artistId": "cimabue", "year": 1287, "decade": 1280, "eraId": "sacred-medieval", "regionId": "europe", "subRegionId": "italian", "museumId": null, "medium": "Tempera and gold on wood", "dimensions": "336 x 267 cm", "image": "https://commons.wikimedia.org/wiki/Special:FilePath/Cimabue%2C%20crocifisso%20di%20santa%20croce.JPG?width=1200", "imageSource": "wikimedia", "imageCredit": "CC BY-SA via Wikimedia Commons, Basilica di Santa Croce, Florence", "famousLevel": 5, "wallLabel": "Cimabue's great Crucifix, painted for the church of Santa Croce in Florence around 1287. Christ's body curves in a gentle S-shape \u2014 a new naturalistic treatment of the crucifixion at odds with the rigid Byzantine Christ. This painting was catastrophically damaged by the 1966 Florence flood and was the most famous casualty of the disaster; it has been painstakingly restored but the damage is visible.", "longForm": "Giovanni Cimabue (c. 1240\u20131302) is the first named Italian painter whose personality emerges from historical documents \u2014 Dante mentions him in the Purgatorio as the greatest painter of his day, immediately before crediting his student Giotto with superseding him. Cimabue's significance is that he absorbed the Byzantine tradition \u2014 his training was in Constantinople's visual conventions \u2014 and began to soften it, introducing a new emotional expressiveness and some three-dimensionality. The Santa Croce Crucifix, with Christ's body gently curved as if truly heavy and pained, is his most ambitious work. In 1966, the Arno flooded Florence and inundated Santa Croce to a depth of several meters; the Cimabue Crucifix was submerged in water mixed with heating oil and its painted surface was largely destroyed. The restoration took decades.", "tags": ["florentine", "tempera", "crucifix", "proto-renaissance", "cimabue"], "comprehensionQuestion": {"question": "Why was the slight curve in Cimabue's crucified Christ a significant innovation compared to Byzantine crucifixes?", "options": ["The curved pose was borrowed from ancient Roman sculpture of dying athletes", "A body that curves under its own weight feels physically real \u2014 it suggested that Christ truly suffered in a human body, not as an abstract theological symbol", "The curve was necessary to fit the painted surface within the cross shape", "Byzantine artists were not allowed to depict suffering, so the rigid Byzantine Christ was an artistic constraint rather than a stylistic choice"], "correctIndex": 1, "explanation": "Earlier Byzantine-style crucifixes often showed Christ with rigid, symmetrical posture \u2014 a divine being who transcended physical suffering. Cimabue's slight curve, the way the torso bends under the body's weight, insists on the physical reality of the Crucifixion: this body is heavy, this death is real. That insistence on physical reality was exactly what Giotto and the Renaissance would amplify."}, "lat": 43.77, "lng": 11.26}}, "lessons": {"american-modernism-01": {"id": "american-modernism-01", "movementId": "american-modernism", "title": "An American Subject", "subtitle": "Hopper, O'Keeffe, and the shape of the 20th-century United States", "estimatedMinutes": 5, "cards": [{"type": "context", "title": "After Europe", "body": "By 1900, ambitious American painters had spent a century looking to Europe for instruction. They studied in Paris, copied Old Masters in Florence, painted Roman ruins. The shift came slowly between the wars: a small group of New York painters and the photographer Alfred Stieglitz's circle began making work whose subjects were specifically American \u2014 the gridded city, the sparse Western desert, the small town at midnight. After World War II, with Europe in ruins and many of its leading artists in exile in New York, the United States briefly became the world's art capital. Abstract Expressionism \u2014 Pollock, Rothko, de Kooning \u2014 was the result. But the earlier figurative work of Hopper and O'Keeffe is in some ways more revealing about what the country looked like and felt like in the first half of the century."}, {"type": "wall-label", "artworkId": "met-hopper-tables"}, {"type": "quiz-artist", "artworkId": "met-hopper-tables", "correctArtistId": "hopper", "distractorArtistIds": ["okeeffe", "monet", "degas"]}, {"type": "wall-label", "artworkId": "met-okeeffe-cow-skull"}, {"type": "quiz-movement", "artworkId": "met-okeeffe-cow-skull", "correctMovementId": "american-modernism", "distractorMovementIds": ["impressionism", "dutch-golden-age", "italian-renaissance"]}, {"type": "quiz-date", "artworkId": "met-okeeffe-cow-skull", "correctYear": 1931, "rangeStart": 1850, "rangeEnd": 2000}, {"type": "reward"}]}, "ancient-worlds-first-writing": {"id": "ancient-worlds-first-writing", "eraId": "ancient-worlds", "title": "The Invention of Writing", "subtitle": "How three civilizations discovered they could make marks that meant words", "estimatedMinutes": 6, "cards": [{"type": "context", "title": "The Most Important Invention Nobody Talks About", "body": "Writing was invented independently at least three times in human history: in Mesopotamia around 3300 BCE, in China around 1300 BCE, and in Mesoamerica by 600 BCE. (Egyptian hieroglyphs, ca. 3200 BCE, are sometimes considered a fourth, though the relationship to Sumerian cuneiform is debated.) Once invented, writing transformed art. Suddenly inscriptions on objects could tell us exactly what they were, who made them, what they were for. In each of the three independent cases, the first uses of writing were not for poetry or literature \u2014 they were for accounting, divination, and royal propaganda. Stories came later."}, {"type": "wall-label", "artworkId": "met-standard-of-ur"}, {"type": "quiz-region", "artworkId": "met-standard-of-ur", "correctRegionId": "middle-east-north-africa", "distractorRegionIds": ["east-asia", "south-asia", "mesoamerica"]}, {"type": "wall-label", "artworkId": "met-shang-bronze-vessel"}, {"type": "wall-label", "artworkId": "met-indus-seal"}, {"type": "comparison", "title": "Three writing systems, three fates", "artworkIds": ["met-standard-of-ur", "met-shang-bronze-vessel", "met-indus-seal"], "body": "Three artifacts, three writing systems, three radically different outcomes. Sumerian cuneiform, on the Standard of Ur, was used for over three thousand years across multiple Mesopotamian empires and was deciphered in the 19th century. Shang Chinese oracle bone script on bronzes like this evolved into the modern Chinese writing system \u2014 one of the longest continuous literary traditions on Earth. The Indus Valley script on this small seal has never been deciphered; we cannot read its texts and we don't know what language they record. Three civilizations invented writing within roughly two thousand years of each other; one tradition lived, one ended and was reborn, one fell silent."}, {"type": "quiz-before-after", "earlierArtworkId": "met-standard-of-ur", "laterArtworkId": "met-shang-bronze-vessel"}, {"type": "reward"}]}, "ancient-worlds-sampler": {"id": "ancient-worlds-sampler", "eraId": "ancient-worlds", "isSampler": true, "title": "The First Cities", "subtitle": "What humans were making, at the same moment, in different parts of the world", "estimatedMinutes": 7, "cards": [{"type": "context", "title": "A Synchronous World", "body": "Around 1300 BCE, the pharaoh Hatshepsut had been dead for two centuries. The Olmec were carving basalt heads in the river valleys of present-day Veracruz. The Shang dynasty in China was inscribing oracle bones with the first Chinese writing. The first temples on the Acropolis of Athens had not yet been built. These civilizations did not know about each other. They were inventing what art could do, independently and simultaneously. This lesson is a sampler \u2014 one work from a few different places, all in the era we call 'Ancient Worlds.' Notice what they share and what they don't."}, {"type": "wall-label", "artworkId": "met-hatshepsut-kneeling"}, {"type": "quiz-region", "artworkId": "met-hatshepsut-kneeling", "correctRegionId": "middle-east-north-africa", "distractorRegionIds": ["east-asia", "mesoamerica", "europe"]}, {"type": "wall-label", "artworkId": "met-olmec-head"}, {"type": "quiz-region", "artworkId": "met-olmec-head", "correctRegionId": "mesoamerica", "distractorRegionIds": ["middle-east-north-africa", "sub-saharan-africa", "south-asia"]}, {"type": "wall-label", "artworkId": "met-han-tomb-figures"}, {"type": "comparison", "title": "Three civilizations, three answers to the same question", "artworkIds": ["met-hatshepsut-kneeling", "met-olmec-head", "met-han-tomb-figures"], "body": "All three works relate to death and rulership, but the answers diverge sharply. Hatshepsut was a living ruler depicted in eternal offering \u2014 the statue housed her ka, her spiritual double, and was ritually fed and woken each morning. The Olmec heads were portraits of specific rulers, defaced and buried after each ruler's death \u2014 meant to die with their subjects. The Han tomb figures were cheap proxies, symbolic substitutes for the live attendants who had been buried in earlier Chinese rulers' tombs. Same general subject, profoundly different cultural answers."}, {"type": "quiz-before-after", "earlierArtworkId": "met-olmec-head", "laterArtworkId": "met-han-tomb-figures"}, {"type": "reward"}]}, "byzantine-sacred-medieval-01": {"id": "byzantine-sacred-medieval-01", "eraId": "sacred-medieval", "regionId": "europe", "subRegionId": "greek-byzantine", "title": "The Sacred Face", "subtitle": "From Ravenna to Hagia Sophia \u2014 how Byzantine art made the divine visible", "estimatedMinutes": 6, "cards": [{"type": "context", "title": "A Theology Written in Gold", "body": "Byzantine art is not primitive art. It is art with a theological program. The flat faces, the gold backgrounds, the absence of shadow, the forward-facing hieratic poses \u2014 these are not failures to achieve naturalism. They are statements about the nature of the divine. An icon is not a picture of a saint; it is a window onto eternal reality, and naturalism would make it merely earthly. The two works in this lesson \u2014 made three centuries and a thousand miles apart \u2014 both work from the same premises and produce a visual tradition that shaped the entire history of European painting."}, {"type": "wall-label", "artworkId": "ravenna-justinian-mosaic"}, {"type": "quiz-date", "artworkId": "ravenna-justinian-mosaic", "correctYear": 547, "rangeStart": 300, "rangeEnd": 1400}, {"type": "wall-label", "artworkId": "hagia-sophia-deesis"}, {"type": "comparison", "title": "Early and Late Byzantine: the same tradition, seven centuries apart", "artworkIds": ["ravenna-justinian-mosaic", "hagia-sophia-deesis"], "body": "The Justinian mosaic (547 CE) and the Hagia Sophia De\u00ebsis (c. 1261) are both Byzantine mosaics, both gold-ground, both frontal. But look closely at the faces. Justinian's courtiers are identical types \u2014 the same oval head, the same large eyes, no individual psychology. The De\u00ebsis Christ has a specific face: a slight turn, shadowed eyes, a gaze of complex authority and something like mercy. The seven centuries between them were not stagnant. In the final phase of Byzantine art \u2014 the Palaeologan Renaissance \u2014 painters and mosaicists moved toward the emotional naturalism that was also beginning in Siena and Florence. The De\u00ebsis is sometimes called the first Renaissance image."}, {"type": "wall-label", "artworkId": "met-byzantine-icon"}, {"type": "quiz-region", "artworkId": "met-byzantine-icon", "correctRegionId": "europe", "distractorRegionIds": ["middle-east-north-africa", "east-asia", "south-asia"]}, {"type": "reward"}]}, "china-across-eras-comparison": {"id": "china-across-eras-comparison", "eraId": "sacred-medieval", "regionId": "east-asia", "title": "One Civilization, 2,500 Years", "subtitle": "Oracle bone \u2192 Fang Ding \u2192 Tang horse \u2192 Wu Zhen bamboo: what stays, what changes", "estimatedMinutes": 9, "cards": [{"type": "context", "title": "Continuity and Rupture", "body": "No ancient civilization maintained an unbroken material and literary tradition as long as China. The same writing system that appears on the oracle bones of 1200 BCE is still legible \u2014 with effort \u2014 to a modern Chinese reader. The bronze ding vessel shape reappears in Song dynasty ceramic incense burners and in the design of the Shanghai Museum. The literati painter's brush is the same brush used to write the oracle inscriptions. But within this extraordinary continuity, the aesthetic priorities shifted beyond recognition. The Shang king asked the oracle bone: 'Will the ancestor protect us?' Wu Zhen asked his bamboo: 'Am I still free?' Four objects from the same civilization, answering entirely different questions."}, {"type": "wall-label", "artworkId": "shang-oracle-bone"}, {"type": "wall-label", "artworkId": "china-si-mu-wu-fang-ding"}, {"type": "wall-label", "artworkId": "met-tang-horse"}, {"type": "wall-label", "artworkId": "met-wu-zhen-bamboo"}, {"type": "comparison", "title": "The full arc: 2,500 years of a single civilization", "artworkIds": ["shang-oracle-bone", "china-si-mu-wu-fang-ding", "met-tang-horse", "met-wu-zhen-bamboo"], "body": "Oracle bone (1200 BCE): writing as ritual instrument, the king's direct line to his dead ancestors. Fang ding (1200 BCE): bronze as political monument, the weight of state power made visible. Tang horse (700 CE): burial art as celebration of worldly abundance, the good life preserved for the afterlife. Wu Zhen bamboo (1350 CE): ink painting as inner life made visible, the scholar's self-portrait under occupation. What runs through all four: an intense relationship between the object and the invisible \u2014 ancestors, cosmic order, the afterlife, the scholar's integrity. Chinese art is rarely just about what you can see."}, {"type": "quiz-before-after", "earlierArtworkId": "china-si-mu-wu-fang-ding", "laterArtworkId": "met-tang-horse"}, {"type": "reward"}]}, "chinese-ancient-01": {"id": "chinese-ancient-01", "eraId": "ancient-worlds", "regionId": "east-asia", "subRegionId": "china-ancient", "title": "Bronze, Jade, and Bone", "subtitle": "Three materials \u2014 three theories of power in ancient China", "estimatedMinutes": 7, "cards": [{"type": "context", "title": "The First Historical Civilization of China", "body": "The Shang dynasty (c. 1600\u20131050 BCE) is the first Chinese dynasty with confirmed historical records. Those records survive in two forms: oracle bone inscriptions \u2014 questions addressed to royal ancestors, incised on bone and turtle shell \u2014 and bronze vessels, cast at a scale that required the concentrated resources of a royal state. Together they define an ancient world organized around two obsessions: communication with the dead, and ritual performance that confirmed the living king's legitimacy. Jade, worked by hand into discs and blades and burial suits, was the third material thread \u2014 connecting the human body to the cosmic order."}, {"type": "wall-label", "artworkId": "shang-oracle-bone"}, {"type": "wall-label", "artworkId": "china-si-mu-wu-fang-ding"}, {"type": "comparison", "title": "Oracle bone and bronze vessel: same ritual world, different media", "artworkIds": ["shang-oracle-bone", "china-si-mu-wu-fang-ding"], "body": "Both objects served the Shang dynasty's central preoccupation: maintaining the relationship between the living king and the royal ancestors who governed events from beyond death. Oracle bones recorded the questions \u2014 'Will this military campaign succeed?' 'Will the harvest be good?' \u2014 and the cracks in the heated bone were the ancestor's answer. Bronze vessels held the food and wine offerings that fed those ancestors in their spirit world. One system was textual, the other material; both were means of keeping the ancestors on the living king's side."}, {"type": "wall-label", "artworkId": "china-jade-bi-disc"}, {"type": "quiz-region", "artworkId": "china-jade-bi-disc", "correctRegionId": "east-asia", "distractorRegionIds": ["south-asia", "middle-east-north-africa", "europe"]}, {"type": "quiz-before-after", "earlierArtworkId": "met-shang-bronze-vessel", "laterArtworkId": "china-jade-bi-disc"}, {"type": "reward"}]}, "chinese-sacred-medieval-01": {"id": "chinese-sacred-medieval-01", "eraId": "sacred-medieval", "regionId": "east-asia", "subRegionId": "china-medieval", "title": "The Three Phases of Chinese Aesthetic Thought", "subtitle": "Tang horse, Song landscape, Yuan bamboo \u2014 one civilization, three answers", "estimatedMinutes": 7, "cards": [{"type": "context", "title": "The Long Arc", "body": "Chinese art between 600 and 1400 CE passes through three completely distinct aesthetic phases \u2014 not as accident, but as deliberate responses to the world each era inhabited. The Tang dynasty (618\u2013907) was cosmopolitan, confident, and materially extravagant: its art says 'the world is rich and we command it.' The Song dynasty (960\u20131279) was inward, philosophical, and haunted by loss: its art says 'the world is vast and we are small in it.' The Yuan dynasty (1271\u20131368) was a foreign occupation that turned scholar-artists into deliberate obscurantists: its art says 'the only freedom left is the brush.' All three phases flow from the same tradition. None of them look alike."}, {"type": "wall-label", "artworkId": "met-tang-horse"}, {"type": "wall-label", "artworkId": "met-song-landscape"}, {"type": "comparison", "title": "Tang horse and Song landscape: the same civilization, 350 years apart", "artworkIds": ["met-tang-horse", "met-song-landscape"], "body": "The Tang horse is solid, three-dimensional, physically convincing \u2014 a possession of a person who valued the world's abundance. It was buried to accompany an aristocrat into the afterlife, in a tomb stocked with everything the dead person would need to continue living well. The Song landscape is ink on silk \u2014 minimal, fog-filled, the mountains barely there. It was made to be looked at by a scholar, to induce a mental state of withdrawal from worldly concern. One celebrates the body and the world; the other tries to dissolve both. What changed? The Tang's cosmopolitan confidence gave way to Song philosophy: neo-Confucian scholars who found the exterior world a distraction from the cultivation of the inner one."}, {"type": "wall-label", "artworkId": "met-wu-zhen-bamboo"}, {"type": "quiz-date", "artworkId": "met-wu-zhen-bamboo", "correctYear": 1350, "rangeStart": 600, "rangeEnd": 1700}, {"type": "quiz-region", "artworkId": "met-wu-zhen-bamboo", "correctRegionId": "east-asia", "distractorRegionIds": ["south-asia", "europe", "middle-east-north-africa"]}, {"type": "reward"}]}, "dutch-golden-age-01": {"id": "dutch-golden-age-01", "movementId": "dutch-golden-age", "title": "Quiet Rooms, Pearl Light", "subtitle": "An introduction to Vermeer and the Dutch interior", "estimatedMinutes": 4, "cards": [{"type": "context", "title": "A Republic of Painters", "body": "In 1648, the Dutch officially won their long war of independence from Spain. They were Protestant, mercantile, and newly rich, with no king and no powerful Catholic church to commission grand religious art. So Dutch painters did something unprecedented: they painted for the open market. Middle-class families bought small pictures to hang in their homes \u2014 portraits, landscapes, still lifes, and quiet domestic interiors. Some estimates suggest five million paintings were produced in the 17th-century Netherlands. Most were not great. A handful were among the greatest in Western art."}, {"type": "wall-label", "artworkId": "met-vermeer-water-pitcher"}, {"type": "quiz-movement", "artworkId": "met-vermeer-water-pitcher", "correctMovementId": "dutch-golden-age", "distractorMovementIds": ["italian-renaissance", "impressionism", "american-modernism"]}, {"type": "wall-label", "artworkId": "met-rembrandt-self-portrait"}, {"type": "quiz-artist", "artworkId": "met-rembrandt-self-portrait", "correctArtistId": "rembrandt", "distractorArtistIds": ["vermeer", "hopper", "botticelli"]}, {"type": "quiz-date", "artworkId": "met-vermeer-water-pitcher", "correctYear": 1662, "rangeStart": 1500, "rangeEnd": 1900}, {"type": "reward"}]}, "egyptian-ancient-01": {"id": "egyptian-ancient-01", "movementId": "egyptian-ancient", "title": "Made for Eternity", "subtitle": "Egyptian art as a tool, not a picture", "estimatedMinutes": 5, "cards": [{"type": "context", "title": "Art With a Job to Do", "body": "Almost all the Egyptian art in the Met was made to function in ways we do not function anymore. Statues housed the soul of a king and were spoken to, fed offerings, and ritually awakened each morning. Temple reliefs of Augustus making sacrifices to Isis were not decoration but a contractual ledger between Rome and the gods of Egypt. The convention of showing figures with feet and torso in profile but eyes facing forward was not a failure of skill but a deliberate choice \u2014 the goal was to render every part of the body in its most recognizable, complete form, so that the depicted person would arrive in the afterlife intact. Egyptian art prized permanence over expression, which is part of why it looks so consistent over three thousand years."}, {"type": "wall-label", "artworkId": "met-hatshepsut-kneeling"}, {"type": "quiz-movement", "artworkId": "met-hatshepsut-kneeling", "correctMovementId": "egyptian-ancient", "distractorMovementIds": ["italian-renaissance", "northern-renaissance", "american-modernism"]}, {"type": "wall-label", "artworkId": "met-temple-dendur"}, {"type": "quiz-date", "artworkId": "met-temple-dendur", "correctYear": -15, "rangeStart": -2000, "rangeEnd": 500}, {"type": "quiz-before-after", "earlierArtworkId": "met-hatshepsut-kneeling", "laterArtworkId": "met-temple-dendur"}, {"type": "reward"}]}, "greek-ancient-01": {"id": "greek-ancient-01", "eraId": "ancient-worlds", "regionId": "europe", "subRegionId": "greek-byzantine", "title": "The Greek Human Figure", "subtitle": "How Greek artists spent three centuries learning to show a body that feels real", "estimatedMinutes": 6, "cards": [{"type": "context", "title": "From Egypt to Eleusis", "body": "When Greek sculptors first began making monumental stone figures around 600 BCE, they borrowed the pose directly from Egypt: left foot forward, arms at sides, head front-facing. They called these figures kouroi \u2014 young men. Over the next two centuries, they gradually loosened the pose, discovered the contrapposto weight-shift, learned to render fabric, muscle, and hair with increasing conviction. By 450 BCE they had achieved something unprecedented: sculpture that looked like it could take a breath. This three-century project is one of the clearest narratives of artistic development in history."}, {"type": "wall-label", "artworkId": "met-kouros"}, {"type": "wall-label", "artworkId": "met-greek-grave-stele"}, {"type": "comparison", "title": "200 years between these two objects", "artworkIds": ["met-kouros", "met-greek-grave-stele"], "body": "The Kouros (ca. 590 BCE) and the Grave Stele of a Young Woman (ca. 395 BCE) are separated by about two centuries and represent the full arc of Archaic to Classical. The kouros is rigid, symmetrical, schematic \u2014 derived from Egyptian conventions with only small Greek modifications. The grave stele figure leans, has weight on one hip, wears clothes with specific folds, and has an expression that reads as tired and sad. The same civilization, two hundred years apart, and the difference is almost the distance between a hieroglyph and a photograph."}, {"type": "quiz-before-after", "earlierArtworkId": "met-kouros", "laterArtworkId": "met-greek-grave-stele"}, {"type": "wall-label", "artworkId": "met-red-figure-kylix"}, {"type": "quiz-region", "artworkId": "met-red-figure-kylix", "correctRegionId": "europe", "distractorRegionIds": ["east-asia", "middle-east-north-africa", "south-asia"]}, {"type": "reward"}]}, "greek-to-byzantine-comparison": {"id": "greek-to-byzantine-comparison", "eraId": "sacred-medieval", "regionId": "europe", "title": "The Same Face, A Thousand Years", "subtitle": "From the Greek kouros to the Byzantine icon \u2014 one continuous question about the human face", "estimatedMinutes": 8, "cards": [{"type": "context", "title": "One Question, Three Answers", "body": "From roughly 600 BCE to 1300 CE \u2014 nearly two thousand years \u2014 artists in the eastern Mediterranean kept returning to the same question: what does the human face mean in art? The Greek answer was: it means the individual, the specific person, in this moment, with this body. The Roman answer was: it means the person's history, their authority, their moral character. The Byzantine answer was: the face in sacred art should mean not a person but a presence \u2014 the divine made approachable through a human form that transcends human individuality. Looking at these three answers together shows a fundamental disagreement about what art is for."}, {"type": "wall-label", "artworkId": "met-greek-grave-stele"}, {"type": "wall-label", "artworkId": "met-roman-portrait"}, {"type": "wall-label", "artworkId": "hagia-sophia-deesis"}, {"type": "comparison", "title": "Greek, Roman, Byzantine: three theories of the face", "artworkIds": ["met-greek-grave-stele", "met-roman-portrait", "hagia-sophia-deesis"], "body": "The Greek grave stele shows a young woman who leans and looks elsewhere \u2014 she has mood, weight, psychology, a specific moment of exhaustion and grief. The Roman verist portrait shows not a beautiful person but an authority: every wrinkle earns the face its power, the asymmetries insist this is a real individual with a history. The Byzantine De\u00ebsis Christ looks directly at you with enormous eyes and a complex, non-individual gaze \u2014 this face is not recording a person but manifesting a presence. All three are images of faces. All three have completely different theories of what a face is for."}, {"type": "quiz-before-after", "earlierArtworkId": "met-roman-portrait", "laterArtworkId": "hagia-sophia-deesis"}, {"type": "wall-label", "artworkId": "met-duccio-madonna"}, {"type": "context", "title": "And then Duccio", "body": "Duccio's Madonna and Child (ca. 1300) is the moment when the Byzantine face and the Greek face begin to merge again. The gold ground is Byzantine; the emotional specificity \u2014 the way Mary looks away from the Christ Child with foreknowledge of his death, the way the Child's hand reaches up to brush her veil \u2014 is the beginning of something new. Duccio is looking at the Byzantine tradition and asking: what if the face could be both eternal and specific? What if you could have the sacred presence of an icon and the human psychology of a Greek portrait? The Italian Renaissance is his answer."}, {"type": "reward"}]}, "impressionism-01": {"id": "impressionism-01", "movementId": "impressionism", "title": "The Light Keeps Changing", "subtitle": "Monet, Degas, and the painting of the present moment", "estimatedMinutes": 4, "cards": [{"type": "context", "title": "The Salon des Refus\u00e9s", "body": "In 1863, the official Paris Salon rejected so many paintings that Napoleon III created a parallel exhibition for the rejected works. It was called the Salon des Refus\u00e9s \u2014 the Salon of the Refused. A decade later, a group of these refused painters organized their own exhibition. A critic, reviewing Monet's loose harbor scene Impression, Sunrise, mocked the entire group as mere 'impressionists.' Within a generation, the name had become an honorific, and Impressionism was the most popular movement in Western art."}, {"type": "wall-label", "artworkId": "met-monet-bridge"}, {"type": "quiz-artist", "artworkId": "met-monet-bridge", "correctArtistId": "monet", "distractorArtistIds": ["degas", "vermeer", "okeeffe"]}, {"type": "wall-label", "artworkId": "met-degas-rehearsal"}, {"type": "quiz-movement", "artworkId": "met-degas-rehearsal", "correctMovementId": "impressionism", "distractorMovementIds": ["dutch-golden-age", "italian-renaissance", "american-modernism"]}, {"type": "quiz-before-after", "earlierArtworkId": "met-vermeer-water-pitcher", "laterArtworkId": "met-monet-bridge"}, {"type": "reward"}]}, "islamic-sacred-medieval-01": {"id": "islamic-sacred-medieval-01", "eraId": "sacred-medieval", "regionId": "middle-east-north-africa", "subRegionId": "islamic", "title": "The Architecture of Paradise", "subtitle": "How Islamic civilization made the invisible visible \u2014 without depicting it", "estimatedMinutes": 6, "cards": [{"type": "context", "title": "A Different Visual Theology", "body": "Islam emerged in the 7th century CE , "estimatedMinutes": 6, "cards": [{"type": "context", "title": "Between Two Rivers", "body": "Mesopotamia means 'land between the rivers' \u2014 the Tigris and Euphrates, whose annual floods deposited the fertile silt that made southern Iraq, in the 4th millennium BCE, one of the few places on Earth where the food surplus for urban civilization was possible. The Sumerians built the first cities: Uruk, Ur, Nippur, Lagash. They invented writing \u2014 initially to keep grain accounts. They built ziggurats, developed legal codes, and created the first sustained tradition of large-scale sculpture. Every subsequent Mesopotamian civilization \u2014 Akkadian, Babylonian, Assyrian \u2014 inherited and transformed their cultural forms over three thousand years."}, {"type": "wall-label", "artworkId": "british-ram-thicket"}, {"type": "quiz-region", "artworkId": "british-ram-thicket", "correctRegionId": "middle-east-north-africa", "distractorRegionIds": ["east-asia", "mesoamerica", "south-asia"]}, {"type": "wall-label", "artworkId": "met-standard-of-ur"}, {"type": "wall-label", "artworkId": "louvre-naram-sin-stele"}, {"type": "comparison", "title": "Power in three objects from the same city", "artworkIds": ["british-ram-thicket", "met-standard-of-ur", "louvre-naram-sin-stele"], "body": "The Ram in a Thicket, the Standard of Ur, and the Victory Stele of Naram-Sin all speak to power \u2014 but differently. The Ram makes wealth visible: gold, lapis lazuli, and shell brought from hundreds of miles away, assembled into an object so extraordinary it could only belong to a king. The Standard narrates social order: war and peace in horizontal registers, with size indicating hierarchy. The Stele performs divinity: a century after Sumer, the Akkadian king is depicted as a god-king ascending into the heavens, towering over enemies and soldiers alike. Each object is a different answer to the same question: what does supreme power look like?"}, {"type": "quiz-before-after", "earlierArtwork yorai, the medicine Buddha, who you can approach physically, walk around, gaze at. Same period, three civilizations, three propositions about what counts as a sacred encounter."}, {"type": "quiz-region", "artworkId": "met-islamic-ceramic", "correctRegionId": "middle-east-north-africa", "distractorRegionIds": ["europe", "east-asia", "mesoamerica"]}, {"type": "reward"}]}, "sacred-medieval-sampler": {"id": "sacred-medieval-sampler", "eraId": "sacred-medieval", "isSampler": true, "title": "The Sacred Made Visible", "subtitle": "Three civilizations, three answers to the question of how to depict the divine", "estimatedMinutes": 8, "cards": [{"type": "context", "title": "After the Empires", "body": "Around 500 CE, the Western Roman Empire collapsed. Around 600 CE, Islam was born. Around 700 CE, the Tang dynasty reached its height. Around 800 CE, Borobudur was built in Java and Charlemagne was crowned in Aachen. The nine centuries we call 'Sacred & Medieval Worlds' are not a dark age \u2014 they are a period when religious traditions across Eurasia produced some of the most distinctive visual cultures in history. What unites them, across enormous geographic and theological distances, is a shared impulse: to find visual forms for the invisible, the divine, the transcendent. What divides them is how. This sampler shows three answers."}, {"type": "wall-label", "artworkId": "met-byzantine-icon"}, {"type": "quiz-region", "artworkId": "met-byzantine-icon", "correctRegionId": "europe", "distractorRegionIds": ["middle-east-north-africa", "east-asia", "south-asia"]}, {"type": "wall-label", "artworkId": "met-quran-folio"}, {"type": "wall-label", "artworkId": "met-borobudur-photo"}, {"type": "comparison", "title": "Three theologies of the image", "artworkIds": ["met-byzantine-icon", "met-quran-folio", "met-borobudur-photo"], "body": "The Byzantine icon depicts the Virgin and Christ Child with deliberate non-naturalism: the gold background, the flat space, the hieratic frontality all <script>(function(){

/* ===== js/core/state.js ===== */

/* ============================================================
   ACCESSION - STATE MANAGEMENT
   The single source of truth for user data.
   Persists to localStorage on every change.

   VERSIONING & MIGRATIONS
   -----------------------
   Saved state carries a `schemaVersion` field. The migrations
   below run in sequence to bring an older save up to current.
   When you change the state shape in an incompatible way:
     1. Bump CURRENT_SCHEMA_VERSION
     2. Add a migration function to MIGRATIONS keyed by the old
        version it accepts
     3. Test by hand-editing a localStorage payload to the old
        version and reloading
   The merge with DEFAULT_STATE handles additive changes (new
   fields) automatically — only write a migration when you need
   to restructure or backfill existing data.
   ============================================================ */

const STORAGE_KEY = 'accession:userState:v1';
const CURRENT_SCHEMA_VERSION = 3;

// Migration functions: each takes a state and returns the next-version state.
// Keyed by the version it accepts. Run in sequence until current.
const MIGRATIONS = {
  // v2 -> v3: add SRS (spaced repetition) fields.
  // Existing artworkState entries get default SRS values.
  2: function(s) {
    // Add session counter
    if (!s.sessionCount) s.sessionCount = 0;
    // Add review queue if missing
    if (!s.reviewQueue) s.reviewQueue = {};
    // Backfill: any artwork the user has encountered gets an initial SRS entry
    for (const artId in (s.artworkState || {})) {
      const as = s.artworkState[artId];
      if (as.encountered && !s.reviewQueue[artId]) {
        s.reviewQueue[artId] = {
          // Due in 3 sessions (they've already seen it)
          dueAtSession: (s.sessionCount || 0) + 3,
          intervalIndex: 1,   // index into SRS_INTERVALS
          consecutiveMisses: 0,
          quizTier: 'recognition',
          wallLabelDue: (s.sessionCount || 0) + 5,
        };
      }
    }
    s.schemaVersion = 3;
    return s;
  },
  // v1 didn't have cellCompletions; v2 derives them so Z-axis "new content
  // added" detection works for users who completed lessons before we added
  // the cellCompletions tracking.
  1: function(s) {
    if (!s.cellCompletions) s.cellCompletions = {};
    // Map legacy movement IDs to their era:region cells so older
    // completions register as "you've already seen this cell."
    const legacyMap = {
      'egyptian-ancient':      'ancient-worlds:middle-east-north-africa',
      'italian-renaissance':   'renaissances-empires:europe',
      'northern-renaissance':  'renaissances-empires:europe',
      'dutch-golden-age':      'renaissances-empires:europe',
      'impressionism':         'revolution-industry:europe',
      'american-modernism':    'modernism:americas',
    };
    for (const movId in (s.movementProgress || {})) {
      const cellKey = legacyMap[movId];
      if (cellKey && (s.movementProgress[movId].lessonsCompleted || []).length > 0) {
        // Use the current time as a placeholder completion time
        if (!s.cellCompletions[cellKey]) {
          s.cellCompletions[cellKey] = new Date().toISOString();
        }
      }
    }
    s.schemaVersion = 2;
    return s;
  },
};

// Default state shape. Every property must exist here so that
// upgrades from older versions are predictable.
const DEFAULT_STATE = {
  // Schema version — incremented when state shape changes
  schemaVersion: CURRENT_SCHEMA_VERSION,

  // User identity
  userId: null,
  displayName: null,
  partnerName: null,

  // Onboarding
  hasCompletedIntro: false,
  hasCompletedWalkthrough: false,
  visitedMuseums: [],

  // Streak
  streakDays: 0,
  lastSessionDate: null,

  // Session counter — incremented once per app open.
  // Used by the SRS system instead of calendar days.
  sessionCount: 0,

  // Spaced repetition review queue.
  // { [artworkId]: { dueAtSession, intervalIndex, consecutiveMisses, quizTier, wallLabelDue } }
  reviewQueue: {},

  // Per-artwork state
  artworkState: {},

  // Per-movement progress (legacy, kept for compatibility)
  movementProgress: {},

  // NEW (global thesis): Per-cell completion timestamps.
  // Keyed by "${eraId}:${regionId}". Used to detect newly added content.
  cellCompletions: {},

  // NEW: Track the last gap-size we nudged about, so we don't nag.
  lastSyncNudgeGap: 0,

  // NEW: Has the user dismissed the "new content added" prompts for these works?
  acknowledgedNewArtworks: [],

  // NEW: Free Explore mode — when true, the synchronization rule is silent.
  freeExploreMode: false,

  // Per-movement curator rank (legacy)
  curatorRanks: {},

  // Author mode edits
  authorEdits: {},
  authorModeUnlocked: false,

  // App settings
  settings: {
    reducedMotion: false,
  },
};

// In-memory copy of state, mutated then saved.
let state = null;

/**
 * Load state from localStorage, or initialize defaults.
 * Always returns a complete state object.
 *
 * On load, runs any pending migrations to bring older saves up to
 * the current schema version. Failed loads fall back to a fresh
 * state — and we attempt to preserve the unparseable raw data
 * under a backup key so the user could recover manually.
 */
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      state = createFreshState();
      saveState();
      return state;
    }
    let parsed = JSON.parse(raw);

    // Treat missing schemaVersion as v1 (we introduced versioning in v2)
    const version = parsed.schemaVersion || 1;
    if (version < CURRENT_SCHEMA_VERSION) {
      // Snapshot the pre-migration state so we can recover if the
      // migration is buggy. Overwrites any previous pre-migration backup.
      try {
        localStorage.setItem(
          STORAGE_KEY + ':pre-migration-v' + version,
          raw
        );
      } catch (_) { /* quota errors are non-fatal */ }
      parsed = runMigrations(parsed, version);
    }

    // Merge with defaults to handle additively-added fields
    state = { ...DEFAULT_STATE, ...parsed };
    return state;
  } catch (err) {
    console.warn('Failed to load state:', err);
    // Preserve corrupt data so the user can recover if needed
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) localStorage.setItem(STORAGE_KEY + ':corrupt-backup', raw);
    } catch (_) {}
    state = createFreshState();
    saveState();
    return state;
  }
}

/**
 * Run all migrations from `fromVersion` up to CURRENT_SCHEMA_VERSION.
 */
function runMigrations(s, fromVersion) {
  let current = s;
  for (let v = fromVersion; v < CURRENT_SCHEMA_VERSION; v++) {
    const migrate = MIGRATIONS[v];
    if (migrate) {
      try {
        current = migrate(current);
      } catch (err) {
        console.warn(`Migration v${v} -> v${v + 1} failed, keeping prior state:`, err);
      }
    }
  }
  return current;
}

/**
 * Create a fresh state object with a generated user ID.
 */
function createFreshState() {
  return {
    ...DEFAULT_STATE,
    userId: generateUserId(),
  };
}

/**
 * Generate a simple user ID. Not cryptographically secure;
 * just unique enough to identify this user's writes to Firebase.
 */
function generateUserId() {
  return 'u_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}

/**
 * Get the current state. Read-only — use updateState to modify.
 */
function getState() {
  if (!state) loadState();
  return state;
}

/**
 * Update state with a partial object or a mutation function.
 * Saves to localStorage and notifies listeners.
 */
function updateState(patch) {
  if (!state) loadState();
  if (typeof patch === 'function') {
    patch(state);
  } else {
    Object.assign(state, patch);
  }
  saveState();
  notifyListeners();
}

/**
 * Save state to localStorage. Called automatically by updateState.
 */
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (err) {
    console.error('Failed to save state:', err);
  }
}

/**
 * Reset all state (for testing, or "start over" feature).
 */
function resetState() {
  state = createFreshState();
  saveState();
  notifyListeners();
}

// Simple pub/sub for state changes
const listeners = new Set();

function onStateChange(fn) {
  listeners.add(fn);
  return () => listeners.delete(fn);
}

function notifyListeners() {
  listeners.forEach(fn => {
    try { fn(state); } catch (err) { console.error(err); }
  });
}

/* ===== Convenience helpers for specific state operations ===== */

/**
 * Mark an artwork as encountered (shown to the user at least once).
 */
function markEncountered(artworkId) {
  updateState(s => {
    if (!s.artworkState[artworkId]) {
      s.artworkState[artworkId] = { encountered: false, masteredCount: 0, seenInPerson: null };
    }
    s.artworkState[artworkId].encountered = true;
    s.artworkState[artworkId].lastSeenAt = new Date().toISOString();
  });
}

/**
 * Mark an artwork as correctly identified in a quiz.
 * Increments mastery count.
 */
function markMastered(artworkId) {
  updateState(s => {
    if (!s.artworkState[artworkId]) {
      s.artworkState[artworkId] = { encountered: true, masteredCount: 0, seenInPerson: null };
    }
    s.artworkState[artworkId].masteredCount += 1;
    s.artworkState[artworkId].lastSeenAt = new Date().toISOString();
  });
}

/**
 * Record the user's response to "have you seen this in person?"
 * value can be 'yes', 'no', or 'maybe'.
 */
function setSeenInPerson(artworkId, value) {
  updateState(s => {
    if (!s.artworkState[artworkId]) {
      s.artworkState[artworkId] = { encountered: true, masteredCount: 0 };
    }
    s.artworkState[artworkId].seenInPerson = value;
  });
}

/**
 * Mark a lesson as completed within a movement.
 */
/**
 * Mark a lesson as completed. The first argument is a "scope key" — could be
 * a movementId (legacy) or an eraId (new model) or any other grouping. The
 * lesson record is stored in s.movementProgress for backward compat.
 */
function markLessonCompleted(scopeKey, lessonId) {
  if (!scopeKey) scopeKey = '_global';  // Fall-through bucket
  updateState(s => {
    if (!s.movementProgress[scopeKey]) {
      s.movementProgress[scopeKey] = { lessonsCompleted: [], finalExhibitionPassed: false };
    }
    if (!s.movementProgress[scopeKey].lessonsCompleted.includes(lessonId)) {
      s.movementProgress[scopeKey].lessonsCompleted.push(lessonId);
    }
  });
}

/**
 * Update streak based on whether the user did any activity today.
 * Sundays are "rest days" — they don't break a streak even if missed.
 */
function tickStreak() {
  const today = new Date().toISOString().slice(0, 10);
  const s = getState();

  if (s.lastSessionDate === today) {
    // Already counted today
    return;
  }

  if (!s.lastSessionDate) {
    // First session ever
    updateState({ streakDays: 1, lastSessionDate: today });
    return;
  }

  // Calculate days between
  const last = new Date(s.lastSessionDate);
  const now = new Date(today);
  const dayDiff = Math.round((now - last) / (1000 * 60 * 60 * 24));

  if (dayDiff === 1) {
    // Consecutive day, increment
    updateState({ streakDays: s.streakDays + 1, lastSessionDate: today });
  } else if (dayDiff === 2 && new Date(s.lastSessionDate).getDay() === 6) {
    // Missed only Sunday — Sunday is a rest day, preserve streak
    updateState({ streakDays: s.streakDays + 1, lastSessionDate: today });
  } else {
    // Streak broken, restart at 1
    updateState({ streakDays: 1, lastSessionDate: today });
  }
}

/* ============================================================
   EXPORT / IMPORT
   Lets the user save a JSON backup of their progress and
   restore it on the same or a different device. Critical for
   any case where localStorage is cleared (browser wipe, new
   phone, "reset" tap, paranoid user before a code push).
   ============================================================ */

/**
 * Return the current state as a JSON-serializable object, plus
 * a small metadata envelope identifying it as an Accession backup
 * with a timestamp and the user's display name.
 */
function exportState() {
  if (!state) loadState();
  return {
    _appName: 'Accession',
    _exportedAt: new Date().toISOString(),
    _displayName: state.displayName || null,
    schemaVersion: state.schemaVersion || CURRENT_SCHEMA_VERSION,
    state: state,
  };
}

/**
 * Trigger a browser download of the current state as a JSON file.
 * Filename uses the displayName + date.
 */
function downloadBackup() {
  const payload = exportState();
  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0, 10);
  const name = (state.displayName || 'accession').replace(/[^a-z0-9-]/gi, '_').toLowerCase();
  a.href = url;
  a.download = `accession-backup-${name}-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/**
 * Restore state from a backup payload (the object returned by
 * exportState). Validates the envelope, runs any pending
 * migrations, and saves. Returns { ok: true } or { ok: false, error }.
 *
 * Does NOT prompt for confirmation — the caller (Profile view)
 * handles the "are you sure?" UX.
 */
function importState(payload) {
  try {
    if (!payload || typeof payload !== 'object') {
      return { ok: false, error: 'Backup file is empty or not valid JSON.' };
    }
    if (payload._appName !== 'Accession') {
      return { ok: false, error: 'That file is not an Accession backup.' };
    }
    if (!payload.state || typeof payload.state !== 'object') {
      return { ok: false, error: 'Backup file is missing state data.' };
    }
    // Run migrations if the backup is older
    let restored = payload.state;
    const version = restored.schemaVersion || payload.schemaVersion || 1;
    if (version < CURRENT_SCHEMA_VERSION) {
      restored = runMigrations(restored, version);
    }
    // Merge with current defaults to fill in any fields added since
    state = { ...DEFAULT_STATE, ...restored };
    saveState();
    notifyListeners();
    return { ok: true };
  } catch (err) {
    return { ok: false, error: err.message || 'Unknown error reading backup.' };
  }
}

/* ============================================================
   SPACED REPETITION SYSTEM (SRS)
   Session-based intervals. The session counter increments once
   per app open; review due dates are compared against it.
   Intervals: 1 → 3 → 7 → 21 → 60 sessions.
   ============================================================ */

const SRS_INTERVALS = [1, 3, 7, 21, 60];

/**
 * Increment the session counter. Call once on app boot.
 */
function tickSession() {
  updateState(s => { s.sessionCount = (s.sessionCount || 0) + 1; });
}

/**
 * Schedule an artwork for review after a lesson encounter.
 * Called when the user first encounters an artwork.
 */
function scheduleReview(artworkId) {
  if (!state) loadState();
  const current = state.sessionCount || 0;
  if (state.reviewQueue[artworkId]) return; // already scheduled
  updateState(s => {
    s.reviewQueue[artworkId] = {
      dueAtSession: current + SRS_INTERVALS[0],
      intervalIndex: 0,
      consecutiveMisses: 0,
      quizTier: 'recognition',
      wallLabelDue: current + SRS_INTERVALS[1],
    };
  });
}

/**
 * Record a correct answer for an artwork in the review queue.
 * Advances the interval and resets consecutive misses.
 */
function recordReviewCorrect(artworkId) {
  if (!state) loadState();
  const current = state.sessionCount || 0;
  updateState(s => {
    const entry = s.reviewQueue[artworkId];
    if (!entry) return;
    const nextIndex = Math.min(entry.intervalIndex + 1, SRS_INTERVALS.length - 1);
    entry.intervalIndex = nextIndex;
    entry.dueAtSession = current + SRS_INTERVALS[nextIndex];
    entry.consecutiveMisses = 0;
    // Advance wall label on correct answers too, but more slowly
    entry.wallLabelDue = current + SRS_INTERVALS[Math.min(nextIndex + 1, SRS_INTERVALS.length - 1)];
  });
}

/**
 * Record an incorrect answer.
 * First miss: reschedule +1 session, same tier.
 * Second consecutive miss: step back one tier.
 */
function recordReviewMiss(artworkId) {
  if (!state) loadState();
  const current = state.sessionCount || 0;
  const tiers = ['recognition', 'context', 'synthesis'];
  updateState(s => {
    const entry = s.reviewQueue[artworkId];
    if (!entry) return;
    entry.consecutiveMisses = (entry.consecutiveMisses || 0) + 1;
    // Reschedule for next session regardless
    entry.dueAtSession = current + 1;
    if (entry.consecutiveMisses >= 2) {
      // Step back one tier
      const currentTierIdx = tiers.indexOf(entry.quizTier);
      if (currentTierIdx > 0) {
        entry.quizTier = tiers[currentTierIdx - 1];
      }
      entry.consecutiveMisses = 0; // reset after step-back
      // Also reset interval index
      entry.intervalIndex = Math.max(0, entry.intervalIndex - 1);
    }
  });
}

/**
 * Mark a wall label as reviewed. Advances its due date.
 */
function recordWallLabelReview(artworkId) {
  if (!state) loadState();
  const current = state.sessionCount || 0;
  updateState(s => {
    const entry = s.reviewQueue[artworkId];
    if (!entry) return;
    const nextIndex = Math.min((entry.intervalIndex || 0) + 1, SRS_INTERVALS.length - 1);
    entry.wallLabelDue = current + SRS_INTERVALS[nextIndex];
  });
}

/**
 * Get all items due for review this session.
 * Returns { quizItems: [artworkId], wallLabelItems: [artworkId] }
 */
function getDueReviewItems() {
  if (!state) loadState();
  const current = state.sessionCount || 0;
  const quizItems = [];
  const wallLabelItems = [];
  for (const [artId, entry] of Object.entries(state.reviewQueue || {})) {
    if (entry.dueAtSession <= current) quizItems.push(artId);
    if (entry.wallLabelDue <= current) wallLabelItems.push(artId);
  }
  return { quizItems, wallLabelItems };
}

/**
 * Get the review count for the Today view badge.
 */
function getDueReviewCount() {
  const { quizItems, wallLabelItems } = getDueReviewItems();
  // Deduplicate — an artwork may appear in both
  const all = new Set([...quizItems, ...wallLabelItems]);
  return all.size;
}
